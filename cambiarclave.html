<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recuperar Contraseña - Virtualmind</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 50%, #4a90d9 100%);
      min-height: 100vh;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen">

  <div class="glass-card shadow-2xl p-6 sm:p-8 rounded-2xl w-full max-w-md">
    <!-- Enlace al inicio (arriba) -->
    <div class="mb-4">
      <a href="/" class="inline-flex items-center gap-2 text-sm text-blue-600 hover:text-blue-700 font-medium">
        <span aria-hidden="true">←</span>
        Volver al inicio
      </a>
    </div>

    <div class="text-center mb-6">
      <img src="/assets/logo.png" alt="Virtualmind" class="w-16 h-16 mx-auto mb-3 rounded-full shadow-lg object-cover">
      <div class="w-16 h-16 mx-auto mb-3 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center shadow-lg">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">Recuperar Contraseña</h1>
      <p class="text-gray-500 text-sm mt-2">
        Ingresa tu correo para recibir el código de verificación
      </p>
    </div>

    <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Correo electrónico</label>
    <input
      id="email"
      type="email"
      placeholder="tunombre@dominio.com"
      class="w-full border border-gray-300 p-3 rounded-lg mb-5 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition shadow-sm"
      autocomplete="email"
      required
    />

    <button
      id="recoverBtn"
      class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-3 rounded-lg font-semibold hover:from-blue-700 hover:to-indigo-700 disabled:opacity-60 disabled:cursor-not-allowed transition shadow-md hover:shadow-lg transform hover:-translate-y-0.5"
    >
      Enviar
    </button>

    <p id="message" class="text-center mt-4 text-sm" aria-live="polite"></p>

    <!-- Enlace al inicio (abajo) -->
    <div class="mt-6 text-center">
      <a href="/" class="text-sm text-gray-600 hover:text-blue-600 font-medium">Volver al inicio</a>
    </div>
  </div>

  <script>
    const emailInput = document.getElementById('email');
    const messageEl = document.getElementById('message');
    const btn = document.getElementById('recoverBtn');

    function setMessage(text, type = 'neutral') {
      // Limpia clases previas
      messageEl.classList.remove('text-red-500', 'text-green-600', 'text-gray-600');
      // Asigna color según tipo
      if (type === 'error') messageEl.classList.add('text-red-500');
      else if (type === 'success') messageEl.classList.add('text-green-600');
      else messageEl.classList.add('text-gray-600');
      messageEl.textContent = text;
    }

    async function submitRecovery() {
      const email = emailInput.value.trim();

      if (!email) {
        setMessage('Por favor ingresa tu correo.', 'error');
        emailInput.focus();
        return;
      }

      try {
        btn.disabled = true;
        setMessage('Enviando solicitud…', 'neutral');

        const resp = await fetch('https://gestordecursos.pegui.edu.co:8000/auth/request-password-reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        if (resp.ok) {
          setMessage('Código enviado. Redirigiendo a la página de verificación...', 'success');
          setTimeout(() => {
            window.location.href = '/reset-password/?email=' + encodeURIComponent(email);
          }, 1500);
        } else {
          setMessage('Error al intentar recuperar la contraseña.', 'error');
        }
      } catch (e) {
        setMessage('Error al conectar con el servidor.', 'error');
      } finally {
        btn.disabled = false;
      }
    }

    btn.addEventListener('click', submitRecovery);

    // Permite enviar con Enter dentro del input
    emailInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        submitRecovery();
      }
    });
  </script>

</body>
</html>
