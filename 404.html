<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Página No Encontrada | VirtualMind</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 40px;
      max-width: 600px;
    }
    .error-code {
      font-size: 120px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 15px;
      color: #e5e7eb;
    }
    p {
      font-size: 18px;
      color: #9ca3af;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .illustration {
      width: 200px;
      height: 200px;
      margin: 0 auto 30px;
      position: relative;
    }
    .illustration::before {
      content: '🔍';
      font-size: 120px;
      display: block;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
    }
    .help-links {
      margin-top: 40px;
      padding-top: 30px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .help-links p {
      font-size: 14px;
      margin-bottom: 15px;
    }
    .help-links a {
      color: #667eea;
      text-decoration: none;
      margin: 0 15px;
      font-size: 14px;
    }
    .help-links a:hover {
      text-decoration: underline;
    }
    .logo {
      margin-bottom: 30px;
    }
    .logo span {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <span>VirtualMind</span>
    </div>
    <div class="illustration"></div>
    <div class="error-code">404</div>
    <h1>Página No Encontrada</h1>
    <p>La página que buscas no existe o ha sido movida. Verifica la URL o vuelve al inicio.</p>
    <a href="https://gestordecursos.pegui.edu.co" class="btn">Volver al Inicio</a>
    <div class="help-links">
      <p>¿Necesitas ayuda?</p>
      <a href="https://gestordecursos.pegui.edu.co/login.html">Ir al Login</a>
    </div>
  </div>
</body>
</html>
