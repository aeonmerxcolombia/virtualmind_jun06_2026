<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba ACE Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.23.4/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.23.4/ext-language_tools.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background: #1e1e1e;
        }
        h1 {
            color: #fff;
            text-align: center;
        }
        .editor-container {
            margin: 20px auto;
            max-width: 900px;
        }
        #editor {
            width: 100%;
            height: 400px;
            border-radius: 8px;
        }
        .controls {
            max-width: 900px;
            margin: 0 auto 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary { background: #007acc; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-warning { background: #ffc107; color: #000; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <h1>🚀 Prueba de ACE Editor</h1>
    
    <div class="controls">
        <button class="btn-primary" onclick="setMode('javascript')">JavaScript</button>
        <button class="btn-primary" onclick="setMode('python')">Python</button>
        <button class="btn-primary" onclick="setMode('html')">HTML</button>
        <button class="btn-primary" onclick="setMode('css')">CSS</button>
        <button class="btn-primary" onclick="setMode('json')">JSON</button>
        <button class="btn-primary" onclick="setMode('sql')">SQL</button>
        <button class="btn-success" onclick="getValue()">Obtener Valor</button>
        <button class="btn-warning" onclick="setValue()">Establecer Valor</button>
    </div>

    <div class="editor-container">
        <div id="editor"></div>
    </div>

    <script>
        ace.require("ace/ext/language_tools");
        
        const editor = ace.edit("editor", {
            theme: "ace/theme/monokai",
            mode: "ace/mode/javascript",
            fontSize: 14,
            tabSize: 2,
            useWorker: true,
            enableBasicAutocompletion: true,
            enableLiveAutocompletion: true,
            showPrintMargin: false,
            wrap: true
        });

        const sampleCode = {
            javascript: `// Ejemplo JavaScript
function saludar(nombre) {
    return \`Hola, \${nombre}!\`;
}

const numbers = [1, 2, 3, 4, 5];
const doubled = numbers.map(n => n * 2);

console.log(saludar("Mundo"));
console.log(doubled);`,

            python: `# Ejemplo Python
def saludar(nombre):
    return f"Hola, {nombre}!"

numbers = [1, 2, 3, 4, 5]
doubled = [n * 2 for n in numbers]

print(saludar("Mundo"))
print(doubled)`,

            html: `<!-- Ejemplo HTML -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Página</title>
</head>
<body>
    <h1>Hola Mundo</h1>
</body>
</html>`,

            css: `/* Ejemplo CSS */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.button {
    background: #007acc;
    color: white;
    padding: 10px 20px;
}`,

            json: `{
    "nombre": "Usuario",
    "edad": 30,
    "roles": ["admin", "editor"],
    "configuracion": {
        "tema": "oscuro",
        "idioma": "es"
    }
}`,

            sql: `-- Ejemplo SQL
SELECT u.nombre, u.email, COUNT(p.id) as proyectos
FROM usuarios u
LEFT JOIN proyectos p ON u.id = p.usuario_id
WHERE u.activo = 1
GROUP BY u.id
ORDER BY proyectos DESC;`
        };

        function setMode(mode) {
            editor.session.setMode(`ace/mode/${mode}`);
            editor.setValue(sampleCode[mode] || "", -1);
        }

        function getValue() {
            alert("Contenido del editor:\n\n" + editor.getValue());
        }

        function setValue() {
            editor.setValue("// Nuevo contenido establecido\nconsole.log('Hello World!');", -1);
        }

        editor.setValue(sampleCode.javascript, -1);
    </script>
</body>
</html>
