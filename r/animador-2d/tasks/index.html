<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Tareas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/fetch-con-token.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'fade-in': 'fadeIn 0.3s ease-out',
            'slide-up': 'slideUp 0.4s ease-out',
            'bounce-in': 'bounceIn 0.5s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' }
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' }
            },
            bounceIn: {
              '0%': { transform: 'scale(0.3)', opacity: '0' },
              '50%': { transform: 'scale(1.05)' },
              '70%': { transform: 'scale(0.9)' },
              '100%': { transform: 'scale(1)', opacity: '1' }
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-100 min-h-screen">
  <!-- Header con gradiente -->
  <div class="bg-gradient-to-r from-blue-600 via-blue-700 to-indigo-800 shadow-2xl">
    <div class="max-w-7xl mx-auto px-6 py-8">
      <div class="flex items-center justify-between">
        <div class="flex items-center space-x-4">
          <div class="bg-white/20 backdrop-blur-sm rounded-full p-3">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path>
            </svg>
          </div>
          <div>
            <h1 class="text-4xl font-bold text-white tracking-tight">Gestión de Tareas</h1>
            <p class="text-blue-100 text-lg">Organiza y gestiona tus proyectos</p>
          </div>
        </div>
        <div class="hidden md:flex items-center space-x-6 text-blue-100">
          <div class="text-center">
            <div class="text-2xl font-bold text-white" id="total-tareas">0</div>
            <div class="text-sm">Total</div>
          </div>
          <div class="text-center">
            <div class="text-2xl font-bold text-green-300" id="tareas-completadas">0</div>
            <div class="text-sm">Completadas</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Contenido principal -->
  <div class="max-w-7xl mx-auto px-6 py-8">
    <!-- Barra de acciones -->
    <div class="bg-white/70 backdrop-blur-sm rounded-2xl shadow-lg p-6 mb-8 border border-white/50">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div class="flex items-center space-x-4">
          <button onclick="cargarTareas()" 
            class="bg-white hover:bg-gray-50 text-gray-700 px-4 py-3 rounded-xl font-medium border border-gray-200 transition-all duration-200 hover:shadow-md flex items-center space-x-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
            </svg>
            <span>Actualizar</span>
          </button>
        </div>
        
        <!-- Filtros ampliados con proyecto -->
        <div class="flex items-center space-x-3 flex-wrap gap-2">
          <select id="filtroProyecto" class="bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            <option value="">Todos los proyectos</option>
          </select>
          <select id="filtroEstado" class="bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            <option value="">Todos los estados</option>
            <option value="Nuevo">Nuevo</option>
            <option value="En curso">En curso</option>
            <option value="En revisión">En revisión</option>
            <option value="Resuelto">Resuelto</option>
            <option value="Cerrado">Cerrado</option>
          </select>
          <select id="filtroPrioridad" class="bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            <option value="">Todas las prioridades</option>
            <option value="Alta">Alta</option>
            <option value="Media">Media</option>
            <option value="Baja">Baja</option>
          </select>
          <select id="filtroFase" class="bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            <option value="">Todas las fases</option>
          </select>
          <select id="filtroEtapa" class="bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            <option value="">Todas las etapas</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Tabla de tareas mejorada con columna proyecto -->
    <div class="bg-white/70 backdrop-blur-sm rounded-2xl shadow-xl border border-white/50 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full">
          <thead class="bg-gradient-to-r from-gray-50 to-gray-100">
            <tr>
              <th class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider border-b border-gray-200">
                <div class="flex items-center space-x-2">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a.997.997 0 01-1.414 0l-7-7A1.997 1.997 0 013 12V7a4 4 0 014-4z"></path>
                  </svg>
                  <span>Título</span>
                </div>
              </th>
              <th class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider border-b border-gray-200">
                <div class="flex items-center space-x-2">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                  </svg>
                  <span>Proyecto</span>
                </div>
              </th>
              <th class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider border-b border-gray-200">
                <div class="flex items-center space-x-2">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                  </svg>
                  <span>Responsable</span>
                </div>
              </th>
              <th class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider border-b border-gray-200">
                <div class="flex items-center space-x-2">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                  </svg>
                  <span>Prioridad</span>
                </div>
              </th>
              <th class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider border-b border-gray-200">
                <div class="flex items-center space-x-2">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                  </svg>
                  <span>Estado</span>
                </div>
              </th>
              <th class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider border-b border-gray-200">
                <div class="flex items-center space-x-2">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                  </svg>
                  <span>Fase</span>
                </div>
              </th>
              <th class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider border-b border-gray-200">
                <div class="flex items-center space-x-2">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
                  </svg>
                  <span>Etapa</span>
                </div>
              </th>
              <th class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider border-b border-gray-200">
                <div class="flex items-center space-x-2">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                  </svg>
                  <span>Vencimiento</span>
                </div>
              </th>
              <th class="px-6 py-4 text-center text-xs font-semibold text-gray-600 uppercase tracking-wider border-b border-gray-200">
                Acciones
              </th>
            </tr>
          </thead>
          <tbody id="tbody-tareas" class="divide-y divide-gray-100">
            <!-- Se llenará dinámicamente -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Estado de carga -->
    <div id="loading" class="hidden text-center py-8">
      <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
      <p class="mt-2 text-gray-600">Cargando tareas...</p>
    </div>

    <!-- Estado vacío -->
    <div id="empty-state" class="hidden text-center py-12">
      <div class="bg-white/70 backdrop-blur-sm rounded-2xl shadow-lg p-8 border border-white/50">
        <svg class="mx-auto h-16 w-16 text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
        </svg>
        <h3 class="text-lg font-medium text-gray-900 mb-2">No hay tareas asignadas</h3>
        <p class="text-gray-500">No tienes tareas asignadas en este momento.</p>
      </div>
    </div>
  </div>

  <!-- Contenedor de modales -->
  <div id="modal-container"></div>

  <script>
    const API_URL = "https://gestordecursos.pegui.edu.co:8000/tareas/";
    const STATIC_URL = "https://gestordecursos.pegui.edu.co:8000";
    const USERS_URL = "https://gestordecursos.pegui.edu.co:8000/users/";
    const FASES_URL = "https://gestordecursos.pegui.edu.co:8000/fases/";
    const ETAPAS_URL = "https://gestordecursos.pegui.edu.co:8000/etapas/";
    const PROJECTS_URL = "https://gestordecursos.pegui.edu.co:8000/projects/";

    // Listas fijas para selects
    const ESTADOS = [
      "Nuevo",
      "En curso",
      "En revisión",
      "Resuelto",
      "Cerrado"
    ];
    const PRIORIDADES = [
      "Alta",
      "Media",
      "Baja"
    ];

    let listaUsuarios = [];
    let listaFases = [];
    let listaEtapas = [];
    let listaProyectos = [];
    let tareasGlobales = [];

    // *** FUNCIONES PARA RESOLVER IDs A NOMBRES ***
    function obtenerNombreFase(faseId) {
      if (!faseId) return 'Sin fase';
      const fase = listaFases.find(f => f.id == faseId);
      return fase ? (fase.nombre || `Fase ${faseId}`) : `Fase ${faseId}`;
    }

    function obtenerNombreEtapa(etapaId) {
      if (!etapaId) return 'Sin etapa';
      const etapa = listaEtapas.find(e => e.id == etapaId);
      return etapa ? (etapa.nombre || `Etapa ${etapaId}`) : `Etapa ${etapaId}`;
    }

    function obtenerNombreProyecto(projectId) {
      if (!projectId) return 'Sin proyecto';
      const proyecto = listaProyectos.find(p => p.id == projectId);
      return proyecto ? (proyecto.nombre || proyecto.name || `Proyecto ${projectId}`) : `Proyecto ${projectId}`;
    }

    // Funciones de utilidad para badges
    function getPrioridadBadge(prioridad) {
      const badges = {
        'Alta': 'bg-red-100 text-red-800 border border-red-200',
        'Media': 'bg-yellow-100 text-yellow-800 border border-yellow-200',
        'Baja': 'bg-green-100 text-green-800 border border-green-200'
      };
      return badges[prioridad] || 'bg-gray-100 text-gray-800 border border-gray-200';
    }

    function getEstadoBadge(estado) {
      const badges = {
        'Nuevo': 'bg-blue-100 text-blue-800 border border-blue-200',
        'En curso': 'bg-orange-100 text-orange-800 border border-orange-200',
        'En revisión': 'bg-purple-100 text-purple-800 border border-purple-200',
        'Resuelto': 'bg-green-100 text-green-800 border border-green-200',
        'Cerrado': 'bg-gray-100 text-gray-800 border border-gray-200'
      };
      return badges[estado] || 'bg-gray-100 text-gray-800 border border-gray-200';
    }

    function getFaseBadge(fase) {
      return 'bg-indigo-100 text-indigo-800 border border-indigo-200';
    }

    function getEtapaBadge(etapa) {
      return 'bg-teal-100 text-teal-800 border border-teal-200';
    }

    function getProyectoBadge(proyecto) {
      return 'bg-purple-100 text-purple-800 border border-purple-200';
    }

    // Obtener headers con token
    function getAuthHeaders(extra = {}) {
      const token = localStorage.getItem('token');
      return {
        ...extra,
        ...(token ? { Authorization: 'Bearer ' + token } : {}),
      };
    }

    // Función para cargar proyectos
    async function cargarProyectos() {
      try {
        console.log('Cargando proyectos...');
        const projectResponse = await fetch(PROJECTS_URL, {
            headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
        });

        if (projectResponse.ok) {
          listaProyectos = await projectResponse.json();
          console.log('Proyectos cargados:', listaProyectos);
          actualizarFiltroProyectos();
        } else {
          console.warn('No se pudieron cargar los proyectos');
        }
      } catch (error) {
        console.error('Error cargando proyectos:', error);
      }
    }

    // Función para cargar fases
    async function cargarFases() {
      try {
        console.log('Cargando fases...');
        const faseResponse = await fetch(FASES_URL, {
            headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
        });

        if (faseResponse.ok) {
          listaFases = await faseResponse.json();
          console.log('Fases cargadas:', listaFases);
          actualizarFiltroFases();
        } else {
          console.warn('No se pudieron cargar las fases');
        }
      } catch (error) {
        console.error('Error cargando fases:', error);
      }
    }

    // Función para cargar etapas
    async function cargarEtapas() {
      try {
        console.log('Cargando etapas...');
        const etapaResponse = await fetch(ETAPAS_URL, {
            headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
        });

        if (etapaResponse.ok) {
          listaEtapas = await etapaResponse.json();
          console.log('Etapas cargadas:', listaEtapas);
          actualizarFiltroEtapas();
        } else {
          console.warn('No se pudieron cargar las etapas');
        }
      } catch (error) {
        console.error('Error cargando etapas:', error);
      }
    }

    // Función para actualizar el select de proyectos
    function actualizarFiltroProyectos() {
      const filtroProyecto = document.getElementById('filtroProyecto');
      filtroProyecto.innerHTML = '<option value="">Todos los proyectos</option>';

      listaProyectos.forEach(proyecto => {
        const option = document.createElement('option');
        option.value = proyecto.id;
        option.textContent = proyecto.nombre || proyecto.name || `Proyecto ${proyecto.id}`;
        filtroProyecto.appendChild(option);
      });
    }

    // Función para actualizar el select de fases
    function actualizarFiltroFases() {
      const filtroFase = document.getElementById('filtroFase');
      filtroFase.innerHTML = '<option value="">Todas las fases</option>';

      listaFases.forEach(fase => {
        const option = document.createElement('option');
        option.value = fase.id;
        option.textContent = fase.nombre || `Fase ${fase.id}`;
        filtroFase.appendChild(option);
      });
    }

    // Función para actualizar el select de etapas
    function actualizarFiltroEtapas() {
      const filtroEtapa = document.getElementById('filtroEtapa');
      filtroEtapa.innerHTML = '<option value="">Todas las etapas</option>';

      listaEtapas.forEach(etapa => {
        const option = document.createElement('option');
        option.value = etapa.id;
        option.textContent = etapa.nombre || `Etapa ${etapa.id}`;
        filtroEtapa.appendChild(option);
      });
    }

    // Actualizar estadísticas
    function actualizarEstadisticas(tareas) {
      const total = tareas.length;
      const completadas = tareas.filter(t => t.estado === 'Resuelto' || t.estado === 'Cerrado').length;
      
      document.getElementById('total-tareas').textContent = total;
      document.getElementById('tareas-completadas').textContent = completadas;
    }

    // Cargar tareas al inicio (NO requiere autenticación)
    async function cargarTareas() {
      const loadingEl = document.getElementById('loading');
      const emptyStateEl = document.getElementById('empty-state');
      const tbody = document.getElementById('tbody-tareas');
      
      loadingEl.classList.remove('hidden');
      emptyStateEl.classList.add('hidden');

      // Asegurar que proyectos, fases y etapas estén cargadas
      await Promise.all([cargarProyectos(), cargarFases(), cargarEtapas()]);
      
      fetch(API_URL)
        .then(res => {
          if (res.status === 401 || res.status === 403) {
            throw new Error("No autorizado");
          }
          return res.json();
        })
        .then(data => {
          const tareas = Array.isArray(data) ? data : (data.tareas || data.data || []);
          if (!Array.isArray(tareas)) {
            throw new Error("Formato de respuesta inválido");
          }
          tareasGlobales = tareas;
          renderTareas(tareas);
          actualizarEstadisticas(tareas);
        })
        .catch(err => {
          console.error('Error cargando tareas:', err);
          tbody.innerHTML = '<tr><td colspan="9" class="text-center py-8 text-red-600">Error: ' + err.message + '</td></tr>';
        })
        .finally(() => {
          loadingEl.classList.add('hidden');
        });
    }

    function renderTareas(tareas) {
      const tbody = document.getElementById('tbody-tareas');
      const emptyStateEl = document.getElementById('empty-state');
      
      if (tareas.length === 0) {
        tbody.innerHTML = '';
        emptyStateEl.classList.remove('hidden');
        return;
      }
      
      emptyStateEl.classList.add('hidden');
      tbody.innerHTML = '';
      
      tareas.forEach((tarea, index) => {
        const row = document.createElement('tr');
        row.className = 'hover:bg-blue-50/50 transition-colors duration-200 animate-slide-up';
        row.style.animationDelay = `${index * 0.05}s`;
        
        row.innerHTML = `
          <td class="px-6 py-4 border-b border-gray-100">
            <div class="font-medium text-gray-900 truncate max-w-xs" title="${tarea.titulo}">
              ${tarea.titulo}
            </div>
          </td>
          <td class="px-6 py-4 border-b border-gray-100">
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${getProyectoBadge(obtenerNombreProyecto(tarea.project_id))}">
              ${obtenerNombreProyecto(tarea.project_id)}
            </span>
          </td>
          <td class="px-6 py-4 border-b border-gray-100">
            <div class="flex items-center space-x-2">
              <div class="w-8 h-8 bg-gradient-to-br from-blue-400 to-blue-600 rounded-full flex items-center justify-center text-white text-sm font-medium">
                ${(tarea.asignado || 'N').charAt(0).toUpperCase()}
              </div>
              <span class="text-gray-700 font-medium">${tarea.asignado || 'Sin asignar'}</span>
            </div>
          </td>
          <td class="px-6 py-4 border-b border-gray-100">
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${getPrioridadBadge(tarea.prioridad)}">
              ${tarea.prioridad || 'Sin definir'}
            </span>
          </td>
          <td class="px-6 py-4 border-b border-gray-100">
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${getEstadoBadge(tarea.estado)}">
              ${tarea.estado || 'Sin estado'}
            </span>
          </td>
          <td class="px-6 py-4 border-b border-gray-100">
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${getFaseBadge(obtenerNombreFase(tarea.fase_id))}">
              ${obtenerNombreFase(tarea.fase_id)}
            </span>
          </td>
          <td class="px-6 py-4 border-b border-gray-100">

    // Filtros ampliados con proyecto
    function aplicarFiltros() {
      const filtroProyecto = document.getElementById('filtroProyecto').value;
      const filtroEstado = document.getElementById('filtroEstado').value;
      const filtroPrioridad = document.getElementById('filtroPrioridad').value;
      const filtroFase = document.getElementById('filtroFase').value;
      const filtroEtapa = document.getElementById('filtroEtapa').value;
      
      let tareasFiltradas = tareasGlobales;
      
      if (filtroProyecto) {
        tareasFiltradas = tareasFiltradas.filter(t => t.project_id == filtroProyecto);
      }
      
      if (filtroEstado) {
        tareasFiltradas = tareasFiltradas.filter(t => t.estado === filtroEstado);
      }
      
      if (filtroPrioridad) {
        tareasFiltradas = tareasFiltradas.filter(t => t.prioridad === filtroPrioridad);
      }
      
      if (filtroFase) {
        tareasFiltradas = tareasFiltradas.filter(t => t.fase_id == filtroFase);
      }

      if (filtroEtapa) {
        tareasFiltradas = tareasFiltradas.filter(t => t.etapa_id == filtroEtapa);
      }
      
      renderTareas(tareasFiltradas);
    }

    document.getElementById('filtroProyecto').onchange = aplicarFiltros;
    document.getElementById('filtroEstado').onchange = aplicarFiltros;

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Fecha de inicio</label>
                    <input type="date" name="fecha_inicio" 
                      class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-white" />
                  </div>
                  <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Fecha de entrega</label>
                    <input type="date" name="fecha_entrega" 
                      class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-white" />
                  </div>
                </div>
              </div>

              <!-- Botones -->
              <div class="flex flex-col sm:flex-row gap-3 pt-4">
                <button type="button" onclick="cerrarModalNuevaTarea()" 
                  class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 px-6 py-3 rounded-lg font-semibold transition-all duration-200 flex items-center justify-center space-x-2">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                  </svg>
                  <span>Cancelar</span>
                </button>
                <button type="submit" 
                  class="flex-1 bg-gradient-to-r from-emerald-500 to-green-600 hover:from-emerald-600 hover:to-green-700 text-white px-6 py-3 rounded-lg font-semibold transition-all duration-200 transform hover:scale-105 hover:shadow-lg flex items-center justify-center space-x-2">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                  </svg>
                  <span>Crear Tarea</span>
                </button>
              </div>
            </form>
          </div>
        </div>
      `;
      document.getElementById('modal-container').innerHTML = modalHtml;
      document.getElementById('formNuevaTarea').onsubmit = enviarNuevaTarea;
    }

    function cerrarModalNuevaTarea() {
      document.getElementById('modal-container').innerHTML = "";
    }

    // *** FUNCIÓN CORREGIDA PARA ENVIAR NUEVA TAREA CON PROJECT_ID ***
    function enviarNuevaTarea(e) {
      e.preventDefault();
      const form = e.target;
      const formData = new FormData(form);
      const submitBtn = form.querySelector('button[type="submit"]');

      // VALIDACIÓN CRÍTICA: Verificar que project_id tenga valor
      const projectId = formData.get('project_id');
      if (!projectId || projectId === '') {
        mostrarNotificacion('Debes seleccionar un proyecto válido', 'error');
        return;
      }

      // VALIDACIÓN CRÍTICA: Verificar que fase_id tenga valor
      const faseId = formData.get('fase_id');
      if (!faseId || faseId === '') {
        mostrarNotificacion('Debes seleccionar una fase válida', 'error');
        return;
      }

      // Validación adicional: etapa_id puede ser opcional
      const etapaId = formData.get('etapa_id');
      
      // Eliminar campos vacíos para evitar enviar null
      if (!etapaId || etapaId === '') {
        formData.delete('etapa_id'); // No enviar si está vacío
      }

      // Procesar seguidores múltiples
      const seguidoresSel = form.querySelector('select[name="seguidores"]');
      if (seguidoresSel) {
        const seleccionados = Array.from(seguidoresSel.selectedOptions).map(opt => opt.value);
        formData.delete('seguidores');
        seleccionados.forEach(seguidor => formData.append('seguidores', seguidor));
      }

      // Log de depuración
      console.log('Datos enviados en FormData:');
      for (let pair of formData.entries()) {
        console.log(`${pair[0]}: ${pair[1]} (tipo: ${typeof pair[1]})`);
      }

      // Deshabilitar botón y mostrar loading
      submitBtn.disabled = true;
      submitBtn.innerHTML = `
        <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        Creando...
      `;

      fetch(API_URL, {
        method: "POST",
        headers: getAuthHeaders(),
        body: formData
      })
      .then(res => {
        if (!res.ok) {
          return res.json().then(err => { 
            console.error('Error del backend:', err);
            throw new Error(err.detail || 'Error del servidor'); 
          });
        }
        return res.json();
      })
      .then(data => {
        console.log('Respuesta exitosa del backend:', data);
        cerrarModalNuevaTarea();
        cargarTareas();
        mostrarNotificacion('¡Tarea creada exitosamente!', 'success');
      })
      .catch(err => {
        console.error('Error creando tarea:', err);
        mostrarNotificacion('Error creando tarea: ' + err.message, 'error');
      })
      .finally(() => {
        // Restaurar botón
        submitBtn.disabled = false;
        submitBtn.innerHTML = `
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
          </svg>
          <span>Crear Tarea</span>
        `;
      });
    }

    // Función para mostrar notificaciones
    function mostrarNotificacion(mensaje, tipo = 'info') {
      const colores = {
        success: 'bg-green-500 text-white',
        error: 'bg-red-500 text-white',
        info: 'bg-blue-500 text-white',
        warning: 'bg-yellow-500 text-white'
      };

      const iconos = {
        success: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>`,
        error: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>`,
        info: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>`,
        warning: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>`
      };

      const notificacion = document.createElement('div');
      notificacion.className = `fixed top-4 right-4 z-[60] ${colores[tipo]} px-6 py-4 rounded-lg shadow-2xl flex items-center space-x-3 animate-slide-up max-w-sm`;
      notificacion.innerHTML = `
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          ${iconos[tipo]}
        </svg>
        <span class="font-medium">${mensaje}</span>
      `;

      document.body.appendChild(notificacion);

      // Remover después de 4 segundos
      setTimeout(() => {
        notificacion.style.animation = 'fadeIn 0.3s ease-out reverse';
        setTimeout(() => notificacion.remove(), 300);
      }, 4000);
    }

    // Mejorar UX con loading states
    function mostrarCargando(elemento, mostrar = true) {
      if (mostrar) {
        elemento.disabled = true;
        elemento.classList.add('opacity-50', 'cursor-not-allowed');
      } else {
        elemento.disabled = false;
        elemento.classList.remove('opacity-50', 'cursor-not-allowed');
      }
    }

    // Inicializar la aplicación
    document.addEventListener('DOMContentLoaded', function() {
      cargarTareas();
    });
  </script>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    @keyframes bounceIn {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.05); }
      70% { transform: scale(0.9); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    .animate-fade-in {
      animation: fadeIn 0.3s ease-out;
    }
    
    .animate-slide-up {
      animation: slideUp 0.4s ease-out;
    }
    
    .animate-bounce-in {
      animation: bounceIn 0.5s ease-out;
    }
    
    /* Scroll personalizado */
    ::-webkit-scrollbar {
      width: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
      border-radius: 10px;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    
    /* Mejoras en los select múltiples */
    select[multiple] option:checked {
      background: linear-gradient(0deg, #3b82f6 0%, #3b82f6 100%);
      color: white;
    }
    
    /* Animaciones hover más suaves */
    .transition-all {
      transition-property: all;
      transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      transition-duration: 200ms;
    }

    /* Responsive table improvements */
    @media (max-width: 768px) {
      .overflow-x-auto {
        scrollbar-width: thin;
      }
    }

    /* Badge improvements */
    .inline-flex {
      white-space: nowrap;
    }

    /* Form improvements */
    input:focus, select:focus, textarea:focus {
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    /* Loading animation improvements */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .animate-spin {
      animation: spin 1s linear infinite;
    }
  </style>
<script src="/js/tareas-vencimiento.js"></script>
</body>
