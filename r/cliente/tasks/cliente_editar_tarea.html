<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>

<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-100 min-h-screen">
    
  <div class="bg-gradient-to-r from-blue-600 via-blue-700 to-indigo-800 shadow-2xl">
    <div class="max-w-7xl mx-auto px-6 py-8">
      <div class="flex items-center justify-between">
        <div class="flex items-center space-x-4">
          <div class="bg-white/20 backdrop-blur-sm rounded-full p-3"><svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg></div>
          <div><h1 class="text-4xl font-bold text-white tracking-tight">Editar Tarea</h1><p class="text-blue-100 text-lg">Modifica los detalles de la tarea</p></div>
        </div>
        <div class="hidden md:flex"><a href="https://gestordecursos.pegui.edu.co/r/cliente/tasks" class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-lg flex items-center space-x-2"><span>Volver a la lista</span></a></div>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-8">
    <div id="form-container" class="bg-white/70 backdrop-blur-sm rounded-2xl shadow-xl border border-white/50 overflow-hidden" style="display: none;">
      <div class="p-6">
        <h2 class="text-2xl font-bold text-gray-900 mb-6">Editando Tarea: <span id="task-title-header" class="text-blue-700"></span></h2>
        
        <form id="formEditarTarea" enctype="multipart/form-data" autocomplete="off" class="space-y-6">
          <div class="bg-gray-50 rounded-xl p-6"> <h3 class="text-lg font-semibold text-gray-900 mb-4">Información básica</h3> <div class="grid grid-cols-1 md:grid-cols-2 gap-4"> <div class="md:col-span-2"> <label class="block text-sm font-semibold text-gray-700 mb-2">Título *</label> <input type="text" name="titulo" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" /> </div> <div class="md:col-span-2"> <label class="block text-sm font-semibold text-gray-700 mb-2">Descripción</label> <textarea name="descripcion" rows="3" class="w-full p-3 border border-gray-300 rounded-lg resize-none focus:ring-2 focus:ring-blue-500"></textarea> </div> </div> </div> <div class="bg-gray-50 rounded-xl p-6"> <h3 class="text-lg font-semibold text-gray-900 mb-4">Proyecto y Asignación</h3> <div class="grid grid-cols-1 md:grid-cols-3 gap-4"> <div> <label class="block text-sm font-semibold text-gray-700 mb-2">Proyecto *</label> <select name="project_id" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"></select> </div> <div> <label class="block text-sm font-semibold text-gray-700 mb-2">Responsable *</label> <select name="asignado" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"></select> </div> <div> <label class="block text-sm font-semibold text-gray-700 mb-2">Seguidores</label> <select name="seguidores" multiple class="w-full p-3 border border-gray-300 rounded-lg h-32 focus:ring-2 focus:ring-blue-500"></select> </div> </div> </div> <div class="bg-gray-50 rounded-xl p-6"> <h3 class="text-lg font-semibold text-gray-900 mb-4">Configuración</h3> <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4"> <div> <label class="block text-sm font-semibold text-gray-700 mb-2">Estado *</label> <select name="estado" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"> <option value="Nuevo">Nuevo</option><option value="En curso">En curso</option><option value="En revisión">En revisión</option><option value="Resuelto">Resuelto</option><option value="Cerrado">Cerrado</option> </select> </div> <div> <label class="block text-sm font-semibold text-gray-700 mb-2">Prioridad *</label> <select name="prioridad" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"> <option value="Alta">Alta</option><option value="Media">Media</option><option value="Baja">Baja</option> </select> </div> <div> <label class="block text-sm font-semibold text-gray-700 mb-2">Fase *</label> <select name="fase_id" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"></select> </div> <div> <label class="block text-sm font-semibold text-gray-700 mb-2">Etapa</label> <select name="etapa_id" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"></select> </div> <div class="lg:col-span-2"> <label class="block text-sm font-semibold text-gray-700 mb-2">Adjuntar nuevos archivos</label> <input type="file" name="adjuntos" multiple class="w-full p-2 border border-gray-300 rounded-lg file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" /> <p class="text-xs text-gray-500 mt-1">Si subes nuevos, reemplazarán los anteriores.</p> <div id="current-attachments" class="mt-3"></div> </div> </div> </div> <div class="bg-gray-50 rounded-xl p-6"> <h3 class="text-lg font-semibold text-gray-900 mb-4">Fechas importantes</h3> <div class="grid grid-cols-1 md:grid-cols-2 gap-4"> <div> <label class="block text-sm font-semibold text-gray-700 mb-2">Fecha de inicio</label> <input type="date" name="fecha_inicio" id="fecha_inicio" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" /> </div> <div> <label class="block text-sm font-semibold text-gray-700 mb-2">Fecha de entrega</label> <input type="date" name="fecha_entrega" id="fecha_entrega" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" /> </div> </div> <div id="fecha-error" class="mt-2 text-sm text-red-600 hidden"></div> </div> <div class="flex flex-col sm:flex-row gap-3 pt-4"> <a href="https://gestordecursos.pegui.edu.co/r/cliente/tasks" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 px-6 py-3 rounded-lg font-semibold flex items-center justify-center"><span>Cancelar</span></a> <button type="submit" class="flex-1 bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 text-white px-6 py-3 rounded-lg font-semibold flex items-center justify-center"><span>Guardar Cambios</span></button> </div>
        </form>
      </div>
    </div>
    <div id="loading-container" class="text-center py-20">
      <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
      <p class="mt-4 text-gray-700 font-semibold">Cargando datos de la tarea...</p>
    </div>
  </div>
  
  <script>
    const API_BASE_URL = "https://gestordecursos.pegui.edu.co:8000";
    const API_URL = `${API_BASE_URL}/tareas/`;
    const USERS_URL = `${API_BASE_URL}/users/`;
    const PROJECTS_URL = `${API_BASE_URL}/projects/`;
    const CRONOGRAMAS_URL = `${API_BASE_URL}/cronogramas/`;
    
    let clienteProyectos = [];
    let listaUsuarios = [];
    let mapaProyectoACronograma = {};
    let mapaCronogramaAEstructura = {};
    let currentAttachments = [];
    let fechaInicioEtapa = null;
    let fechaFinEtapa = null;

    function parseJwt(token) {
        try {
            const jsonPayload = decodeURIComponent(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
            return JSON.parse(jsonPayload);
        } catch (e) { console.error("Error decodificando token:", e); return null; }
    }

    function getAuthHeaders() {
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = "/index.html"; return null; }
        return { 'Authorization': `Bearer ${token}` };
    }

    async function inicializarFormularioEdicion() {
        const loadingContainer = document.getElementById('loading-container');
        const formContainer = document.getElementById('form-container');
        
        const params = new URLSearchParams(window.location.search);
        const taskId = params.get('id');
        if (!taskId) {
            loadingContainer.innerHTML = `<div class="text-center py-20 text-red-600 font-bold">Error: No se especificó un ID de tarea.</div>`;
            return;
        }

        const headers = getAuthHeaders();
        const token = localStorage.getItem('token');
        if (!token || !headers) return;

        const payload = parseJwt(token);
        const userIdFromToken = payload.user_id || payload.uid;
        if (!userIdFromToken) {
            mostrarNotificacion('Error: No se pudo identificar al usuario.', 'error');
            return;
        }
        
        try {
            const [tareaResponse, proyectosResponse, cronogramasResponse, usersResponse] = await Promise.all([
                fetch(API_URL + taskId, { headers }),
                fetch(PROJECTS_URL, { headers }),
                fetch(CRONOGRAMAS_URL, { headers }),
                fetch(USERS_URL, { headers })
            ]);

            if (!tareaResponse.ok) throw new Error('No se pudo cargar la tarea o no tienes permiso.');

            const tareaAEditar = await tareaResponse.json();
            currentAttachments = tareaAEditar.adjuntos || [];
            
            const todosLosProyectos = await proyectosResponse.json();
            const proyectosDelClienteIds = todosLosProyectos.filter(p => p.client_id === userIdFromToken).map(p => p.id);
            
            if (!proyectosDelClienteIds.includes(tareaAEditar.project_id)) {
                throw new Error("Acceso denegado. Esta tarea no pertenece a tus proyectos.");
            }
            clienteProyectos = todosLosProyectos.filter(p => proyectosDelClienteIds.includes(p.id));

            (await cronogramasResponse.json()).forEach(c => {
                mapaProyectoACronograma[c.project_id] = c.id;
                mapaCronogramaAEstructura[c.id] = c.estructura || [];
            });

            // ##### INICIO DE LA CORRECCIÓN #####
            const usersData = await usersResponse.json();
            // Esta línea ahora es más robusta. Intenta acceder a 'usersData.users'. 
            // Si no existe, prueba directamente con 'usersData' (si la API devuelve un arreglo).
            // Si todo falla, usa un arreglo vacío para evitar el error.
            listaUsuarios = usersData.users || usersData || [];
            // ##### FIN DE LA CORRECCIÓN #####
            
            await poblarFormulario(tareaAEditar);

            loadingContainer.style.display = 'none';
            formContainer.style.display = 'block';

            document.getElementById('formEditarTarea').onsubmit = (e) => actualizarTarea(e, taskId);

        } catch(error) {
            loadingContainer.innerHTML = `<div class="text-center py-20 text-red-600 font-bold">Error: ${error.message}</div>`;
        }
    }

    async function poblarFormulario(tarea) {
        document.getElementById('task-title-header').textContent = `"${tarea.titulo}"`;
        document.querySelector('[name="titulo"]').value = tarea.titulo || '';
        document.querySelector('[name="descripcion"]').value = tarea.descripcion || '';
        document.querySelector('[name="estado"]').value = tarea.estado || 'Nuevo';
        document.querySelector('[name="prioridad"]').value = tarea.prioridad || 'Media';
        document.querySelector('[name="fecha_inicio"]').value = tarea.fecha_inicio || '';
        document.querySelector('[name="fecha_entrega"]').value = tarea.fecha_entrega || '';

        // Primero se llenan las opciones, y luego se asigna el valor
        actualizarSelectUsuarios();
        document.querySelector('[name="asignado"]').value = tarea.asignado || '';
        if (tarea.seguidores && Array.isArray(tarea.seguidores)) {
            const seguidoresSelect = document.querySelector('[name="seguidores"]');
            Array.from(seguidoresSelect.options).forEach(option => {
                if (tarea.seguidores.includes(option.value)) { option.selected = true; }
            });
        }
        
        actualizarSelectProyectos();
        document.querySelector('[name="project_id"]').value = tarea.project_id;

        await actualizarSelectFases(tarea.project_id);
        document.querySelector('[name="fase_id"]').value = tarea.fase_id;

        await actualizarSelectEtapas(tarea.project_id, tarea.fase_id);
        const selectEtapa = document.querySelector('[name="etapa_id"]');
        if (tarea.etapa_id) {
          selectEtapa.value = tarea.etapa_id;
          establecerRestriccionesFechas(selectEtapa.options[selectEtapa.selectedIndex]);
        }
        
        mostrarAdjuntosActuales();
    }

    function mostrarAdjuntosActuales() {
        const container = document.getElementById('current-attachments');
        container.innerHTML = '';
        if (currentAttachments.length > 0) {
            let listHTML = '<label class="block text-sm font-semibold text-gray-700 mb-2">Adjuntos actuales:</label><ul class="list-disc list-inside space-y-1">';
            currentAttachments.forEach(url => {
                const fileName = decodeURIComponent(url.split('/').pop());
                const fullUrl = url.startsWith('http') ? url : `${API_BASE_URL}${url}`;
                listHTML += `<li><a href="${fullUrl}" target="_blank" class="text-blue-600 hover:underline text-sm">${fileName}</a></li>`;
            });
            listHTML += '</ul>';
            container.innerHTML = listHTML;
        }
    }

    async function actualizarTarea(e, taskId) {
        e.preventDefault();
        const form = e.target;
        let formData = new FormData(form);
        const submitBtn = form.querySelector('button[type="submit"]');
        const fileInput = form.querySelector('[name="adjuntos"]');

        submitBtn.disabled = true;
        submitBtn.innerHTML = `<span>Guardando...</span>`;

        if (fileInput.files.length === 0 && currentAttachments.length > 0) {
            formData.delete('adjuntos');
            try {
                formData = await reAdjuntarArchivosExistentes(formData);
            } catch (error) {
                mostrarNotificacion('Error al procesar adjuntos existentes.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<span>Guardar Cambios</span>`;
                return;
            }
        }
        
        fetch(API_URL + taskId + '/', {
            method: "PUT",
            headers: getAuthHeaders(),
            body: formData
        })
        .then(res => res.ok ? res.json() : res.json().then(err => Promise.reject(err)))
        .then(data => {
            mostrarNotificacion('¡Tarea actualizada exitosamente!', 'success');
            setTimeout(() => { window.location.href = 'https://gestordecursos.pegui.edu.co/r/cliente/tasks'; }, 1500);
        })
        .catch(err => {
            mostrarNotificacion(`Error: ${err.detail || 'No se pudo actualizar la tarea.'}`, 'error');
        })
        .finally(() => {
            submitBtn.disabled = false;
            submitBtn.innerHTML = `<span>Guardar Cambios</span>`;
        });
    }

    async function reAdjuntarArchivosExistentes(formData) {
        const promesasDeFetch = currentAttachments.map(async (url) => {
            const fullUrl = url.startsWith('http') ? url : `${API_BASE_URL}${url}`;
            const response = await fetch(fullUrl);
            if (!response.ok) { throw new Error(`No se pudo descargar el archivo: ${url}`); }
            const blob = await response.blob();
            const fileName = decodeURIComponent(url.split('/').pop());
            formData.append('adjuntos', blob, fileName);
        });
        await Promise.all(promesasDeFetch);
        return formData;
    }
    
    function actualizarSelectProyectos() {
      const select = document.querySelector('select[name="project_id"]');
      select.innerHTML = '';
      clienteProyectos.forEach(p => select.innerHTML += `<option value="${p.id}">${p.nombre || p.name}</option>`);
    }

    function actualizarSelectUsuarios() {
      if (!Array.isArray(listaUsuarios)) {
        console.error("Error: listaUsuarios no es un arreglo. Datos recibidos:", listaUsuarios);
        return;
      }
      const options = listaUsuarios.map(u => `<option value="${u.nombre || u.username}">${u.nombre || u.username}</option>`).join('');
      document.querySelector('select[name="asignado"]').innerHTML = '<option value="">Selecciona responsable</option>' + options;
      document.querySelector('select[name="seguidores"]').innerHTML = options;
    }

    function actualizarSelectFases(projectId) {
      const selectFase = document.querySelector('select[name="fase_id"]');
      const cronogramaId = mapaProyectoACronograma[projectId];
      if (!cronogramaId) { selectFase.innerHTML = '<option value="">Sin cronograma</option>'; return Promise.resolve(); }
      const fases = (mapaCronogramaAEstructura[cronogramaId] || []).map(item => ({ id: item.fase_id, nombre: item.nombre_fase }));
      selectFase.innerHTML = '<option value="">Selecciona fase</option>';
      fases.forEach(f => selectFase.innerHTML += `<option value="${f.id}">${f.nombre}</option>`);
      return Promise.resolve();
    }

    function actualizarSelectEtapas(projectId, faseId) {
      const selectEtapa = document.querySelector('select[name="etapa_id"]');
      const cronogramaId = mapaProyectoACronograma[projectId];
      if (!cronogramaId || !faseId) { selectEtapa.innerHTML = '<option value="">Selecciona fase</option>'; return Promise.resolve(); }
      const fase = (mapaCronogramaAEstructura[cronogramaId] || []).find(item => item.fase_id == faseId);
      const etapas = fase ? fase.etapas : [];
      selectEtapa.innerHTML = '<option value="">Selecciona etapa (opcional)</option>';
      (etapas || []).forEach(e => selectEtapa.innerHTML += `<option value="${e.etapa_id}" data-fecha-inicio="${e.fecha_inicio}" data-fecha-fin="${e.fecha_fin}">${e.nombre_etapa}</option>`);
      return Promise.resolve();
    }
    
    function establecerRestriccionesFechas(etapaOption) { /* ... */ }
    function resetearFechas() { /* ... */ }
    function mostrarNotificacion(mensaje, tipo = 'info') { /* ... */ }
    
    document.addEventListener('change', function(e) {
      if (e.target.name === 'project_id') actualizarSelectFases(e.target.value);
      if (e.target.name === 'fase_id') actualizarSelectEtapas(document.querySelector('select[name="project_id"]').value, e.target.value);
      if (e.target.name === 'etapa_id') establecerRestriccionesFechas(e.target.options[e.target.selectedIndex]);
    });

    document.addEventListener('DOMContentLoaded', inicializarFormularioEdicion);
  </script>
</body>
</html>
