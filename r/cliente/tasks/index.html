<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mis Tareas - Portal de Cliente</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/fetch-con-token.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'fade-in': 'fadeIn 0.3s ease-out',
            'bounce-in': 'bounceIn 0.5s ease-out',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            bounceIn: { '0%': { transform: 'scale(0.3)', opacity: '0' }, '100%': { transform: 'scale(1)', opacity: '1' } }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-100 min-h-screen">
  
  <div class="bg-gradient-to-r from-blue-600 via-blue-700 to-indigo-800 shadow-2xl">
    <div class="max-w-7xl mx-auto px-6 py-8">
      <div class="flex items-center justify-between">
        <div class="flex items-center space-x-4">
          <div class="bg-white/20 backdrop-blur-sm rounded-full p-3">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
          </div>
          <div>
            <h1 class="text-4xl font-bold text-white tracking-tight">Portal de Tareas</h1>
            <p class="text-blue-100 text-lg">Gestiona las tareas de tus proyectos</p>
          </div>
        </div>
        <div class="hidden md:flex items-center space-x-6 text-blue-100">
          <div class="text-center"><div class="text-2xl font-bold text-white" id="total-tareas">0</div><div class="text-sm">Total</div></div>
          <div class="text-center"><div class="text-2xl font-bold text-green-300" id="tareas-completadas">0</div><div class="text-sm">Completadas</div></div>
        </div>
      </div>
    </div>
  </div>
  <div class="max-w-7xl mx-auto px-6 py-8">
    <div class="bg-white/70 backdrop-blur-sm rounded-2xl shadow-lg p-6 mb-8 border border-white/50">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div class="flex items-center space-x-4">
          <button id="btnNuevaTarea" class="group relative bg-gradient-to-r from-emerald-500 to-green-600 hover:from-emerald-600 text-white px-6 py-3 rounded-xl font-semibold flex items-center space-x-2">
             <span>Nueva Tarea</span>
          </button>
          <button onclick="cargarDatosCliente()" class="bg-white hover:bg-gray-50 text-gray-700 px-4 py-3 rounded-xl font-medium border border-gray-200 flex items-center space-x-2">
            <span>Actualizar</span>
          </button>
        </div>
        <div class="flex items-center space-x-3 flex-wrap gap-2">
          <select id="filtroProyecto" class="bg-white border rounded-lg px-3 py-2 text-sm"><option value="">Todos mis proyectos</option></select>
          <select id="filtroEstado" class="bg-white border rounded-lg px-3 py-2 text-sm"><option value="">Todos los estados</option><option value="Nuevo">Nuevo</option><option value="En curso">En curso</option><option value="En revisión">En revisión</option><option value="Resuelto">Resuelto</option><option value="Cerrado">Cerrado</option></select>
          <select id="filtroPrioridad" class="bg-white border rounded-lg px-3 py-2 text-sm"><option value="">Todas las prioridades</option><option value="Alta">Alta</option><option value="Media">Media</option><option value="Baja">Baja</option></select>
        </div>
      </div>
    </div>
    <div class="bg-white/70 backdrop-blur-sm rounded-2xl shadow-xl border border-white/50 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full">
          <thead class="bg-gradient-to-r from-gray-50 to-gray-100">
            <tr>
              <th class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase">Título</th>
              <th class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase">Proyecto</th>
              <th class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase">Responsable</th>
              <th class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase">Prioridad</th>
              <th class="px-6 py-4 text-left text-xs font-semibold text-gray-600 uppercase">Estado</th>
              <th class="px-6 py-4 text-center text-xs font-semibold text-gray-600 uppercase">Acciones</th>
            </tr>
          </thead>
          <tbody id="tbody-tareas" class="divide-y divide-gray-100"></tbody>
        </table>
      </div>
    </div>
    <div id="loading" class="hidden text-center py-8"><div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div><p class="mt-2 text-gray-600">Cargando...</p></div>
    <div id="empty-state" class="hidden text-center py-12"><div class="bg-white/70 backdrop-blur-sm rounded-2xl shadow-lg p-8 border border-white/50"><h3 class="text-lg font-medium text-gray-900 mb-2">No tienes tareas asignadas</h3></div></div>
  </div>
  <div id="modal-container"></div>

  <script>
    const API_URL = "https://gestordecursos.pegui.edu.co:8000";
    const TAREAS_ENDPOINT = `${API_URL}/tareas/`;
    const PROJECTS_ENDPOINT = `${API_URL}/projects/`;
    const FASES_URL = `${API_URL}/fases/`;
    const ETAPAS_URL = `${API_URL}/etapas/`;

    let clienteProyectos = [];
    let clienteTareas = [];
    let listaFases = [];
    let listaEtapas = [];

    function parseJwt(token) {
      try {
        const jsonPayload = decodeURIComponent(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
        return JSON.parse(jsonPayload);
      } catch (e) { console.error("Error decodificando token:", e); return null; }
    }

    function getAuthHeaders() {
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = "/index.html"; return null; }
        return { 'Authorization': `Bearer ${token}` };
    }
    
    async function cargarDatosCliente() {
      const loadingEl = document.getElementById('loading');
      loadingEl.classList.remove('hidden');
      document.getElementById('tbody-tareas').innerHTML = '';

      const headers = getAuthHeaders();
      if (!headers) return;
      
      const payload = parseJwt(localStorage.getItem('token'));
      const userIdFromToken = payload.user_id || payload.uid;
      
      try {
        const [tareasResponse, proyectosResponse, fasesResponse, etapasResponse] = await Promise.all([
          fetch(TAREAS_ENDPOINT, { headers }),
          fetch(PROJECTS_ENDPOINT, { headers }),
          fetch(FASES_URL, { headers }),
          fetch(ETAPAS_URL, { headers })
        ]);

        if (!proyectosResponse.ok || !tareasResponse.ok || !fasesResponse.ok || !etapasResponse.ok) throw new Error("Fallo al cargar datos de la API.");

        const todosLosProyectos = await proyectosResponse.json();
        const todasLasTareas = await tareasResponse.json();
        listaFases = await fasesResponse.json();
        listaEtapas = await etapasResponse.json();

        clienteProyectos = todosLosProyectos.filter(p => p.client_id === userIdFromToken);
        const idsProyectosCliente = clienteProyectos.map(p => p.id);
        clienteTareas = todasLasTareas.filter(t => idsProyectosCliente.includes(t.project_id));

        actualizarFiltroProyectos();
        renderTareas(clienteTareas);
        actualizarEstadisticas(clienteTareas);

      } catch (err) {
        console.error('Error cargando datos:', err);
      } finally {
        loadingEl.classList.add('hidden');
      }
    }
    
    function obtenerNombreProyecto(id) {
        const p = clienteProyectos.find(proj => proj.id === id);
        return p ? (p.nombre || p.name) : 'N/A';
    }
    function obtenerNombreFase(id) {
        if (!id) return 'Sin fase';
        const f = listaFases.find(fase => fase.id === id);
        return f ? f.nombre : `Fase ${id}`;
    }
    function obtenerNombreEtapa(id) {
        if (!id) return 'Sin etapa';
        const e = listaEtapas.find(etapa => etapa.id === id);
        return e ? e.nombre : `Etapa ${id}`;
    }

    function getPrioridadBadge(p) { return {'Alta':'bg-red-100 text-red-800','Media':'bg-yellow-100 text-yellow-800','Baja':'bg-green-100 text-green-800'}[p]||'bg-gray-100'; }
    function getEstadoBadge(e) { return {'Nuevo':'bg-blue-100 text-blue-800','En curso':'bg-orange-100 text-orange-800','En revisión':'bg-purple-100 text-purple-800','Resuelto':'bg-green-100 text-green-800','Cerrado':'bg-gray-100'}[e]||'bg-gray-100'; }
    function getProyectoBadge() { return 'bg-indigo-100 text-indigo-800'; }
    
    function actualizarFiltroProyectos() {
      const filtro = document.getElementById('filtroProyecto');
      filtro.innerHTML = '<option value="">Todos mis proyectos</option>';
      clienteProyectos.forEach(p => filtro.innerHTML += `<option value="${p.id}">${p.nombre || p.name}</option>`);
    }
    
    function actualizarEstadisticas(tareas) {
        document.getElementById('total-tareas').textContent = tareas.length;
        document.getElementById('tareas-completadas').textContent = tareas.filter(t => t.estado === 'Resuelto' || t.estado === 'Cerrado').length;
    }
    
    // **FUNCIÓN RENDERTAREAS RESTAURADA**
    function renderTareas(tareas) {
        const tbody = document.getElementById('tbody-tareas');
        const emptyState = document.getElementById('empty-state');
        tbody.innerHTML = '';
        emptyState.classList.toggle('hidden', tareas.length > 0);

        tareas.forEach((tarea) => {
            const nombreProyecto = obtenerNombreProyecto(tarea.project_id);
            const row = document.createElement('tr');
            row.className = 'hover:bg-blue-50/50';
            row.innerHTML = `
              <td class="px-6 py-4 border-b font-medium text-gray-900">${tarea.titulo}</td>
              <td class="px-6 py-4 border-b"><span class="px-2.5 py-0.5 rounded-full text-xs font-medium ${getProyectoBadge()}">${nombreProyecto}</span></td>
              <td class="px-6 py-4 border-b text-gray-700">${tarea.asignado || 'N/A'}</td>
              <td class="px-6 py-4 border-b"><span class="px-2.5 py-0.5 rounded-full text-xs font-medium ${getPrioridadBadge(tarea.prioridad)}">${tarea.prioridad || 'N/A'}</span></td>
              <td class="px-6 py-4 border-b"><span class="px-2.5 py-0.5 rounded-full text-xs font-medium ${getEstadoBadge(tarea.estado)}">${tarea.estado || 'N/A'}</span></td>
              <td class="px-6 py-4 border-b text-center">
                <div class="flex justify-center space-x-2">
                  <button class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-2 rounded-lg text-sm" onclick="verDetalleTarea(${tarea.id})">Ver</button>
                  <a href="cliente_editar_tarea.html?id=${tarea.id}" class="bg-yellow-500 hover:bg-yellow-600 text-white px-3 py-2 rounded-lg text-sm">Editar</a>
                </div>
              </td>`;
            tbody.appendChild(row);
        });
    }

    function aplicarFiltros() {
      const pFiltro = document.getElementById('filtroProyecto').value;
      const eFiltro = document.getElementById('filtroEstado').value;
      const prioFiltro = document.getElementById('filtroPrioridad').value;
      let tareasFiltradas = clienteTareas;
      if (pFiltro) tareasFiltradas = tareasFiltradas.filter(t => t.project_id == pFiltro);
      if (eFiltro) tareasFiltradas = tareasFiltradas.filter(t => t.estado === eFiltro);
      if (prioFiltro) tareasFiltradas = tareasFiltradas.filter(t => t.prioridad === prioFiltro);
      renderTareas(tareasFiltradas);
    }
    
    // **LÓGICA DEL MODAL (COMPLETA Y FUNCIONAL)**
    function cerrarModalDetalle() {
        const modal = document.getElementById('modalDetalleTarea');
        if (modal) {
            modal.style.animation = 'fadeIn 0.2s ease-out reverse';
            setTimeout(() => modal.remove(), 200);
        }
    }

    async function verDetalleTarea(tareaId) {
        try {
            const res = await fetch(`${TAREAS_ENDPOINT}${tareaId}`, { headers: getAuthHeaders() });
            if (!res.ok) throw new Error('No se pudo cargar la tarea.');
            const tarea = await res.json();
            mostrarModalDetalle(tarea);
        } catch (error) {
            alert(error.message);
        }
    }
    
    function mostrarModalDetalle(tarea) {
        const nombreProyecto = obtenerNombreProyecto(tarea.project_id);
        const nombreFase = obtenerNombreFase(tarea.fase_id);
        const nombreEtapa = obtenerNombreEtapa(tarea.etapa_id);
        
        let adjuntosHTML = '<span class="text-gray-500 italic">Sin adjuntos</span>';
        if (Array.isArray(tarea.adjuntos) && tarea.adjuntos.length > 0) {
            adjuntosHTML = tarea.adjuntos.map(url => {
                let realUrl = url.startsWith('http') ? url : (url.startsWith('/') ? API_URL + url : API_URL + '/' + url);
                const nombre = decodeURIComponent(url.split('/').pop());
                return `<a href="${realUrl}" target="_blank" class="text-blue-600 hover:underline">${nombre}</a>`;
            }).join("<br>");
        }

        const modalHtml = `
        <div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-fade-in" id="modalDetalleTarea" onclick="cerrarModalDetalle()">
          <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto animate-bounce-in" onclick="event.stopPropagation()">
            <div class="sticky top-0 bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-6 rounded-t-2xl flex justify-between items-center">
              <h2 class="text-2xl font-bold">Detalle de Tarea</h2>
              <button class="bg-white/20 hover:bg-white/30 rounded-full p-2" onclick="cerrarModalDetalle()">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
              </button>
            </div>
            <div class="p-6 space-y-6">
              <div class="bg-gray-50 rounded-xl p-4">
                  <label class="block text-sm font-semibold text-gray-600 mb-1">Título</label>
                  <p class="text-lg font-medium text-gray-900">${tarea.titulo}</p>
              </div>
              <div class="bg-gray-50 rounded-xl p-4">
                  <label class="block text-sm font-semibold text-gray-600 mb-1">Descripción</label>
                  <p class="text-gray-800 whitespace-pre-wrap">${tarea.descripcion || 'Sin descripción'}</p>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 text-center">
                  <div class="bg-gray-50 rounded-xl p-3"><label class="block text-xs text-gray-500">Proyecto</label><span class="font-semibold">${nombreProyecto}</span></div>
                  <div class="bg-gray-50 rounded-xl p-3"><label class="block text-xs text-gray-500">Estado</label><span class="font-semibold">${tarea.estado}</span></div>
                  <div class="bg-gray-50 rounded-xl p-3"><label class="block text-xs text-gray-500">Prioridad</label><span class="font-semibold">${tarea.prioridad}</span></div>
                  <div class="bg-gray-50 rounded-xl p-3"><label class="block text-xs text-gray-500">Responsable</label><span class="font-semibold">${tarea.asignado}</span></div>
                  <div class="bg-gray-50 rounded-xl p-3"><label class="block text-xs text-gray-500">Fase</label><span class="font-semibold">${nombreFase}</span></div>
                  <div class="bg-gray-50 rounded-xl p-3"><label class="block text-xs text-gray-500">Etapa</label><span class="font-semibold">${nombreEtapa}</span></div>
                  <div class="bg-gray-50 rounded-xl p-3"><label class="block text-xs text-gray-500">Fecha Inicio</label><span class="font-semibold">${tarea.fecha_inicio || 'N/A'}</span></div>
                  <div class="bg-gray-50 rounded-xl p-3"><label class="block text-xs text-gray-500">Fecha Entrega</label><span class="font-semibold">${tarea.fecha_entrega || 'N/A'}</span><br><span class="text-xs">${getVencimientoBadge(tarea)}</span></div>
              </div>
              <div class="mt-4">
                ${getVencimientoModalSection(tarea)}
              </div>
              <div class="bg-gray-50 rounded-xl p-4">
                <label class="block text-sm font-semibold text-gray-600 mb-2">Seguidores</label>
                <div>${(tarea.seguidores && tarea.seguidores.length > 0) ? tarea.seguidores.join(', ') : 'Sin seguidores'}</div>
              </div>
              <div class="bg-gray-50 rounded-xl p-4">
                <label class="block text-sm font-semibold text-gray-600 mb-2">Adjuntos</label>
                <div class="space-y-2">${adjuntosHTML}</div>
              </div>
            </div>
          </div>
        </div>
        `;
        document.getElementById('modal-container').innerHTML = modalHtml;
    }
    
    document.getElementById('filtroProyecto').onchange = aplicarFiltros;
    document.getElementById('filtroEstado').onchange = aplicarFiltros;
    document.getElementById('filtroPrioridad').onchange = aplicarFiltros;
    document.getElementById('btnNuevaTarea').onclick = () => {
        window.location.href = `cliente_crear_tarea.html`;
    };
    document.addEventListener('DOMContentLoaded', cargarDatosCliente);
  </script>
<script src="/js/tareas-vencimiento.js"></script>
</body>
</html>
