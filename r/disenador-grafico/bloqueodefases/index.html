<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bloqueo de Cronogramas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-100 via-gray-200 to-gray-300 min-h-screen">

  <div class="max-w-6xl mx-auto p-6">
    <h1 class="text-3xl font-bold text-gray-800 mb-8 flex items-center gap-2">
      🔒 Bloqueo de Cronogramas
    </h1>

    <!-- Contenedor de cronogramas -->
    <div id="cronogramasGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </div>

  <script>
    const API_URL = "https://gestordecursos.pegui.edu.co:8000";
    const TOKEN = localStorage.getItem("token");

    async function cargarCronogramas() {
      const res = await fetch(`${API_URL}/cronogramas`, {
        headers: { "Authorization": `Bearer ${TOKEN}` }
      });
      const data = await res.json();

      const grid = document.getElementById("cronogramasGrid");
      grid.innerHTML = "";

      if (!data.length) {
        grid.innerHTML = `
          <div class="col-span-full text-center text-gray-500">
            No hay cronogramas disponibles.
          </div>`;
        return;
      }

      data.forEach(c => {
        const estadoBadge = c.estado
          ? `<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm font-semibold border border-green-300">Activo</span>`
          : `<span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-sm font-semibold border border-red-300">Finalizado</span>`;

        const btnText = c.estado ? "🔒 Finalizar" : "🔓 Reabrir";
        const btnClass = c.estado 
          ? "bg-red-600 hover:bg-red-700" 
          : "bg-green-600 hover:bg-green-700";

        const card = `
          <div class="bg-white shadow-lg rounded-xl p-6 flex flex-col justify-between transition-all hover:shadow-2xl">
            <div>
              <h2 class="text-xl font-bold text-gray-800 mb-2">Cronograma #${c.id}</h2>
              <p class="text-gray-500 mb-2">Proyecto: ${c.project_id}</p>
              
              <div class="mb-3">
                <p class="font-semibold">📌 Inicio:</p>
                <p class="text-sm text-gray-600">${c.dia_inicio_inicio} al ${c.dia_fin_inicio} de ${c.mes_inicio}</p>
                <p class="text-xs text-gray-500">Responsables: ${c.responsables_inicio}</p>
              </div>
              
              <div class="mb-3">
                <p class="font-semibold">⚙️ Desarrollo:</p>
                <p class="text-sm text-gray-600">${c.dia_inicio_desarrollo} al ${c.dia_fin_desarrollo} de ${c.mes_desarrollo}</p>
                <p class="text-xs text-gray-500">Responsables: ${c.responsables_desarrollo}</p>
              </div>
              
              <div class="mb-3">
                <p class="font-semibold">✅ Final:</p>
                <p class="text-sm text-gray-600">${c.dia_inicio_final} al ${c.dia_fin_final} de ${c.mes_final}</p>
                <p class="text-xs text-gray-500">Responsables: ${c.responsables_final}</p>
              </div>

              ${estadoBadge}
            </div>
            <button onclick="toggleEstado(${c.id}, ${c.estado})"
                    class="mt-6 px-4 py-2 rounded-lg text-white font-semibold shadow-md transition-all transform hover:scale-105 ${btnClass}">
              ${btnText} Cronograma
            </button>
          </div>
        `;
        grid.innerHTML += card;
      });
    }

    async function toggleEstado(id, estado) {
      const nuevoEstado = !estado;
      await fetch(`${API_URL}/cronogramas/${id}/estado?estado=${nuevoEstado}`, {
        method: "PATCH",
        headers: { "Authorization": `Bearer ${TOKEN}` }
      });
      cargarCronogramas(); // refrescar lista
    }

    cargarCronogramas();
  </script>
</body>
</html>
