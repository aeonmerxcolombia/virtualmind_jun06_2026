<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Subir documentos</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white p-6">
  <h1 class="text-2xl font-bold text-emerald-600 mb-4">📁 Ahora debes cargar los siguientes documentos:</h1>
  <p class="mb-4">Haz clic en cada documento para seleccionarlo y subirlo.</p>

  <div id="botones" class="grid grid-cols-3 gap-4 mb-8"></div>

  <input type="file" id="fileInput" hidden>

  <div class="mt-8">
    <h2 class="text-xl font-semibold mb-2">📄 Documentos ya subidos:</h2>
    <ul id="documentosList" class="list-disc list-inside text-gray-700 space-y-1">
      <li class="text-gray-500">Cargando...</li>
    </ul>
  </div>

  <div class="mt-6">
    <a id="perfilLink" href="#" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
      Ir al perfil del cliente
    </a>
  </div>

  <script>
    const uid = new URLSearchParams(window.location.search).get("uid");
    const documentos = [
      "PROPUESTA COMERCIAL", "CONTRATO FIRMADO", "CÁMARA DE COMERCIO",
      "RUT", "MANUAL DE MARCA - IMAGEN", "CRONOGRAMA APROBADO",
      "LOGOS", "PRESENTACIÓN DE LA EMPRESA", "OTRO"
    ];

    const contenedor = document.getElementById("botones");
    const input = document.getElementById("fileInput");
    const lista = document.getElementById("documentosList");
    const perfilLink = document.getElementById("perfilLink");

    perfilLink.href = `/r/cliente/perfil/index.html?uid=${uid}`;
    let tipoSeleccionado = "";

    input.addEventListener("change", async () => {
      const file = input.files[0];
      if (!file || !tipoSeleccionado || !uid) return;

      const formData = new FormData();
      formData.append("user_id", uid);
      formData.append("tipo_documento", tipoSeleccionado);
      formData.append("file", file);

      try {
        const res = await fetch("https://gestordecursos.pegui.edu.co:8000/client-documents/", {
          method: "POST",
          body: formData,
        });

        if (res.ok) {
          alert(`✅ ${tipoSeleccionado} subido correctamente`);
          await cargarDocumentos(); // Recarga lista
        } else {
          const error = await res.json();
          alert(`❌ Error al subir ${tipoSeleccionado}: ${error.detail || "fallo desconocido"}`);
        }
      } catch (err) {
        alert(`⚠️ Error de red al subir ${tipoSeleccionado}`);
      }

      input.value = "";
    });

    documentos.forEach(tipo => {
      const btn = document.createElement("button");
      btn.textContent = tipo;
      btn.className = "bg-green-300 font-bold rounded-full py-2 px-4 hover:bg-green-400";
      btn.onclick = () => {
        tipoSeleccionado = tipo;
        input.click();
      };
      contenedor.appendChild(btn);
    });

    async function cargarDocumentos() {
      try {
        const res = await fetch(`https://gestordecursos.pegui.edu.co:8000/client-documents/${uid}`);
        if (!res.ok) throw new Error("Error al obtener documentos");

        const datos = await res.json();
        lista.innerHTML = "";

        if (datos.length === 0) {
          lista.innerHTML = "<li class='text-gray-500'>No hay documentos cargados.</li>";
          return;
        }

        datos.forEach(doc => {
          const li = document.createElement("li");
          li.innerHTML = `<a class="text-blue-600 underline" href="${doc.archivo_url}" target="_blank">${doc.tipo_documento}</a>`;
          lista.appendChild(li);
        });
      } catch (err) {
        console.error("Error al cargar documentos:", err);
        lista.innerHTML = "<li class='text-red-600'>Error al cargar documentos.</li>";
      }
    }

    cargarDocumentos();
  </script>
</body>
</html>
