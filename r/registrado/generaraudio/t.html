<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Audio IA</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-black font-sans p-6">
  <div class="max-w-xl mx-auto bg-gray-50 shadow-md rounded-xl p-6">
    <h1 class="text-3xl font-bold mb-4 text-center">🔊 Generador de Voz con IA</h1>

    <label for="texto" class="block font-medium mb-1">Texto a convertir:</label>
    <textarea id="texto" rows="4" class="w-full border border-gray-300 rounded p-2 mb-4" placeholder="Escribe aquí el texto que deseas convertir en audio..."></textarea>

    <button onclick="generarAudio()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded w-full font-semibold">Generar Audio</button>

    <div id="audioContainer" class="mt-6 hidden">
      <p class="font-medium">Audio generado:</p>
      <audio controls id="audioPlayer" class="w-full mt-2"></audio>
      <a id="downloadLink" class="text-blue-600 underline mt-2 inline-block" download>Descargar archivo</a>
    </div>

    <div id="loading" class="mt-4 text-center hidden text-gray-600">⏳ Generando audio...</div>
  </div>

  <script>
    async function generarAudio() {
      const texto = document.getElementById("texto").value.trim();
      if (!texto) {
        alert("Por favor escribe algún texto.");
        return;
      }

      document.getElementById("loading").classList.remove("hidden");
      document.getElementById("audioContainer").classList.add("hidden");

      try {
        const response = await fetch("https://gestordecursos.pegui.edu.co:8000/audio/generar/", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ texto })
        });

        if (!response.ok) throw new Error("Error al generar el audio");

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);

        document.getElementById("audioPlayer").src = url;
        const downloadLink = document.getElementById("downloadLink");
        downloadLink.href = url;
        downloadLink.download = "voz_generada.wav";

        document.getElementById("audioContainer").classList.remove("hidden");
      } catch (err) {
        alert("Error: " + err.message);
      } finally {
        document.getElementById("loading").classList.add("hidden");
      }
    }
  </script>
</body>
</html>
