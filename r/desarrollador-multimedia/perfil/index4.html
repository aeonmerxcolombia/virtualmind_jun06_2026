<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Perfil de Usuario</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-2xl bg-white p-8 rounded-2xl shadow-xl border border-gray-200">
    
    <h2 class="text-3xl font-bold mb-6 text-center text-gray-700">Perfil de Usuario</h2>

    <div id="preview" class="flex justify-center mb-6 hidden">
      <img id="foto_actual" src="" alt="Foto de perfil"
        class="w-32 h-32 object-cover rounded-full border-4 border-gray-300 shadow-lg" />
    </div>

    <form id="profileForm" enctype="multipart/form-data" class="space-y-5">
      
      <div>
        <label for="user_id" class="block font-semibold mb-1">ID de Usuario</label>
        <input type="text" id="user_id" name="user_id" readonly
          class="w-full border border-gray-300 p-3 rounded-lg bg-gray-100 text-gray-700" />
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label for="nombre" class="block font-semibold mb-1">Nombre</label>
          <input type="text" id="nombre" name="nombre" class="w-full border border-gray-300 p-3 rounded-lg" />
        </div>
        <div>
          <label for="apellidos" class="block font-semibold mb-1">Apellidos</label>
          <input type="text" id="apellidos" name="apellidos" class="w-full border border-gray-300 p-3 rounded-lg" />
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label for="telefono" class="block font-semibold mb-1">Teléfono</label>
          <input type="text" id="telefono" name="telefono" class="w-full border border-gray-300 p-3 rounded-lg" />
        </div>
        <div>
          <label for="celular" class="block font-semibold mb-1">Celular</label>
          <input type="text" id="celular" name="celular" class="w-full border border-gray-300 p-3 rounded-lg" />
        </div>
      </div>

      <div>
        <label for="direccion" class="block font-semibold mb-1">Dirección</label>
        <input type="text" id="direccion" name="direccion" class="w-full border border-gray-300 p-3 rounded-lg" />
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label for="ciudad" class="block font-semibold mb-1">Ciudad</label>
          <input type="text" id="ciudad" name="ciudad" class="w-full border border-gray-300 p-3 rounded-lg" />
        </div>
        <div>
          <label for="pais" class="block font-semibold mb-1">País</label>
          <input type="text" id="pais" name="pais" class="w-full border border-gray-300 p-3 rounded-lg" />
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label for="cargo" class="block font-semibold mb-1">Cargo</label>
          <input type="text" id="cargo" name="cargo" class="w-full border border-gray-300 p-3 rounded-lg" />
        </div>
        <div>
          <label for="empresa" class="block font-semibold mb-1">Empresa</label>
          <input type="text" id="empresa" name="empresa" class="w-full border border-gray-300 p-3 rounded-lg" />
        </div>
      </div>

      <div>
        <label for="biografia" class="block font-semibold mb-1">Biografía</label>
        <textarea id="biografia" name="biografia" rows="3"
          class="w-full border border-gray-300 p-3 rounded-lg"></textarea>
      </div>

      <div class="grid grid-cols-3 gap-4">
        <div>
          <label for="linkedin" class="block font-semibold mb-1">LinkedIn</label>
          <input type="text" id="linkedin" name="linkedin" class="w-full border border-gray-300 p-3 rounded-lg" />
        </div>
        <div>
          <label for="twitter" class="block font-semibold mb-1">Twitter</label>
          <input type="text" id="twitter" name="twitter" class="w-full border border-gray-300 p-3 rounded-lg" />
        </div>
        <div>
          <label for="facebook" class="block font-semibold mb-1">Facebook</label>
          <input type="text" id="facebook" name="facebook" class="w-full border border-gray-300 p-3 rounded-lg" />
        </div>
      </div>

      <div class="flex items-center space-x-4 mt-2">
        <label class="flex items-center">
          <input type="checkbox" id="notificaciones_email" name="notificaciones_email" class="mr-2" checked />
          Notificaciones por correo
        </label>
        <label class="flex items-center">
          <input type="checkbox" id="notificaciones_virtualmind" name="notificaciones_virtualmind" class="mr-2" checked />
          Notificaciones en Virtualmind
        </label>
      </div>

      <div>
        <label for="privacidad_perfil" class="block font-semibold mb-1">Privacidad</label>
        <select id="privacidad_perfil" name="privacidad_perfil" class="w-full border border-gray-300 p-3 rounded-lg">
          <option value="privado">Privado</option>
          <option value="publico">Público</option>
        </select>
      </div>

      <div>
        <label for="foto" class="block font-semibold mb-1">Actualizar Foto de Perfil</label>
        <input type="file" id="foto" name="foto" accept="image/*" class="w-full border border-gray-300 p-3 rounded-lg" />
      </div>

      <div class="flex justify-between mt-8">
        <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 shadow">
          Guardar Cambios
        </button>
        <button type="button" onclick="eliminarPerfil()" class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700 shadow">
          Eliminar Perfil
        </button>
      </div>

      <div id="respuesta" class="mt-4 text-sm"></div>

    </form>

  </div>

</body>
</html>
