<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corrector de Traducción - Agente KimiK2</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

  <div class="container mx-auto p-6">
    <h1 class="text-4xl font-extrabold text-center text-indigo-700 mb-8">Corrector de Traducción - Agente KimiK2</h1>

    <!-- Área de texto para ingresar el texto -->
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-lg shadow-xl mb-6">
      <textarea id="input-text" class="w-full h-32 p-4 border-2 border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-600 text-lg mb-6" placeholder="Escribe tu texto aquí..."></textarea>

      <!-- Botón para seleccionar traducción con KimiK2 -->
      <div class="flex justify-center mb-6">
        <button id="kimik2-btn" class="py-3 px-6 bg-blue-500 text-white font-semibold rounded-full shadow-md transition-all transform hover:scale-105 hover:bg-blue-600">Traducir con KimiK2</button>
      </div>
    </div>

    <!-- Mostrar los resultados de las respuestas -->
    <div id="results" class="max-w-4xl mx-auto mt-8 space-y-6"></div>

  </div>

  <script>
    // Función para enviar la solicitud y obtener la respuesta de KimiK2
    async function sendRequest(endpoint, body) {
      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(body),
        });

        if (!response.ok) {
          throw new Error('Error en la solicitud');
        }

        // Intentamos obtener la respuesta como texto
        const textResponse = await response.text();

        // Si la respuesta es JSON, intentar parsearlo, sino, solo devolver el texto
        try {
          const data = JSON.parse(textResponse);
          return data.mensaje || data.result || data.respuesta;
        } catch (e) {
          return textResponse; // Si no es JSON, devolverlo como texto
        }

      } catch (error) {
        console.error('Error en la solicitud:', error);
        return 'Error al procesar la solicitud';
      }
    }

    // Función para manejar la solicitud de traducción con KimiK2
    async function handleKimiK2Request() {
      const text = document.getElementById('input-text').value;
      if (!text) {
        alert('Por favor, ingresa un texto');
        return;
      }

      document.getElementById('results').innerHTML = 'Procesando...';

      const body = { "mensaje": text }; // Usamos "mensaje" para KimiK2

      const endpoint = 'https://gestordecursos.pegui.edu.co:8000/chat/kimi'; // Endpoint de KimiK2

      // Enviar la solicitud a KimiK2
      const result = await sendRequest(endpoint, body);

      // Mostrar el resultado en la interfaz
      document.getElementById('results').innerHTML = `
        <div class="bg-white p-6 rounded-lg shadow-md">
          <h2 class="text-2xl font-semibold text-indigo-600 mb-4">Resultado del Agente Traductor (KimiK2)</h2>
          <p class="text-lg text-gray-700">${result}</p>
        </div>
      `;
    }

    // Evento para el botón de KimiK2
    document.getElementById('kimik2-btn').addEventListener('click', handleKimiK2Request);
  </script>
</body>
</html>
