<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Perfil de Usuario</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/fetch-con-token.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.10/build/css/intlTelInput.css">
  <style>
    .iti { width: 100%; }

    /* === CAMBIO 1: Estilos para el scrollbar del modal === */

<body class="bg-gradient-to-br from-blue-50 to-emerald-50 min-h-screen flex items-center justify-center p-4 sm:p-6">
  <div class="w-full max-w-6xl bg-white rounded-2xl shadow-2xl border border-gray-200 overflow-hidden">
    <div class="bg-gradient-to-r from-blue-600 to-emerald-600 p-6 flex justify-between items-center">
      <h2 class="text-3xl font-bold text-white">Perfil de Usuario</h2>
      <div class="flex items-center gap-4">
        <a href="https://gestordecursos.pegui.edu.co/r/superadmin/" class="flex items-center gap-2 text-white text-sm font-medium opacity-80 hover:opacity-100 transition">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
          <span>Volver al Inicio</span>
        </a>
        <a href="#" onclick="history.back(); return false;" class="flex items-center gap-2 text-white text-sm font-medium opacity-80 hover:opacity-100 transition">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
          <span>Cerrar</span>
        </a>
      </div>
    </div>
    
    <div class="p-8">
      <div id="preview" class="flex justify-center mb-6 hidden">
        <img id="foto_actual" src="" alt="Foto de perfil"
             class="w-32 h-32 object-cover rounded-full border-4 border-white shadow-lg"
             onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=Usuario&background=0D8ABC&color=fff';" />
      </div>
      
      <div class="mb-6 max-w-md mx-auto">
        <label for="foto" class="block font-semibold text-blue-700 mb-1">Foto de Perfil</label>
        <div class="flex gap-2">
          <label class="flex-1 cursor-pointer bg-blue-600 text-white px-4 py-2 rounded-lg text-center text-sm hover:bg-blue-700">
            📁 Subir
            <input type="file" id="foto" name="foto" accept="image/*" class="hidden" />
          </label>
          <button type="button" id="btnTomarFoto" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-green-700">📷 Cámara</button>
        </div>
      </div>

      <!-- Modal Cámara -->
      <div id="modalCamara" class="fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-xl p-4 max-w-md w-full">
          <h3 class="text-lg font-bold text-center mb-2">Capturar Foto</h3>
          <video id="videoCamara" autoplay playsinline class="w-full rounded-lg bg-black"></video>
          <canvas id="canvasFotoPerfil" class="hidden"></canvas>
          <div class="flex justify-center gap-3 mt-3">
            <button type="button" id="btnCapturarFoto" class="bg-blue-600 text-white px-4 py-2 rounded-lg">Capturar</button>
            <button type="button" id="btnCerrarCamara" class="bg-gray-500 text-white px-4 py-2 rounded-lg">Cancelar</button>
          </div>
        </div>
      </div>

      <form id="profileForm" enctype="multipart/form-data" class="space-y-6" novalidate>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="md:col-span-2"> 
            <label for="user_id" class="block font-semibold text-blue-700">ID de Usuario</label> 
            <input type="text" id="user_id" name="user_id" readonly class="w-full border border-gray-300 p-3 rounded-lg bg-gray-100 text-gray-700" /> 
          </div>
          <div> <label for="nombre" class="block font-semibold text-blue-700">Nombre <span class="text-red-500">*</span></label> <input type="text" id="nombre" name="nombre" title="Nombre(s) del usuario" class="w-full border p-3 rounded-lg" required /> </div>
          <div> <label for="apellidos" class="block font-semibold text-blue-700">Apellidos <span class="text-red-500">*</span></label> <input type="text" id="apellidos" name="apellidos" title="Apellidos del usuario" class="w-full border p-3 rounded-lg" required /> </div>
          <div> <label for="email" class="block font-semibold text-blue-700">Correo Electrónico <span class="text-red-500">*</span></label> <input type="email" id="email" name="email" title="Correo electrónico principal del usuario" required class="w-full border border-gray-300 p-3 rounded-lg bg-white text-gray-900" /> </div>
          <div> <label for="telefono" class="block font-semibold text-blue-700">Teléfono <span class="text-red-500">*</span></label> <input type="tel" id="telefono" name="telefono" title="Número de teléfono fijo con código de país" class="w-full border p-3 rounded-lg" /> </div>
          <div> <label for="celular" class="block font-semibold text-blue-700">Celular <span class="text-red-500">*</span></label> <input type="tel" id="celular" name="celular" title="Número de celular con código de país" class="w-full border p-3 rounded-lg" /> </div>
          <div class="md:col-span-2"> <label for="direccion" class="block font-semibold text-blue-700">Oficina / Dirección <span class="text-red-500">*</span></label> <input type="text" id="direccion" name="direccion" title="Dirección física u oficina del usuario" class="w-full border p-3 rounded-lg" required /> </div>
          <div> <label for="pais" class="block font-semibold text-blue-700">País</label> 
            <select id="pais" name="pais" title="Selecciona tu país de residencia" class="w-full border p-3 rounded-lg bg-white mb-1" onchange="cargarCiudadesPorPais()">
              <option value="">Seleccionar...</option>
              <option value="Colombia">Colombia</option>
              <option value="España">España</option>
              <option value="México">México</option>
              <option value="Argentina">Argentina</option>
              <option value="Chile">Chile</option>
              <option value="Perú">Perú</option>
              <option value="Venezuela">Venezuela</option>
              <option value="Ecuador">Ecuador</option>
              <option value="Estados Unidos">Estados Unidos</option>
              <option value="Canadá">Canadá</option>
              <option value="Reino Unido">Reino Unido</option>
              <option value="Francia">Francia</option>
              <option value="Alemania">Alemania</option>
              <option value="Italia">Italia</option>
              <option value="Brasil">Brasil</option>
              <option value="Otro">Otro (especificar)</option>
            </select>
            <input type="text" id="pais_otro" name="pais_otro" title="Escribe tu país si no está en la lista" class="w-full border p-3 rounded-lg hidden" placeholder="Especifica tu país" /> 
          </div>
          <div> <label for="ciudad" class="block font-semibold text-blue-700">Ciudad</label> 
            <select id="ciudad" name="ciudad" title="Selecciona tu ciudad de residencia" class="w-full border p-3 rounded-lg bg-white mb-1">
              <option value="">Selecciona primero un país...</option>
            </select>
            <input type="text" id="ciudad_otra" name="ciudad_otra" title="Escribe tu ciudad si no está en la lista" class="w-full border p-3 rounded-lg hidden" placeholder="Especifica tu ciudad" /> 
          </div>
          <div> <label for="empresa" class="block font-semibold text-blue-700">Empresa</label> <input type="text" id="empresa" name="empresa" title="Nombre de la empresa u organización donde trabajas" class="w-full border p-3 rounded-lg" /> </div>
          <div> <label for="cargo" class="block font-semibold text-blue-700">Cargo</label> <input type="text" id="cargo" name="cargo" title="Tu cargo o posición en la empresa" class="w-full border p-3 rounded-lg" /> </div>
          <div class="md:col-span-2">
            <label class="block font-semibold text-blue-700 mb-3">🎯 Intereses Profesionales</label>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 p-3 bg-blue-50 rounded-lg">
              <div>
                <label class="block text-xs font-medium text-blue-600 mb-1">Área de Interés</label>
                <select id="intereses_interes_principal" name="intereses_interes_principal" class="w-full border p-2 rounded text-sm">
                  <option value="">Seleccionar...</option>
                  <option value="desarrollo_software">Desarrollo de Software</option>
                  <option value="diseno_instruccional">Diseño Instruccional</option>
                  <option value="diseno_grafico">Diseño Gráfico</option>
                  <option value="produccion_multimedia">Producción Multimedia</option>
                  <option value="gestion_proyectos">Gestión de Proyectos</option>
                  <option value="marketing">Marketing Digital</option>
                </select>
              </div>
              <div>
                <label class="block text-xs font-medium text-blue-600 mb-1">Formato Preferido</label>
                <select id="intereses_formato_preferido" name="intereses_formato_preferido" class="w-full border p-2 rounded text-sm">
                  <option value="">Seleccionar...</option>
                  <option value="video">Video Tutoriales</option>
                  <option value="lectura">Lectura</option>
                  <option value="interactivo">Interactivo</option>
                  <option value="practico">Práctico</option>
                </select>
              </div>
              <div>
                <label class="block text-xs font-medium text-blue-600 mb-1">Nivel de Experiencia</label>
                <select id="intereses_nivel_experiencia" name="intereses_nivel_experiencia" class="w-full border p-2 rounded text-sm">
                  <option value="">Seleccionar...</option>
                  <option value="principiante">Principiante</option>
                  <option value="intermedio">Intermedio</option>
                  <option value="avanzado">Avanzado</option>
                </select>
              </div>
              <div>
                <label class="block text-xs font-medium text-blue-600 mb-1">Objetivo Principal</label>
                <select id="intereses_objetivo_principal" name="intereses_objetivo_principal" class="w-full border p-2 rounded text-sm">
                  <option value="">Seleccionar...</option>
                  <option value="aprendizaje">Aprender nuevas habilidades</option>
                  <option value="actualizacion">Actualizar conocimientos</option>
                  <option value="certificacion">Obtener certificación</option>
                  <option value="mejora_continua">Mejora continua</option>
                </select>
              </div>
            </div>
          </div>
          <div class="md:col-span-2"> 
            <h3 class="text-lg font-semibold text-blue-800 border-b pb-2 mb-4">Redes Sociales</h3> 
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4"> 
              <div><label for="linkedin" class="block font-semibold text-blue-700">LinkedIn</label><input type="url" id="linkedin" name="linkedin" title="URL de tu perfil de LinkedIn" class="w-full border p-3 rounded-lg" placeholder="https://linkedin.com/in/..."/></div> 
              <div><label for="twitter" class="block font-semibold text-blue-700">Twitter</label><input type="url" id="twitter" name="twitter" title="URL de tu perfil de Twitter / X" class="w-full border p-3 rounded-lg" placeholder="https://twitter.com/..."/></div> 
              <div><label for="facebook" class="block font-semibold text-blue-700">Facebook</label><input type="url" id="facebook" name="facebook" title="URL de tu perfil de Facebook" class="w-full border p-3 rounded-lg" placeholder="https://facebook.com/..."/></div> 
            </div> 
          </div>
        </div>
        
        <div class="border border-emerald-300 rounded-xl p-4 mt-4 bg-emerald-50"> 
          <div class="flex items-center justify-between mb-3"> 
            <h3 class="text-lg font-bold text-emerald-700">Competencias / Habilidades</h3> 
            <button type="button" id="btnEditarCompetencias" class="text-sm bg-blue-600 text-white px-4 py-1 rounded-lg shadow-md hover:bg-blue-700 transition-transform hover:scale-105">Editar</button> 
          </div> 
          <div id="skillsView" class="flex flex-wrap gap-2 mb-2"></div> 
          <div id="langsView" class="flex flex-wrap gap-2 mb-2"></div> 
          <p class="text-sm text-gray-600">
            <span id="nivelAcademicoView"></span>
            <span id="areaConocimientoView"></span>
            <span id="aniosExperienciaView"></span>
          </p> 
          <p class="text-sm text-gray-600" id="perfilamientoView"></p> 
        </div>
        
        <div class="flex justify-end pt-4"> 
          <button type="submit" id="btnGuardarPerfil" class="bg-gradient-to-r from-blue-600 to-emerald-600 text-white px-8 py-3 rounded-lg shadow-lg hover:opacity-90 transition disabled:opacity-50 disabled:cursor-wait">Guardar Cambios</button>

  <div id="modalCompetencias" class="fixed inset-0 bg-gray-900 bg-opacity-60 flex items-center justify-center p-4 hidden z-50">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl p-8 m-4 flex flex-col max-h-[90vh]">
      <h3 class="text-2xl font-bold text-blue-700 mb-6 flex-shrink-0">Editar Competencias</h3>
      <form id="competenciasForm" class="flex flex-col h-full overflow-hidden">
        <div class="flex-grow overflow-y-auto space-y-4 pr-2 modal-scroll-content">
          <div><label for="habilidades" class="block font-semibold text-gray-700 mb-1">Habilidades (separadas por coma)</label><input type="text" id="habilidades" name="habilidades" class="w-full border p-3 rounded-lg" placeholder="Ej: Python, Liderazgo, Scrum"></div>
          <div><label for="idiomas" class="block font-semibold text-gray-700 mb-1">Idiomas (separados por coma)</label><input type="text" id="idiomas" name="idiomas" class="w-full border p-3 rounded-lg" placeholder="Ej: Inglés, Español, Francés"></div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label for="nivel_academico" class="block font-semibold text-gray-700 mb-1">Nivel Académico</label>
              <select id="nivel_academico" name="nivel_academico" class="w-full border p-3 rounded-lg bg-white">
                <option value="">No especificado</option>
                <option value="Bachiller">Bachiller</option>
                <option value="Técnico">Técnico</option>
                <option value="Tecnólogo">Tecnólogo</option>
                <option value="Profesional">Profesional</option>
                <option value="Especialización">Especialización</option>
                <option value="Maestría">Maestría</option>
                <option value="Doctorado">Doctorado</option>
              </select>
            </div>
            <div><label for="anios_experiencia" class="block font-semibold text-gray-700 mb-1">Años de Experiencia</label><input type="number" id="anios_experiencia" name="anios_experiencia" class="w-full border p-3 rounded-lg" min="0" max="50"></div>
          </div>
          <div><label for="area_conocimiento" class="block font-semibold text-gray-700 mb-1">Área de Conocimiento Principal</label><input type="text" id="area_conocimiento" name="area_conocimiento" class="w-full border p-3 rounded-lg" placeholder="Ej: Desarrollo de Software"></div>
          <div><label for="otros_estudios" class="block font-semibold text-gray-700 mb-1">Otros Estudios</label><input type="text" id="otros_estudios" name="otros_estudios" class="w-full border p-3 rounded-lg" placeholder="Ej: Certificación AWS, Coursera..."></div>
          <div><label for="disponibilidad" class="block font-semibold text-gray-700 mb-1">Disponibilidad</label><input type="text" id="disponibilidad" name="disponibilidad" class="w-full border p-3 rounded-lg" placeholder="Ej: Tiempo completo, Medio tiempo, Por proyecto..."></div>
          <div><label for="perfilamiento" class="block font-semibold text-gray-700 mb-1">Perfilamiento (breve descripción)</label><textarea id="perfilamiento" name="perfilamiento" rows="3" class="w-full border p-3 rounded-lg"></textarea></div>
        </div>
        <div class="flex-shrink-0 flex justify-end gap-4 pt-6 mt-4 border-t border-gray-200">
          <button type="button" id="btnCancelarCompetencias" class="text-gray-600 hover:text-gray-800 transition">Cancelar</button>
          <button type="submit" class="bg-emerald-600 text-white px-6 py-2 rounded-lg shadow hover:bg-emerald-700 transition">Guardar Competencias</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.10/build/js/intlTelInput.min.js"></script>

  <script>
    const API_URL = "https://gestordecursos.pegui.edu.co:8000";
    const $ = (selector) => document.querySelector(selector);
    
    let competenciasActual = {};
    let fotoActualUrl = null;
    let iti_telefono = null;
    let iti_celular = null;
    let emailOriginal = null;
    let perfilExiste = false;

    function renderCompetenciasView() { 
      $('#skillsView').innerHTML = (competenciasActual.habilidades || []).map(h => `<span class="bg-emerald-200 text-emerald-800 rounded-full px-3 py-1 text-xs font-medium">${h}</span>`).join(' ');
      $('#langsView').innerHTML = (competenciasActual.idiomas || []).map(l => `<span class="bg-blue-200 text-blue-800 rounded-full px-3 py-1 text-xs font-medium">${l}</span>`).join(' ');
      $('#nivelAcademicoView').innerText = competenciasActual.nivel_academico ? `Nivel: ${competenciasActual.nivel_academico}` : "";
      $('#areaConocimientoView').innerText = competenciasActual.area_conocimiento ? ` | Área: ${competenciasActual.area_conocimiento}` : "";
      $('#aniosExperienciaView').innerText = competenciasActual.anios_experiencia ? ` | Experiencia: ${competenciasActual.anios_experiencia} años` : "";
      $('#perfilamientoView').innerText = competenciasActual.perfilamiento ? `Sobre mí: ${competenciasActual.perfilamiento}` : "";
    }

    function initializePhoneInputs() { 
      const telInput = $('#telefono'); 
      const celInput = $('#celular');
      const itiOptions = { 
        utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.10/build/js/utils.js", 
        initialCountry: "auto", 
        geoIpLookup: function(callback) { 
          fetch("https://ipapi.co/json").then(res => res.json()).then(data => callback(data.country_code || "us")).catch(() => callback("us")); 
        }, 
        separateDialCode: true, 
        preferredCountries: ['co', 'us', 'es', 'mx', 'ar'] 
      };
      if (telInput) iti_telefono = window.intlTelInput(telInput, itiOptions);
      if (celInput) iti_celular = window.intlTelInput(celInput, itiOptions);
    }

    async function cargarPerfil(userId) { 
      const token = localStorage.getItem('token');
      if (!token) { 
        $('#respuesta').innerHTML = '<span class="text-red-600">⚠️ Sesión inválida.</span>'; 
        $('#btnGuardarPerfil').disabled = true; 
        return; 
      }
      try {
        const profileRes = await fetch(`${API_URL}/profiles/${userId}`, { headers: { 'Authorization': `Bearer ${token}` } });
        if (profileRes.ok) {
          perfilExiste = true; 
          const profileData = await profileRes.json();
          fotoActualUrl = profileData.foto_url || null;
if (fotoActualUrl) { 
            document.getElementById('foto_actual').src = fotoActualUrl; 
            document.getElementById('preview').classList.remove('hidden'); 
          }
var camposBasicos = ['nombre', 'apellidos', 'direccion', 'cargo', 'empresa', 'linkedin', 'twitter', 'facebook', 'intereses_interes_principal', 'intereses_formato_preferido', 'intereses_nivel_experiencia', 'intereses_objetivo_principal'];
          console.log('Cargando datos perfil:', profileData);
          camposBasicos.forEach(function(id) { 
            var el = document.getElementById(id);
            if (el && profileData[id]) {
              el.value = profileData[id];
              console.log('Campo cargado:', id, '=', profileData[id]);
            }
          });
          
          if (profileData.pais) {
            var paisExistente = profileData.pais;
            var paisSelect = document.getElementById('pais');
            var opcionesPais = paisSelect.options;
            var existePais = false;
            for (var i = 0; i < opcionesPais.length; i++) {
              if (opcionesPais[i].value === paisExistente) {
                existePais = true;
                break;
              }
            }
            if (existePais) {
              paisSelect.value = paisExistente;
              cargarCiudadesPorPais();
              document.getElementById('ciudad').value = profileData.ciudad || '';
            } else {
              paisSelect.value = 'Otro (especificar)';
              document.getElementById('pais_otro').value = paisExistente;
              document.getElementById('pais_otro').classList.remove('hidden');
            }
          }
          
          if (profileData.telefono && iti_telefono) iti_telefono.setNumber(profileData.telefono);
          if (profileData.celular && iti_celular) iti_celular.setNumber(profileData.celular);
        } else if (profileRes.status === 404) {
          perfilExiste = false; 
          console.warn("No se encontró perfil (404). Entrando en modo de creación.");
          $('#respuesta').innerHTML = `<span class="text-blue-600">ℹ️ Estás creando un nuevo perfil para este usuario.</span>`;
        } else {
           console.error(`Error ${profileRes.status} al cargar perfil`);
           $('#respuesta').innerHTML = `<span class="text-orange-600">⚠️ No se pudo cargar el perfil.</span>`;
        }

        try {
            const userRes = await fetch(`${API_URL}/users/${userId}`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (userRes.ok) { 
              const userData = await userRes.json(); 
              if (userData.email) { 
                $('#email').value = userData.email; 
                emailOriginal = userData.email; 
              } else { 
                $('#email').value = ''; 
                emailOriginal = null; 
              } 
            } else { 
              console.error(`Error ${userRes.status} al cargar usuario`); 
              $('#email').value = 'Error al cargar'; 
              emailOriginal = null; 
              if (userRes.status === 401) logout(); 
            }
        } catch(userErr) { 
          console.error("Error de red cargando usuario", userErr); 
          $('#email').value = 'Error de red'; 
          emailOriginal = null; 
        }
        await cargarCompetencias(userId);
      } catch (err) { 
        console.error("Error general en cargarPerfil", err); 
        $('#respuesta').innerHTML = '<span class="text-red-600">⚠️ Error de red al cargar datos.</span>'; 
      }
    }

    async function cargarCompetencias(userId) { 
      const token = localStorage.getItem('token'); if (!token) return;
      try { 
        const res = await fetch(`${API_URL}/competencias/usuario/${userId}`, { headers: { 'Authorization': `Bearer ${token}` } }); 
        competenciasActual = res.ok ? await res.json() : {}; 
      } catch { 
        competenciasActual = {}; 
      }
      renderCompetenciasView();
    }

    function openSkillsModal() {

      $('#nivel_academico').value = competenciasActual.nivel_academico || '';

    function closeSkillsModal() { 
      $('#modalCompetencias').classList.add('hidden');
    }

    async function saveSkills(e) { 
       e.preventDefault(); 
       const userId = $("#user_id").value.trim(); 
       if (!userId) return;
       const token = localStorage.getItem('token'); 
       if(!token) { alert('Sesión inválida'); return; }
       
       const newSkillsPayload = {
         user_id: userId,
         habilidades: $('#habilidades').value.split(',').map(s => s.trim()).filter(Boolean),
         idiomas: $('#idiomas').value.split(',').map(s => s.trim()).filter(Boolean),
         nivel_academico: $('#nivel_academico').value,
         area_conocimiento: $('#area_conocimiento').value,
         anios_experiencia: parseInt($('#anios_experiencia').value, 10) || 0,
         perfilamiento: $('#perfilamiento').value,
         otros_estudios: $('#otros_estudios').value,
         disponibilidad: $('#disponibilidad').value,
       };
       try {
         const res = await fetch(`${API_URL}/competencias/usuario/${userId}`, {
           method: 'PUT',
           headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
           body: JSON.stringify(newSkillsPayload)
         });
         if (res.ok) {
           competenciasActual = await res.json(); 
           renderCompetenciasView(); 
           closeSkillsModal();
           $('#respuesta').innerHTML = '<span class="text-green-600">✅ Competencias actualizadas.</span>';
         } else { 
           const error = await res.json(); 
           throw new Error(error.detail || 'Error al guardar competencias'); 
         }
       } catch (error) { alert(`Error al guardar: ${error.message}`); }
    }

      const userId = url.searchParams.get("user_id");
      if (userId) { 
        $("#user_id").value = userId; 
        await cargarPerfil(userId); 
      } else { 
        alert("ID de usuario no encontrado en la URL."); 
        $('#btnGuardarPerfil').disabled = true; 
      }
    });

    $("#foto").addEventListener("change", function(e) { 
      const file = e.target.files[0]; 
      if (file) { 
        const reader = new FileReader(); 
        reader.onload = (ev) => { 
          $("#foto_actual").src = ev.target.result; 
          $("#preview").classList.remove("hidden"); 
        }; 
        reader.readAsDataURL(file);

      e.preventDefault();
      const saveButton = $('#btnGuardarPerfil'); 
      const respuestaDiv = $('#respuesta');
      respuestaDiv.innerHTML = '';

      const form = e.target;
      if (!form.checkValidity()) {
          form.reportValidity();
          respuestaDiv.innerHTML = '<span class="text-red-600">⚠️ Por favor, completa todos los campos obligatorios (*).</span>';
          return;
      }

      let telefonosValidos = true; 
      let errorTelefono = "";
      
      // === SOLUCIÓN PRINCIPAL: Cambiar .find() por .querySelector() ===
      const telItiInput = $('#telefono').closest('.iti')?.querySelector('.iti__input');
      if (telItiInput) telItiInput.style.borderColor = '';
      
      const celItiInput = $('#celular').closest('.iti')?.querySelector('.iti__input');
      if (celItiInput) celItiInput.style.borderColor = '';

      if (!iti_telefono || !iti_telefono.isValidNumber()) {
          telefonosValidos = false; 
          errorTelefono = "El número de Teléfono no es válido o está vacío.";

      if (!iti_celular || !iti_celular.isValidNumber()) {
          telefonosValidos = false;
          errorTelefono = errorTelefono || "El número de Celular no es válido o está vacío.";
          if (celItiInput) celItiInput.style.borderColor = '#ef4444';
      }
      if (!telefonosValidos) { 
        respuestaDiv.innerHTML = `<span class="text-red-600">⚠️ ${errorTelefono}</span>`; 
        return; 
      }

      saveButton.disabled = true; 
      saveButton.textContent = "Guardando...";
      
      const userId = $("#user_id").value.trim(); 
      const token = localStorage.getItem('token');
      
      if (!userId || !token) {
          respuestaDiv.innerHTML = '<span class="text-red-600">⚠️ Error: Falta ID de usuario o sesión inválida.</span>';
          saveButton.disabled = false; 
          saveButton.textContent = "Guardar Cambios";
          return;
      }

      const profileFormData = new FormData();
      var camposBasicos = ['nombre', 'apellidos', 'direccion', 'cargo', 'empresa', 'biografia', 'linkedin', 'twitter', 'facebook', 'intereses_interes_principal', 'intereses_formato_preferido', 'intereses_nivel_experiencia', 'intereses_objetivo_principal'];
      console.log('Guardando perfil, userId:', userId);
      camposBasicos.forEach(function(id) { 
        var el = document.getElementById(id);
        if (el) {
          profileFormData.append(id, el.value); 
          console.log(' Campo:', id, '=', el.value);
        }
      });
      
      var paisEl = document.getElementById('pais');
      var paisVal = paisEl ? paisEl.value : '';
      var paisOtroEl = document.getElementById('pais_otro');
      var paisOtro = paisOtroEl ? paisOtroEl.value : '';
      var paisFinal = paisVal === 'Otro (especificar)' && paisOtro ? paisOtro : paisVal;
      profileFormData.append('pais', paisFinal);
      console.log(' Pais:', paisFinal);
      
      var ciudadEl = document.getElementById('ciudad');
      var ciudadVal = ciudadEl ? ciudadEl.value : '';
      var ciudadOtraEl = document.getElementById('ciudad_otra');
      var ciudadOtra = ciudadOtraEl ? ciudadOtraEl.value : '';
      var ciudadFinal = ciudadVal === 'Otra' && ciudadOtra ? ciudadOtra : ciudadVal;
      profileFormData.append('ciudad', ciudadFinal);
      console.log(' Ciudad:', ciudadFinal);
      
      if (iti_telefono && iti_telefono.isValidNumber()) profileFormData.append('telefono', iti_telefono.getNumber());
      if (iti_celular && iti_celular.isValidNumber()) profileFormData.append('celular', iti_celular.getNumber());

      var fetchUrl = perfilExiste ? API_URL + '/profiles/' + userId : API_URL + '/profiles/';

      console.log('perfilExiste:', perfilExiste);
      
      let profileUpdateSuccess = false;
      try {
        console.log('Haciendo fetch...');
        const profileRes = await fetch(fetchUrl, { 
          method: httpMethod, 
          headers: { 'Authorization': 'Bearer ' + token }, 
          body: profileFormData 
        });

            $("#foto_actual").src = fotoActualUrl;

          respuestaDiv.innerHTML = `<span class="text-red-600">❌ Error al guardar perfil: ${profileData.detail || 'Fallo en la solicitud'}</span>`;

      } catch (error) { 
        respuestaDiv.innerHTML = `<span class="text-red-600">⚠️ Error de red guardando perfil: ${error.message}</span>`; 
      }

      const nuevoEmail = $('#email').value.trim(); 
      let emailUpdateMessage = '';
      if (profileUpdateSuccess && nuevoEmail && nuevoEmail !== emailOriginal) {
          try {
              const emailRes = await fetch(`${API_URL}/users/${userId}/email`, { 
                method: 'PATCH', 
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ email: nuevoEmail }) 
              });
              if (emailRes.ok) { 
                emailUpdateMessage = '<br><span class="text-green-600">✅ Email actualizado correctamente.</span>'; 
                emailOriginal = nuevoEmail; 
              } else { 
                const errorData = await emailRes.json(); 
                if (emailRes.status === 400) { 
                  emailUpdateMessage = `<br><span class="text-red-600">❌ Error al actualizar email: ${errorData.detail || 'Email ya en uso.'}</span>`; 
                } else { 
                  emailUpdateMessage = `<br><span class="text-red-600">❌ Error ${emailRes.status} al actualizar email.</span>`; 
                } 
              }
          } catch (emailError) { 
            emailUpdateMessage = `<br><span class="text-red-600">⚠️ Error de red actualizando email: ${emailError.message}</span>`; 
          }
          respuestaDiv.innerHTML += emailUpdateMessage;
      }

      saveButton.disabled = false; 
      saveButton.textContent = "Guardar Cambios";
      if (profileUpdateSuccess) {
          const rol = window.location.pathname.split("/")[2];
          if (rol) { 
            setTimeout(() => { window.location.href = `https://gestordecursos.pegui.edu.co/r/${rol}/`; }, 2500); 
          }
      }
    });

    $('#btnEditarCompetencias').addEventListener('click', openSkillsModal);
    $('#btnCancelarCompetencias').addEventListener('click', closeSkillsModal);
    $('#competenciasForm').addEventListener('submit', saveSkills);
    $('#modalCompetencias').addEventListener('click', (e) => { if (e.target === $('#modalCompetencias')) closeSkillsModal(); });
    
    function logout() { localStorage.clear(); window.location.href = '/index.html'; }
  </script>
  
  <script>
    var camaraStreamPerfil = null;
    
    function abrirCamaraPerfil() {
      var modal = document.getElementById('modalCamara');
      if (modal) modal.classList.remove('hidden');
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
        .then(function(s) { camaraStreamPerfil = s; document.getElementById('videoCamara').srcObject = s; })
        .catch(function(err) { alert('Error cámara: ' + err.message); cerrarCamaraPerfil(); });
    }
    
    function cerrarCamaraPerfil() {
      var modal = document.getElementById('modalCamara');
      if (modal) modal.classList.add('hidden');
      if (camaraStreamPerfil) { 
        camaraStreamPerfil.getTracks().forEach(function(t) { t.stop(); }); 
        camaraStreamPerfil = null; 
      }
    }
    
    function tomarFotoDelPerfil() {
      var video = document.getElementById('videoCamara');
      var canvas = document.getElementById('canvasFotoPerfil');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0);
      var imagenDataUrl = canvas.toDataURL('image/jpeg', 0.8);
      
      var arr = imagenDataUrl.split(','), mime = arr[0].match(/:(.*?);/)[1];
      var bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
      while(n--) u8arr[n] = bstr.charCodeAt(n);
      var filePerfil = new File([u8arr], 'foto_perfil.jpg', {type: mime});
      
      var dt = new DataTransfer();
      dt.items.add(filePerfil);
      document.getElementById('foto').files = dt.files;
      document.getElementById('foto_actual').src = imagenDataUrl;
      document.getElementById('preview').classList.remove('hidden');
      
      cerrarCamaraPerfil();
      document.getElementById('respuesta').innerHTML = '<span class="text-green-600">📸 Foto capturada. Guarda los cambios.</span>';
    }
    
    document.getElementById('btnTomarFoto').addEventListener('click', abrirCamaraPerfil);

    function cargarCiudadesPorPais() {
      var paisSeleccionado = document.getElementById('pais').value;
      var ciudadSelect = document.getElementById('ciudad');
      var paisOtroInput = document.getElementById('pais_otro');
      var ciudadOtraInput = document.getElementById('ciudad_otra');
      
      ciudadSelect.innerHTML = '';
      paisOtroInput.classList.add('hidden');
      ciudadOtraInput.classList.add('hidden');
      
      if (!paisSeleccionado) {
        var opDefault = document.createElement('option');
        opDefault.value = '';
        opDefault.textContent = 'Selecciona primero un país...';
        ciudadSelect.appendChild(opDefault);
        return;

        op.value = ciudad;

<script>
document.addEventListener('DOMContentLoaded', function() {
    const path = window.location.pathname;
    const isSuperadmin = path.includes('/r/superadmin/');
    const isAdmin = path.includes('/r/admin/');
    const isCoordinador = path.includes('/r/coordinador/');
    const isCliente = path.includes('/r/cliente/');
    const isDisInst = path.includes('/r/disenador-instruccional/');
    const isAutor = path.includes('/r/autor/');
    const isRevisor = path.includes('/r/revisor-qa/');
    const isEditor = path.includes('/r/editor/');
    const isDesaMult = path.includes('/r/desarrollador-multimedia/');
    const isAbogado = path.includes('/r/abogado/');
    const isDisGraf = path.includes('/r/disenador-grafico/');
    const isAnim2d = path.includes('/r/animador-2d/');
    const isAnim3d = path.includes('/r/animador-3d/');
    const isVideo = path.includes('/r/video/');
    const isCorrector = path.includes('/r/corrector-de-estilo/');
    const isIngeniero = path.includes('/r/ingeniero-lms/');
    const isRegistrado = path.includes('/r/registrado/');

    const allowedRoles = [];
    if (isSuperadmin) allowedRoles.push('superadmin');
    if (isAdmin) allowedRoles.push('admin');
    if (isCoordinador) allowedRoles.push('coordinador');
    if (isCliente) allowedRoles.push('cliente');
    if (isDisInst) allowedRoles.push('disenador-instruccional');
    if (isAutor) allowedRoles.push('autor');
    if (isRevisor) allowedRoles.push('revisor-qa');
    if (isEditor) allowedRoles.push('editor');
    if (isDesaMult) allowedRoles.push('desarrollador-multimedia');
    if (isAbogado) allowedRoles.push('abogado');
    if (isDisGraf) allowedRoles.push('disenador-grafico');
    if (isAnim2d) allowedRoles.push('animador-2d');
    if (isAnim3d) allowedRoles.push('animador-3d');
    if (isVideo) allowedRoles.push('video');
    if (isCorrector) allowedRoles.push('corrector-de-estilo');
    if (isIngeniero) allowedRoles.push('ingeniero-lms');
    if (isRegistrado) allowedRoles.push('registrado');

    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/';
        return;
    }

    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const userRoles = payload.roles || [payload.role].filter(Boolean);
        if (!userRoles.some(r => allowedRoles.includes(r))) {
            window.location.href = '/';
            return;
        }
    } catch(e) {
        window.location.href = '/';
    }
});
</script>

<script>
