<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Perfil de Usuario</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/fetch-con-token.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.10/build/css/intlTelInput.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .iti { width: 100%; }
    .iti__country-list { z-index: 100; }
    .iti__input.error { border-color: #ef4444 !important; }

    /* Scrollbar del modal */
    .modal-scroll-content::-webkit-scrollbar {
        width: 8px;
    }
    .modal-scroll-content::-webkit-scrollbar-thumb {
        background-color: #cbd5e1;
        border-radius: 4px;
    }
    .modal-scroll-content::-webkit-scrollbar-track {
        background-color: #f1f5f9;
    }

    /* === ESTILOS DEL TOUR GUIADO INTERACTIVO (ROSA TOUR) - CORREGIDO === */
    .tour-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(15, 23, 42, 0.75);
        backdrop-filter: blur(4px);
        z-index: 9999;
        pointer-events: none; /* CORRECCIÓN: No bloquea clics por defecto */
        opacity: 0;
        visibility: hidden; /* CORRECCIÓN: Oculta por completo el elemento del flujo de renderizado */
        transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    .tour-overlay.visible { 
        opacity: 1; 
        pointer-events: auto; /* Activa la captura de clics durante el tour */
        visibility: visible; 
    }
    
    .tour-highlight {
        position: relative;
        z-index: 10000 !important;
        box-shadow: 0 0 0 9999px rgba(15, 23, 42, 0.75), 0 0 20px 5px rgba(99, 102, 241, 0.6) !important;
        pointer-events: none;
        border-color: #6366f1 !important;
        transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }
    
    .tour-card {
        position: absolute;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        padding: 20px;
        width: 320px;
        z-index: 10001;
        border: 1px solid #e2e8f0;
        opacity: 0;
        transform: translateY(10px);
        transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .tour-card.visible {
        opacity: 1;
        transform: translateY(0);
    }
    .tour-card::after {
        content: "";
        position: absolute;
        border-width: 8px;
        border-style: solid;
    }
    /* Direcciones de flecha del Tour */
    .tour-card-bottom::after {
        bottom: 100%; left: 24px;
        border-color: transparent transparent #ffffff transparent;
    }
    .tour-card-top::after {
        top: 100%; left: 24px;
        border-color: #ffffff transparent transparent transparent;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-slate-100 to-emerald-50 min-h-screen flex items-center justify-center p-4 sm:p-6">
  
  <div class="w-full max-w-6xl bg-white rounded-3xl shadow-2xl border border-gray-100 overflow-hidden">
    <!-- Header -->
    <div class="bg-gradient-to-r from-blue-600 via-indigo-600 to-emerald-600 p-6 flex justify-between items-center shadow-md">
      <h2 class="text-3xl font-bold text-white flex items-center gap-2">
        <span>👤</span> Perfil de Usuario
      </h2>
      <div class="flex items-center gap-4">
        <!-- Botón del tutorial interactivo -->
        <button type="button" onclick="iniciarTourPerfil(true)" class="flex items-center gap-2 bg-white/20 hover:bg-white/30 text-white text-sm font-semibold px-4 py-2 rounded-full shadow-sm transition border border-white/10" data-tooltip="Iniciar guía rápida" data-tooltip-position="bottom">
          <span>💡</span> <span class="hidden sm:inline">Tutorial</span>
        </button>
        <a href="https://gestordecursos.pegui.edu.co/r/superadmin/" class="flex items-center gap-2 text-white text-sm font-medium opacity-80 hover:opacity-100 transition" data-tooltip="Volver a la vista del panel principal" data-tooltip-position="bottom">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
          <span class="hidden md:inline">Volver al Inicio</span>
        </a>
        <a href="#" onclick="history.back(); return false;" class="flex items-center gap-2 text-white text-sm font-medium opacity-80 hover:opacity-100 transition" data-tooltip="Cerrar y volver a la página previa" data-tooltip-position="bottom">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
          <span class="hidden md:inline">Cerrar</span>
        </a>
      </div>
    </div>
    
    <div class="p-8">
      <!-- Sección Foto de Perfil (Tour Step 1) -->
      <div id="tour-step-foto" class="mb-8 bg-slate-50 p-6 rounded-2xl border border-slate-100 max-w-xl mx-auto flex flex-col items-center">
        <div id="preview" class="flex justify-center mb-4 hidden">
          <img id="foto_actual" src="" alt="Foto de perfil" 
               class="w-32 h-32 object-cover rounded-full border-4 border-white shadow-lg" 
               onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=Usuario&background=0D8ABC&color=fff';" />
        </div>
        
        <div class="w-full text-center">
          <label for="foto" class="block font-bold text-gray-700 mb-2">Foto de Perfil</label>
          <div class="flex gap-2 justify-center">
            <label class="cursor-pointer bg-blue-600 text-white px-5 py-2.5 rounded-xl text-sm font-semibold hover:bg-blue-700 transition shadow-md" data-tooltip="Subir una imagen en formato JPG o PNG" data-tooltip-position="top">
              📁 Subir Archivo
              <input type="file" id="foto" name="foto" accept="image/*" class="hidden" />
            </label>
            <button type="button" id="btnTomarFoto" class="bg-green-600 text-white px-5 py-2.5 rounded-xl text-sm font-semibold hover:bg-green-700 transition shadow-md" data-tooltip="Tomar una fotografía en tiempo real con la cámara" data-tooltip-position="top">📷 Tomar Foto</button>
          </div>
        </div>
      </div>

      <!-- Modal Cámara -->
      <div id="modalCamara" class="fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center p-4 hidden z-[200]">
        <div class="bg-white rounded-2xl p-4 max-w-md w-full">
          <h3 class="text-lg font-bold text-center mb-2">Capturar Foto</h3>
          <video id="videoCamara" autoplay playsinline class="w-full rounded-lg bg-black"></video>
          <canvas id="canvasFotoPerfil" class="hidden"></canvas>
          <div class="flex justify-center gap-3 mt-3">
            <button type="button" id="btnCapturarFoto" class="bg-blue-600 text-white px-4 py-2 rounded-lg" data-tooltip="Capturar instantánea" data-tooltip-position="top">Capturar</button>
            <button type="button" id="btnCerrarCamara" class="bg-gray-500 text-white px-4 py-2 rounded-lg" data-tooltip="Cerrar cámara" data-tooltip-position="top">Cancelar</button>
          </div>
        </div>
      </div>

      <!-- Formulario Principal -->
      <form id="profileForm" enctype="multipart/form-data" class="space-y-6" novalidate>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="md:col-span-2">
             <label for="user_id" class="block font-semibold text-blue-700">ID de Usuario</label>
             <input type="text" id="user_id" name="user_id" readonly class="w-full border border-gray-300 p-3 rounded-lg bg-gray-100 text-gray-700 cursor-not-allowed" data-tooltip="ID único del sistema (Solo Lectura)" data-tooltip-position="bottom" />
          </div>
          
          <!-- Datos Personales (Tour Step 2) -->
          <div class="p-4 bg-slate-50/50 rounded-2xl border border-slate-100 space-y-4" id="tour-step-datos-personales">
            <h4 class="font-bold text-gray-800 border-b pb-2 flex items-center gap-2"><span class="text-blue-600">👤</span> Información Básica</h4>
            <div>
              <label for="nombre" class="block text-sm font-semibold text-gray-700">Nombre <span class="text-red-500">*</span></label>
              <input type="text" id="nombre" name="nombre" title="Nombre(s) del usuario" class="w-full border p-3 rounded-lg mt-1" required data-tooltip="Introduce tu primer y segundo nombre" data-tooltip-position="top" />
            </div>
            <div>
              <label for="apellidos" class="block text-sm font-semibold text-gray-700">Apellidos <span class="text-red-500">*</span></label>
              <input type="text" id="apellidos" name="apellidos" title="Apellidos del usuario" class="w-full border p-3 rounded-lg mt-1" required data-tooltip="Introduce tus apellidos" data-tooltip-position="top" />
            </div>
            <div>
              <label for="email" class="block text-sm font-semibold text-gray-700">Correo Electrónico <span class="text-red-500">*</span></label>
              <input type="email" id="email" name="email" title="Correo electrónico principal del usuario" required class="w-full border border-gray-300 p-3 rounded-lg bg-white text-gray-900 mt-1" data-tooltip="Correo electrónico institucional o personal" data-tooltip-position="top" />
            </div>
          </div>

          <!-- Contacto y Ubicación (Tour Step 3) -->
          <div class="p-4 bg-slate-50/50 rounded-2xl border border-slate-100 space-y-4" id="tour-step-contacto">
            <h4 class="font-bold text-gray-800 border-b pb-2 flex items-center gap-2"><span class="text-green-600">📞</span> Contacto y Residencia</h4>
            <div>
              <label for="telefono" class="block text-sm font-semibold text-gray-700">Teléfono <span class="text-red-500">*</span></label>
              <input type="tel" id="telefono" name="telefono" title="Número de teléfono fijo con código de país" class="w-full border p-3 rounded-lg mt-1" data-tooltip="Ingresa tu teléfono fijo con código internacional" data-tooltip-position="top" />
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-700" for="celular">Celular <span class="text-red-500">*</span></label>
              <input type="tel" id="celular" name="celular" title="Número de celular con código de país" class="w-full border p-3 rounded-lg mt-1" data-tooltip="Ingresa tu número celular activo" data-tooltip-position="top" />
            </div>
            <div>
              <label for="direccion" class="block text-sm font-semibold text-gray-700">Oficina / Dirección <span class="text-red-500">*</span></label>
              <input type="text" id="direccion" name="direccion" title="Dirección física u oficina del usuario" class="w-full border p-3 rounded-lg mt-1" required data-tooltip="Dirección de tu residencia u oficina de trabajo" data-tooltip-position="top" />
            </div>
          </div>

          <!-- Ubicación Geográfica -->
          <div class="p-4 bg-slate-50/50 rounded-2xl border border-slate-100 space-y-4 md:col-span-2">
            <h4 class="font-bold text-gray-800 border-b pb-2 flex items-center gap-2"><span class="text-indigo-600">🌍</span> Ubicación Geográfica</h4>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label for="pais" class="block text-sm font-semibold text-gray-700">País</label>
                <select id="pais" name="pais" title="Selecciona tu país de residencia" class="w-full border p-3 rounded-lg bg-white mt-1" onchange="cargarCiudadesPorPais()" data-tooltip="Selecciona tu país de residencia actual" data-tooltip-position="top">
                  <option value="">Seleccionar...</option>
                  <option value="Colombia">Colombia</option>
                  <option value="España">España</option>
                  <option value="México">México</option>
                  <option value="Argentina">Argentina</option>
                  <option value="Chile">Chile</option>
                  <option value="Perú">Perú</option>
                  <option value="Venezuela">Venezuela</option>
                  <option value="Ecuador">Ecuador</option>
                  <option value="Estados Unidos">Estados Unidos</option>
                  <option value="Canadá">Canadá</option>
                  <option value="Reino Unido">Reino Unido</option>
                  <option value="Francia">Francia</option>
                  <option value="Alemania">Alemania</option>
                  <option value="Italia">Italia</option>
                  <option value="Brasil">Brasil</option>
                  <option value="Otro">Otro (especificar)</option>
                </select>
                <input type="text" id="pais_otro" name="pais_otro" title="Escribe tu país si no está en la lista" class="w-full border p-3 rounded-lg hidden mt-2" placeholder="Especifica tu país" data-tooltip="Escribe tu país personalizado" data-tooltip-position="top" />
              </div>
              <div>
                <label for="ciudad" class="block text-sm font-semibold text-gray-700">Ciudad</label>
                <select id="ciudad" name="ciudad" title="Selecciona tu ciudad de residencia" class="w-full border p-3 rounded-lg bg-white mt-1" data-tooltip="Selecciona tu ciudad de residencia actual" data-tooltip-position="top">
                  <option value="">Selecciona primero un país...</option>
                </select>
                <input type="text" id="ciudad_otra" name="ciudad_otra" title="Escribe tu ciudad si no está en la lista" class="w-full border p-3 rounded-lg hidden mt-2" placeholder="Especifica tu ciudad" data-tooltip="Escribe tu ciudad personalizada" data-tooltip-position="top" />
              </div>
            </div>
          </div>

          <!-- Empresa y Cargo -->
          <div class="p-4 bg-slate-50/50 rounded-2xl border border-slate-100 space-y-4 md:col-span-2">
            <h4 class="font-bold text-gray-800 border-b pb-2 flex items-center gap-2"><span class="text-orange-600">💼</span> Entorno Laboral</h4>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label for="empresa" class="block text-sm font-semibold text-gray-700">Empresa</label>
                <input type="text" id="empresa" name="empresa" title="Nombre de la empresa u organización donde trabajas" class="w-full border p-3 rounded-lg mt-1" data-tooltip="Nombre de la empresa u organización" data-tooltip-position="top" />
              </div>
              <div>
                <label for="cargo" class="block text-sm font-semibold text-gray-700">Cargo</label>
                <input type="text" id="cargo" name="cargo" title="Tu cargo o posición en la empresa" class="w-full border p-3 rounded-lg mt-1" data-tooltip="Tu puesto o cargo laboral actual" data-tooltip-position="top" />
              </div>
            </div>
          </div>

          <!-- Intereses Profesionales (Tour Step 4) -->
          <div id="tour-step-intereses" class="md:col-span-2">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2 mb-3">
              <label class="block font-semibold text-blue-700">🎯 Intereses Profesionales</label>
              <!-- Botón IA para sugerir intereses basados en el Cargo y Empresa -->
              <button type="button" id="btnSugerirInteresesIA" onclick="sugerirInteresesConIA()" class="px-4 py-1.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border border-indigo-200 text-xs font-bold rounded-xl transition flex items-center gap-1.5 shadow-sm self-start" data-tooltip="Generar intereses basados en tu Cargo y Empresa con ROSA IA" data-tooltip-position="top">
                🤖 Sugerir con IA
              </button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 p-4 bg-blue-50 rounded-2xl border border-blue-100">
              <div>
                <label class="block text-xs font-medium text-blue-600 mb-1">Área de Interés</label>
                <select id="intereses_interes_principal" name="intereses_interes_principal" class="w-full border p-2.5 rounded-lg text-sm bg-white" data-tooltip="Área técnica de mayor afinidad" data-tooltip-position="top">
                  <option value="">Seleccionar...</option>
                  <option value="desarrollo_software">Desarrollo de Software</option>
                  <option value="diseno_instruccional">Diseño Instruccional</option>
                  <option value="diseno_grafico">Diseño Gráfico</option>
                  <option value="produccion_multimedia">Producción Multimedia</option>
                  <option value="gestion_proyectos">Gestión de Proyectos</option>
                  <option value="marketing">Marketing Digital</option>
                </select>
              </div>
              <div>
                <label class="block text-xs font-medium text-blue-600 mb-1">Formato Preferido</label>
                <select id="intereses_formato_preferido" name="intereses_formato_preferido" class="w-full border p-2.5 rounded-lg text-sm bg-white" data-tooltip="Tipo de formato educativo favorito" data-tooltip-position="top">
                  <option value="">Seleccionar...</option>
                  <option value="video">Video Tutoriales</option>
                  <option value="lectura">Lectura</option>
                  <option value="interactivo">Interactivo</option>
                  <option value="practico">Práctico</option>
                </select>
              </div>
              <div>
                <label class="block text-xs font-medium text-blue-600 mb-1">Nivel de Experiencia</label>
                <select id="intereses_nivel_experiencia" name="intereses_nivel_experiencia" class="w-full border p-2.5 rounded-lg text-sm bg-white" data-tooltip="Nivel de experiencia profesional" data-tooltip-position="top">
                  <option value="">Seleccionar...</option>
                  <option value="principiante">Principiante</option>
                  <option value="intermedio">Intermedio</option>
                  <option value="avanzado">Avanzado</option>
                </select>
              </div>
              <div>
                <label class="block text-xs font-medium text-blue-600 mb-1">Objetivo Principal</label>
                <select id="intereses_objetivo_principal" name="intereses_objetivo_principal" class="w-full border p-2.5 rounded-lg text-sm bg-white" data-tooltip="¿Qué buscas lograr prioritariamente?" data-tooltip-position="top">
                  <option value="">Seleccionar...</option>
                  <option value="aprendizaje">Aprender nuevas habilidades</option>
                  <option value="actualizacion">Actualizar conocimientos</option>
                  <option value="certificacion">Obtener certificación</option>
                  <option value="mejora_continua">Mejora continua</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Competencias (Tour Step 5) -->
          <div id="tour-step-competencias" class="md:col-span-2 border border-emerald-300 rounded-2xl p-5 bg-emerald-50/50">
             <div class="flex items-center justify-between mb-3 border-b border-emerald-100 pb-2">
               <h3 class="text-lg font-bold text-emerald-700 flex items-center gap-2"><span>🛡️</span> Competencias / Habilidades</h3>
               <button type="button" id="btnEditarCompetencias" class="text-sm bg-blue-600 text-white px-4 py-2 rounded-xl shadow-md hover:bg-blue-700 transition duration-200" data-tooltip="Haz clic para abrir el editor avanzado de competencias" data-tooltip-position="top">Editar</button>
             </div>
             <div id="skillsView" class="flex flex-wrap gap-2 mb-2"></div>
             <div id="langsView" class="flex flex-wrap gap-2 mb-2"></div>
             <p class="text-sm text-gray-700 mt-2 font-medium">
              <span id="nivelAcademicoView"></span>
              <span id="areaConocimientoView"></span>
              <span id="aniosExperienciaView"></span>
            </p>
             <p class="text-sm text-gray-600 mt-1 italic" id="perfilamientoView"></p>
          </div>

          <!-- Redes Sociales -->
          <div class="md:col-span-2 p-4 bg-slate-50/50 rounded-2xl border border-slate-100">
             <h3 class="text-lg font-semibold text-blue-800 border-b pb-2 mb-4">Redes Sociales</h3>
             <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
               <div><label for="linkedin" class="block text-sm font-semibold text-blue-700">LinkedIn</label><input type="url" id="linkedin" name="linkedin" title="URL de tu perfil de LinkedIn" class="w-full border p-3 rounded-lg mt-1" placeholder="https://linkedin.com/in/..."/></div>
               <div><label for="twitter" class="block text-sm font-semibold text-blue-700">Twitter</label><input type="url" id="twitter" name="twitter" title="URL de tu perfil de Twitter / X" class="w-full border p-3 rounded-lg mt-1" placeholder="https://twitter.com/..."/></div>
               <div><label for="facebook" class="block text-sm font-semibold text-blue-700">Facebook</label><input type="url" id="facebook" name="facebook" title="URL de tu perfil de Facebook" class="w-full border p-3 rounded-lg mt-1" placeholder="https://facebook.com/..."/></div>
             </div>
          </div>
        </div>
        
        <!-- Guardar Cambios (Tour Step 6) -->
        <div class="flex justify-end pt-4" id="tour-step-guardar">
           <button type="submit" id="btnGuardarPerfil" class="bg-gradient-to-r from-blue-600 to-emerald-600 text-white px-10 py-3.5 rounded-xl shadow-lg hover:opacity-95 transition duration-200 disabled:opacity-50 disabled:cursor-wait font-bold text-lg" data-tooltip="Guardar cambios de tu perfil en el servidor" data-tooltip-position="top">Guardar Cambios</button>
        </div>
      </form>
      <div id="respuesta" class="mt-4 text-sm text-center"></div>
    </div>
  </div>

  <!-- Modal Competencias -->
  <div id="modalCompetencias" class="fixed inset-0 bg-gray-900 bg-opacity-60 flex items-center justify-center p-4 hidden z-50">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl p-8 m-4 flex flex-col max-h-[90vh]">
      <h3 class="text-2xl font-bold text-blue-700 mb-6 flex-shrink-0">Editar Competencias</h3>
      <form id="competenciasForm" class="flex flex-col h-full overflow-hidden">
        <div class="flex-grow overflow-y-auto space-y-4 pr-2 modal-scroll-content">
          <div><label for="habilidades" class="block font-semibold text-gray-700 mb-1">Habilidades (separadas por coma)</label><input type="text" id="habilidades" name="habilidades" class="w-full border p-3 rounded-lg" placeholder="Ej: Python, Liderazgo, Scrum" data-tooltip="Lista tus principales destrezas separadas por comas" data-tooltip-position="top"></div>
          <div><label for="idiomas" class="block font-semibold text-gray-700 mb-1">Idiomas (separados por coma)</label><input type="text" id="idiomas" name="idiomas" class="w-full border p-3 rounded-lg" placeholder="Ej: Inglés, Español, Francés" data-tooltip="Lista los idiomas que dominas separados por comas" data-tooltip-position="top"></div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block font-semibold text-gray-700 mb-1" for="nivel_academico">Nivel Académico</label>
              <select id="nivel_academico" name="nivel_academico" class="w-full border p-3 rounded-lg bg-white" data-tooltip="Tu último nivel académico obtenido" data-tooltip-position="top">
                <option value="">No especificado</option>
                <option value="Bachiller">Bachiller</option>
                <option value="Técnico">Técnico</option>
                <option value="Tecnólogo">Tecnólogo</option>
                <option value="Profesional">Profesional</option>
                <option value="Especialización">Especialización</option>
                <option value="Maestría">Maestría</option>
                <option value="Doctorado">Doctorado</option>
              </select>
            </div>

    function iniciarTourPerfil(forzado = false) {
      if (!forzado && localStorage.getItem('seen_profile_tour') === 'true') {
        return; // Ya se vio el tour y no es forzado
      }
      
      // Crear overlay si no existe
      let overlay = document.getElementById('tourOverlay');
      if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'tourOverlay';
        overlay.className = 'tour-overlay';
        document.body.appendChild(overlay);
      }
      overlay.classList.add('visible');
      currentTourStep = 0;
      mostrarPasoTour();
    }

    function mostrarPasoTour() {
      // Limpiar realces anteriores
      document.querySelectorAll('.tour-highlight').forEach(el => el.classList.remove('tour-highlight'));
      let cardExistente = document.getElementById('tourCardActive');
      if (cardExistente) cardExistente.remove();

      if (currentTourStep >= tourSteps.length) {
        finalizarTour();
        return;
      }

      const paso = tourSteps[currentTourStep];
      const targetEl = document.getElementById(paso.id);

      if (!targetEl) {
        // Fallback si el selector no está en el DOM
        currentTourStep++;
        mostrarPasoTour();
        return;
      }

      // Realzar elemento
      targetEl.classList.add('tour-highlight');
      targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });

      // Crear tarjeta de diálogo
      const tourCard = document.createElement('div');
      tourCard.id = 'tourCardActive';
      tourCard.className = `tour-card tour-card-${paso.pos}`;
      tourCard.innerHTML = `
        <h4 class="font-bold text-indigo-700 text-lg mb-1">${paso.title}</h4>
        <p class="text-sm text-gray-600 mb-4">${paso.desc}</p>
        <div class="flex justify-between items-center text-xs text-gray-400 mb-3 border-t pt-2 border-slate-100">
          <span>Paso ${currentTourStep + 1} de ${tourSteps.length}</span>
          <button onclick="finalizarTour()" class="text-red-500 hover:underline font-semibold focus:outline-none">Omitir</button>
        </div>
        <div class="flex gap-2 justify-end">
          ${currentTourStep > 0 ? `<button onclick="anteriorPasoTour()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg font-medium">Atrás</button>` : ''}
          <button onclick="siguientePasoTour()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1.5 rounded-lg font-semibold shadow">${currentTourStep === tourSteps.length - 1 ? 'Finalizar' : 'Siguiente'}</button>
        </div>
      `;
      document.body.appendChild(tourCard);

      // Posicionar tarjeta dinámicamente cerca de su target
      requestAnimationFrame(() => {
        const rect = targetEl.getBoundingClientRect();
        const cardRect = tourCard.getBoundingClientRect();
        let top = 0;
        let left = rect.left + window.scrollX;

        if (paso.pos === "bottom") {
          top = rect.bottom + window.scrollY + 12;
        } else {
          top = rect.top + window.scrollY - cardRect.height - 12;
        }

        // Ajustes horizontales para evitar desbordes en móviles
        if (left + cardRect.width > window.innerWidth - 10) {
          left = window.innerWidth - cardRect.width - 15;
        }
        if (left < 10) left = 10;

        tourCard.style.top = `${top}px`;
        tourCard.style.left = `${left}px`;
        tourCard.classList.add('visible');
      });
    }

    window.siguientePasoTour = () => {
      currentTourStep++;
      mostrarPasoTour();
    };

    window.anteriorPasoTour = () => {
      currentTourStep--;
      mostrarPasoTour();
    };

    window.finalizarTour = () => {
      localStorage.setItem('seen_profile_tour', 'true');
      const overlay = document.getElementById('tourOverlay');
      if (overlay) overlay.classList.remove('visible');
      document.querySelectorAll('.tour-highlight').forEach(el => el.classList.remove('tour-highlight'));
      const card = document.getElementById('tourCardActive');
      if (card) card.remove();
    };

    // === ROSA IA - INTEGRACIÓN DE SUGERENCIAS Y REDACCIÓN INTELIGENTE ===
    async function sugerirInteresesConIA() {
      const cargo = document.getElementById('cargo').value.trim();
      const empresa = document.getElementById('empresa').value.trim();
      
      if (!cargo) {
        alert("Por favor, escribe primero tu Cargo en la sección de Entorno Laboral para que ROSA IA pueda sugerirte tus intereses.");
        document.getElementById('cargo').focus();
        return;
      }
      
      const btn = document.getElementById('btnSugerirInteresesIA');
      const originalText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '⏳ Analizando...';
      
      const prompt = `Actúas como un experto en desarrollo profesional e-learning. Basándote en el cargo de "${cargo}" ${empresa ? `en la empresa "${empresa}"` : ''}, analiza y selecciona de manera óptima las mejores opciones profesionales de entre las listas provistas:
      1. Área de Interés (elige estrictamente una de estas opciones exactas): desarrollo_software, diseno_instruccional, diseno_grafico, produccion_multimedia, gestion_proyectos, marketing
      2. Formato Preferido (elige estrictamente una de estas opciones exactas): video, lectura, interactivo, practico
      3. Nivel de Experiencia (elige estrictamente una de estas opciones exactas): principiante, intermedio, avanzado
      4. Objetivo Principal (elige estrictamente una de estas opciones exactas): aprendizaje, actualizacion, certificacion, mejora_continua
      
      Responde estrictamente en formato JSON plano plano, sin bloques de código Markdown ni backticks de ningún tipo, con el siguiente formato:
      {"interes": "valor_elegido", "formato": "valor_elegido", "nivel": "valor_elegido", "objetivo": "valor_elegido"}`;

      try {
        const token = localStorage.getItem('token');
        const response = await fetch(`${API_URL}/chat/gemini`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ prompt })
        });
        
        if (!response.ok) throw new Error("Error en la llamada de IA");
        const data = await response.json();
        
        let cleanText = (data.respuesta || data.mensaje || "").trim();
        if (cleanText.includes("```json")) {
            cleanText = cleanText.split("```json")[1].split("```")[0].trim();
        } else if (cleanText.includes("```")) {
            cleanText = cleanText.split("```")[1].split("```")[0].trim();
        }
        
        const resObj = JSON.parse(cleanText);
        
        if (resObj.interes) document.getElementById('intereses_interes_principal').value = resObj.interes;
        if (resObj.formato) document.getElementById('intereses_formato_preferido').value = resObj.formato;
        if (resObj.nivel) document.getElementById('intereses_nivel_experiencia').value = resObj.nivel;
        if (resObj.objetivo) document.getElementById('intereses_objetivo_principal').value = resObj.objetivo;
        
        $('#respuesta').innerHTML = '<span class="text-green-600">✅ Intereses profesionales sugeridos por ROSA IA aplicados.</span>';
      } catch (e) {
        console.error("Fallo al procesar JSON estructurado de Gemini:", e);
        alert("ROSA IA no pudo procesar la sugerencia estructurada en este momento. Vuelve a intentarlo.");
      } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
      }
    }

    async function sugerirPerfilamientoConIA() {
      const cargo = document.getElementById('cargo').value.trim();
      const empresa = document.getElementById('empresa').value.trim();
      const habilidades = document.getElementById('habilidades').value.trim();

      const btn = document.getElementById('btnSugerirPerfilamientoIA');

      const prompt = `Escribe un extracto de presentación perfil profesional de alto impacto y moderno (máximo 80 palabras) para un profesional cuyo cargo es "${cargo}" ${empresa ? `en la empresa "${empresa}"` : ''} ${habilidades ? `y que tiene habilidades clave en: ${habilidades}` : ''}. Genera estrictamente el texto final redactado, sin prefijos, sin introducciones y sin comillas adicionales.`;
      
      try {
        const token = localStorage.getItem('token');
        const response = await fetch(`${API_URL}/chat/gemini`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ prompt })
        });
        
        if (!response.ok) throw new Error("Error en la llamada de IA");

        const perfilTexto = (data.respuesta || data.mensaje || "").trim().replace(/^["']|["']$/g, '');
        document.getElementById('perfilamiento').value = perfilTexto;

        console.error(e);
        alert("Error de conexión segura con el servicio de IA de VirtualMind.");

    }

    function initializePhoneInputs() { 
       const telInput = $('#telefono'); 
       const celInput = $('#celular');
      const itiOptions = { 
         utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.10/build/js/utils.js",
         initialCountry: "auto",
         geoIpLookup: function(callback) {
           fetch("https://ipapi.co/json").then(res => res.json()).then(data => callback(data.country_code || "us")).catch(() => callback("us"));
         },
         separateDialCode: true,
         preferredCountries: ['co', 'us', 'es', 'mx', 'ar']
       };
      if (telInput) iti_telefono = window.intlTelInput(telInput, itiOptions);
      if (celInput) iti_celular = window.intlTelInput(celInput, itiOptions);

    async function cargarPerfil(userId) { 
       const token = localStorage.getItem('token');
      if (!token) { 
         $('#respuesta').innerHTML = '<span class="text-red-600">⚠️ Sesión inválida.</span>'; 
         $('#btnGuardarPerfil').disabled = true; 
         return; 
       }
      try {
        const profileRes = await fetch(`${API_URL}/profiles/${userId}`, { headers: { 'Authorization': `Bearer ${token}` } });
        if (profileRes.ok) {
          perfilExiste = true; 
          const profileData = await profileRes.json();
          fotoActualUrl = profileData.foto_url || null;
          if (fotoActualUrl) { 
             document.getElementById('foto_actual').src = fotoActualUrl; 
             document.getElementById('preview').classList.remove('hidden'); 
           }
          var camposBasicos = ['nombre', 'apellidos', 'direccion', 'cargo', 'empresa', 'linkedin', 'twitter', 'facebook', 'intereses_interes_principal', 'intereses_formato_preferido', 'intereses_nivel_experiencia', 'intereses_objetivo_principal'];
          console.log('Cargando datos perfil:', profileData);
          camposBasicos.forEach(function(id) { 
             var el = document.getElementById(id);
            if (el && profileData[id]) {
              el.value = profileData[id];
              console.log('Campo cargado:', id, '=', profileData[id]);
            }
          });
          
          if (profileData.pais) {
            var paisExistente = profileData.pais;
            var paisSelect = document.getElementById('pais');
            var opcionesPais = paisSelect.options;
            var existePais = false;
            for (var i = 0; i < opcionesPais.length; i++) {
              if (opcionesPais[i].value === paisExistente) {
                existePais = true;
                break;
              }
            }
            if (existePais) {
              paisSelect.value = paisExistente;
              cargarCiudadesPorPais();
              document.getElementById('ciudad').value = profileData.ciudad || '';
            } else {
              paisSelect.value = 'Otro (especificar)';
              document.getElementById('pais_otro').value = paisExistente;
              document.getElementById('pais_otro').classList.remove('hidden');
            }
          }
          
          if (profileData.telefono && iti_telefono) iti_telefono.setNumber(profileData.telefono);
          if (profileData.celular && iti_celular) iti_celular.setNumber(profileData.celular);
        } else if (profileRes.status === 404) {
          perfilExiste = false; 
          console.warn("No se encontró perfil (404). Entrando en modo de creación.");
          $('#respuesta').innerHTML = `<span class="text-blue-600">ℹ️ Estás creando un nuevo perfil para este usuario.</span>`;
        } else { 
           console.error(`Error ${profileRes.status} al cargar perfil`); 
           $('#respuesta').innerHTML = `<span class="text-orange-600">⚠️ No se pudo cargar el perfil.</span>`;
        }

        try {
            const userRes = await fetch(`${API_URL}/users/${userId}`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (userRes.ok) { 
               const userData = await userRes.json(); 
               if (userData.email) { 
                 $('#email').value = userData.email; 
                 emailOriginal = userData.email; 
               } else { 
                 $('#email').value = ''; 
                 emailOriginal = null; 
               } 
             } else { 
               console.error(`Error ${userRes.status} al cargar usuario`); 
               $('#email').value = 'Error al cargar'; 
               emailOriginal = null; 
               if (userRes.status === 401) logout(); 
             }
        } catch(userErr) { 
           console.error("Error de red cargando usuario", userErr); 
           $('#email').value = 'Error de red'; 
           emailOriginal = null; 
         }
        await cargarCompetencias(userId);
      } catch (err) { 
         console.error("Error general en cargarPerfil", err); 
         $('#respuesta').innerHTML = '<span class="text-red-600">⚠️ Error de red al cargar datos.</span>'; 
       }
    }

    async function cargarCompetencias(userId) { 
       const token = localStorage.getItem('token'); if (!token) return;
      try { 
         const res = await fetch(`${API_URL}/competencias/usuario/${userId}`, { headers: { 'Authorization': `Bearer ${token}` } }); 
         competenciasActual = res.ok ? await res.json() : {}; 
       } catch { 
         competenciasActual = {}; 
       }
      renderCompetenciasView();
    }

    function openSkillsModal() { 
       $('#habilidades').value = (competenciasActual.habilidades || []).join(', ');
      $('#idiomas').value = (competenciasActual.idiomas || []).join(', ');
      $('#nivel_academico').value = competenciasActual.nivel_academico || '';
      $('#area_conocimiento').value = competenciasActual.area_conocimiento || '';
      $('#anios_experiencia').value = competenciasActual.anios_experiencia || '';
      $('#perfilamiento').value = competenciasActual.perfilamiento || '';
      $('#otros_estudios').value = competenciasActual.otros_estudios || '';
      $('#disponibilidad').value = competenciasActual.disponibilidad || '';
      $('#modalCompetencias').classList.remove('hidden');
    }

    function closeSkillsModal() { 
       $('#modalCompetencias').classList.add('hidden');
    }

    async function saveSkills(e) {
        e.preventDefault();
        const userId = $("#user_id").value.trim();
        if (!userId) return;
       const token = localStorage.getItem('token');
        if(!token) { alert('Sesión inválida'); return; }
              
        const newSkillsPayload = { 
         user_id: userId, 
         habilidades: $('#habilidades').value.split(',').map(s => s.trim()).filter(Boolean), 
         idiomas: $('#idiomas').value.split(',').map(s => s.trim()).filter(Boolean), 
         nivel_academico: $('#nivel_academico').value, 
         area_conocimiento: $('#area_conocimiento').value, 
         anios_experiencia: parseInt($('#anios_experiencia').value, 10) || 0, 
         perfilamiento: $('#perfilamiento').value, 
         otros_estudios: $('#otros_estudios').value, 
         disponibilidad: $('#disponibilidad').value, 
       }; 
       try { 
         const res = await fetch(`${API_URL}/competencias/usuario/${userId}`, { 
           method: 'PUT', 
           headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, 
           body: JSON.stringify(newSkillsPayload) 
         }); 
         if (res.ok) { 
           competenciasActual = await res.json(); 
            renderCompetenciasView(); 
            closeSkillsModal(); 
           $('#respuesta').innerHTML = '<span class="text-green-600">✅ Competencias actualizadas.</span>'; 
         } else { 
            const error = await res.json(); 
            throw new Error(error.detail || 'Error al guardar competencias'); 
          } 
       } catch (error) { alert(`Error al guardar: ${error.message}`); }
    }

    window.addEventListener("DOMContentLoaded", async () => { 
       initializePhoneInputs();
      const url = new URL(window.location.href); 
       let userId = url.searchParams.get("user_id");
      if (userId) { 
         $("#user_id").value = userId; 
         await cargarPerfil(userId); 
         // Autoejecutar Tour ROSA si es primera visita
         setTimeout(() => iniciarTourPerfil(false), 800);
       } else { 
         // Fallback: obtener userId de localStorage o JWT
         userId = localStorage.getItem("user_id");
         if (!userId) {
           try {
             const token = localStorage.getItem("token");
             if (token) {
               const payload = JSON.parse(atob(token.split('.')[1]));
               userId = payload.user_id;
               localStorage.setItem("user_id", userId);
             }
           } catch (e) { console.error("Error obteniendo userId del token:", e); }
         }
         if (userId) {
           $("#user_id").value = userId;
           await cargarPerfil(userId);
           setTimeout(() => iniciarTourPerfil(false), 800);
         } else {
           console.warn("No se pudo identificar el usuario");
           $('#btnGuardarPerfil').disabled = true;
         }
       }
    });

    $("#foto").addEventListener("change", function(e) { 
       const file = e.target.files[0]; 
       if (file) { 
         const reader = new FileReader(); 
         reader.onload = (ev) => { 
           $("#foto_actual").src = ev.target.result; 
           $("#preview").classList.remove("hidden"); 
         }; 
         reader.readAsDataURL(file); 
       }
    });

    $('#profileForm').addEventListener('submit', async function (e) { 
       e.preventDefault();
      const saveButton = $('#btnGuardarPerfil'); 
       const respuestaDiv = $('#respuesta');
      respuestaDiv.innerHTML = '';

      const form = e.target;
      if (!form.checkValidity()) {
          form.reportValidity();
          respuestaDiv.innerHTML = '<span class="text-red-600">⚠️ Por favor, completa todos los campos obligatorios (*).</span>';
          return;
      }

      let telefonosValidos = true; 
       let errorTelefono = "";
      
      const telItiInput = $('#telefono').closest('.iti')?.querySelector('.iti__input');
      if (telItiInput) telItiInput.style.borderColor = '';
      
      const celItiInput = $('#celular').closest('.iti')?.querySelector('.iti__input');
      if (celItiInput) celItiInput.style.borderColor = '';

      if (!iti_telefono || !iti_telefono.isValidNumber()) {
          telefonosValidos = false; 
          errorTelefono = "El número de Teléfono no es válido o está vacío.";
          if (telItiInput) telItiInput.style.borderColor = '#ef4444';
      }
      if (!iti_celular || !iti_celular.isValidNumber()) {
          telefonosValidos = false;
          errorTelefono = errorTelefono || "El número de Celular no es válido o está vacío.";
          if (celItiInput) celItiInput.style.borderColor = '#ef4444';
      }
      if (!telefonosValidos) {
         respuestaDiv.innerHTML = `<span class="text-red-600">⚠️ ${errorTelefono}</span>`;
         return;
       }

      saveButton.disabled = true; 
       saveButton.textContent = "Guardando...";
      
      const userId = $("#user_id").value.trim(); 
       const token = localStorage.getItem('token');
      
      if (!userId || !token) {
          respuestaDiv.innerHTML = '<span class="text-red-600">⚠️ Error: Falta ID de usuario o sesión inválida.</span>';
          saveButton.disabled = false; 
           saveButton.textContent = "Guardar Cambios";
          return;
      }

      const profileFormData = new FormData();
      var camposBasicos = ['nombre', 'apellidos', 'direccion', 'cargo', 'empresa', 'biografia', 'linkedin', 'twitter', 'facebook', 'intereses_interes_principal', 'intereses_formato_preferido', 'intereses_nivel_experiencia', 'intereses_objetivo_principal'];
      console.log('Guardando perfil, userId:', userId);
      camposBasicos.forEach(function(id) { 
         var el = document.getElementById(id);
        if (el) {
          profileFormData.append(id, el.value); 
           console.log(' Campo:', id, '=', el.value);
        }
      });
      
      var paisEl = document.getElementById('pais');
      var paisVal = paisEl ? paisEl.value : '';
      var paisOtroEl = document.getElementById('pais_otro');
      var paisOtro = paisOtroEl ? paisOtroEl.value : '';
      var paisFinal = paisVal === 'Otro (especificar)' && paisOtro ? paisOtro : paisVal;
      profileFormData.append('pais', paisFinal);
      console.log(' Pais:', paisFinal);
      
      var ciudadEl = document.getElementById('ciudad');
      var ciudadVal = ciudadEl ? ciudadEl.value : '';
      var ciudadOtraEl = document.getElementById('ciudad_otra');
      var ciudadOtra = ciudadOtraEl ? ciudadOtraEl.value : '';
      var ciudadFinal = ciudadVal === 'Otra' && ciudadOtra ? ciudadOtra : ciudadVal;
      profileFormData.append('ciudad', ciudadFinal);
      console.log(' Ciudad:', ciudadFinal);
      
      if (iti_telefono && iti_telefono.isValidNumber()) profileFormData.append('telefono', iti_telefono.getNumber());
      if (iti_celular && iti_celular.isValidNumber()) profileFormData.append('celular', iti_celular.getNumber());
      const file = document.getElementById('foto').files[0]; 
       if (file) profileFormData.append("foto", file);

      if (!perfilExiste) { profileFormData.append("user_id", userId); }
      var httpMethod = perfilExiste ? 'PUT' : 'POST';
      var fetchUrl = perfilExiste ? API_URL + '/profiles/' + userId : API_URL + '/profiles/';
      
      console.log('Enviando:', httpMethod, fetchUrl);
      console.log('perfilExiste:', perfilExiste);
      
      let profileUpdateSuccess = false;
      try {
        console.log('Haciendo fetch...');
        const profileRes = await fetch(fetchUrl, { 
           method: httpMethod, 
           headers: { 'Authorization': 'Bearer ' + token }, 
           body: profileFormData 
         });
        console.log('Respuesta status:', profileRes.status);
        const profileData = await profileRes.json();
        console.log('Respuesta data:', profileData);
        if (profileRes.ok) {
          respuestaDiv.innerHTML = '<span class="text-green-600">✅ Perfil guardado correctamente.</span>';
          if (profileData.foto_url) { 
             fotoActualUrl = profileData.foto_url; 
             $("#foto_actual").src = fotoActualUrl; 
             $("#preview").classList.remove("hidden"); 
           }
          profileUpdateSuccess = true; 
          perfilExiste = true;
        } else {
          respuestaDiv.innerHTML = `<span class="text-red-600">❌ Error al guardar perfil: ${profileData.detail || 'Fallo en la solicitud'}</span>`;
        }
      } catch (error) { 
         respuestaDiv.innerHTML = `<span class="text-red-600">⚠️ Error de red guardando perfil: ${error.message}</span>`; 
       }

      const nuevoEmail = $('#email').value.trim(); 
       let emailUpdateMessage = '';
      if (profileUpdateSuccess && nuevoEmail && nuevoEmail !== emailOriginal) {
          try {
              const emailRes = await fetch(`${API_URL}/users/${userId}/email`, { 
                 method: 'PATCH', 
                 headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, 
                 body: JSON.stringify({ email: nuevoEmail }) 
               });
              if (emailRes.ok) { 
                 emailUpdateMessage = '<br><span class="text-green-600">✅ Email actualizado correctamente.</span>'; 
                 emailOriginal = nuevoEmail; 
               } else { 
                 const errorData = await emailRes.json(); 
                 if (emailRes.status === 400) { 
                   emailUpdateMessage = `<br><span class="text-red-600">❌ Error al actualizar email: ${errorData.detail || 'Email ya en uso.'}</span>`; 
                 } else { 
                   emailUpdateMessage = `<br><span class="text-red-600">❌ Error ${emailRes.status} al actualizar email.</span>`; 
                 } 
               }
          } catch (emailError) { 
             emailUpdateMessage = `<br><span class="text-red-600">⚠️ Error de red actualizando email: ${emailError.message}</span>`; 
           }
          respuestaDiv.innerHTML += emailUpdateMessage;
      }

      saveButton.disabled = false; 
       saveButton.textContent = "Guardar Cambios";
      if (profileUpdateSuccess) {
          const rol = window.location.pathname.split("/")[2];
          if (rol) { 
             setTimeout(() => { window.location.href = `https://gestordecursos.pegui.edu.co/r/${rol}/`; }, 2500); 
           }
      }
    });

    $('#btnEditarCompetencias').addEventListener('click', openSkillsModal);
    $('#btnCancelarCompetencias').addEventListener('click', closeSkillsModal);
    $('#competenciasForm').addEventListener('submit', saveSkills);
    $('#modalCompetencias').addEventListener('click', (e) => { if (e.target === $('#modalCompetencias')) closeSkillsModal(); });
    
    function logout() { localStorage.clear(); window.location.href = '/index.html'; }
  </script>
  
  <script>
    var camaraStreamPerfil = null;
    
    function abrirCamaraPerfil() {
      var modal = document.getElementById('modalCamara');
      if (modal) modal.classList.remove('hidden');
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
        .then(function(s) { camaraStreamPerfil = s; document.getElementById('videoCamara').srcObject = s; })
        .catch(function(err) { alert('Error cámara: ' + err.message); cerrarCamaraPerfil(); });
    }
    
    function cerrarCamaraPerfil() {
      var modal = document.getElementById('modalCamara');
      if (modal) modal.classList.add('hidden');
      if (camaraStreamPerfil) { 
         camaraStreamPerfil.getTracks().forEach(function(t) { t.stop(); }); 
         camaraStreamPerfil = null; 
       }
    }
    
    function tomarFotoDelPerfil() {
      var video = document.getElementById('videoCamara');
      var canvas = document.getElementById('canvasFotoPerfil');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0);
      var imagenDataUrl = canvas.toDataURL('image/jpeg', 0.8);
        
      var arr = imagenDataUrl.split(','), mime = arr[0].match(/:(.*?);/)[1];
      var bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
      while(n--) u8arr[n] = bstr.charCodeAt(n);
      var filePerfil = new File([u8arr], 'foto_perfil.jpg', {type: mime});
        
      var dt = new DataTransfer();
      dt.items.add(filePerfil);
      document.getElementById('foto').files = dt.files;
      document.getElementById('foto_actual').src = imagenDataUrl;
      document.getElementById('preview').classList.remove('hidden');
        
      cerrarCamaraPerfil();
      document.getElementById('respuesta').innerHTML = '<span class="text-green-600">📸 Foto capturada. Guarda los cambios.</span>';
    }
    
    document.getElementById('btnTomarFoto').addEventListener('click', abrirCamaraPerfil);
    document.getElementById('btnCapturarFoto').addEventListener('click', tomarFotoDelPerfil);
    document.getElementById('btnCerrarCamara').addEventListener('click', cerrarCamaraPerfil);
    
    var ciudadesPorPais = {
      'Colombia': ['Bogotá', 'Medellín', 'Cali', 'Barranquilla', 'Cartagena', 'Cúcuta', 'Bucaramanga', 'Pereira', 'Manizales', 'Ibagué', 'Neiva', 'Santa Marta', 'Pasto', 'Popayán', 'Armenia', 'Montería', 'Valledupar', 'Villavicencio', 'Otra'],
      'España': ['Madrid', 'Barcelona', 'Valencia', 'Sevilla', 'Zaragoza', 'Málaga', 'Murcia', 'Palma', 'Las Palmas', 'Bilbao', 'Otra'],
      'México': ['Ciudad de México', 'Guadalajara', 'Monterrey', 'Puebla', 'Tijuana', 'León', 'Juárez', 'Torreón', 'Otra'],
      'Argentina': ['Buenos Aires', 'Córdoba', 'Rosario', 'Mendoza', 'La Plata', 'Mar del Plata', 'Salta', 'Otra'],
      'Chile': ['Santiago', 'Valparaíso', 'Concepción', 'La Serena', 'Antofagasta', 'Otra'],
      'Perú': ['Lima', 'Arequipa', 'Cuzco', 'Trujillo', 'Chiclayo', 'Otra'],
      'Venezuela': ['Caracas', 'Maracaibo', 'Valencia', 'Barquisimeto', 'Ciudad Bolívar', 'Otra'],
      'Ecuador': ['Quito', 'Guayaquil', 'Cuenca', 'Otra'],
      'Estados Unidos': ['New York', 'Los Angeles', 'Chicago', 'Houston', 'Miami', 'Otra'],
      'Canadá': ['Toronto', 'Vancouver', 'Montreal', 'Calgary', 'Otra'],
      'Reino Unido': ['Londres', 'Manchester', 'Birmingham', 'Glasgow', 'Otra'],
      'Francia': ['París', 'Marsella', 'Lyon', 'Toulouse', 'Otra'],
      'Alemania': ['Berlín', 'Múnich', 'Fráncfort', 'Hamburgo', 'Otra'],
      'Italia': ['Roma', 'Milán', 'Nápoles', 'Turín', 'Otra'],
      'Brasil': ['São Paulo', 'Río de Janeiro', 'Brasilia', 'Salvador', 'Otra'],
      'Otro (especificar)': ['Otra']
    };
    
    function cargarCiudadesPorPais() {
      var paisSeleccionado = document.getElementById('pais').value;
      var citySelect = document.getElementById('ciudad');
      var paisOtroInput = document.getElementById('pais_otro');
      var ciudadOtraInput = document.getElementById('ciudad_otra');
        
      citySelect.innerHTML = '';
      paisOtroInput.classList.add('hidden');
      ciudadOtraInput.classList.add('hidden');
        
      if (!paisSeleccionado) {
        var opDefault = document.createElement('option');
        opDefault.value = '';
        opDefault.textContent = 'Selecciona primero un país...';
        citySelect.appendChild(opDefault);
        return;
      }
        
      if (paisSeleccionado === 'Otro (especificar)') {
        paisOtroInput.classList.remove('hidden');
        var opDefault = document.createElement('option');
        opDefault.value = '';
        opDefault.textContent = 'Especifica tu país above';
        citySelect.appendChild(opDefault);
        return;
      }
        
      var ciudades = ciudadesPorPais[paisSeleccionado] || ['Otra'];
      ciudades.forEach(function(ciudad) {
        var op = document.createElement('option');
        op.value = ciudad;
        op.textContent = ciudad;
        citySelect.appendChild(op);
      });
    }
    
    function mostrarCiudadOtra() {
      var citySelect = document.getElementById('ciudad');
      var ciudadOtraInput = document.getElementById('ciudad_otra');
      if (citySelect.value === 'Otra') {
        ciudadOtraInput.classList.remove('hidden');
      } else {
        ciudadOtraInput.classList.add('hidden');
      }
    }
    
    document.getElementById('ciudad').addEventListener('change', mostrarCiudadOtra);
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const path = window.location.pathname;
      const isSuperadmin = path.includes('/r/superadmin/');
      const isAdmin = path.includes('/r/admin/');
      const isCoordinador = path.includes('/r/coordinador/');
      const isCliente = path.includes('/r/cliente/');
      const isDisInst = path.includes('/r/disenador-instruccional/');
      const isAutor = path.includes('/r/autor/');
      const isRevisor = path.includes('/r/revisor-qa/');
      const isEditor = path.includes('/r/editor/');
      const isDesaMult = path.includes('/r/desarrollador-multimedia/');
      const isAbogado = path.includes('/r/abogado/');
      const isDisGraf = path.includes('/r/disenador-grafico/');
      const isAnim2d = path.includes('/r/animador-2d/');
      const isAnim3d = path.includes('/r/animador-3d/');
      const isVideo = path.includes('/r/video/');
      const isCorrector = path.includes('/r/corrector-de-estilo/');
      const isIngeniero = path.includes('/r/ingeniero-lms/');
      const isRegistrado = path.includes('/r/registrado/');

      const allowedRoles = [];
      if (isSuperadmin) allowedRoles.push('superadmin');
      if (isAdmin) allowedRoles.push('admin');
      if (isCoordinador) allowedRoles.push('coordinador');
      if (isCliente) allowedRoles.push('cliente');
      if (isDisInst) allowedRoles.push('disenador-instruccional');
      if (isAutor) allowedRoles.push('autor');
      if (isRevisor) allowedRoles.push('revisor-qa');
      if (isEditor) allowedRoles.push('editor');
      if (isDesaMult) allowedRoles.push('desarrollador-multimedia');
      if (isAbogado) allowedRoles.push('abogado');
      if (isDisGraf) allowedRoles.push('disenador-grafico');
      if (isAnim2d) allowedRoles.push('animador-2d');
      if (isAnim3d) allowedRoles.push('animador-3d');
      if (isVideo) allowedRoles.push('video');
      if (isCorrector) allowedRoles.push('corrector-de-estilo');
      if (isIngeniero) allowedRoles.push('ingeniero-lms');
      if (isRegistrado) allowedRoles.push('registrado');

      const token = localStorage.getItem('token');
      if (!token) {
          window.location.href = '/';
          return;
      }

      try {
          const payload = JSON.parse(atob(token.split('.')[1]));
          const userRoles = payload.roles || [payload.role].filter(Boolean);
          if (!userRoles.some(r => allowedRoles.includes(r))) {
              window.location.href = '/';
              return;
          }
      } catch(e) {
          window.location.href = '/';
      }
    });
  </script>
  
  <script>
    (function() {
      const token = localStorage.getItem('token');
      if (!token) return;

      try {
          const payload = JSON.parse(atob(token.split('.')[1]));

          const hasPermission = (perm) => permissions.includes(perm);
          const hasAnyPermission = (perms) => perms.some(p => permissions.includes(p));

          const menuPermissions = {

              'menu-metricas': ['reportes_metricas_ver'],
              'menu-diseno-instruccional': ['diseno_instruccional_ver', 'diseno_instruccional_crear'],
              'menu-autor-contenido': ['autor_ver', 'autor_crear'],
              'menu-microcursos': ['capacitacion_microcursos_ver'],
              'menu-tutoriales': ['capacitacion_tutoriales_ver'],
              'menu-faq': ['capacitacion_faq_ver'],
          };

          Object.entries(menuPermissions).forEach(([id, required]) => {
              const el = document.getElementById(id);
              if (el && !hasAnyPermission(required)) {
                  el.style.display = 'none';
              }
          });
      } catch(e) {}
    })();
