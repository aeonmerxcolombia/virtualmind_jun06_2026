<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Cronogramas</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/fetch-con-token.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet"/>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card {
            animation: fadeIn 0.4s ease-out forwards;
            transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }
        .btn {
            transition: background-color 0.2s, color 0.2s, transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-1px);
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-weight: 500;
            font-size: 0.75rem;
        }
        .status-planificado { background-color: #e0e7ff; color: #4338ca; }
        .status-en_progreso { background-color: #dbeafe; color: #1d4ed8; }
        .status-completado { background-color: #d1fae5; color: #059669; }
        .status-cancelado { background-color: #fee2e2; color: #b91c1c; }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">
    <div class="container mx-auto max-w-7xl p-4 sm:p-6 lg:p-8">
        
        <header class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-800 flex items-center">
                <i class="fas fa-stream mr-4 text-indigo-600"></i>Cronogramas
            </h1>
        </header>

        <!-- Filtros -->
        <div class="mb-8 bg-white p-4 rounded-xl shadow-sm">
            <label for="projectFilter" class="block text-sm font-medium text-gray-700 mb-1">Filtrar por Proyecto</label>
            <select id="projectFilter" class="w-full p-2 border border-gray-300 rounded-lg">
                <!-- Opciones de proyectos se cargarán aquí -->
            </select>
        </div>

        <!-- Contenedor de la Lista de Cronogramas -->
        <div id="cronogramasList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Las tarjetas de cronograma se insertarán aquí -->
            <div id="loadingState" class="col-span-full text-center text-gray-500 p-8">
                <i class="fas fa-spinner fa-spin fa-2x"></i>
                <p class="mt-2">Cargando cronogramas...</p>
            </div>
        </div>
    </div>

    <!-- Plantilla para una Tarjeta de Cronograma -->
    <template id="cronogramaCardTemplate">
        <div class="card bg-white rounded-xl shadow-md overflow-hidden">
            <div class="p-6">
                <div class="flex justify-between items-start">
                    <p class="text-sm font-semibold text-indigo-600 project-name">Nombre del Proyecto</p>
                    <span class="status-badge status-planificado cronograma-estado">Planificado</span>
                </div>
                <h2 class="text-xl font-bold text-gray-800 mt-2 truncate cronograma-nombre">Nombre del Cronograma</h2>
                <div class="mt-4 flex items-center text-gray-500 text-sm">
                    <i class="fas fa-calendar-alt mr-2"></i>
                    <span class="cronograma-fechas">Calculando fechas...</span>
                </div>
            </div>
            <div class="bg-gray-50 px-6 py-3 flex justify-end items-center gap-3">
                <a href="#" class="btn text-gray-600 hover:text-blue-600 view-link">
                    <i class="fas fa-eye mr-1"></i>Ver
                </a>
                <a href="#" class="btn text-gray-600 hover:text-indigo-600 edit-link">
                    <i class="fas fa-pencil-alt mr-1"></i>Editar
                </a>
                <button class="btn text-gray-600 hover:text-red-600 delete-button">
                    <i class="fas fa-trash-alt mr-1"></i>Eliminar
                </button>
            </div>
        </div>
    </template>
    
<script>
document.addEventListener('DOMContentLoaded', () => {
    const API_BASE = "https://gestordecursos.pegui.edu.co:8000";
    const token = localStorage.getItem("token");

    let allProjects = [];
    let allCronogramas = [];

    const projectFilter = document.getElementById('projectFilter');
    const cronogramasList = document.getElementById('cronogramasList');
    const loadingState = document.getElementById('loadingState');
    const cardTemplate = document.getElementById('cronogramaCardTemplate');

    async function fetchData(endpoint) {
        const response = await fetch(`${API_BASE}${endpoint}`, { headers: { "Authorization": `Bearer ${token}` } });
        if (!response.ok) {
            throw new Error(`Error ${response.status} en ${endpoint}`);
        }
        return response.json();
    }

    async function init() {
        try {
            [allProjects, allCronogramas] = await Promise.all([
                fetchData("/projects/"),
                fetchData("/cronogramas/")
            ]);
            
            renderProjectsFilter();
            renderCronogramas(allCronogramas);
            attachEventListeners();

        } catch (error) {
            console.error("Error al inicializar la vista:", error);
            cronogramasList.innerHTML = `<div class="col-span-full text-center text-red-500 p-8">Error al cargar los datos.</div>`;
        }
    }

    function renderProjectsFilter() {
        let optionsHtml = `<option value="all">Todos los Proyectos</option>`;
        allProjects.forEach(project => {
            optionsHtml += `<option value="${project.id}">${project.name}</option>`;
        });
        projectFilter.innerHTML = optionsHtml;
    }
    
    function renderCronogramas(cronogramas) {
        cronogramasList.innerHTML = '';
        if (cronogramas.length === 0) {
            cronogramasList.innerHTML = `<div class="col-span-full text-center text-gray-500 p-8">No se encontraron cronogramas.</div>`;
            return;
        }

        cronogramas.forEach(cronograma => {
            const card = cardTemplate.content.cloneNode(true);
            
            const project = allProjects.find(p => p.id === cronograma.project_id);
            card.querySelector('.project-name').textContent = project ? project.name : 'Proyecto Desconocido';
            
            card.querySelector('.cronograma-nombre').textContent = cronograma.nombre || 'Sin Nombre';

            const estadoBadge = card.querySelector('.cronograma-estado');
            estadoBadge.textContent = (cronograma.estado || 'desconocido').replace(/_/g, ' ');
            estadoBadge.className = `status-badge status-${(cronograma.estado || 'desconocido')}`;

            if (cronograma.estructura && cronograma.estructura.length > 0) {
                const fechasInicio = cronograma.estructura.map(f => new Date(f.fecha_inicio));
                const fechasFin = cronograma.estructura.map(f => new Date(f.fecha_fin));
                const minDate = new Date(Math.min(...fechasInicio)).toLocaleDateString('es-CO');
                const maxDate = new Date(Math.max(...fechasFin)).toLocaleDateString('es-CO');
                card.querySelector('.cronograma-fechas').textContent = `${minDate} - ${maxDate}`;
            } else {
                card.querySelector('.cronograma-fechas').textContent = 'Sin fechas definidas';
            }

            // Configurar botones de acción
            card.querySelector('.view-link').href = `./ver-cronograma.html?cronograma_id=${cronograma.id}`;
            card.querySelector('.edit-link').href = `./editar_cronograma.html?cronograma_id=${cronograma.id}`;
            card.querySelector('.delete-button').dataset.id = cronograma.id;

            cronogramasList.appendChild(card);
        });
    }

    function attachEventListeners() {
        projectFilter.addEventListener('change', async (e) => {
            const selectedProjectId = e.target.value;
            cronogramasList.innerHTML = '';
            cronogramasList.appendChild(loadingState);

            if (selectedProjectId === 'all') {
                renderCronogramas(allCronogramas);
            } else {
                try {
                    const cronograma = await fetchData(`/cronogramas/project/${selectedProjectId}`);
                    renderCronogramas([cronograma]);
                } catch (err) {
                     if (err.message.includes("404")) {
                        renderCronogramas([]);
                     } else {
                        console.error(err);
                        cronogramasList.innerHTML = `<div class="col-span-full text-center text-red-500 p-8">Error al filtrar.</div>`;
                     }
                }
            }
        });

        cronogramasList.addEventListener('click', async (e) => {
            const deleteButton = e.target.closest('.delete-button');
            if (deleteButton) {
                const cronogramaId = deleteButton.dataset.id;
                if (confirm(`¿Estás seguro de que deseas eliminar el cronograma ${cronogramaId}?`)) {
                    try {
                        await fetch(`${API_BASE}/cronogramas/${cronogramaId}`, { 
                            method: 'DELETE',
                            headers: { "Authorization": `Bearer ${token}` }
                        });
                        allCronogramas = allCronogramas.filter(c => c.id != cronogramaId);
                        renderCronogramas(allCronogramas);
                        alert('Cronograma eliminado');
                    } catch (err) {
                        console.error('Error al eliminar:', err);
                        alert('No se pudo eliminar el cronograma.');
                    }
                }
            }
        });
    }

    init();
});
</script>
<script src="/js/roles.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const path = window.location.pathname;
    const isSuperadmin = path.includes('/r/superadmin/');
    const isAdmin = path.includes('/r/admin/');
    const isCoordinador = path.includes('/r/coordinador/');
    const isCliente = path.includes('/r/cliente/');
    const isDisInst = path.includes('/r/disenador-instruccional/');
    const isAutor = path.includes('/r/autor/');
    const isRevisor = path.includes('/r/revisor-qa/');
    const isEditor = path.includes('/r/editor/');
    const isDesaMult = path.includes('/r/desarrollador-multimedia/');
    const isAbogado = path.includes('/r/abogado/');
    const isDisGraf = path.includes('/r/disenador-grafico/');
    const isAnim2d = path.includes('/r/animador-2d/');
    const isAnim3d = path.includes('/r/animador-3d/');
    const isVideo = path.includes('/r/video/');
    const isCorrector = path.includes('/r/corrector-de-estilo/');
    const isIngeniero = path.includes('/r/ingeniero-lms/');
    const isRegistrado = path.includes('/r/registrado/');

    const allowedRoles = [];
    if (isSuperadmin) allowedRoles.push('superadmin');
    if (isAdmin) allowedRoles.push('admin');
    if (isCoordinador) allowedRoles.push('coordinador');
    if (isCliente) allowedRoles.push('cliente');
    if (isDisInst) allowedRoles.push('disenador-instruccional');
    if (isAutor) allowedRoles.push('autor');
    if (isRevisor) allowedRoles.push('revisor-qa');
    if (isEditor) allowedRoles.push('editor');
    if (isDesaMult) allowedRoles.push('desarrollador-multimedia');
    if (isAbogado) allowedRoles.push('abogado');
    if (isDisGraf) allowedRoles.push('disenador-grafico');
    if (isAnim2d) allowedRoles.push('animador-2d');
    if (isAnim3d) allowedRoles.push('animador-3d');
    if (isVideo) allowedRoles.push('video');
    if (isCorrector) allowedRoles.push('corrector-de-estilo');
    if (isIngeniero) allowedRoles.push('ingeniero-lms');
    if (isRegistrado) allowedRoles.push('registrado');

    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/';
        return;
    }
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const userRoles = payload.roles || [payload.role].filter(Boolean);
        if (!userRoles.some(r => allowedRoles.includes(r))) {
            window.location.href = '/';
            return;
        }
    } catch(e) {
        window.location.href = '/';
    }
});
</script>

<script>
// ==================== VERIFICACIÓN DE PERMISOS DE MENÚ ====================
(function() {
    const token = localStorage.getItem('token');
    if (!token) return;
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const permissions = payload.permissions || [];
        
        const hasPermission = (perm) => permissions.includes(perm);
        const hasAnyPermission = (perms) => perms.some(p => permissions.includes(p));
        
        const menuPermissions = {
            'menu-proyectos': ['proyectos_crear', 'proyectos_consultar'],
            'menu-crear-proyecto': ['proyectos_crear'],
            'menu-entidades': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-crear-entidad': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-plan-estudio': ['proyectos_planes_formacion_listar', 'diseno_instruccional_ver'],
            'menu-crear-plan': ['diseno_instruccional_crear'],
            'menu-cursos': ['proyectos_cursos_listar'],
            'menu-crear-curso': ['autor_crear'],
            'menu-modulos': ['proyectos_modulos_listar'],
            'menu-crear-modulo': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-unidades': ['proyectos_unidades_listar'],
            'menu-crear-unidad': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-tareas': ['proyectos_tareas_listar'],
            'menu-crear-tarea': ['autor_crear'],
            'menu-evaluaciones': ['proyectos_evaluaciones_listar'],
            'menu-crear-evaluacion': ['autor_crear'],
            'menu-fases': ['proyectos_fases_etapas_gestionar'],
            'menu-cronogramas': ['proyectos_cronogramas_crear'],
            'menu-calendario': ['proyectos_calendario_ver'],
            'menu-usuarios': ['usuarios_crear'],
            'menu-clientes': ['usuarios_crear'],
            'menu-crm': ['usuarios_crear'],
            'menu-roles': ['roles_permisos_gestionar'],
            'menu-drive': ['archivos_drive_personal_ver', 'archivos_drive_global_ver'],
            'menu-ia': ['ia_produccion_imagen', 'ia_produccion_audio', 'ia_linguistica_usar'],
            'menu-canvas': ['herramientas_canvas_usar'],
            'menu-powerpoint': ['herramientas_powerpoint_usar'],
            'menu-auditoria': ['seguridad_auditoria_ver'],
            'menu-bitacora': ['seguridad_bitacora_usuarios_ver'],
            'menu-estadisticas': ['reportes_estadisticas_ver'],
            'menu-metricas': ['reportes_metricas_ver'],
            'menu-diseno-instruccional': ['diseno_instruccional_ver', 'diseno_instruccional_crear'],
            'menu-autor-contenido': ['autor_ver', 'autor_crear'],
            'menu-microcursos': ['capacitacion_microcursos_ver'],
            'menu-tutoriales': ['capacitacion_tutoriales_ver'],
            'menu-faq': ['capacitacion_faq_ver'],
        };
        
        Object.entries(menuPermissions).forEach(([id, required]) => {
            const el = document.getElementById(id);
            if (el && !hasAnyPermission(required)) {
                el.style.display = 'none';
            }
        });
    } catch(e) {}
})();
</script>

</body>
</html>
