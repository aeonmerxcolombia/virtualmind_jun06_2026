<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Virtualmind – Superadmin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.js.iife.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.css"/>
  <script src="/js/fetch-con-token.js"></script>
  <script src="/js/colmena-widget-intelligent.js"></script>
  <script src="/js/global-search.js"></script>
  <script src="/js/tooltips.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/open-dyslexic-regular.css" rel="stylesheet">
  
  <script>
    if (window.innerWidth <= 768) {
      window.location.href = "https://gestordecursos.pegui.edu.co/r/superadmin/responsive/";
    }
  </script>
  
  <style>
    /* Custom High-Tech Styling */
    body {
      font-family: 'Inter', sans-serif;
      transition: background-color 0.3s ease, font-size 0.2s ease;
    }
    
    .chat-bubble { animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    
    iframe { width: 100%; height: 100%; border: none; }
    
    /* Custom Premium Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(243, 244, 246, 1);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(99, 102, 241, 0.4);
      border-radius: 9999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(99, 102, 241, 0.7);
    }
    
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    
    .chat-bubble {
      max-width: 90%;
      word-wrap: break-word;
      line-height: 1.6;
    }
    
    /* Menú Activo con gradiente y neón */
    .menu-item.active {
      background: linear-gradient(135deg, rgba(79, 70, 229, 0.25) 0%, rgba(99, 102, 241, 0.1) 100%) !important;
      color: #ffffff !important;
      font-weight: 600;
      border-left: 3px solid #6366f1;
      box-shadow: inset 0 0 12px rgba(99, 102, 241, 0.15);
    }
    
    /* Configuración de Traducción de Google */
    #google_translate_element {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    #google_translate_element .goog-te-combo {
      border-radius: 0.5rem;
      padding: 0.375rem 0.75rem;
      font-size: 0.8125rem;
      font-weight: 500;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background-color: rgba(15, 23, 42, 0.8);
      color: #e2e8f0;
      outline: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    #google_translate_element .goog-te-combo:hover {
      border-color: rgba(99, 102, 241, 0.4);
      background-color: rgba(15, 23, 42, 0.95);
    }
    .goog-logo-link { display: none !important; }
    .goog-te-gadget-simple { background-color: transparent !important; border: none !important; }
    .goog-te-gadget-simple span { display: none; }
    
    /* Clases de Accesibilidad */
    body.contrast { filter: invert(1) hue-rotate(180deg); background: #000 !important; }
    body.contrast iframe { filter: invert(1) hue-rotate(180deg); } /* Evita doble inversión en iframe */
    body.large-text { font-size: 1.15rem !important; line-height: 1.7 !important; }
    body.grayscale { filter: grayscale(1); }
    body.dyslexia { font-family: 'OpenDyslexic', sans-serif !important; }
    body.reduce-motion * { animation: none !important; transition: none !important; }
    
    /* Chat Widget Posición e Interacciones */
    #chatWidgetContainer {
      position: fixed;
      bottom: 1.5rem;
      left: calc(18rem + 1.5rem);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    #chatWidgetToggle {
      background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
      color: white;
      padding: 1rem;
      border-radius: 9999px;
      box-shadow: 0 4px 20px rgba(79, 70, 229, 0.4);
      font-size: 1.5rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    #chatWidgetToggle:hover { 
      transform: scale(1.08) rotate(5deg);
      box-shadow: 0 6px 24px rgba(79, 70, 229, 0.6);
    }
    #chatWidget {
      width: 26rem;
      height: 36rem;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 1rem;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      transform-origin: bottom left;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
      opacity: 0;
      transform: translateY(100%) scale(0.9);
      pointer-events: none;
      margin-bottom: 0.75rem;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: absolute;
      bottom: calc(100% + 1rem);
      left: 0;
    }
    #chatWidget.opened {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    #chatBoxWidget { flex-grow: 1; overflow-y: auto; }
    
    /* Accesibilidad Dropdown Animaciones */
    #accessibilityMenu {
      position: relative;
    }
    #accessibilityControls {
      display: none;
      position: absolute;
      top: calc(100% + 0.75rem);
      right: 0;
      width: 16rem;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 0.75rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      padding: 0.75rem;
      flex-direction: column;
      gap: 0.5rem;
      animation: fadeIn 0.2s ease-out;
    }
    #accessibilityMenu.opened #accessibilityControls { 
      display: flex; 
    }
    
    /* Custom ambient glowing backgrounds */
    .glow-blob {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(0,0,0,0) 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
  </style>
<script src="/staging/js/staging-banner.js"></script>
</head>
<body class="min-h-screen font-[Inter] bg-white text-gray-900 flex flex-col overflow-x-hidden">

  <script>
    // --- Guardián de Ruta ---
    let token = localStorage.getItem("token");
    let termsAccepted = localStorage.getItem("termsAccepted");
    let API = "https://gestordecursos.pegui.edu.co:8000";
    
    if (!token) {
      window.location.href = "/index.html";
    } else if (termsAccepted !== 'true') {
      window.location.href = '/accept-terms.html';
    }

    // --- Elegant Toast Alerts (Sustituye a alerts de navegador para William Andrés) ---
    function showNotification(type, message) {
      const container = document.getElementById('customToastContainer');
      if (!container) return;
      const toast = document.createElement('div');
      toast.className = `flex items-center p-4 rounded-xl shadow-xl border backdrop-blur-md transform translate-y-2 opacity-0 transition-all duration-300 pointer-events-auto ${
        type === 'success' 
          ? 'bg-emerald-50 border-emerald-300 text-emerald-700' 
          : 'bg-rose-50 border-rose-300 text-rose-700'
      }`;
      toast.innerHTML = `
        <span class="mr-3 text-lg">${type === 'success' ? '✨' : '⚠️'}</span>
        <div class="text-xs font-semibold tracking-wide">${message}</div>
      `;
      container.appendChild(toast);
      setTimeout(() => {
        toast.classList.remove('translate-y-2', 'opacity-0');
      }, 50);
      setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-2');
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }
    
    // Override alert globally for seamless styling upgrade
    window.alert = function(msg) {
      const isSuccess = msg.includes('✅') || msg.toLowerCase().includes('éxito') || msg.toLowerCase().includes('copiado');
      showNotification(isSuccess ? 'success' : 'error', msg.replace(/[✅❌]/g, '').trim());
    };

    // --- Notificaciones ---
    const notifBtn = document.getElementById("notifButton");
    const notifDropdown = document.getElementById("notifDropdown");
    const notifList = document.getElementById("notifList");
    const notifCount = document.getElementById("notifCount");
    const notifEmpty = document.getElementById("notifEmpty");
    let notifAbierto = false;
    
    notifBtn.addEventListener("click", () => {
      notifDropdown.classList.toggle("hidden");
      if (!notifAbierto) {
        notifAbierto = true;
        cargarNotificaciones();
        fetch(`${API}/notifications/leer`, {
          method: "POST",
          headers: { Authorization: "Bearer " + token }
        })
        .then(() => {
          notifCount.textContent = "0";
          notifCount.style.display = "none";
        })
        .catch(() => {});
      }
    });

    function toggleMenu(id) {

    function parseJwt(token) {
      try {
        const base64Url = token.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(
          atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')
        );
        return JSON.parse(jsonPayload);
      } catch (e) {
        console.error("Error decodificando token:", e);
        return null;
      }
    }

    async function fetchPermissionsForCurrentRole() {
      if (!token) return new Set();
      const path = window.location.pathname;
      const currentRole = path.split('/')[2];
      
      if (!currentRole || currentRole === 'superadmin') return new Set();
      
      try {
        const res = await fetch(`${API}/roles/`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) {
          if (res.status === 401) logout();
          throw new Error(`HTTP error! status: ${res.status}`);
        }
        const allRoles = await res.json();
        const currentRoleObject = allRoles.find(r => r.name === currentRole);
        if (currentRoleObject && currentRoleObject.permissions) {
          return new Set(currentRoleObject.permissions.map(p => p.name));
        }
        return new Set();
      } catch (error) {
        console.error(`Error consultando permisos para el rol '${currentRole}':`, error);
        return new Set();
      }
    }

    async function renderSidebar() {
      const sidebarMenu = document.getElementById('dynamic-sidebar-menu');
      if (!sidebarMenu) return;
      sidebarMenu.innerHTML = '';
      
      const path = window.location.pathname;
      const currentRole = path.split('/')[2];
      let permissionsToRender = new Set();
      
      if (currentRole === 'superadmin') {
        for (const sectionId in menuMapping) {
          const section = menuMapping[sectionId];
          if (section.items) {
            section.items.forEach(item => permissionsToRender.add(item.permission));
          } else if (section.permission) {
            permissionsToRender.add(section.permission);
          }
        }
      } else {
        permissionsToRender = await fetchPermissionsForCurrentRole();
      }
      
      for (const sectionId in menuMapping) {
        const section = menuMapping[sectionId];
        if (section.url && section.permission && permissionsToRender.has(section.permission)) {
          sidebarMenu.innerHTML += `
            <a href="#" onclick="selectMenu(this); cargarVista('${section.url}')"

              <span class="mr-3.5 text-lg">${section.icon}</span>

            </a>`;

          const visibleItems = section.items.filter(item => permissionsToRender.has(item.permission));
          if (visibleItems.length > 0) {
            let sectionItemsHTML = visibleItems.map(item => `
              <a href="#" onclick="selectMenu(this); cargarVista('${item.url}')"

    async function cargarPerfilSidebar() {
      if (!token) return;
      const payload = parseJwt(token);
      if (!payload || !payload.user_id) { logout(); return; }
      const user_id = payload.user_id;
      localStorage.setItem("user_id", user_id);
      
      try {
        const res = await fetch(`${API}/users/${user_id}`, {
          headers: { Authorization: "Bearer " + token }
        });
        const data = await res.json();
        const roles = data.roles;
        const sel = document.getElementById("roleSelect");
        sel.innerHTML = "";
        
        const path = window.location.pathname;
        const currentRole = path.split('/')[2];
        
        roles.forEach(r => {
          const o = document.createElement("option");
          o.value = r;
          o.textContent = r.charAt(0).toUpperCase() + r.slice(1);
          if (r === currentRole) o.selected = true;
          sel.appendChild(o);
        });
        
        sel.addEventListener("change", async () => {
          if (!sel.value) return;
          try {
            const res = await fetch(`${API}/auth/switch-role`, {
              method: "POST",
              headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
              body: JSON.stringify({ role: sel.value })
            });
            if (!res.ok) throw new Error((await res.json()).detail || "Error al cambiar rol");
            const data = await res.json();
            localStorage.setItem("token", data.access_token);
            window.location.href = `/r/${sel.value}/`;
          } catch (e) {
            showNotification("error", "Error al cambiar rol: " + e.message);
          }
        });
      } catch (e) {
        console.error("Error cargando roles de usuario:", e);
      }
      
      try {
        const res2 = await fetch(`${API}/profiles/${user_id}`, {
          headers: { Authorization: "Bearer " + token }
        });
        const p = await res2.json();
        document.getElementById("sidebarAvatar").src = p.foto_url || "/assets/default_avatar.png";
        document.getElementById("sidebarName").textContent = p.nombre || "Perfil";
      } catch (e) {
        console.error("Error cargando perfil:", e);
      }
    }

    async function cargarNotificaciones() {
      try {
        const res = await fetch(`${API}/notifications/`, {
          headers: { Authorization: "Bearer " + token }
        });
        
        if (res.status === 401) { logout(); return; }
        
        const data = await res.json();
        const user_id = localStorage.getItem("user_id");
        const notifs = (data.notificaciones || []).filter(n => String(n.usuario_id) === String(user_id));
        
        notifList.innerHTML = "";
        if (notifs.length === 0) {
          notifCount.textContent = 0;
          notifEmpty.style.display = "block";
          return;
        }
        
        notifCount.textContent = notifs.length;
        notifEmpty.style.display = "none";
        
        notifs.forEach(n => {
          const div = document.createElement("div");
          div.className = "px-4 py-3 hover:bg-gray-100 cursor-pointer text-xs border-b border-gray-200 transition-colors";

        btnSpeak.innerHTML = "🔊 Escuchar";
        btnSpeak.title = "Escuchar esta respuesta";
        btnSpeak.className = "text-[10px] text-indigo-600 hover:text-indigo-700 font-semibold hover:underline";
        btnSpeak.onclick = () => speakText(originalTxt, btnSpeak);
        
        const buttonsContainer = document.createElement("div");
        buttonsContainer.className = "mt-2.5 pt-2 border-t border-white/5 flex";
        buttonsContainer.appendChild(btnCopy);
        buttonsContainer.appendChild(btnSpeak);
        d.appendChild(buttonsContainer);
      }
      
      chatBox.appendChild(d);
      chatBox.scrollTop = chatBox.scrollHeight;
      
      const copia = chatBox.cloneNode(true);
      copia.querySelectorAll("button").forEach(b => b.remove());
      localStorage.setItem(KEY, copia.innerHTML);
    }

    async function enviarMensaje() {
      const msg = document.getElementById("chatInput").value.trim();
      if (!msg) return;
      
      appendBubble(msg, "Tú");
      document.getElementById("chatInput").value = "";
      
      const t = document.createElement("div");
      t.id = "typing";
      t.className = "chat-bubble bg-gray-100 border border-gray-200 p-3 rounded-xl italic text-gray-500 text-xs flex items-center gap-2";
      t.innerHTML = `
        <span class="flex h-2 w-2 relative">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2 w-2 bg-indigo-500"></span>
        </span>
        Procesando comando...
      `;
      chatBox.appendChild(t);
      chatBox.scrollTop = chatBox.scrollHeight;
      
      const mdl = "gemini";
      
      try {
        const r = await fetch(`${API}/chat/${mdl}`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({ prompt: msg, mensaje: msg }) 
         });
        const { respuesta } = await r.json();
        appendBubble(respuesta, "IA");
      } catch {
        appendBubble("❌ Error al contactar el servidor de IA.", "IA");
      } finally {
        document.getElementById("typing")?.remove();
      }
    }

    // --- Accesibilidad ---
    const toggleBtn = document.getElementById('accessibilityToggle');
    const panel = document.getElementById('accessibilityControls');
    const wrap = document.getElementById('accessibilityMenu');
    
    toggleBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const exp = toggleBtn.getAttribute('aria-expanded') === 'true';
      toggleBtn.setAttribute('aria-expanded', String(!exp));
      wrap.classList.toggle('opened');
    });

    // Cierra el panel de accesibilidad si se hace clic fuera de él
    document.addEventListener('click', (e) => {
      if (!wrap.contains(e.target)) {
        wrap.classList.remove('opened');
        toggleBtn.setAttribute('aria-expanded', 'false');
      }
    });
    
    panel.querySelectorAll('button[data-act]').forEach(b => {
      b.addEventListener('click', () => {
        const action = b.getAttribute('data-act');
        document.body.classList.toggle(action);
        b.classList.toggle('bg-indigo-500/10');
        b.classList.toggle('border-indigo-500/30');
      });
    });
    
    document.getElementById('resetAccessibility').addEventListener('click', () => {
      ['contrast', 'large-text', 'grayscale', 'dyslexia', 'reduce-motion'].forEach(c => document.body.classList.remove(c));
      panel.querySelectorAll('button[data-act]').forEach(b => {
        b.classList.remove('bg-indigo-500/10', 'border-indigo-500/30');
      });
      showNotification('success', 'Ajustes de accesibilidad restablecidos');
    });

    function copiarTexto(id) {
      const texto = document.getElementById(id)?.innerText;
      if (texto) {
        // Safe clipboard method for iframe restriction guards
        const textArea = document.createElement("textarea");
        textArea.value = texto;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          alert("✅ Texto copiado al portapapeles");
        } catch (err) {
          alert("❌ No se pudo copiar");
        }
        document.body.removeChild(textArea);
      }
    }

    // --- Síntesis de Voz (Text to Speech) ---
    function sanitizeTextForSpeech(text) {
      let cleanedText = text.replace(/\*\*(.*?)\*\*/g, '$1');
      cleanedText = cleanedText.replace(/\*(.*?)\*/g, '$1');
      cleanedText = cleanedText.replace(/[\#\>\-]/g, '');
      cleanedText = cleanedText.replace(/\n/g, ' ').replace(/\s{2,}/g, ' ');
      return cleanedText.trim();
    }

    function updateSpeakButtonState(button, state) {
      if (button) {
        button.disabled = state === 'disabled';
        button.style.opacity = state === 'disabled' ? 0.5 : 1;
        button.style.cursor = state === 'disabled' ? 'not-allowed' : 'pointer';
        button.textContent = state === 'disabled' ? '🔊 Leyendo...' : '🔊 Escuchar';
      }
    }

    function speakText(text, button) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const cleanedText = sanitizeTextForSpeech(text);
        const utterance = new SpeechSynthesisUtterance(cleanedText);
        utterance.lang = 'es-ES';
        utterance.rate = 1;
        utterance.pitch = 1;
        utterance.volume = 1;
        updateSpeakButtonState(button, 'disabled');
        
        utterance.onend = function () { updateSpeakButtonState(button, 'enabled'); };
        utterance.onerror = function (event) {
          console.error('Error en síntesis de voz:', event);
          updateSpeakButtonState(button, 'enabled');
        };
        
        setTimeout(() => { window.speechSynthesis.speak(utterance); }, 100);
      } else {
        alert('Tu navegador no soporta la síntesis de voz.');
      }
    }

    // --- INTEGRACIÓN WHISPER IA CON INTERCEPTOR DE COMANDOS ---
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    document.addEventListener('DOMContentLoaded', () => {
      const micButton = document.getElementById('micButton');
      if (micButton) {
        micButton.addEventListener('click', toggleAudioRecording);
      }
    });

    async function toggleAudioRecording() {
      if (!isRecording) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];

          mediaRecorder.ondataavailable = (event) => {
            if (event.data.size > 0) audioChunks.push(event.data);
          };

          mediaRecorder.onstop = async () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/ogg' });
            await enviarAudioAWhisper(audioBlob);
            stream.getTracks().forEach(track => track.stop());
          };

          mediaRecorder.start();
          isRecording = true;
          document.getElementById('chatInput').value = '🎙️ Grabando audio... (Clic para detener)';
          updateMicButtonVisuals();

        } catch (error) {
          console.error("Error accediendo al micrófono:", error);
          alert("❌ No se pudo acceder al micrófono. Verifica permisos del navegador.");
        }
      } else {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
          mediaRecorder.stop();
        }
        isRecording = false;
        updateMicButtonVisuals();
      }
    }

    async function procesarComandosDeVoz(textoDescifrado) {
        const texto = textoDescifrado.toLowerCase();
        if (texto.includes("abrir") || texto.includes("ir a") || texto.includes("muéstrame") || texto.includes("crear")) {
            for (const sectionId in menuMapping) {
                const section = menuMapping[sectionId];
                if (section.url && texto.includes(section.label.toLowerCase())) {
                    cargarVista(section.url);
                    return true;
                } 
                else if (section.items) {
                    for (const item of section.items) {
                        if (texto.includes(item.label.toLowerCase())) {
                            cargarVista(item.url);
                            return true;
                        }
                    }
                }
            }
        }
        return false;
    }

    async function enviarAudioAWhisper(audioBlob) {
      const chatInput = document.getElementById('chatInput');
      chatInput.value = '⏳ Transcribiendo comandos por Whisper IA...';
      
      const formData = new FormData();
      formData.append("audio", audioBlob, "grabacion.ogg");

      try {
        const respuesta = await fetch(`${API}/whisper/transcribir`, {
          method: 'POST',
          body: formData
        });

        if (!respuesta.ok) throw new Error("Fallo en el servidor.");

        const data = await respuesta.json();
        const textoTranscrito = data.texto;
        chatInput.value = textoTranscrito;

        const esComandoEjecutado = await procesarComandosDeVoz(textoTranscrito);
        
        if (esComandoEjecutado) { 
           appendBubble(`🗣️ Comando de voz detectado exitosamente. Redirigiendo vista del sistema...`, "IA");
           chatInput.value = ""; 
        } else {
           // Enviar directamente como pregunta si no es una acción de navegación directa
           enviarMensaje();
        }
      } catch (error) {
        console.error("Error Whisper:", error);
        chatInput.value = '';
        alert("❌ Error al transcribir. Asegúrate de que Whisper está en ejecución en el servidor Backend.");
      }
    }

    function updateMicButtonVisuals() {
      const micButton = document.getElementById('micButton');
      if (micButton) {
        if (isRecording) {
          micButton.innerHTML = `<svg class="w-4 h-4 text-rose-500 animate-pulse" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z" clip-rule="evenodd"></path></svg>`;
          micButton.title = 'Detener y transcribir comando';
          micButton.className = "absolute right-2 p-1.5 rounded-full bg-rose-500/20 text-rose-300 border border-rose-500/30 hover:bg-rose-500/30 transition-all focus:outline-none";
        } else {
          micButton.innerHTML = `<svg id="micIconDefault" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>`;
          micButton.title = 'Iniciar grabación';
          micButton.className = "absolute right-2 p-1.5 rounded-full text-gray-400 hover:text-indigo-600 hover:bg-gray-100 transition-all focus:outline-none";
        }
      }
    }

    // Traductor de Google
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'es',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE
      }, 'google_translate_element');
    }
  </script>
  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  <script src="/js/roles.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const path = window.location.pathname;
      const isSuperadmin = path.includes('/r/superadmin/');
      const isAdmin = path.includes('/r/admin/');
      const isCoordinador = path.includes('/r/coordinador/');
      const isCliente = path.includes('/r/cliente/');
      const isDisInst = path.includes('/r/disenador-instruccional/');
      const isAutor = path.includes('/r/autor/');
      const isRevisor = path.includes('/r/revisor-qa/');
      const isEditor = path.includes('/r/editor/');
      const isDesaMult = path.includes('/r/desarrollador-multimedia/');
      const isAbogado = path.includes('/r/abogado/');
      const isDisGraf = path.includes('/r/disenador-grafico/');
      const isAnim2d = path.includes('/r/animador-2d/');
      const isAnim3d = path.includes('/r/animador-3d/');
      const isVideo = path.includes('/r/video/');
      const isCorrector = path.includes('/r/corrector-de-estilo/');
      const isIngeniero = path.includes('/r/ingeniero-lms/');
      const isRegistrado = path.includes('/r/registrado/');

      const allowedRoles = [];
      if (isSuperadmin) allowedRoles.push('superadmin');
      if (isAdmin) allowedRoles.push('admin');
      if (isCoordinador) allowedRoles.push('coordinador');
      if (isCliente) allowedRoles.push('cliente');
      if (isDisInst) allowedRoles.push('disenador-instruccional');
      if (isAutor) allowedRoles.push('autor');
      if (isRevisor) allowedRoles.push('revisor-qa');
      if (isEditor) allowedRoles.push('editor');
      if (isDesaMult) allowedRoles.push('desarrollador-multimedia');
      if (isAbogado) allowedRoles.push('abogado');
      if (isDisGraf) allowedRoles.push('disenador-grafico');
      if (isAnim2d) allowedRoles.push('animador-2d');
      if (isAnim3d) allowedRoles.push('animador-3d');
      if (isVideo) allowedRoles.push('video');
      if (isCorrector) allowedRoles.push('corrector-de-estilo');
      if (isIngeniero) allowedRoles.push('ingeniero-lms');
      if (isRegistrado) allowedRoles.push('registrado');

      const token = localStorage.getItem('token');
      if (!token) {
        window.location.href = '/';
        return;
      }
      
      try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const userRoles = payload.roles || [payload.role].filter(Boolean);
        if (!userRoles.some(r => allowedRoles.includes(r))) {
          window.location.href = '/';
          return;
        }
      } catch(e) {
        window.location.href = '/';
      }
    });
  </script>
  
  <script>
    // ==================== VERIFICACIÓN DE PERMISOS DE MENÚ ====================
    (function() {
      const token = localStorage.getItem('token');
      if (!token) return;
      
      try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const permissions = payload.permissions || [];
        
        const hasPermission = (perm) => permissions.includes(perm);
        const hasAnyPermission = (perms) => perms.some(p => permissions.includes(p));
        
        const menuPermissions = {
          'menu-proyectos': ['proyectos_crear', 'proyectos_consultar'],
          'menu-crear-proyecto': ['proyectos_crear'],
          'menu-entidades': ['autor_crear', 'diseno_instruccional_crear'],
          'menu-crear-entidad': ['autor_crear', 'diseno_instruccional_crear'],
          'menu-plan-estudio': ['proyectos_planes_formacion_listar', 'diseno_instruccional_ver'],
          'menu-crear-plan': ['diseno_instruccional_crear'],
          'menu-cursos': ['proyectos_cursos_listar'],
          'menu-crear-curso': ['autor_crear'],
          'menu-modulos': ['proyectos_modulos_listar'],
          'menu-crear-modulo': ['autor_crear', 'diseno_instruccional_crear'],
          'menu-unidades': ['proyectos_unidades_listar'],
          'menu-crear-unidad': ['autor_crear', 'diseno_instruccional_crear'],
          'menu-tareas': ['proyectos_tareas_listar'],
          'menu-crear-tarea': ['autor_crear'],
          'menu-evaluaciones': ['proyectos_evaluaciones_listar'],
          'menu-crear-evaluacion': ['autor_crear'],
          'menu-fases': ['proyectos_fases_etapas_gestionar'],
          'menu-cronogramas': ['proyectos_cronogramas_crear'],
          'menu-calendario': ['proyectos_calendario_ver'],
          'menu-usuarios': ['usuarios_crear'],
          'menu-clientes': ['usuarios_crear'],
          'menu-crm': ['usuarios_crear'],
          'menu-roles': ['roles_permisos_gestionar'],
          'menu-drive': ['archivos_drive_personal_ver', 'archivos_drive_global_ver'],
          'menu-ia': ['ia_produccion_imagen', 'ia_produccion_audio', 'ia_linguistica_usar'],
          'menu-canvas': ['herramientas_canvas_usar'],
          'menu-Office': ['herramientas_Office_usar'],
          'menu-auditoria': ['seguridad_auditoria_ver'],
          'menu-bitacora': ['seguridad_bitacora_usuarios_ver'],
          'menu-estadisticas': ['reportes_estadisticas_ver'],
          'menu-metricas': ['reportes_metricas_ver'],
          'menu-diseno-instruccional': ['diseno_instruccional_ver', 'diseno_instruccional_crear'],
          'menu-autor-contenido': ['autor_ver', 'autor_crear'],
          'menu-microcursos': ['capacitacion_microcursos_ver'],
          'menu-tutoriales': ['capacitacion_tutoriales_ver'],
          'menu-faq': ['capacitacion_faq_ver'],
        };
        
        Object.entries(menuPermissions).forEach(([id, required]) => {
          const el = document.getElementById(id);
          if (el && !hasAnyPermission(required)) {
            el.style.display = 'none';
          }
        });
      } catch(e) {
        console.error("Error comprobando permisos de menú:", e);
      }
    })();
  </script>
