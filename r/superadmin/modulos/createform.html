<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Nuevo Módulo con Formulario</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/fetch-con-token.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .form-section {
            transition: all 0.3s ease;
            border: 1px solid #e5e7eb;
        }
        .form-section:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-color: #2563eb;
        }
        label {
            display: block;
            margin-bottom: 0.25rem;
            font-weight: 500;
            color: #374151;
        }
        input[type="text"], input[type="number"], textarea, select {
            width: 100%;
            border-radius: 0.375rem;
            border: 1px solid #D1D5DB;
            padding: 0.5rem 0.75rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        input[type="checkbox"] {
             width: 1rem;
             height: 1rem;
             border-radius: 0.25rem;
             accent-color: #2563eb;
        }
        select {
            -webkit-appearance: none; -moz-appearance: none; appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 1.25em 1.25em;
            padding-right: 2.5rem; 
        }
        /* !--- NUEVOS ESTILOS DE VALIDACIÓN ---! */
        .error {
            border-color: #ef4444 !important;
        }
        .error-text {
            color: #ef4444;
            font-size: 0.75rem;
            margin-top: 4px;
            display: none;
        }
        .error-text.active {
            display: block;
        }
        .mic-recording { animation: micPulse 1s infinite ease-in-out; background-color: #ef4444 !important; color: white !important; border-color: #dc2626 !important; }
        .mic-processing { background-color: #eab308 !important; color: white !important; border-color: #ca8a04 !important; }
        @keyframes micPulse { 0% { transform: scale(1); } 50% { transform: scale(1.04); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50">

    <div id="notification" class="fixed top-24 right-4 z-50"></div>

    <script>
        const API_BASE = 'https://gestordecursos.pegui.edu.co:8000';
        const API_GEMINI = `${API_BASE}/chat/gemini`;
        const API_STUDY_PLANS = `${API_BASE}/study_plans`;
        const API_USERS = `${API_BASE}/users`;
        const API_MODULES = `${API_BASE}/modules`;
        
        const CACHE_KEY = 'moduleFormProgress'; 
        const form = document.getElementById('createModuleForm');
        const token = localStorage.getItem('token');
        
        // Variables globales para el contexto
        let parentStudyPlan = null;

        // --- UTILS ---
        function showNotification(type, title, message) {
            const notificationArea = document.getElementById('notification');
            const colors = { success: 'green', error: 'red', info: 'yellow' };
            const icons = { success: 'fa-check-circle', error: 'fa-times-circle', info: 'fa-exclamation-triangle' };
            const notification = document.createElement('div');
            notification.className = `bg-white rounded-lg shadow-xl border-l-4 border-${colors[type]}-500 p-4 max-w-md mb-4`;
            notification.innerHTML = `<div class="flex items-center"><div class="mr-3"><i class="fas ${icons[type]} text-${colors[type]}-500 text-xl"></i></div><div><div class="font-semibold">${title}</div><div class="text-sm text-gray-600">${message}</div></div></div>`;
            notificationArea.appendChild(notification);
            setTimeout(() => { notification.remove(); }, 5000);
        }

        async function fetchAPI(url, options = {}) {
            const defaultHeaders = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
            const allOptions = { ...options, headers: { ...defaultHeaders, ...options.headers } };
            const response = await fetch(url, allOptions);
            if (!response.ok) {
                const errorData = await response.json().catch(() => ({ detail: 'Error en la respuesta del servidor' }));
                throw new Error(errorData.detail || `Error ${response.status}`);
            }
            if (response.status === 204) return null;
            return response.json();
        }

        // --- LÓGICA PRINCIPAL DE CARGA ---
        
        async function initPage() {
            if (!token) { window.location.href = '/'; return; }
            
            // 1. Cargar autores (siempre necesario)
            loadAuthors();

            // 2. Verificar URL para herencia
            const urlParams = new URLSearchParams(window.location.search);
            const studyPlanId = urlParams.get('study_plan_id') || urlParams.get('project_id');

            if (studyPlanId) {
                // --- MODO HERENCIA (Viene del flujo) ---
                console.log("Modo Herencia activado - studyPlanId:", studyPlanId);
                await loadInheritedData(studyPlanId);
            } else {
                // --- MODO MANUAL (Entró directo) ---
                console.log("Modo Manual activado");
                await enableManualSelection();
            }
            
            loadProgress();
        }

        // MODO HERENCIA: Bloquea selects y carga datos específicos
        async function loadInheritedData(studyPlanId) {
            try {
                // Cargar plan de formación
                parentStudyPlan = await fetchAPI(`${API_STUDY_PLANS}/${studyPlanId}`);
                
                // Llenar Select de Plan
                const planSelect = document.getElementById('studyPlanSelect');
                planSelect.innerHTML = `<option value="${parentStudyPlan.id}" selected>${parentStudyPlan.name}</option>`;
                planSelect.disabled = true;
                planSelect.classList.add("bg-gray-100", "cursor-not-allowed");
                document.getElementById('study_plan_id_hidden').value = studyPlanId;

                // Mostrar caja de contexto
                document.getElementById('studyPlanNameContext').textContent = parentStudyPlan.name;
                document.getElementById('contextContainer').classList.remove('hidden');

            } catch (err) {
                showNotification('error', 'Error de Carga', `No se pudo cargar el contexto: ${err.message}`);
            }
        }

        // MODO MANUAL: Habilita selects para elegir Plan
        async function enableManualSelection() {
            const planSelect = document.getElementById('studyPlanSelect');

            // 1. Cargar TODOS los planes
            try {
                const plans = await fetchAPI(API_STUDY_PLANS + '/');
                planSelect.innerHTML = '<option value="">Seleccione un plan...</option>';
                plans.forEach(p => {
                    planSelect.innerHTML += `<option value="${p.id}">${p.name}</option>`;
                });
            } catch (e) {
                console.error(e);
                planSelect.innerHTML = '<option value="">Error cargando planes</option>';
            }

            // 2. Listener: Cuando cambia el Plan -> Guardar contexto
            planSelect.addEventListener('change', async (e) => {
                const planId = e.target.value;
                document.getElementById('study_plan_id_hidden').value = planId; // Guardar en hidden
                
                parentStudyPlan = null; // Reset contexto

                if (!planId) return;

                try {
                    // Obtener detalles del plan para el contexto IA
                    parentStudyPlan = await fetchAPI(`${API_STUDY_PLANS}/${planId}`);
                    document.getElementById('studyPlanNameContext').textContent = parentStudyPlan.name;
                    document.getElementById('contextContainer').classList.remove('hidden');

                } catch (err) {
                    console.error(err);
                }
            });
        }

        async function loadAuthors() {
            const authorSelect = document.getElementById('authorSelect');
            try {
                const users = await fetchAPI(API_USERS);
                authorSelect.innerHTML = '<option value="">-- Selecciona un autor --</option>';
                users.forEach(user => {
                    authorSelect.innerHTML += `<option value="${user.nombre}">${user.nombre} (${user.email})</option>`;
                });
            } catch (error) {
                authorSelect.innerHTML = '<option value="">Error al cargar autores</option>';
            }
        }

        // --- PROGRESO ---
        function saveProgress() {
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            localStorage.setItem(CACHE_KEY, JSON.stringify(data));
        }
        function loadProgress() {
            const savedData = localStorage.getItem(CACHE_KEY);
            if (!savedData) return;
            const data = JSON.parse(savedData);
            for (const key in data) {
                if (form.elements[key]) {
                    const element = form.elements[key];
                    if (element.type === 'checkbox') element.checked = data[key];
                    else if (element.type !== 'file') element.value = data[key];
                }
            }
        }
        function clearProgress() {
            if (confirm("¿Limpiar formulario?")) {
                localStorage.removeItem(CACHE_KEY);
                form.reset();
                document.getElementById('version').value = '1.0';
                window.location.reload(); // Recargar para reiniciar lógica limpia
            }
        }

        // --- VALIDACIÓN ---
        function validateModuleForm() {
            let isValid = true;
            form.querySelectorAll(".error").forEach(el => el.classList.remove("error"));
            form.querySelectorAll(".error-text.active").forEach(el => el.classList.remove("active"));
            
            form.querySelectorAll("[required]").forEach(el => {
                if (!el.value.trim()) {
                    isValid = false;
                    el.classList.add("error");
                    const errorMsg = el.parentElement.querySelector(".error-text");
                    if (errorMsg) errorMsg.classList.add("active");
                }
            });
            
            // Validar que el ID del plan de estudio esté seteado
            const pId = document.getElementById('study_plan_id_hidden').value;
            
            if (!pId) {
                showNotification('error', 'Faltan Datos', 'Debes seleccionar un Plan de Formación.');
                isValid = false;
            }

            if (!isValid) showNotification('error', 'Campos incompletos', 'Revisa los campos marcados en rojo.');
            return isValid;
        }

        // --- SUBMIT ---
        document.getElementById('saveButton').addEventListener('click', async (e) => {
            e.preventDefault();
            
            if (!validateModuleForm()) return;
            
            // Validar que tengamos contexto cargado para la IA
            if (!parentStudyPlan) {
                showNotification('error', 'Error', 'Falta información del Plan de Formación para la IA. Intenta seleccionar de nuevo.');
                return;
            }

            const saveButton = document.getElementById('saveButton');
            const saveButtonIcon = document.getElementById('saveButtonIcon');
            const saveButtonText = document.getElementById('saveButtonText');
            const originalIconHTML = saveButtonIcon.innerHTML;
            const originalText = saveButtonText.textContent;

            saveButton.disabled = true;
            
            // Construir payload
            const payload = {};
            for (const element of form.elements) {
                if (element.name) {
                    if (element.type === 'checkbox') payload[element.name] = element.checked;
                    else if (element.type === 'number' || element.name.includes('nota')) {
                         const val = parseFloat(element.value);
                         payload[element.name] = isNaN(val) ? null : val;
                    } else {
                        payload[element.name] = element.value || null;
                    }
                }
            }
            // Asegurar IDs correctos - solo study_plan_id (sin course_id)
            payload.study_plan_id = parseInt(document.getElementById('study_plan_id_hidden').value);
            payload.codigo_id_del_modulo = 'ID_' + new Date().getTime();

            try {
                // 1. IA CHECK
                saveButtonText.textContent = 'Validando IA...';
                saveButtonIcon.innerHTML = '<i class="fas fa-robot fa-spin mr-2"></i>';

                const prompt = `
                    Eres experto en educación. Valida coherencia:
                    PLAN DE FORMACIÓN: "${parentStudyPlan.name}" (Obj: ${parentStudyPlan.objetivo_general})
                    MÓDULO NUEVO: "${payload.nombre_del_modulo}" (Obj: ${payload.objetivo_general})
                    
                    Responde brevemente (2 líneas) si tiene sentido pedagógico.
                `;

                const geminiRes = await fetch(API_GEMINI, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ prompt: prompt })
                });

                if (!geminiRes.ok) throw new Error("La IA no está disponible.");
                const aiData = await geminiRes.json();
                const aiReview = aiData.respuesta || "Sin respuesta de IA.";

                if (!confirm(`🤖 Opinión de IA:\n\n${aiReview}\n\n¿Guardar módulo?`)) {
                    throw new Error("Cancelado por usuario.");
                }

                // 2. GUARDAR
                saveButtonText.textContent = 'Creando...';
                saveButtonIcon.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>';

                const response = await fetch(API_MODULES, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                     const errData = await response.json();
                     throw new Error(errData.detail || 'Error al guardar módulo.');
                }

                const newModule = await response.json();
                showNotification('success', 'Éxito', 'Módulo creado.');
                localStorage.removeItem(CACHE_KEY);
                form.reset();

                // 3. REDIRECCIÓN
                setTimeout(() => {
                    const params = new URLSearchParams();
                    params.set('study_plan_id', payload.study_plan_id);
                    params.set('module_id', newModule.id); // ID real del módulo creado
                    window.location.href = `unidades.html?${params.toString()}`;
                }, 2000);

            } catch (error) {
                showNotification('error', 'Error', error.message);
            } finally {
                saveButton.disabled = false;
                saveButtonText.textContent = originalText;
                saveButtonIcon.innerHTML = originalIconHTML;
            }
        });

        // Inicializar
        document.addEventListener('DOMContentLoaded', initPage);
        // Listeners extra
        form.addEventListener('input', saveProgress);
        document.getElementById('btnLimpiarProgreso').addEventListener('click', clearProgress);

    </script>

    if (isAnim2d) allowedRoles.push('animador-2d');
    if (isAnim3d) allowedRoles.push('animador-3d');
    if (isVideo) allowedRoles.push('video');
    if (isCorrector) allowedRoles.push('corrector-de-estilo');

        const payload = JSON.parse(atob(token.split('.')[1]));

<script>
// ===== WHISPER - CONTROL DE INSTANCIAS SÍNCRONAS =====
const API_URL = 'https://gestordecursos.pegui.edu.co:8000';
const API_WHISPER = API_URL + '/whisper/transcribir';
let mediaRecorder = null, audioChunks = [], idCampoDestino = null, temporizadorMaximo = null, estaGrabando = false;
function getSessionToken() { return localStorage.getItem('token'); }
async function gestionarGrabacionWhisper(e, idCampo) {
    if (e) { e.preventDefault(); e.stopPropagation(); }
    if (estaGrabando && idCampoDestino === idCampo) { if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop(); return; }
    if (estaGrabando) { if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop(); await new Promise(r => setTimeout(r, 150)); }
    idCampoDestino = idCampo; audioChunks = []; estaGrabando = true;
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
        mediaRecorder.ondataavailable = (ev) => { if (ev.data && ev.data.size > 0) audioChunks.push(ev.data); };
        mediaRecorder.onstart = () => {
            resetearIconosMic();
            const cb = document.getElementById('btn-mic-' + idCampoDestino);
            const ci = document.getElementById('ico-mic-' + idCampoDestino);
            if (cb) cb.classList.add('mic-recording');
            if (ci) ci.className = 'fas fa-stop text-lg';
            temporizadorMaximo = setTimeout(() => { if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop(); }, 10000);
        };
        mediaRecorder.onstop = async () => {
            clearTimeout(temporizadorMaximo); estaGrabando = false;
            const pb = document.getElementById('btn-mic-' + idCampoDestino);
            const pi = document.getElementById('ico-mic-' + idCampoDestino);
            if (pb) { pb.classList.remove('mic-recording'); pb.classList.add('mic-processing'); }
            if (pi) pi.className = 'fas fa-spinner fa-spin text-lg';
            const blob = new Blob(audioChunks, { type: 'audio/webm;codecs=opus' });
            stream.getTracks().forEach(t => t.stop());
            if (blob.size > 100) await enviarAudioAWhisper(blob);
            else { console.warn('Audio corto'); resetearIconosMic(); }
        };
        mediaRecorder.start();
    } catch (err) { estaGrabando = false; console.error(err); resetearIconosMic(); }
}
async function enviarAudioAWhisper(blob) {
    if (!blob || !blob.size) { resetearIconosMic(); return; }
    const fd = new FormData(); fd.append('audio', blob, 'dictado.webm');
    try {
        const r = await fetch(API_WHISPER, { method: 'POST', headers: { 'Authorization': 'Bearer ' + getSessionToken() }, body: fd });
        if (!r.ok) throw new Error((await r.json().catch(() => ({}))).detail || 'Error');
        const txt = ((await r.json()).texto || '').trim();
        if (txt) { const inp = document.getElementById(idCampoDestino); if (inp) { inp.value = inp.value.trim() ? inp.value.trim() + ' ' + txt : txt; inp.dispatchEvent(new Event('input', { bubbles: true })); } }
    } catch(e) { console.error(e); } finally { resetearIconosMic(); }
}
function resetearIconosMic() {
    document.querySelectorAll('[id^="btn-mic-"]').forEach(b => {
        b.className = 'px-4 bg-gray-100 border border-gray-300 rounded-xl text-gray-500 hover:bg-gray-200 hover:text-indigo-600 transition flex items-center justify-center w-14 flex-shrink-0';
        if (b.id.includes('notas_adicionales') || b.id.includes('lista_unidades_temas') || b.id.includes('objetivos_especificos')) b.classList.add('h-[104px]');
        else if (b.id.includes('objetivo_general')) b.classList.add('h-[84px]');
        else b.classList.add('h-12');
    });
    document.querySelectorAll('[id^="ico-mic-"]').forEach(i => i.className = 'fas fa-microphone text-lg');
    if (!estaGrabando) idCampoDestino = null;
}
</script>
