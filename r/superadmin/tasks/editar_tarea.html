<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Editar Tarea</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/fetch-con-token.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'fade-in': 'fadeIn 0.3s ease-out',
            'slide-up': 'slideUp 0.4s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' }
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' }
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-100 min-h-screen">
  
  <!-- Header -->
  <div class="bg-gradient-to-r from-blue-600 via-blue-700 to-indigo-800 shadow-2xl">
    <div class="max-w-4xl mx-auto px-6 py-6">
      <div class="flex items-center justify-between">
        <div class="flex items-center space-x-4">
          <div class="bg-white/20 backdrop-blur-sm rounded-full p-3">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
            </svg>
          </div>
          <div>
            <h1 class="text-2xl font-bold text-white tracking-tight">Editar Tarea</h1>
            <p class="text-blue-100">Modifica los detalles de la tarea</p>
          </div>
        </div>
        <button onclick="window.history.back()" 
          class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-lg transition-colors flex items-center space-x-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
          <span>Volver</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Contenido principal -->
  <div class="max-w-4xl mx-auto px-6 py-8">
    
    <!-- Estado de carga -->
    <div id="loading" class="text-center py-12">
      <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
      <p class="text-gray-600 text-lg">Cargando tarea...</p>
    </div>

    <!-- Formulario de edición -->
    <div id="edit-form-container" class="hidden">
      <div class="bg-white/70 backdrop-blur-sm rounded-2xl shadow-xl border border-white/50 overflow-hidden">
        
        <form id="editTaskForm" class="p-8 space-y-8">
          <!-- Información básica -->
          <div class="bg-gray-50 rounded-xl p-6">
            <h3 class="text-lg font-semibold text-gray-900 mb-6 flex items-center space-x-2">
              <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
              </svg>
              <span>Información básica</span>
            </h3>
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Título *</label>
                <input type="text" id="titulo" name="titulo" title="Nombre o título de la tarea" required 
                  class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-white text-lg" />
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Descripción</label>
                <textarea id="descripcion" name="descripcion" title="Describe la tarea en detalle" rows="4"
                  class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-white resize-none"></textarea>
              </div>
            </div>
          </div>

          <!-- Asignación y Proyecto -->
          <div class="bg-gray-50 rounded-xl p-6">
            <h3 class="text-lg font-semibold text-gray-900 mb-6 flex items-center space-x-2">
              <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0z"></path>
              </svg>
              <span>Asignación y Proyecto</span>
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Proyecto *</label>
                <select id="project_id" name="project_id" title="Selecciona el proyecto de la tarea" required 
                  class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-white">
                  <option value="">Cargando proyectos...</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Responsable *</label>
                <select id="asignado" name="asignado" title="Usuario responsable de la tarea" required 
                  class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-white">
                  <option value="">Cargando usuarios...</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Seguidores</label>
                <select id="seguidores" name="seguidores" title="Usuarios seguidores de la tarea" multiple 
                  class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-white">
                  <option value="">Cargando usuarios...</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Estado y Configuración -->
          <div class="bg-gray-50 rounded-xl p-6">
            <h3 class="text-lg font-semibold text-gray-900 mb-6 flex items-center space-x-2">
              <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
              </svg>
              <span>Estado y Configuración</span>
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Estado *</label>
                <select id="estado" name="estado" title="Selecciona el estado de la tarea" required 
                  class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-white">
                  <option value="Nuevo">Nuevo</option>
                  <option value="En curso">En curso</option>
                  <option value="En revisión">En revisión</option>
                  <option value="Resuelto">Resuelto</option>
                  <option value="Cerrado">Cerrado</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Prioridad *</label>
                <select id="prioridad" name="prioridad" title="Nivel de prioridad de la tarea" required 
                  class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-white">
                  <option value="Alta">Alta</option>
                  <option value="Media">Media</option>
                  <option value="Baja">Baja</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Fase *</label>
                <select id="fase_id" name="fase_id" title="Selecciona la fase de la tarea" required 
                  class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-white">
                  <option value="">Selecciona un proyecto primero</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Etapa</label>
                <select id="etapa_id" name="etapa_id" title="Selecciona la etapa de la tarea" 
                  class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-white">
                  <option value="">Selecciona una fase primero</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Fechas -->
          <div class="bg-gray-50 rounded-xl p-6">
            <h3 class="text-lg font-semibold text-gray-900 mb-6 flex items-center space-x-2">
              <svg class="w-5 h-5 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
              </svg>
              <span>Fechas</span>
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Fecha de inicio</label>
                <input type="date" id="fecha_inicio" name="fecha_inicio" title="Fecha de inicio de la tarea" 
                  class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-white" />
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Fecha de entrega</label>
                <input type="date" id="fecha_entrega" name="fecha_entrega" title="Fecha de entrega de la tarea" 
                  class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-white" />
              </div>
            </div>
            <div id="fecha-error" class="mt-2 text-sm text-red-600 hidden"></div>
          </div>

          <!-- Adjuntos -->
          <div class="bg-gray-50 rounded-xl p-6">
            <h3 class="text-lg font-semibold text-gray-900 mb-6 flex items-center space-x-2">
              <svg class="w-5 h-5 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.586-6.586A4 4 0 0115.172 7m-9.414 0a6 6 0 018.486 0l6.586 6.586a6 6 0 01-8.486 0L5.758 7.414z"></path>
              </svg>
              <span>Adjuntos</span>
            </h3>
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">Subir archivos</label>
              <input type="file" id="adjuntos" name="adjuntos" title="Archivos adjuntos para la tarea" multiple 
                class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-white" />
              <p class="text-sm text-gray-500 mt-2">Archivos actuales: <span id="current-adjuntos">Ninguno</span></p>
            </div>
          </div>

          <!-- Botones de acción -->
          <div class="flex flex-col sm:flex-row gap-4 pt-6">
            <button type="button" onclick="window.history.back()" 
              class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 px-8 py-4 rounded-xl font-semibold transition-all duration-200 flex items-center justify-center space-x-2 text-lg">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
              </svg>
              <span>Cancelar</span>
            </button>
            <button type="submit" id="saveButton"
              class="flex-1 bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white px-8 py-4 rounded-xl font-semibold transition-all duration-200 transform hover:scale-105 hover:shadow-lg flex items-center justify-center space-x-2 text-lg">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
              </svg>
              <span>Guardar Cambios</span>
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Estado de error -->
    <div id="error-state" class="hidden text-center py-12">
      <div class="bg-red-50 rounded-2xl p-8 border border-red-200">
        <svg class="mx-auto h-16 w-16 text-red-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
        <h3 class="text-lg font-medium text-red-900 mb-2">Error al cargar la tarea</h3>
        <p class="text-red-600 mb-4">No se pudo cargar la información de la tarea.</p>
        <button onclick="window.location.reload()" 
          class="bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-lg transition-colors">
          Intentar de nuevo
        </button>
      </div>
    </div>
  </div>

  <!-- Notificaciones -->
  <div id="notifications-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

  <script>
    const API_URL = "https://gestordecursos.pegui.edu.co:8000/tareas/";
    const USERS_URL = "https://gestordecursos.pegui.edu.co:8000/users/";
    const PROJECTS_URL = "https://gestordecursos.pegui.edu.co:8000/projects/";
    const CRONOGRAMAS_URL = "https://gestordecursos.pegui.edu.co:8000/cronogramas/";

    let taskId = null;
    let currentTask = null;
    let listaUsuarios = [];
    let listaProyectos = [];
    let listaCronogramas = []; // Almacenará los cronogramas cargados

    // Estructura para mapear project_id -> cronograma_id
    let mapaProyectoACronograma = {};

    // Estructura para mapear cronograma_id -> estructura (fases y etapas)
    let mapaCronogramaAEstructura = {};

    // Variables para almacenar las fechas de la etapa seleccionada
    let fechaInicioEtapa = null;
    let fechaFinEtapa = null;

    // Obtener headers con token (sin Content-Type para multipart/form-data)
    function getAuthHeaders() {
      const token = localStorage.getItem('token');
      return {
        ...(token ? { Authorization: 'Bearer ' + token } : {}),
      };
    }

    // Obtener ID de la tarea desde URL
    function getTaskIdFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('id');
    }

    // Mostrar notificación
    function showNotification(message, type = 'info') {
      const colors = {
        success: 'bg-green-500 text-white',
        error: 'bg-red-500 text-white',
        info: 'bg-blue-500 text-white',
        warning: 'bg-yellow-500 text-white'
      };

      const icons = {
        success: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>`,
        error: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>`,
        info: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>`,
        warning: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>`
      };

      const notification = document.createElement('div');
      notification.className = `${colors[type]} px-6 py-4 rounded-lg shadow-lg flex items-center space-x-3 animate-slide-up max-w-sm`;
      notification.innerHTML = `
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          ${icons[type]}
        </svg>
        <span class="font-medium">${message}</span>
      `;

      document.getElementById('notifications-container').appendChild(notification);

      setTimeout(() => {
        notification.style.animation = 'fadeIn 0.3s ease-out reverse';
        setTimeout(() => notification.remove(), 300);
      }, 4000);
    }

    // Función para cargar proyectos
    async function cargarProyectos() {
      try {
        console.log('Cargando proyectos...');
        const projectResponse = await fetch(PROJECTS_URL, {
          headers: getAuthHeaders()
        });
        if (projectResponse.ok) {
          listaProyectos = await projectResponse.json();
          console.log('Proyectos cargados:', listaProyectos);
          // actualizarSelectProyectos(); // Se llama después de cargar la tarea
        } else {
          console.warn('No se pudieron cargar los proyectos');
        }
      } catch (error) {
        console.error('Error cargando proyectos:', error);
      }
    }

    // Función para cargar usuarios
    async function cargarUsuarios() {
      try {
        console.log('Cargando usuarios...');
        const usersResponse = await fetch(USERS_URL, {
          headers: getAuthHeaders()
        });
        if (usersResponse.ok) {
          listaUsuarios = await usersResponse.json();
          console.log('Usuarios cargados:', listaUsuarios);
          // populateSelect('asignado', userOptions);
          // populateSelect('seguidores', userOptions, true);
        } else {
          console.warn('No se pudieron cargar los usuarios');
        }
      } catch (error) {
        console.error('Error cargando usuarios:', error);
      }
    }

    // Función para cargar cronogramas y construir mapas
    async function cargarCronogramas() {
      try {
        console.log('Cargando cronogramas...');
        const cronogramasResponse = await fetch(CRONOGRAMAS_URL, {
          headers: getAuthHeaders()
        });
        if (cronogramasResponse.ok) {
          listaCronogramas = await cronogramasResponse.json();
          console.log('Cronogramas cargados:', listaCronogramas);

          // Construir mapa de proyecto_id -> cronograma_id
          mapaProyectoACronograma = {};
          mapaCronogramaAEstructura = {};
          listaCronogramas.forEach(cronograma => {
            mapaProyectoACronograma[cronograma.project_id] = cronograma.id;
            // Guardamos la estructura completa del cronograma
            mapaCronogramaAEstructura[cronograma.id] = cronograma.estructura || [];
          });
          console.log('Mapa proyecto -> cronograma:', mapaProyectoACronograma);
          console.log('Mapa cronograma -> estructura:', mapaCronogramaAEstructura);
        } else {
          console.warn('No se pudieron cargar los cronogramas');
        }
      } catch (error) {
        console.error('Error cargando cronogramas:', error);
      }
    }

    // Función para actualizar el select de proyectos
    function actualizarSelectProyectos() {
      const selectProyecto = document.getElementById('project_id');
      selectProyecto.innerHTML = '<option value="">Selecciona proyecto</option>';
      listaProyectos.forEach(proyecto => {
        const option = document.createElement('option');
        option.value = proyecto.id;
        option.textContent = proyecto.nombre || proyecto.name || `Proyecto ${proyecto.id}`;
        selectProyecto.appendChild(option);
      });
    }

    // Función para actualizar los selects de usuarios
    function actualizarSelectUsuarios() {
      const optionsUsuarios = listaUsuarios.map(u =>
        `<option value="${u.nombre || u.username || u.email}">${u.nombre || u.username || u.email}</option>`
      ).join('');

      const selectAsignado = document.getElementById('asignado');
      const selectSeguidores = document.getElementById('seguidores');

      selectAsignado.innerHTML = '<option value="">Selecciona responsable</option>' + optionsUsuarios;
      selectSeguidores.innerHTML = optionsUsuarios;
    }

    // Función para actualizar el select de fases basado en el proyecto seleccionado
    function actualizarSelectFases(projectId) {
      const selectFase = document.getElementById('fase_id');
      const selectEtapa = document.getElementById('etapa_id'); // También reseteamos etapas

      // Resetear fechas y mensajes de error
      resetearFechas();

      if (!projectId) {
        selectFase.innerHTML = '<option value="">Selecciona un proyecto primero</option>';
        selectEtapa.innerHTML = '<option value="">Selecciona una fase primero</option>';
        return;
      }

      const cronogramaId = mapaProyectoACronograma[projectId];
      if (!cronogramaId) {
        selectFase.innerHTML = '<option value="">Proyecto sin cronograma</option>';
        selectEtapa.innerHTML = '<option value="">Proyecto sin cronograma</option>';
        return;
      }

      const estructura = mapaCronogramaAEstructura[cronogramaId] || [];
      const fases = estructura.map(item => ({
        id: item.fase_id,
        nombre: item.nombre_fase
      }));

      if (fases.length === 0) {
        selectFase.innerHTML = '<option value="">Sin fases definidas</option>';
        selectEtapa.innerHTML = '<option value="">Sin fases definidas</option>';
        return;
      }

      selectFase.innerHTML = '<option value="">Selecciona fase</option>';
      fases.forEach(fase => {
        const option = document.createElement('option');
        option.value = fase.id;
        option.textContent = fase.nombre || `Fase ${fase.id}`;
        selectFase.appendChild(option);
      });

      // Resetear etapas al cambiar de proyecto/fase
      selectEtapa.innerHTML = '<option value="">Selecciona una fase primero</option>';
    }

    // Función para actualizar el select de etapas basado en la fase seleccionada
    function actualizarSelectEtapas(projectId, faseId) {
     const selectEtapa = document.getElementById('etapa_id');

      // Resetear fechas y mensajes de error
      resetearFechas();

      if (!projectId || !faseId) {
        selectEtapa.innerHTML = '<option value="">Selecciona una fase primero</option>';
        return;
      }

      const cronogramaId = mapaProyectoACronograma[projectId];
      if (!cronogramaId) {
        selectEtapa.innerHTML = '<option value="">Proyecto sin cronograma</option>';
        return;
      }

      const estructura = mapaCronogramaAEstructura[cronogramaId] || [];
      const faseSeleccionada = estructura.find(item => item.fase_id == faseId);

      if (!faseSeleccionada || !faseSeleccionada.etapas || faseSeleccionada.etapas.length === 0) {
        selectEtapa.innerHTML = '<option value="">Sin etapas definidas</option>';
        return;
      }

      selectEtapa.innerHTML = '<option value="">Selecciona etapa (opcional)</option>';
      faseSeleccionada.etapas.forEach(etapa => {
        const option = document.createElement('option');
        option.value = etapa.etapa_id;
        option.textContent = etapa.nombre_etapa || `Etapa ${etapa.etapa_id}`;
        option.dataset.fechaInicio = etapa.fecha_inicio; // Almacenar fecha de inicio
        option.dataset.fechaFin = etapa.fecha_fin;       // Almacenar fecha de fin
        selectEtapa.appendChild(option);
      });
    }

    // Función para establecer las restricciones de fecha basadas en la etapa seleccionada
    function establecerRestriccionesFechas(etapaOption) {
        const errorDiv = document.getElementById('fecha-error');
        const fechaInicioInput = document.getElementById('fecha_inicio');
        const fechaEntregaInput = document.getElementById('fecha_entrega');

        // Resetear fechas y mensajes de error
        resetearFechas();

        if (!etapaOption || !etapaOption.dataset.fechaInicio || !etapaOption.dataset.fechaFin) {
            // Si no hay etapa seleccionada o no tiene fechas, no aplicar restricciones
            // Pero limpiar los campos de fecha
            fechaInicioInput.value = '';
            fechaEntregaInput.value = '';
            return;
        }

        fechaInicioEtapa = etapaOption.dataset.fechaInicio;
        fechaFinEtapa = etapaOption.dataset.fechaFin;

        if (fechaInicioEtapa && fechaFinEtapa) {
            // Establecer los atributos min y max en los inputs de fecha
            fechaInicioInput.min = fechaInicioEtapa;
            fechaInicioInput.max = fechaFinEtapa;
            fechaEntregaInput.min = fechaInicioEtapa;
            fechaEntregaInput.max = fechaFinEtapa;

            // Limpiar valores actuales si están fuera de rango
            if (fechaInicioInput.value && (fechaInicioInput.value < fechaInicioEtapa || fechaInicioInput.value > fechaFinEtapa)) {
                fechaInicioInput.value = '';
            }
            if (fechaEntregaInput.value && (fechaEntregaInput.value < fechaInicioEtapa || fechaEntregaInput.value > fechaFinEtapa)) {
                fechaEntregaInput.value = '';
            }

            // Mostrar mensaje informativo
            errorDiv.textContent = `Las fechas deben estar entre ${fechaInicioEtapa} y ${fechaFinEtapa}.`;
            errorDiv.classList.remove('hidden');
        } else {
            // Si por alguna razón las fechas no están disponibles, limpiar restricciones
            fechaInicioInput.min = '';
            fechaInicioInput.max = '';
            fechaEntregaInput.min = '';
            fechaEntregaInput.max = '';
            errorDiv.classList.add('hidden');
        }
    }

    // Función para resetear las fechas y mensajes de error
    function resetearFechas() {
        const errorDiv = document.getElementById('fecha-error');
        const fechaInicioInput = document.getElementById('fecha_inicio');
        const fechaEntregaInput = document.getElementById('fecha_entrega');

        fechaInicioEtapa = null;
        fechaFinEtapa = null;
        errorDiv.classList.add('hidden');
        errorDiv.textContent = '';
        fechaInicioInput.min = '';
        fechaInicioInput.max = '';
        fechaEntregaInput.min = '';
        fechaEntregaInput.max = '';
        // No limpiar los valores de los campos de fecha aquí para no perder datos del usuario innecesariamente
    }

    // Event listener para el cambio de proyecto
    document.addEventListener('change', function(e) {
      if (e.target.id === 'project_id') {
        const projectId = e.target.value;
        actualizarSelectFases(projectId);
      }
      if (e.target.id === 'fase_id') {
        // Necesitamos el projectId también para encontrar el cronograma
        const projectId = document.getElementById('project_id').value;
        const faseId = e.target.value;
        actualizarSelectEtapas(projectId, faseId);
      }
      if (e.target.id === 'etapa_id') {
        const selectedOption = e.target.options[e.target.selectedIndex];
        establecerRestriccionesFechas(selectedOption);
      }
    });

    // Validación adicional al enviar el formulario
    function validarFechasFormulario() {
        const errorDiv = document.getElementById('fecha-error');
        const fechaInicioInput = document.getElementById('fecha_inicio');
        const fechaEntregaInput = document.getElementById('fecha_entrega');
        let esValido = true;
        let mensajeError = '';

        const fechaInicio = fechaInicioInput.value;
        const fechaEntrega = fechaEntregaInput.value;

        if (fechaInicioEtapa && fechaFinEtapa) {
            // Verificar que las fechas ingresadas estén dentro del rango
            if (fechaInicio && (fechaInicio < fechaInicioEtapa || fechaInicio > fechaFinEtapa)) {
                mensajeError += `La fecha de inicio debe estar entre ${fechaInicioEtapa} y ${fechaFinEtapa}. `;
                esValido = false;
            }
            if (fechaEntrega && (fechaEntrega < fechaInicioEtapa || fechaEntrega > fechaFinEtapa)) {
                mensajeError += `La fecha de entrega debe estar entre ${fechaInicioEtapa} y ${fechaFinEtapa}. `;
                esValido = false;
            }
            // Verificar que la fecha de entrega no sea anterior a la de inicio
            if (fechaInicio && fechaEntrega && fechaEntrega < fechaInicio) {
                mensajeError += 'La fecha de entrega no puede ser anterior a la fecha de inicio. ';
                esValido = false;
            }
        }

        if (!esValido) {
            errorDiv.textContent = mensajeError.trim();
            errorDiv.classList.remove('hidden');
        } else {
            errorDiv.classList.add('hidden');
        }

        return esValido;
    }

    // Llenar select
    function populateSelect(selectId, options, allowEmpty = false) {
      const select = document.getElementById(selectId);
      select.innerHTML = allowEmpty ? '<option value="">Seleccionar...</option>' : '';
      
      options.forEach(option => {
        const optionElement = document.createElement('option');
        optionElement.value = option.value;
        optionElement.textContent = option.text;
        select.appendChild(optionElement);
      });
    }

    // Cargar tarea
    async function loadTask() {
      try {
        const response = await fetch(`${API_URL}${taskId}/`, {
          headers: getAuthHeaders()
        });
        if (!response.ok) {
          throw new Error('Tarea no encontrada');
        }

        currentTask = await response.json();
        populateForm(currentTask);
        
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('edit-form-container').classList.remove('hidden');

      } catch (error) {
        console.error('Error loading task:', error);
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error-state').classList.remove('hidden');
        showNotification('Error cargando la tarea', 'error');
      }
    }

    // Llenar formulario con datos de la tarea
    function populateForm(task) {
      document.getElementById('titulo').value = task.titulo || '';
      document.getElementById('descripcion').value = task.descripcion || '';
      
      // Llenar selects de usuarios y proyectos
      actualizarSelectUsuarios();
      actualizarSelectProyectos();
      
      // Establecer valores iniciales
      document.getElementById('asignado').value = task.asignado || '';
      document.getElementById('project_id').value = task.project_id ? String(task.project_id) : '';
      document.getElementById('estado').value = task.estado || '';
      document.getElementById('prioridad').value = task.prioridad || '';
      document.getElementById('fecha_inicio').value = task.fecha_inicio ? task.fecha_inicio.split('T')[0] : '';
      document.getElementById('fecha_entrega').value = task.fecha_entrega ? task.fecha_entrega.split('T')[0] : '';

      // Llenar seguidores
      const seguidoresSelect = document.getElementById('seguidores');
      if (task.seguidores && Array.isArray(task.seguidores)) {
        Array.from(seguidoresSelect.options).forEach(option => {
          option.selected = task.seguidores.includes(option.value);
        });
      }

      // Mostrar adjuntos actuales
      const currentAdjuntos = document.getElementById('current-adjuntos');
      if (task.adjuntos && Array.isArray(task.adjuntos) && task.adjuntos.length > 0) {
        currentAdjuntos.textContent = task.adjuntos.join(', ');
      } else {
        currentAdjuntos.textContent = 'Ninguno';
      }

      // Cargar fases y etapas basadas en el proyecto de la tarea
      if (task.project_id) {
          actualizarSelectFases(String(task.project_id));
          
          // Esperar un poco para que se carguen las fases
          setTimeout(() => {
              document.getElementById('fase_id').value = task.fase_id ? String(task.fase_id) : '';
              
              // Si hay fase, cargar etapas
              if (task.fase_id) {
                  actualizarSelectEtapas(String(task.project_id), String(task.fase_id));
                  
                  // Esperar un poco para que se carguen las etapas
                  setTimeout(() => {
                      document.getElementById('etapa_id').value = task.etapa_id ? String(task.etapa_id) : '';
                      
                      // Si hay etapa, establecer restricciones de fecha
                      if (task.etapa_id) {
                          const etapaSelect = document.getElementById('etapa_id');
                          const selectedOption = Array.from(etapaSelect.options).find(opt => opt.value === String(task.etapa_id));
                          if (selectedOption) {
                              establecerRestriccionesFechas(selectedOption);
                          }
                      }
                  }, 100);
              }
          }, 100);
      }
    }

    // Obtener datos del formulario como FormData
    function getFormData() {
      const formData = new FormData();
      formData.append('titulo', document.getElementById('titulo').value.trim());
      
      const descripcion = document.getElementById('descripcion').value.trim();
      if (descripcion) formData.append('descripcion', descripcion);
      
      const asignado = document.getElementById('asignado').value;
      if (asignado) formData.append('asignado', asignado);
      
      const project_id = document.getElementById('project_id').value;
      if (project_id) formData.append('project_id', parseInt(project_id));
      
      const estado = document.getElementById('estado').value;
      if (estado) formData.append('estado', estado);
      
      const prioridad = document.getElementById('prioridad').value;
      if (prioridad) formData.append('prioridad', prioridad);
      
      const fase_id = document.getElementById('fase_id').value;
      if (fase_id) formData.append('fase_id', parseInt(fase_id));
      
      const etapa_id = document.getElementById('etapa_id').value;
      if (etapa_id) formData.append('etapa_id', parseInt(etapa_id));
      
      const fecha_inicio = document.getElementById('fecha_inicio').value;
      if (fecha_inicio) formData.append('fecha_inicio', fecha_inicio);
      
      const fecha_entrega = document.getElementById('fecha_entrega').value;
      if (fecha_entrega) formData.append('fecha_entrega', fecha_entrega);
      
      // Manejar seguidores
      const seguidores = Array.from(document.getElementById('seguidores').selectedOptions).map(opt => opt.value);
      if (seguidores.length > 0) {
        formData.append('seguidores', JSON.stringify(seguidores));
      } else {
        formData.append('seguidores', JSON.stringify([]));
      }

      // Manejar adjuntos (archivos nuevos)
      const adjuntos = document.getElementById('adjuntos').files;
      for (let file of adjuntos) {
        formData.append('adjuntos', file);
      }

      return formData;
    }

    // Guardar cambios
    async function saveTask(event) {
      event.preventDefault();
      
      // Validar fechas antes de enviar
      if (!validarFechasFormulario()) {
          return; // Detener el envío si las fechas no son válidas
      }
      
      const saveButton = document.getElementById('saveButton');
      const originalContent = saveButton.innerHTML;
      
      // Validar campos requeridos
      if (!document.getElementById('titulo').value.trim()) {
        showNotification('El título es requerido', 'error');
        return;
      }
      if (!document.getElementById('project_id').value) {
        showNotification('Debes seleccionar un proyecto', 'error');
        return;
      }
      if (!document.getElementById('asignado').value) {
        showNotification('Debes seleccionar un responsable', 'error');
        return;
      }
      if (!document.getElementById('prioridad').value) {
        showNotification('Debes seleccionar una prioridad', 'error');
        return;
      }
      if (!document.getElementById('fase_id').value) {
        showNotification('Debes seleccionar una fase', 'error');
        return;
      }

      try {
        // Mostrar loading
        saveButton.disabled = true;
        saveButton.innerHTML = `
          <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Guardando...
        `;

        const formData = getFormData();
        
        // Log para depuración
        for (const [key, value] of formData.entries()) {
          console.log(`FormData ${key}:`, value);
        }

        const response = await fetch(`${API_URL}${taskId}/`, {
          method: 'PUT',
          headers: getAuthHeaders(),
          body: formData
        });

        console.log('Response status:', response.status);
        const responseData = await response.json();
        console.log('Response data:', responseData);

        if (!response.ok) {
          throw new Error(responseData.detail || 'Error al guardar la tarea');
        }

        currentTask = responseData;
        showNotification('¡Tarea actualizada exitosamente!', 'success');
        
        setTimeout(() => {
          window.history.back();
        }, 1500);

      } catch (error) {
        console.error('Error saving task:', error);
        showNotification('Error al guardar: ' + error.message, 'error');
      } finally {
        saveButton.disabled = false;
        saveButton.innerHTML = originalContent;
      }
    }

    // Inicializar
    document.addEventListener('DOMContentLoaded', async function() {
      taskId = getTaskIdFromUrl();
      
      if (!taskId) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error-state').classList.remove('hidden');
        showNotification('ID de tarea no válido', 'error');
        return;
      }

      // Cargar datos en paralelo
      await Promise.all([
        cargarUsuarios(),
        cargarProyectos(),
        cargarCronogramas(),
        loadTask()
      ]);

      // Configurar formulario
      document.getElementById('editTaskForm').addEventListener('submit', saveTask);
    });
  </script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const path = window.location.pathname;
    const isSuperadmin = path.includes('/r/superadmin/');
    const isAdmin = path.includes('/r/admin/');
    const isCoordinador = path.includes('/r/coordinador/');
    const isCliente = path.includes('/r/cliente/');
    const isDisInst = path.includes('/r/disenador-instruccional/');
    const isAutor = path.includes('/r/autor/');
    const isRevisor = path.includes('/r/revisor-qa/');
    const isEditor = path.includes('/r/editor/');
    const isDesaMult = path.includes('/r/desarrollador-multimedia/');
    const isAbogado = path.includes('/r/abogado/');
    const isDisGraf = path.includes('/r/disenador-grafico/');
    const isAnim2d = path.includes('/r/animador-2d/');
    const isAnim3d = path.includes('/r/animador-3d/');
    const isVideo = path.includes('/r/video/');
    const isCorrector = path.includes('/r/corrector-de-estilo/');
    const isIngeniero = path.includes('/r/ingeniero-lms/');
    const isRegistrado = path.includes('/r/registrado/');

    const allowedRoles = [];
    if (isSuperadmin) allowedRoles.push('superadmin');
    if (isAdmin) allowedRoles.push('admin');
    if (isCoordinador) allowedRoles.push('coordinador');
    if (isCliente) allowedRoles.push('cliente');
    if (isDisInst) allowedRoles.push('disenador-instruccional');
    if (isAutor) allowedRoles.push('autor');
    if (isRevisor) allowedRoles.push('revisor-qa');
    if (isEditor) allowedRoles.push('editor');
    if (isDesaMult) allowedRoles.push('desarrollador-multimedia');
    if (isAbogado) allowedRoles.push('abogado');
    if (isDisGraf) allowedRoles.push('disenador-grafico');
    if (isAnim2d) allowedRoles.push('animador-2d');
    if (isAnim3d) allowedRoles.push('animador-3d');
    if (isVideo) allowedRoles.push('video');
    if (isCorrector) allowedRoles.push('corrector-de-estilo');
    if (isIngeniero) allowedRoles.push('ingeniero-lms');
    if (isRegistrado) allowedRoles.push('registrado');

    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/';
        return;
    }
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const userRoles = payload.roles || [payload.role].filter(Boolean);
        if (!userRoles.some(r => allowedRoles.includes(r))) {
            window.location.href = '/';
            return;
        }
    } catch(e) {
        window.location.href = '/';
    }
});
</script>

<script>
// ==================== VERIFICACIÓN DE PERMISOS DE MENÚ ====================
(function() {
    const token = localStorage.getItem('token');
    if (!token) return;
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const permissions = payload.permissions || [];
        
        const hasPermission = (perm) => permissions.includes(perm);
        const hasAnyPermission = (perms) => perms.some(p => permissions.includes(p));
        
        const menuPermissions = {
            'menu-proyectos': ['proyectos_crear', 'proyectos_consultar'],
            'menu-crear-proyecto': ['proyectos_crear'],
            'menu-entidades': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-crear-entidad': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-plan-estudio': ['proyectos_planes_formacion_listar', 'diseno_instruccional_ver'],
            'menu-crear-plan': ['diseno_instruccional_crear'],
            'menu-cursos': ['proyectos_cursos_listar'],
            'menu-crear-curso': ['autor_crear'],
            'menu-modulos': ['proyectos_modulos_listar'],
            'menu-crear-modulo': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-unidades': ['proyectos_unidades_listar'],
            'menu-crear-unidad': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-tareas': ['proyectos_tareas_listar'],
            'menu-crear-tarea': ['autor_crear'],
            'menu-evaluaciones': ['proyectos_evaluaciones_listar'],
            'menu-crear-evaluacion': ['autor_crear'],
            'menu-fases': ['proyectos_fases_etapas_gestionar'],
            'menu-cronogramas': ['proyectos_cronogramas_crear'],
            'menu-calendario': ['proyectos_calendario_ver'],
            'menu-usuarios': ['usuarios_crear'],
            'menu-clientes': ['usuarios_crear'],
            'menu-crm': ['usuarios_crear'],
            'menu-roles': ['roles_permisos_gestionar'],
            'menu-drive': ['archivos_drive_personal_ver', 'archivos_drive_global_ver'],
            'menu-ia': ['ia_produccion_imagen', 'ia_produccion_audio', 'ia_linguistica_usar'],
            'menu-canvas': ['herramientas_canvas_usar'],
            'menu-powerpoint': ['herramientas_powerpoint_usar'],
            'menu-auditoria': ['seguridad_auditoria_ver'],
            'menu-bitacora': ['seguridad_bitacora_usuarios_ver'],
            'menu-estadisticas': ['reportes_estadisticas_ver'],
            'menu-metricas': ['reportes_metricas_ver'],
            'menu-diseno-instruccional': ['diseno_instruccional_ver', 'diseno_instruccional_crear'],
            'menu-autor-contenido': ['autor_ver', 'autor_crear'],
            'menu-microcursos': ['capacitacion_microcursos_ver'],
            'menu-tutoriales': ['capacitacion_tutoriales_ver'],
            'menu-faq': ['capacitacion_faq_ver'],
        };
        
        Object.entries(menuPermissions).forEach(([id, required]) => {
            const el = document.getElementById(id);
            if (el && !hasAnyPermission(required)) {
                el.style.display = 'none';
            }
        });
    } catch(e) {}
})();
</script>
