  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'pulse-slow': 'pulse 3s ease-in-out infinite',
            'gradient': 'gradient 15s ease infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-10px)' }
            },
            gradient: {
              '0%, 100%': { backgroundPosition: '0% 50%' },

  <style>
    body { font-family: 'Lato', sans-serif; }
    
    .gradient-bg {
      background: black ;
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
    }
    
    .glass {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);

    .hover-lift {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

    .hover-lift:hover {

    }
    
    .glow {
      box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
    }
    
    .typing::after {

      animation: blink 1s infinite;
    }

      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }

    .editor-container_document-editor .editor-container__editor-wrapper {

            width: 100%;
            min-height: auto;
            margin: 0;
        }
        .editor-container_document-editor .editor-container__editor-wrapper {
            padding: 1rem;
        }
    }
  </style>

  <script>
    // Configuración y variables
    let editorInstance = null;
    let iaDatosJSON = null;
    let iaTipoEntidad = null;
    
    const {
        DecoupledEditor, Autosave, Essentials, Paragraph, ImageUtils, ImageEditing,
        Mention, Bold, Italic, Underline, Markdown, MediaEmbed, Strikethrough, Code,
        Subscript, Superscript, FontBackgroundColor, FontColor, FontFamily, FontSize,
        RemoveFormat, Highlight, Heading, Link, AutoLink, BlockQuote, HorizontalLine,
        CodeBlock, Indent, IndentBlock, Alignment, List, TodoList, ImageInsertViaUrl,
        ImageBlock, ImageToolbar, AutoImage, BalloonToolbar
    } = window.CKEDITOR;

    const LICENSE_KEY = 'eyJhbGciOiJFUzI1NiJ9.eyJleHAiOjE3NzQ0ODMxOTksImp0aSI6ImRiZGMwN2U0LTBmOTctNGQ3MS05NzA1LWQ4ZWRjMzQ4NjNhZiIsInVzYWdlRW5kcG9pbnQiOiJodHRwczovL3Byb3h5LWV2ZW50LmNrZWRpdG9yLmNvbSIsImRpc3RyaWJ1dGlvbkNoYW5uZWwiOlsiY2xvdWQiLCJkcnVwYWwiLCJzaCJdLCJ3aGl0ZUxhYmVsIjp0cnVlLCJsaWNlbnNlVHlwZSI6InRyaWFsIiwiZmVhdHVyZXMiOlsiKiJdLCJ2YyI6ImNjZDM3NmU2In0.56Ya4P-DOgQuKVRx9i6QWlE0vcje7V8GLb3C8NHfa-6-uFBBxCf--nSyrfXARbEfgMBK4Om3OYFDqJ4e4_rw0Q';
    
    const editorConfig = {
        toolbar: {
            items: [
                'undo', 'redo', '|', 'heading', '|', 'fontSize', 'fontFamily', 'fontColor',
                'fontBackgroundColor', '|', 'bold', 'italic', 'underline', '|', 'link',
                'insertImageViaUrl', 'highlight', 'blockQuote', 'codeBlock', '|',
                'alignment', '|', 'bulletedList', 'numberedList', 'todoList', 'outdent', 'indent'
            ],
            shouldNotGroupWhenFull: false
        },
        plugins: [
            Alignment, AutoImage, AutoLink, Autosave, BalloonToolbar, BlockQuote, Bold,
            Code, CodeBlock, Essentials, FontBackgroundColor, FontColor, FontFamily,
            FontSize, Heading, Highlight, HorizontalLine, ImageBlock, ImageEditing,
            ImageInsertViaUrl, ImageToolbar, ImageUtils, Indent, IndentBlock, Italic,
            Link, List, Markdown, MediaEmbed, Mention, Paragraph, RemoveFormat,
            Strikethrough, Subscript, Superscript, TodoList, Underline
        ],
        balloonToolbar: ['bold', 'italic', '|', 'link', '|', 'bulletedList', 'numberedList'],
        fontFamily: { 
            supportAllValues: true,
            options: [
                { title: 'Default (Lato)', model: 'Lato, sans-serif' },
                { title: 'Roboto', model: 'Roboto, sans-serif' },
                { title: 'Open Sans', model: 'Open Sans, sans-serif' },
                { title: 'Montserrat', model: 'Montserrat, sans-serif' },
                { title: 'Playfair Display', model: 'Playfair Display, serif' }
            ]
        },
        fontSize: {
            options: [10, 12, 14, 'default', 18, 20, 22],
            supportAllValues: true
        },
        heading: {
            options: [
                { model: 'paragraph', title: 'Párrafo', class: 'ck-heading_paragraph' },
                { model: 'heading1', view: 'h1', title: 'Título 1', class: 'ck-heading_heading1' },
                { model: 'heading2', view: 'h2', title: 'Título 2', class: 'ck-heading_heading2' },
                { model: 'heading3', view: 'h3', title: 'Título 3', class: 'ck-heading_heading3' }
            ]
        },
        language: 'es',
        licenseKey: LICENSE_KEY,
        placeholder: '¡Escribe o pega tu contenido aquí!'
    };

    const AUTOSAVE_KEY = 'ckeditor_autosave_content';
    const AUTOSAVE_INTERVAL = 30000;
    let autosaveTimer = null;

    function autoSaveContent() {
      if (window.editorInstance) {
        const content = window.editorInstance.getData();
        if (content && content.trim() !== '' && content !== '<p>&nbsp;</p>') {
          localStorage.setItem(AUTOSAVE_KEY, content);
          const timestamp = new Date().toLocaleTimeString('es-ES');
          const saveIndicator = document.getElementById('autosave-indicator');
          if (saveIndicator) {
            saveIndicator.textContent = '✓ Guardado ' + timestamp;
            saveIndicator.classList.remove('hidden');
            setTimeout(() => {
              saveIndicator.classList.add('hidden');
            }, 3000);
          }
        }
      }
    }

    function restoreSavedContent() {
      const savedContent = localStorage.getItem(AUTOSAVE_KEY);
      if (savedContent && savedContent.trim() !== '' && savedContent !== '<p>&nbsp;</p>') {
        if (window.confirm('¿Restaurar contenido guardado automáticamente?')) {
          window.editorInstance.setData(savedContent);
          showNotification('Contenido restaurado del auto-guardado', 'success');
        } else {
          localStorage.removeItem(AUTOSAVE_KEY);
        }
      }
    }

    DecoupledEditor.create(document.querySelector('#editor'), editorConfig)
        .then(editor => {
            document.querySelector('#editor-toolbar').appendChild(editor.ui.view.toolbar.element);
            document.querySelector('#editor-menu-bar').appendChild(editor.ui.view.menuBarView.element);
            
            window.editorInstance = editor; 
            console.log('CKEditor 5 Decoupled listo en español.');

            editor.model.document.on('change:data', () => {
              clearTimeout(autosaveTimer);
              autosaveTimer = setTimeout(autoSaveContent, AUTOSAVE_INTERVAL);
            });

            setTimeout(restoreSavedContent, 500);
        })
        .catch(error => {

    function formatTextToHTML(text) {
      if (!text) return text;
      
      let formattedText = text
        .replace(/\*\*(.*?)\*\*/g, '<strong class="font-bold text-blue-200">$1</strong>')
        .replace(/\*(.*?)\*/g, '<em class="italic text-purple-200">$1</em>')
        .replace(/^\* (.+)$/gm, '<li class="ml-4 mb-1 text-gray-100">• $1</li>')
        .replace(/\n\n/g, '</p><p class="mb-4 text-gray-100 leading-relaxed">')
        .replace(/\n/g, '<br>')
        .replace(/<strong class="font-bold text-blue-200">([^<]+):<\/strong>/g,
            '<h3 class="text-xl font-bold text-yellow-300 mb-3 mt-6 border-b border-white/20 pb-2">$1:</h3>')
        .replace(/(\d+\.\s)/g, '<span class="font-bold text-green-300">$1</span>');

      if (!formattedText.includes('<li>') && !formattedText.includes('<h3>')) {
        formattedText = '<p class="mb-4 text-gray-100 leading-relaxed">' + formattedText + '</p>';
      }

      if (formattedText.includes('<li>')) {
        formattedText = formattedText.replace(/(<li>.*?<\/li>)/gs, '<ul class="space-y-2 mb-4">$1</ul>');
      }

      return formattedText;
    }

    async function sendRequest(endpoint, body) {
      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (!response.ok) throw new Error(`Error ${response.status}: ${response.statusText}`);

        const textResponse = await response.text();
        try {
          const data = JSON.parse(textResponse);
          const rawText = data.mensaje || data.result || data.respuesta || JSON.stringify(data);
          return formatTextToHTML(rawText);
        } catch {
          return formatTextToHTML(textResponse);
        }
      } catch (e) {
        console.error(e);
        return `<div class="text-red-300 p-4 bg-red-500/20 rounded-lg border border-red-400/30">
          <div class="flex items-center mb-2">
            <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"/>
            </svg>
            <span class="font-semibold">Error de Conexión</span>
          </div>
          <p class="text-sm">${e.message}</p>
        </div>`;
      }
    }

      const modo = document.getElementById('modoIA').value;
      const promptText = document.getElementById('promptInput').value.trim();
      
      let textoParaIA = '';
      
      if (modo === 'editor') {
        const editorData = window.editorInstance ? window.editorInstance.getData() : '';

          textoParaIA = editorData;
          if (promptText) {

        } else if (promptText) {

          return;
        }
      } else {

          return;
        }
        textoParaIA = promptText;
      }

      const tipoEntidad = document.getElementById('tipoEntidadIA').value;
      let instruccionFormatos = '';
      
      if (tipoEntidad === 'modulo') {
        instruccionFormatos = `\n\nIMPORTANTE: Devuelve el resultado en formato JSON con estos campos EXACTOS para crear un nuevo MÓDULO:{  "nombre_del_modulo": "Nombre del módulo",  "objetivo_general": "Objetivo general del módulo",  "objetivos_especificos": "Objetivos específicos (separados por saltos de línea)",  "publico_objetivo": "Público objetivo",  "duracion_estimada": "Duración estimada (ej: 8 horas)",  "requisitos_previos": "Requisitos previos",  "criterios_de_logro": "Criterios de logro"}`;
      } else if (tipoEntidad === 'study_plan') {
        instruccionFormatos = `\n\nIMPORTANTE: Devuelve el resultado en formato JSON con estos campos EXACTOS para crear un nuevo PLAN DE ESTUDIO:{  "name": "Nombre del plan",  "description": "Descripción general",  "modalidad": "Modalidad (Presencial/Virtual/Híbrida)",  "objetivo_general": "Objetivo general",  "objetivos_especificos": ["Objetivo 1", "Objetivo 2", "Objetivo 3"],  "resultados_aprendizaje": "Resultados de aprendizaje esperados",  "recursos_libros": "Recursos bibliográficos",  "recursos_materiales": "Materiales de apoyo"}`;
      } else if (tipoEntidad === 'project') {
        instruccionFormatos = `\n\nIMPORTANTE: Devuelve el resultado en formato JSON con estos campos EXACTOS para crear un nuevo PROYECTO:{  "name": "Nombre del proyecto",  "description": "Descripción del proyecto",  "tipo_proyecto": "Tipo de proyecto",  "publico_objetivo": ["Grupo 1", "Grupo 2"],  "horas_curso": 40,  "observaciones": "Observaciones adicionales"}`;
      }
      
      const promptCompleto = textoParaIA + instruccionFormatos;

      const agents = [
        { name: 'Gemini', endpoint: 'https://gestordecursos.pegui.edu.co:8000/chat/gemini', body: { prompt: promptCompleto }, color: 'green' },
        { name: 'ChatGPT', endpoint: 'https://gestordecursos.pegui.edu.co:8000/chat/openai', body: { mensaje: promptCompleto }, color: 'emerald' },
        { name: 'Kimi', endpoint: 'https://gestordecursos.pegui.edu.co:8000/chat/kimi', body: { mensaje: promptCompleto }, color: 'blue' }
      ];

      iaTipoEntidad = tipoEntidad;
      let lastError = '';
      
      for (let i = 0; i < agents.length; i++) {
        const currentAgent = agents[i];
        document.getElementById('resultInput').value = 'Intentando con ' + currentAgent.name + '...';
        
        try {
          const result = await sendRequestRaw(currentAgent.endpoint, currentAgent.body);
          document.getElementById('resultInput').value = result.text;
          iaDatosJSON = result.jsonData;
          if (iaDatosJSON) {
            showNotification('Resultado de ' + currentAgent.name + ' (JSON detectado)', 'success');
          } else {
            showNotification('Resultado de ' + currentAgent.name + ' (guarda manualmente)', 'warning');
          }
          return;
        } catch (e) {
          lastError = e.message;
          console.warn('Error con ' + currentAgent.name + ':', e.message);
          if (i < agents.length - 1) {
            showNotification(currentAgent.name + ' falló, intentando con ' + agents[i+1].name + '...', 'warning');
          }
        }
      }
      
      document.getElementById('resultInput').value = 'Error: ' + lastError;
      showNotification('Todos los agentes fallaron: ' + lastError, 'error');
    }

    async function sendRequestRaw(endpoint, body) {
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!response.ok) throw new Error(`Error ${response.status}: ${response.statusText}`);
      const textResponse = await response.text();
      
      let jsonData = null;
      let textoLimpio = textResponse;
      
      try {
        const data = JSON.parse(textResponse);
        textoLimpio = data.mensaje || data.result || data.respuesta || textResponse;
        
        if (typeof textoLimpio === 'string') {
          const jsonMatch = textoLimpio.match(/\{[\s\S]*\}/);
          if (jsonMatch) {
            try {
              jsonData = JSON.parse(jsonMatch[0]);
            } catch {}
          }
        }
      } catch {
        const jsonMatch = textResponse.match(/\{[\s\S]*\}/);
        if (jsonMatch) {
          try {
            jsonData = JSON.parse(jsonMatch[0]);
            textoLimpio = JSON.stringify(jsonData, null, 2);
          } catch {
            textoLimpio = textResponse;
          }
        }
      }
      
      return { text: textoLimpio, jsonData: jsonData };
    }

    function showNotification(message, type) {
      const notification = document.createElement('div');
      const colors = {
        warning: 'bg-yellow-500',
        error: 'bg-red-500',
        success: 'bg-green-500'
      };
      
      notification.className = `fixed top-4 right-4 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg z-50 transform translate-x-full transition-transform duration-300`;
      notification.textContent = message;
      
      document.body.appendChild(notification);
      
      setTimeout(() => {
        notification.style.transform = 'translateX(0)';
      }, 100);
      
      setTimeout(() => {
        notification.style.transform = 'translateX(100%)';
        setTimeout(() => notification.remove(), 300);
      }, 3000);
    }

    window.subirArchivoDrive = async function(tipo) {
      const contenidoIA = document.getElementById('resultInput').value;
      let contenidoEditor = '';
      if (window.editorInstance) {
        contenidoEditor = window.editorInstance.getData();
      }
      
      const tipoSubida = document.querySelector(`input[name="tipoSubida${tipo === 'global' ? 'Global' : ''}"]:checked`);
      const tipoSeleccionado = tipoSubida ? parseInt(tipoSubida.value) : 0;
      
      let contenido = '';
      const opciones = [];
      if (contenidoIA) opciones.push('ia');
      if (contenidoEditor) opciones.push('editor');
      
      contenido = opciones[tipoSeleccionado] === 'ia' ? contenidoIA : contenidoEditor.replace(/<[^>]*>/g, '');
      
      const fileNameInput = tipo === 'personal' ? document.getElementById('driveFileName') : document.getElementById('driveFileNameGlobal');
      const fileName = fileNameInput.value || 'documento';
      
      const carpetaSeleccionada = document.querySelector('input[name="carpetaDrive"]:checked');
      const folderId = carpetaSeleccionada ? carpetaSeleccionada.value : '';
      
      try {
        const API = 'https://gestordecursos.pegui.edu.co:8000';
        const TOKEN = localStorage.getItem('token') || sessionStorage.getItem('token') || '';
        
        const formData = new FormData();
        const blob = new Blob([contenido], { type: 'text/plain' });
        formData.append('file', blob, fileName + '.txt');
        formData.append('nombre_archivo', fileName);
        if (folderId) formData.append('folder_id', folderId);
        if (tipo === 'global') formData.append('include_general', 'true');
        
        const res = await fetch(API + '/archivos/', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + TOKEN },
          body: formData
        });
        
        if (res.ok) {
          showNotification(`Archivo subido a Drive ${tipo === 'personal' ? 'Personal' : 'Global'}`, 'success');
          if (tipo === 'personal') cerrarModalDrive();
          else cerrarModalDriveGlobal();
        } else {
          const error = await res.json();
          showNotification('Error: ' + (error.detail || res.status), 'error');
        }
      } catch (e) {
        showNotification('Error: ' + e.message, 'error');
      }
    };

        return;
      }
      
      try {
        const API = 'https://gestordecursos.pegui.edu.co:8000';
        const TOKEN = localStorage.getItem('token') || sessionStorage.getItem('token') || '';
        
        let url = '';
        let payload = { ...iaDatosJSON };
        
        if (iaTipoEntidad === 'modulo') {
          const entidadId = document.getElementById('entidadSelect').value;
          const autorSelect = document.getElementById('autorSelect').value;
          if (!entidadId) {
            showNotification('Selecciona un Plan de Estudio padre', 'warning');
            return;
          }
          payload.study_plan_id = parseInt(entidadId);
          if (autorSelect) {
            payload.autor_responsable = autorSelect;
          }
          url = API + '/modules/';
        } else if (iaTipoEntidad === 'study_plan') {
          const entidadId = document.getElementById('entidadSelect').value;
          if (!entidadId) {
            showNotification('Selecciona un Proyecto padre', 'warning');
            return;

          payload.project_id = parseInt(entidadId);
          url = API + '/study_plans/';
        } else if (iaTipoEntidad === 'project') {
          const clienteSelect = document.getElementById('clienteSelect');
          if (clienteSelect && clienteSelect.value) {
            payload.client_id = clienteSelect.value;
          }
          url = API + '/projects/';
        }
        
        const res = await fetch(url, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + TOKEN 
          },
          body: JSON.stringify(payload)
        });
        
        if (res.ok) {
          const data = await res.json();
          showNotification(`${iaTipoEntidad === 'modulo' ? 'Módulo' : iaTipoEntidad === 'study_plan' ? 'Plan de Estudio' : 'Proyecto'} creado (ID: ${data.id})`, 'success');

          iaTipoEntidad = null;
          cerrarModalEntidades();
        } else {
          const error = await res.json().catch(() => ({ detail: res.statusText }));
          showNotification('Error: ' + (error.detail || res.status), 'error');
        }
      } catch (e) {
        showNotification('Error: ' + e.message, 'error');
      }
    };

    window.mostrarVistaPrevia = function() {
      const select = document.getElementById('entidadImportarSelect');
      const vistaPrevia = document.getElementById('vistaPrevia');
      const contenido = document.getElementById('contenidoPrevia');
      
      if (!select.value) {
        vistaPrevia.classList.add('hidden');
        return;
      }
      
      const option = select.options[select.selectedIndex];
      const obj = JSON.parse(option.dataset.obj.replace(/&#39;/g, "'"));
      
      let html = '<strong>ID:</strong> ' + obj.id + '<br><br>';
      
      for (const key in obj) {
        if (obj[key] && typeof obj[key] !== 'object') {
          html += `<strong>${key.replace(/_/g, ' ')}:</strong> ${obj[key]}<br>`;
        } else if (obj[key] && Array.isArray(obj[key])) {
          html += `<strong>${key.replace(/_/g, ' ')}:</strong> ${obj[key].length} elementos<br>`;
        }
      }
      
      contenido.innerHTML = html;
      vistaPrevia.classList.remove('hidden');
    };

        return;

      const option = select.options[select.selectedIndex];

      let camposImportantes = [];
      
      if (tipo === 'project') {
        titulo = 'PROYECTO';
        camposImportantes = [
          { label: 'Nombre', valor: obj.name || obj.titulo },
          { label: 'Descripción', valor: obj.description || obj.descripcion },

          { label: 'Duración', valor: obj.duracion },
          { label: 'Horas', valor: obj.horas },

    // ==================== GENERADOR DE IMÁGENES CON IA Y PROGRESO ====================
    const API_IMAGE_BASE = "https://ia.pegui.edu.co/sdapi/v1";
    let isGeneratingImage = false;
    let generatedImageBase64 = null;
    let progressInterval = null;

    window.abrirModalImagenIA = function() {
      const modal = document.createElement('div');
      modal.id = 'modalImagenIA';
      modal.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4';
      
      // CAMBIO IMPORTANTE: Se agregó la UI de la barra de progreso dentro de "imagenLoading"
      modal.innerHTML = `
        <div class="glass rounded-3xl p-6 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
          <div class="flex items-center justify-between mb-6">
            <h3 class="text-2xl font-bold text-white flex items-center">
              <svg class="w-7 h-7 mr-3 text-pink-400" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" clip-rule="evenodd"/>
              </svg>
              Generar Imagen con IA
            </h3>
            <button onclick="cerrarModalImagenIA()" class="text-white/60 hover:text-white text-2xl">&times;</button>
          </div>
          
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-white/80 mb-2">Prompt Positivo</label>
              <textarea id="imagenPrompt" rows="3" class="w-full bg-white/10 border border-white/20 rounded-xl p-3 text-white placeholder-white/50 focus:outline-none focus:border-pink-400" placeholder="Describe la imagen que quieres generar..."></textarea>
            </div>
            
            <div>
              <label class="block text-sm font-medium text-white/80 mb-2">Prompt Negativo</label>
              <textarea id="imagenNegativePrompt" rows="2" class="w-full bg-white/10 border border-white/20 rounded-xl p-3 text-white placeholder-white/50 focus:outline-none focus:border-pink-400 text-sm" placeholder="Lo que NO quieres en la imagen..."></textarea>
            </div>
            
            <div class="grid grid-cols-3 gap-4">
              <div>
                <label class="block text-sm font-medium text-white/80 mb-2">Pasos</label>
                <input type="number" id="imagenSteps" value="20" min="1" max="50" class="w-full bg-white/10 border border-white/20 rounded-xl p-3 text-white focus:outline-none focus:border-pink-400">
              </div>
              <div>
                <label class="block text-sm font-medium text-white/80 mb-2">CFG Scale</label>
                <input type="number" id="imagenCfg" value="7" min="1" max="20" class="w-full bg-white/10 border border-white/20 rounded-xl p-3 text-white focus:outline-none focus:border-pink-400">
              </div>
              <div>
                <label class="block text-sm font-medium text-white/80 mb-2">Dimensiones</label>
                <select id="imagenDimensions" class="w-full bg-white/10 border border-white/20 rounded-xl p-3 text-white focus:outline-none focus:border-pink-400">
                  <option value="512x512">512x512</option>
                  <option value="512x768">512x768</option>
                  <option value="768x512">768x512</option>
                </select>
              </div>
            </div>
            
            <div id="imagenPreviewContainer" class="hidden">
              <label class="block text-sm font-medium text-white/80 mb-2">Vista Previa</label>
              <div class="relative bg-black/30 rounded-xl p-4 flex items-center justify-center min-h-[200px]">
                <img id="imagenPreview" class="max-w-full max-h-[300px] rounded-lg" alt="Preview">
                
                <div id="imagenLoading" class="absolute inset-0 flex flex-col items-center justify-center bg-black/80 rounded-xl hidden px-8">
                  <div class="animate-spin w-12 h-12 border-4 border-pink-500 border-t-transparent rounded-full mx-auto mb-4"></div>
                  <p id="imagenLoadingText" class="text-white font-semibold text-sm mb-2">Generando imagen...</p>
                  <div class="w-full bg-gray-700 rounded-full h-2.5">
                    <div id="imagenProgressBar" class="bg-gradient-to-r from-pink-500 to-purple-500 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                  </div>
                  <p id="imagenProgressText" class="text-white/80 text-xs mt-2 font-mono">0%</p>
                </div>
                
              </div>
            </div>
            
            <div class="flex gap-3 pt-4">
              <button onclick="generarImagenIA()" id="btnGenerarImagen" class="flex-1 bg-gradient-to-r from-pink-500 to-purple-500 hover:from-pink-600 hover:to-purple-600 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd"/>
                </svg>
                Generar Imagen
              </button>
              <button onclick="insertarImagenEnEditor()" id="btnInsertarImagen" class="flex-1 bg-green-500/30 hover:bg-green-500/50 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all border border-green-400/30 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                </svg>
                Insertar en Editor
              </button>
            </div>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
    };

    window.cerrarModalImagenIA = function() {
      const modal = document.getElementById('modalImagenIA');
      if (modal) {
        modal.remove();
      }
      if (progressInterval) {
        clearInterval(progressInterval);
        progressInterval = null;
      }
      generatedImageBase64 = null;
      isGeneratingImage = false;
    };

    // CAMBIO IMPORTANTE: Polling de la API de progreso integrado
    window.generarImagenIA = async function() {
      if (isGeneratingImage) return;
      
      const prompt = document.getElementById('imagenPrompt').value.trim();
      if (!prompt) {
        showNotification('Escribe un prompt primero', 'warning');
        return;
      }

      isGeneratingImage = true;
      const btnGenerar = document.getElementById('btnGenerarImagen');
      const btnInsertar = document.getElementById('btnInsertarImagen');
      const previewContainer = document.getElementById('imagenPreviewContainer');
      const loading = document.getElementById('imagenLoading');
      const progressBar = document.getElementById('imagenProgressBar');
      const progressText = document.getElementById('imagenProgressText');
      const preview = document.getElementById('imagenPreview');
      
      btnGenerar.disabled = true;
      btnGenerar.innerHTML = '<div class="animate-spin w-5 h-5 border-2 border-white border-t-transparent rounded-full"></div> Generando...';
      
      // Reseteamos UI de progreso
      progressBar.style.width = '0%';
      progressText.innerText = '0%';
      previewContainer.classList.remove('hidden');
      loading.classList.remove('hidden');

      const dims = document.getElementById('imagenDimensions').value.split('x');
      const payload = {
        prompt: prompt,
        negative_prompt: document.getElementById('imagenNegativePrompt').value || 'blurry, bad quality, distorted',
        steps: parseInt(document.getElementById('imagenSteps').value),
        cfg_scale: parseInt(document.getElementById('imagenCfg').value),
        width: parseInt(dims[0]),
        height: parseInt(dims[1]),
        sampler_name: "Euler a",
        restore_faces: true
      };

      // Lanzar el polling del progreso mientras el fetch principal hace su trabajo
      progressInterval = setInterval(async () => {
        if (!isGeneratingImage) {
          clearInterval(progressInterval);
          return;
        }
        try {
          const res = await fetch(`${API_IMAGE_BASE}/progress?skip_current_image=false`);
          if (res.ok) {
            const data = await res.json();
            if (data.progress !== undefined) {
              const percentage = Math.round(data.progress * 100);
              progressBar.style.width = percentage + '%';
              progressText.innerText = percentage + '%';
              
              // Si la API arroja un fotograma intermedio, lo mostramos
              if (data.current_image) {
                preview.src = `data:image/png;base64,${data.current_image}`;
              }
            }
          }
        } catch (e) {
          // Ignoramos errores silenciosamente en el polling para no ensuciar la consola
        }
      }, 500); // Polling cada medio segundo

      try {
        // Petición principal que bloquea hasta terminar
        const response = await fetch(`${API_IMAGE_BASE}/txt2img`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error('Error en la generación');

        const data = await response.json();
        generatedImageBase64 = data.images[0];
        
        // Al terminar, forzamos la UI al 100% y mostramos la imagen final
        progressBar.style.width = '100%';
        progressText.innerText = '100%';
        preview.src = `data:image/png;base64,${generatedImageBase64}`;
        
        loading.classList.add('hidden');
        btnInsertar.disabled = false;
        
        showNotification('Imagen generada exitosamente', 'success');
      } catch (error) {
        console.error('Error:', error);
        showNotification('Error al generar imagen: ' + error.message, 'error');
        previewContainer.classList.add('hidden');
      } finally {
        isGeneratingImage = false;
        if (progressInterval) {
          clearInterval(progressInterval);
          progressInterval = null;
        }
        btnGenerar.disabled = false;
        btnGenerar.innerHTML = `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd"/></svg> Generar Imagen`;
      }
    };

    window.insertarImagenEnEditor = function() {
      if (!generatedImageBase64) {
        showNotification('Primero genera una imagen', 'warning');
        return;
      }

      if (!window.editorInstance) {
        showNotification('Editor no disponible', 'error');
        return;
      }

      const imageUrl = `data:image/png;base64,${generatedImageBase64}`;
      
      window.editorInstance.model.change(writer => {
        const imageElement = writer.createElement('imageBlock', {
          src: imageUrl
        });
        window.editorInstance.model.insertContent(imageElement);
      });

      showNotification('Imagen insertada en el editor', 'success');
      cerrarModalImagenIA();
    };
  </script>

  <script src="/js/roles.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
        const path = window.location.pathname;
        const isSuperadmin = path.includes('/r/superadmin/');
        const isAdmin = path.includes('/r/admin/');
        const isCoordinador = path.includes('/r/coordinador/');
        const isCliente = path.includes('/r/cliente/');
        const isDisInst = path.includes('/r/disenador-instruccional/');
        const isAutor = path.includes('/r/autor/');
        const isRevisor = path.includes('/r/revisor-qa/');
        const isEditor = path.includes('/r/editor/');
        const isDesaMult = path.includes('/r/desarrollador-multimedia/');
        const isAbogado = path.includes('/r/abogado/');
        const isDisGraf = path.includes('/r/disenador-grafico/');
        const isAnim2d = path.includes('/r/animador-2d/');
        const isAnim3d = path.includes('/r/animador-3d/');
        const isVideo = path.includes('/r/video/');
        const isCorrector = path.includes('/r/corrector-de-estilo/');
        const isIngeniero = path.includes('/r/ingeniero-lms/');
        const isRegistrado = path.includes('/r/registrado/');

        const allowedRoles = [];
        if (isSuperadmin) allowedRoles.push('superadmin');
        if (isAdmin) allowedRoles.push('admin');
        if (isCoordinador) allowedRoles.push('coordinador');
        if (isCliente) allowedRoles.push('cliente');
        if (isDisInst) allowedRoles.push('disenador-instruccional');
        if (isAutor) allowedRoles.push('autor');
        if (isRevisor) allowedRoles.push('revisor-qa');
        if (isEditor) allowedRoles.push('editor');
        if (isDesaMult) allowedRoles.push('desarrollador-multimedia');
        if (isAbogado) allowedRoles.push('abogado');
        if (isDisGraf) allowedRoles.push('disenador-grafico');
        if (isAnim2d) allowedRoles.push('animador-2d');
        if (isAnim3d) allowedRoles.push('animador-3d');
        if (isVideo) allowedRoles.push('video');
        if (isCorrector) allowedRoles.push('corrector-de-estilo');
        if (isIngeniero) allowedRoles.push('ingeniero-lms');
        if (isRegistrado) allowedRoles.push('registrado');

        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/';
            return;
        }
        
        try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            const userRoles = payload.roles || [payload.role].filter(Boolean);
            if (!userRoles.some(r => allowedRoles.includes(r))) {
                window.location.href = '/';
                return;
            }
        } catch(e) {
            window.location.href = '/';
        }
    });

    (function() {
        const token = localStorage.getItem('token');
        if (!token) return;
        
        try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            const permissions = payload.permissions || [];
            
            const hasPermission = (perm) => permissions.includes(perm);
            const hasAnyPermission = (perms) => perms.some(p => permissions.includes(p));
            
            const menuPermissions = {
                'menu-proyectos': ['proyectos_crear', 'proyectos_consultar'],
                'menu-crear-proyecto': ['proyectos_crear'],
                'menu-entidades': ['autor_crear', 'diseno_instruccional_crear'],
                'menu-crear-entidad': ['autor_crear', 'diseno_instruccional_crear'],
                'menu-plan-estudio': ['proyectos_planes_formacion_listar', 'diseno_instruccional_ver'],
                'menu-crear-plan': ['diseno_instruccional_crear'],
                'menu-cursos': ['proyectos_cursos_listar'],
                'menu-crear-curso': ['autor_crear'],
                'menu-modulos': ['proyectos_modulos_listar'],
                'menu-crear-modulo': ['autor_crear', 'diseno_instruccional_crear'],
                'menu-unidades': ['proyectos_unidades_listar'],
                'menu-crear-unidad': ['autor_crear', 'diseno_instruccional_crear'],
                'menu-tareas': ['proyectos_tareas_listar'],
                'menu-crear-tarea': ['autor_crear'],
                'menu-evaluaciones': ['proyectos_evaluaciones_listar'],
                'menu-crear-evaluacion': ['autor_crear'],
                'menu-fases': ['proyectos_fases_etapas_gestionar'],
                'menu-cronogramas': ['proyectos_cronogramas_crear'],
                'menu-calendario': ['proyectos_calendario_ver'],
                'menu-usuarios': ['usuarios_crear'],
                'menu-clientes': ['usuarios_crear'],
                'menu-crm': ['usuarios_crear'],
                'menu-roles': ['roles_permisos_gestionar'],
                'menu-drive': ['archivos_drive_personal_ver', 'archivos_drive_global_ver'],
                'menu-ia': ['ia_produccion_imagen', 'ia_produccion_audio', 'ia_linguistica_usar'],
                'menu-canvas': ['herramientas_canvas_usar'],
                'menu-powerpoint': ['herramientas_powerpoint_usar'],
                'menu-auditoria': ['seguridad_auditoria_ver'],
                'menu-bitacora': ['seguridad_bitacora_usuarios_ver'],
                'menu-estadisticas': ['reportes_estadisticas_ver'],
                'menu-metricas': ['reportes_metricas_ver'],
                'menu-diseno-instruccional': ['diseno_instruccional_ver', 'diseno_instruccional_crear'],
                'menu-autor-contenido': ['autor_ver', 'autor_crear'],
                'menu-microcursos': ['capacitacion_microcursos_ver'],
                'menu-tutoriales': ['capacitacion_tutoriales_ver'],
                'menu-faq': ['capacitacion_faq_ver'],
            };
            
            Object.entries(menuPermissions).forEach(([id, required]) => {
                const el = document.getElementById(id);
                if (el && !hasAnyPermission(required)) {
                    el.style.display = 'none';
                }
            });
        } catch(e) {}
    })();
  </script>
