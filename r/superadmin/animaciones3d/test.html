<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Editor Avanzado con IA Integrada</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/fetch-con-token.js"></script>
  <script src="https://cdn.ckeditor.com/ckeditor5/39.0.1/classic/ckeditor.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'pulse-slow': 'pulse 3s ease-in-out infinite',
            'gradient': 'gradient 15s ease infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-10px)' }
            },
            gradient: {
              '0%, 100%': { backgroundPosition: '0% 50%' },
              '50%': { backgroundPosition: '100% 50%' }
            }
          }
        }
      }
    }
  </script>
  <style>
    .gradient-bg {
      background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #f5576c);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
    }
    
    .glass {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .hover-lift {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .hover-lift:hover {
      transform: translateY(-8px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }
    
    .glow {
      box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
    }
    
    .typing::after {
      content: '|';
      animation: blink 1s infinite;
    }
    
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
    
    .ck-editor__editable {
      min-height: 300px !important;
      font-size: 16px !important;
    }
  </style>
</head>
<body class="gradient-bg min-h-screen">

  <!-- Partículas decorativas -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/4 left-1/4 w-4 h-4 bg-white rounded-full opacity-20 animate-float"></div>
    <div class="absolute top-1/3 right-1/4 w-6 h-6 bg-purple-300 rounded-full opacity-30 animate-float" style="animation-delay: 2s;"></div>
    <div class="absolute bottom-1/3 left-1/3 w-3 h-3 bg-blue-300 rounded-full opacity-25 animate-float" style="animation-delay: 4s;"></div>
  </div>

  <!-- Canvas 3D de fondo -->
  <canvas id="bg-canvas" class="fixed inset-0 pointer-events-none opacity-30 z-0"></canvas>

  <div class="container mx-auto p-6 max-w-6xl relative z-10">
    <!-- Header con animación -->
    <div class="text-center mb-12">
      <h1 class="text-6xl font-black text-white mb-4 drop-shadow-2xl">
        <span class="bg-gradient-to-r from-white to-blue-100 bg-clip-text text-transparent">
          Editor Avanzado
        </span>
      </h1>
      <h2 class="text-2xl font-light text-white/80 mb-6">
        Potenciado por Agentes de Inteligencia Artificial
      </h2>
      <div class="w-24 h-1 bg-gradient-to-r from-blue-400 to-purple-400 mx-auto rounded-full"></div>
    </div>

    <!-- Editor principal -->
    <div class="glass rounded-3xl p-8 mb-8 hover-lift glow">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-2xl font-bold text-white flex items-center">
          <svg class="w-8 h-8 mr-3 text-blue-300" fill="currentColor" viewBox="0 0 20 20">
            <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/>
          </svg>
          Editor de Texto
        </h3>
        <div class="flex space-x-2">
          <div class="w-3 h-3 bg-red-400 rounded-full"></div>
          <div class="w-3 h-3 bg-yellow-400 rounded-full"></div>
          <div class="w-3 h-3 bg-green-400 rounded-full"></div>
        </div>
      </div>
      
      <div class="bg-white rounded-2xl shadow-inner">
        <textarea id="editor" placeholder="Comienza a escribir tu texto aquí..."></textarea>
      </div>
    </div>

    <!-- Panel de agentes IA -->
    <div class="glass rounded-3xl p-8 mb-8 hover-lift">
      <h3 class="text-2xl font-bold text-white mb-6 text-center flex items-center justify-center">
        <svg class="w-8 h-8 mr-3 text-purple-300" fill="currentColor" viewBox="0 0 20 20">
          <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        Agentes de IA Disponibles
      </h3>
      
      <div class="grid md:grid-cols-3 gap-6">
        <!-- Agente Gemini -->
        <div class="group">
          <button id="btn-gemini" class="w-full bg-gradient-to-br from-green-400 to-green-600 text-white rounded-2xl p-6 font-bold text-lg shadow-xl hover:shadow-2xl transform transition-all duration-300 hover:scale-105 hover:-rotate-1">
            <div class="flex flex-col items-center">
              <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mb-4 group-hover:animate-pulse">
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20">
                  <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
                </svg>
              </div>
              <span class="text-xl font-bold mb-2">Gemini</span>
              <span class="text-sm opacity-90">Corrección y Mejora</span>
            </div>
          </button>
        </div>

        <!-- Agente KimiK2 -->
        <div class="group">
          <button id="btn-kimik2" class="w-full bg-gradient-to-br from-blue-400 to-blue-600 text-white rounded-2xl p-6 font-bold text-lg shadow-xl hover:shadow-2xl transform transition-all duration-300 hover:scale-105 hover:rotate-1">
            <div class="flex flex-col items-center">
              <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mb-4 group-hover:animate-pulse">
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20">
                  <path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zM3 10a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zM14 9a1 1 0 00-1 1v6a1 1 0 001 1h2a1 1 0 001-1v-6a1 1 0 00-1-1h-2z"/>
                </svg>
              </div>
              <span class="text-xl font-bold mb-2">KimiK2</span>
              <span class="text-sm opacity-90">Traducción Inteligente</span>
            </div>
          </button>
        </div>

        <!-- Agente OpenAI -->
        <div class="group">
          <button id="btn-openai" class="w-full bg-gradient-to-br from-purple-400 to-purple-600 text-white rounded-2xl p-6 font-bold text-lg shadow-xl hover:shadow-2xl transform transition-all duration-300 hover:scale-105 hover:-rotate-1">
            <div class="flex flex-col items-center">
              <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mb-4 group-hover:animate-pulse">
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"/>
                </svg>
              </div>
              <span class="text-xl font-bold mb-2">OpenAI</span>
              <span class="text-sm opacity-90">Estilo Académico</span>
            </div>
          </button>
        </div>
      </div>
    </div>

    <!-- Contenedor de resultados -->
    <div class="glass rounded-3xl p-8 hover-lift">
      <div class="flex items-center mb-6">
        <svg class="w-8 h-8 mr-3 text-green-300" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 011 1v1a1 1 0 01-1 1H4a1 1 0 01-1-1v-1zM3 7a1 1 0 011-1h12a1 1 0 011 1v8a1 1 0 01-1 1H4a1 1 0 01-1-1V7zM9 9a1 1 0 000 2h6a1 1 0 100-2H9z"/>
        </svg>
        <h3 class="text-2xl font-bold text-white">Resultados de IA</h3>
      </div>
      
      <div id="results" class="bg-white/10 backdrop-blur-sm rounded-2xl p-6 min-h-[200px] border border-white/20">
        <div class="flex flex-col items-center justify-center h-full text-white/70">
          <svg class="w-16 h-16 mb-4 animate-pulse-slow" fill="currentColor" viewBox="0 0 20 20">
            <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/>
            <path fill-rule="evenodd" d="M4 5a2 2 0 012-2v1a3 3 0 003 3h2a3 3 0 003-3V3a2 2 0 012 2v6a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm8 5a1 1 0 100-2 1 1 0 000 2z"/>
          </svg>
          <p class="text-lg italic text-center">Los resultados de los agentes IA aparecerán aquí...</p>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="text-center mt-12 text-white/60">
      <p class="text-sm">✨ Potenciado por tecnología de vanguardia en IA</p>
    </div>
  </div>

  <script>
    let editorInstance;

    // Inicializa CKEditor con configuración mejorada
    ClassicEditor
      .create(document.querySelector('#editor'), {
        toolbar: [
          'heading', '|',
          'bold', 'italic', 'underline', 'strikethrough', '|',
          'link', 'bulletedList', 'numberedList', '|',
          'outdent', 'indent', '|',
          'blockQuote', 'insertTable', '|',
          'undo', 'redo'
        ],
        heading: {
          options: [
            { model: 'paragraph', title: 'Párrafo', class: 'ck-heading_paragraph' },
            { model: 'heading1', view: 'h1', title: 'Título 1', class: 'ck-heading_heading1' },
            { model: 'heading2', view: 'h2', title: 'Título 2', class: 'ck-heading_heading2' },
            { model: 'heading3', view: 'h3', title: 'Título 3', class: 'ck-heading_heading3' }
          ]
        }
      })
      .then(editor => {
        editorInstance = editor;
        console.log('CKEditor listo');
      })
      .catch(error => {
        console.error('Error al inicializar CKEditor:', error);
      });

    // Función para convertir texto plano a HTML con formato mejorado
    function formatTextToHTML(text) {
      if (!text) return text;
      
      // Convertir texto plano a HTML con mejor formato
      let formattedText = text
        // Convertir **texto** a <strong>texto</strong>
        .replace(/\*\*(.*?)\*\*/g, '<strong class="font-bold text-cyan-300 bg-cyan-900/20 px-2 py-1 rounded">$1</strong>')
        // Convertir *texto* a <em>texto</em>
        .replace(/\*(.*?)\*/g, '<em class="italic text-blue-300 bg-blue-900/20 px-1 rounded">$1</em>')
        // Convertir líneas que empiecen con * a elementos de lista
        .replace(/^\* (.+)$/gm, '<li class="ml-4 mb-2 text-white flex items-start"><span class="text-green-400 mr-2 font-bold">•</span><span>$1</span></li>')
        // Convertir múltiples saltos de línea a párrafos
        .replace(/\n\n/g, '</p><p class="mb-4 text-white leading-relaxed text-base">')
        // Convertir saltos de línea simples a <br>
        .replace(/\n/g, '<br>')
        // Resaltar títulos que empiecen con **
        .replace(/<strong class="font-bold text-cyan-300 bg-cyan-900\/20 px-2 py-1 rounded">([^<]+):<\/strong>/g, 
          '<h3 class="text-2xl font-bold text-white bg-gradient-to-r from-purple-500 to-pink-500 px-4 py-2 rounded-lg mb-4 mt-6 shadow-lg">$1:</h3>')
        // Resaltar secciones numeradas
        .replace(/(\d+\.\s)/g, '<span class="font-bold text-orange-400 bg-orange-900/30 px-2 py-1 rounded mr-2">$1</span>');

      // Envolver en párrafos si no hay estructura
      if (!formattedText.includes('<li>') && !formattedText.includes('<h3>')) {
        formattedText = '<p class="mb-4 text-white leading-relaxed text-base">' + formattedText + '</p>';
      }

      // Si hay elementos de lista, envolverlos en ul
      if (formattedText.includes('<li>')) {
        formattedText = formattedText.replace(/(<li>.*?<\/li>)/gs, '<ul class="space-y-2 mb-6 bg-gray-800/30 p-4 rounded-lg border-l-4 border-green-400">$1</ul>');
      }

      return formattedText;
    }

    // Función genérica para enviar peticiones con mejor manejo de errores
    async function sendRequest(endpoint, body) {
      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (!response.ok) throw new Error(`Error ${response.status}: ${response.statusText}`);

        const textResponse = await response.text();

        try {
          const data = JSON.parse(textResponse);
          const rawText = data.mensaje || data.result || data.respuesta || JSON.stringify(data);
          return formatTextToHTML(rawText);
        } catch {
          return formatTextToHTML(textResponse);
        }
      } catch (e) {
        console.error(e);
        return `<div class="text-red-300 p-4 bg-red-500/20 rounded-lg border border-red-400/30">
          <div class="flex items-center mb-2">
            <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"/>
            </svg>
            <span class="font-semibold">Error de Conexión</span>
          </div>
          <p class="text-sm">${e.message}</p>
        </div>`;
      }
    }

    // Función para mostrar estado de carga
    function showLoading(agentName) {
      document.getElementById('results').innerHTML = `
        <div class="flex flex-col items-center justify-center h-full text-white">
          <div class="animate-spin rounded-full h-16 w-16 border-b-2 border-white mb-4"></div>
          <p class="text-lg font-semibold typing">Procesando con ${agentName}</p>
          <p class="text-sm opacity-70 mt-2">Por favor espera...</p>
        </div>
      `;
    }

    // Manejar clicks para cada agente con mejoras visuales
    async function handleAgentRequest(agent) {
      if (!editorInstance) {
        showNotification('El editor aún no está listo.', 'warning');
        return;
      }
      
      const text = editorInstance.getData().trim();
      if (!text) {
        showNotification('Por favor, escribe algo en el editor.', 'warning');
        return;
      }

      let endpoint = '';
      let body = {};
      let title = '';
      let agentName = '';
      let color = '';

      switch(agent) {
        case 'gemini':
          endpoint = 'https://gestordecursos.pegui.edu.co:8000/chat/gemini';
          body = { prompt: text };
          title = 'Respuesta del Agente Gemini';
          agentName = 'Gemini';
          color = 'green';
          break;
        case 'kimik2':
          endpoint = 'https://gestordecursos.pegui.edu.co:8000/chat/kimi';
          body = { mensaje: text };
          title = 'Respuesta del Agente KimiK2';
          agentName = 'KimiK2';
          color = 'blue';
          break;
        case 'openai':
          endpoint = 'https://gestordecursos.pegui.edu.co:8000/chat/openai';
          body = { mensaje: text };
          title = 'Respuesta del Agente OpenAI';
          agentName = 'OpenAI';
          color = 'purple';
          break;
        default:
          showNotification('Agente desconocido', 'error');
          return;
      }

      showLoading(agentName);

      const result = await sendRequest(endpoint, body);

      document.getElementById('results').innerHTML = `
        <div class="space-y-6">
          <div class="flex items-center space-x-3 pb-4 border-b border-white/20">
            <div class="w-6 h-6 bg-${color}-400 rounded-full animate-pulse flex items-center justify-center">
              <svg class="w-3 h-3 text-white" fill="currentColor" viewBox="0 0 20 20">
                <path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/>
              </svg>
            </div>
            <h2 class="text-2xl font-bold text-white">${title}</h2>
            <div class="flex-1"></div>
            <div class="text-xs text-white/50 bg-white/10 px-3 py-1 rounded-full">
              ${new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })}
            </div>
          </div>
          <div class="bg-gradient-to-br from-gray-900/90 to-gray-800/90 rounded-2xl p-8 backdrop-blur-sm border-2 border-white/30 shadow-2xl">
            <div class="prose prose-xl max-w-none overflow-auto max-h-96">
              ${result}
            </div>
          </div>
          <div class="flex justify-center space-x-4">
            <button onclick="copyToClipboard()" class="bg-white/10 hover:bg-white/20 text-white px-6 py-2 rounded-lg transition-all duration-300 border border-white/20">
              📋 Copiar Resultado
            </button>
            <button onclick="insertToEditor()" class="bg-${color}-500/30 hover:bg-${color}-500/50 text-white px-6 py-2 rounded-lg transition-all duration-300 border border-${color}-400/30">
              📝 Insertar al Editor
            </button>
          </div>
        </div>
      `;
    }

    // Función para mostrar notificaciones
    function showNotification(message, type) {
      const notification = document.createElement('div');
      const colors = {
        warning: 'bg-yellow-500',
        error: 'bg-red-500',
        success: 'bg-green-500'
      };
      
      notification.className = `fixed top-4 right-4 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg z-50 transform translate-x-full transition-transform duration-300`;
      notification.textContent = message;
      
      document.body.appendChild(notification);
      
      setTimeout(() => {
        notification.style.transform = 'translateX(0)';
      }, 100);
      
      setTimeout(() => {
        notification.style.transform = 'translateX(full)';
        setTimeout(() => notification.remove(), 300);
      }, 3000);
    }

    // Eventos de botones con feedback visual
    function addButtonFeedback(buttonId, handler) {
      const button = document.getElementById(buttonId);
      button.addEventListener('click', async () => {
        button.style.transform = 'scale(0.95)';
        setTimeout(() => {
          button.style.transform = '';
        }, 150);
        await handler();
      });
    }

    addButtonFeedback('btn-gemini', () => handleAgentRequest('gemini'));
    addButtonFeedback('btn-kimik2', () => handleAgentRequest('kimik2'));
    addButtonFeedback('btn-openai', () => handleAgentRequest('openai'));

    // Inicializar animación 3D de fondo
    function init3DBackground() {
      const canvas = document.getElementById('bg-canvas');
      if (!canvas) return;

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
      
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0x000000, 0);

      // Crear geometrías flotantes
      const geometries = [];
      const materials = [
        new THREE.MeshBasicMaterial({ color: 0x667eea, wireframe: true }),
        new THREE.MeshBasicMaterial({ color: 0x764ba2, wireframe: true }),
        new THREE.MeshBasicMaterial({ color: 0xf093fb, wireframe: true }),
        new THREE.MeshBasicMaterial({ color: 0xf5576c, wireframe: true })
      ];

      // Crear múltiples objetos 3D
      for (let i = 0; i < 15; i++) {
        let geometry;
        const rand = Math.random();
        
        if (rand < 0.33) {
          geometry = new THREE.BoxGeometry(1, 1, 1);
        } else if (rand < 0.66) {
          geometry = new THREE.SphereGeometry(0.7, 8, 6);
        } else {
          geometry = new THREE.ConeGeometry(0.7, 1.5, 6);
        }

        const material = materials[Math.floor(Math.random() * materials.length)];
        const mesh = new THREE.Mesh(geometry, material);
        
        mesh.position.x = (Math.random() - 0.5) * 20;
        mesh.position.y = (Math.random() - 0.5) * 20;
        mesh.position.z = (Math.random() - 0.5) * 20;
        
        mesh.rotation.x = Math.random() * Math.PI;
        mesh.rotation.y = Math.random() * Math.PI;
        
        scene.add(mesh);
        geometries.push(mesh);
      }

      camera.position.z = 15;

      // Función de animación
      function animate() {
        requestAnimationFrame(animate);

        // Rotar y mover objetos
        geometries.forEach((mesh, index) => {
          mesh.rotation.x += 0.005 + index * 0.001;
          mesh.rotation.y += 0.003 + index * 0.001;
          
          // Movimiento flotante
          mesh.position.y += Math.sin(Date.now() * 0.001 + index) * 0.005;
          mesh.position.x += Math.cos(Date.now() * 0.0008 + index) * 0.003;
        });

        renderer.render(scene, camera);
      }

      animate();

      // Redimensionar canvas
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }

    // Inicializar 3D cuando la página cargue
    window.addEventListener('load', init3DBackground);

    // Variables globales para funciones de resultado
    let lastResult = '';
    
    // Función para copiar resultado al portapapeles
    window.copyToClipboard = function() {
      const resultElement = document.querySelector('#results .prose');
      if (resultElement) {
        const text = resultElement.innerText || resultElement.textContent;
        navigator.clipboard.writeText(text).then(() => {
          showNotification('✅ Resultado copiado al portapapeles', 'success');
        }).catch(() => {
          showNotification('❌ Error al copiar al portapapeles', 'error');
        });
      }
    };

    // Función para insertar resultado en el editor
    window.insertToEditor = function() {
      if (editorInstance) {
        const resultElement = document.querySelector('#results .prose');
        if (resultElement) {
          const currentContent = editorInstance.getData();
          const newContent = resultElement.innerHTML;
          editorInstance.setData(currentContent + '<hr>' + newContent);
          showNotification('✅ Resultado insertado en el editor', 'success');
        }
      } else {
        showNotification('❌ Editor no disponible', 'error');
      }
    };

  </script>

</body>
</html>
