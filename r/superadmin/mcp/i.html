<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP - Asistente IA VirtualMind</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/fetch-con-token.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .chat-messages { max-height: 250px; overflow-y: auto; }
        .typing-indicator span { animation: bounce 1.4s infinite ease-in-out both; }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="container mx-auto px-4 py-4">
        <!-- Header -->
        <div class="flex items-center justify-between mb-4">
            <div>
                <h1 class="text-2xl font-bold text-blue-400">🤖 MCP VirtualMind</h1>
                <p class="text-gray-400 text-sm">Asistente de IA para consultas</p>
            </div>
            <div class="flex gap-2">
                <button onclick="testConnection()" class="bg-green-600 hover:bg-green-700 px-3 py-1.5 rounded text-sm">🔄 Probar</button>
            </div>
        </div>

        <!-- Status -->
        <div id="status" class="bg-gray-800 rounded-lg p-2 mb-3 flex items-center gap-2 text-sm">
            <span id="status-icon">⏳</span>
            <span id="status-text">Conectando...</span>
        </div>

        <!-- Layout: 3 columnas -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-3">
            <!-- Columna 1: Chat (2 cols) -->
            <div class="lg:col-span-2 bg-gray-800 rounded-lg p-3">
                <h2 class="text-base font-semibold mb-2">💬 Asistente</h2>
                <div id="chat-messages" class="chat-messages bg-gray-900 rounded p-2 mb-2 min-h-[150px] text-sm"></div>
                <div class="flex gap-1 mb-2">
                    <input type="text" id="chat-input" placeholder="Escribe..." 
                        class="flex-1 bg-gray-700 rounded px-2 py-1 text-sm focus:outline-none"
                        onkeypress="if(event.key==='Enter')sendMessage()">
                    <button onclick="sendMessage()" class="bg-blue-600 px-2 rounded">➤</button>
                </div>
                <div class="flex flex-wrap gap-1">
                    <button onclick="quickChat('dashboard')" class="text-xs bg-gray-700 px-1.5 py-0.5 rounded">Dashboard</button>
                    <button onclick="quickChat('proyectos')" class="text-xs bg-gray-700 px-1.5 py-0.5 rounded">Proyectos</button>
                    <button onclick="quickChat('usuarios')" class="text-xs bg-gray-700 px-1.5 py-0.5 rounded">Usuarios</button>
                </div>
            </div>

            <!-- Columna 2: Datos y Gráfico (7 cols) -->
            <div class="lg:col-span-7 space-y-3">
                <div class="bg-gray-800 rounded-lg p-3">
                    <h2 class="text-base font-semibold mb-2">📊 Datos</h2>
                    <div id="result" class="bg-gray-900 rounded p-2 min-h-[200px] max-h-[350px] overflow-auto text-xs">
                        <span class="text-gray-500">Usa el chat o las acciones...</span>
                    </div>
                </div>
                <div class="bg-gray-800 rounded-lg p-3">
                    <h2 class="text-base font-semibold mb-2">📈 Gráfico</h2>
                    <canvas id="resultChart" height="150"></canvas>
                </div>
            </div>

            <!-- Columna 3: Herramientas y Acciones (3 cols) -->
            <div class="lg:col-span-3 space-y-3">
                <div class="bg-gray-800 rounded-lg p-3">
                    <h2 class="text-base font-semibold mb-2">📋 Herramientas</h2>
                    <input type="text" id="search-tools" placeholder="Buscar..." 
                        class="w-full bg-gray-700 rounded px-2 py-1 mb-2 text-sm" oninput="filterTools()">
                    <div id="tools-list" class="space-y-1 max-h-[180px] overflow-y-auto text-xs"></div>
                </div>
                <div class="bg-gray-800 rounded-lg p-3">
                    <h2 class="text-base font-semibold mb-2">🚀 Acciones</h2>
                    <div class="grid grid-cols-2 gap-1.5">
                        <button onclick="quickAction('get_dashboard_stats')" class="bg-gray-700 hover:bg-gray-600 p-1.5 rounded text-xs">📊 Dashboard</button>
                        <button onclick="quickAction('get_all_projects')" class="bg-gray-700 hover:bg-gray-600 p-1.5 rounded text-xs">📁 Proyectos</button>
                        <button onclick="quickAction('get_all_users')" class="bg-gray-700 hover:bg-gray-600 p-1.5 rounded text-xs">👥 Usuarios</button>
                        <button onclick="quickAction('get_all_clients')" class="bg-gray-700 hover:bg-gray-600 p-1.5 rounded text-xs">🏢 Clientes</button>
                        <button onclick="quickAction('get_all_courses')" class="bg-gray-700 hover:bg-gray-600 p-1.5 rounded text-xs">📚 Cursos</button>
                        <button onclick="quickAction('get_pending_tasks')" class="bg-gray-700 hover:bg-gray-600 p-1.5 rounded text-xs">📝 Tareas</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const MCP_SERVER = 'https://gestordecursos.pegui.edu.co/mcp/gemini';
        let tools = [];
        let chartInstance = null;

        // Inicializar con mensaje de bienvenida
        document.getElementById('chat-messages').innerHTML = `
            <div class="flex justify-start"><div class="bg-blue-900 rounded p-2 max-w-[90%]">
                <p class="text-xs">¡Hola! Pregúntame sobre:</p>
                <ul class="text-xs mt-1 text-gray-300">
                    <li>📊 Proyectos, usuarios, clientes</li>
                    <li>📈 Dashboard</li>
                    <li>📚 Cursos, tareas</li>
                </ul>
            </div></div>`;

        async function testConnection() {
            try {
                const res = await fetch(`${MCP_SERVER}/health`);
                const data = await res.json();
                document.getElementById('status-icon').textContent = '✅';
                document.getElementById('status-text').textContent = `Conectado - ${data.status}`;
                document.getElementById('status').className = 'bg-green-900 rounded-lg p-2 mb-3 flex items-center gap-2 text-sm';
                loadTools();
            } catch (e) {
                document.getElementById('status-icon').textContent = '❌';
                document.getElementById('status-text').textContent = 'Error de conexión';
                document.getElementById('status').className = 'bg-red-900 rounded-lg p-2 mb-3 flex items-center gap-2 text-sm';
            }
        }

        async function loadTools() {
            try {
                const res = await fetch(`${MCP_SERVER}/tools`);
                const data = await res.json();
                tools = data.tools || [];
                renderTools(tools);
            } catch (e) { console.error('Error:', e); }
        }

        function renderTools(toolsToRender) {
            const container = document.getElementById('tools-list');
            container.innerHTML = toolsToRender.map(tool => 
                `<button onclick="executeTool('${tool.name}', {})" class="w-full text-left p-1.5 rounded hover:bg-gray-700">
                    <div class="font-medium text-blue-400">${tool.name}</div>
                    <div class="text-gray-500 truncate">${tool.description || ''}</div>
                </button>`
            ).join('');
        }

        function filterTools() {
            const query = document.getElementById('search-tools').value.toLowerCase();
            renderTools(tools.filter(t => t.name.toLowerCase().includes(query)));
        }

        async function executeTool(toolName, params) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<span class="text-yellow-400">⏳ Ejecutando...</span>';
            
            try {
                const res = await fetch(`${MCP_SERVER}/mcp/tools`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tool_name: toolName, params: params })
                });
                
                if (!res.ok) {
                    resultDiv.innerHTML = `<span class="text-red-400">❌ Error: ${res.status}</span>`;
                    return;
                }
                
                const data = await res.json();
                const resultData = data.result || data;
                
                if (data.error) {
                    resultDiv.innerHTML = `<span class="text-red-400">❌ ${data.error}</span>`;
                } else {
                    resultDiv.innerHTML = renderTable(resultData, toolName);
                    renderChart(resultData, toolName);
                }
            } catch (e) {
                resultDiv.innerHTML = `<span class="text-red-400">❌ Error: ${e.message}</span>`;
            }
        }

        async function quickAction(toolName) {
            executeTool(toolName, {});
        }

        function renderTable(data, toolName) {
            if (!data) return '<span class="text-gray-500">Sin datos</span>';
            
            // Si es objeto simple (dashboard)
            if (typeof data === 'object' && !Array.isArray(data)) {
                let html = '<table class="w-full text-xs"><tbody>';
                for (const [k, v] of Object.entries(data)) {
                    html += `<tr class="border-b border-gray-700"><td class="py-1 px-2 text-blue-400">${k}</td><td1 px-2 class="py- text-gray-300">${typeof v === 'object' ? JSON.stringify(v) : v}</td></tr>`;
                }
                return html + '</tbody></table>';
            }
            
            if (!Array.isArray(data) || data.length === 0) return '<span class="text-gray-500">Sin registros</span>';
            
            // Campos importantes por tipo
            const importantFields = {
                'get_all_clients': ['razon_social', 'nit', 'ciudad', 'tipo_entidad', 'email_contacto'],
                'get_all_users': ['nombre', 'email', 'rol', 'estado'],
                'get_all_projects': ['name', 'estado', 'tipo_proyecto', 'etapa'],
                'get_all_courses': ['nombre', 'descripcion', 'estado'],
                'get_pending_tasks': ['titulo', 'estado', 'prioridad', 'fecha_limite']
            };
            
            const fields = importantFields[toolName] || Object.keys(data[0]).slice(0, 5);
            
            // Si no hay campos importantes, usar los primeros 5
            const keys = fields.filter(f => data[0].hasOwnProperty(f)).slice(0, 5);
            if (keys.length === 0) keys.push(...Object.keys(data[0]).slice(0, 5));
            
            let html = '<table class="w-full text-xs border-collapse"><thead><tr class="bg-gray-700">';
            keys.forEach(k => html += `<th class="py-1 px-2 text-left text-blue-400">${k}</th>`);
            html += '</tr></thead><tbody>';
            
            data.forEach(row => {
                html += '<tr class="border-b border-gray-700 hover:bg-gray-700">';
                keys.forEach(k => {
                    let val = row[k];
                    if (typeof val === 'object') val = JSON.stringify(val).substring(0, 30);
                    html += `<td class="py-1 px-2 text-gray-300 truncate max-w-[120px]">${val || '-'}</td>`;
                });
                html += '</tr>';
            });
            return html + '</tbody></table>';
        }

        function renderChart(data, toolName) {
            const canvas = document.getElementById('resultChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if (chartInstance) chartInstance.destroy();
            
            let config = null;
            
            // Dashboard - doughnut
            if (toolName === 'get_dashboard_stats' && data.proyectos) {
                config = {
                    type: 'doughnut',
                    data: {
                        labels: ['Proyectos', 'Usuarios', 'Cursos', 'Tareas'],
                        datasets: [{ data: [data.proyectos.total||0, data.usuarios.total||0, data.cursos.total||0, data.tareas.pendientes||0], backgroundColor: ['#3B82F6','#10B981','#F59E0B','#EF4444'] }]
                    },
                    options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: 'white', font: {size: 10} } } } }
                };
            }
            // Usuarios - pie por estado
            else if (toolName === 'get_all_users' && Array.isArray(data)) {
                const estados = {1: 'Activos', 0: 'Inactivos'};
                const counts = {};
                data.forEach(u => { const e = estados[u.estado] || 'Otro'; counts[e] = (counts[e]||0)+1; });
                config = { type: 'pie', data: { labels: Object.keys(counts), datasets: [{ data: Object.values(counts), backgroundColor: ['#10B981','#EF4444','#F59E0B'] }] }, options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: 'white', font: {size: 10} } } } } };
            }
            // Clientes - bar por ciudad
            else if (toolName === 'get_all_clients' && Array.isArray(data)) {
                const ciudades = {};
                data.forEach(c => { const ciudad = c.ciudad || 'Sin ciudad'; ciudades[ciudad] = (ciudades[ciudad]||0)+1; });
                config = { type: 'bar', data: { labels: Object.keys(ciudades).slice(0,8), datasets: [{ label: 'Clientes', data: Object.values(ciudades).slice(0,8), backgroundColor: '#6366F1' }] }, options: { responsive: true, plugins: { legend: {display:false} }, scales: { x: { ticks: {color:'white'}, grid: {color:'#374151'} }, y: { ticks: {color:'white'}, grid: {color:'#374151'} } } } };
            }
            // Proyectos
            else if (toolName === 'get_all_projects' && Array.isArray(data)) {
                const estados = {};
                data.forEach(p => { const e = p.estado || 'Sin estado'; estados[e] = (estados[e]||0)+1; });
                config = { type: 'bar', data: { labels: Object.keys(estados), datasets: [{ label: 'Proyectos', data: Object.values(estados), backgroundColor: '#3B82F6' }] }, options: { responsive: true, plugins: { legend: {display:false} }, scales: { x: { ticks: {color:'white'}, grid: {color:'#374151'} }, y: { ticks: {color:'white'}, grid: {color:'#374151'} } } } };
            }
            else if (Array.isArray(data) && data.length > 0) {
                config = { type: 'bar', data: { labels: data.slice(0,8).map(i=>(i.name||i.nombre||i.titulo||i.razon_social||'Item').substring(0,15)), datasets: [{ label: 'Registros', data: data.slice(0,8).map(()=>1), backgroundColor: '#6366F1' }] }, options: { indexAxis: 'y', responsive: true, plugins: { legend: {display:false} }, scales: { x: { ticks: {color:'white'}, grid: {color:'#374151'} }, y: { ticks: {color:'white'}, grid: {display:false} } } } };
            }
            else {
                canvas.style.display = 'none';
                return;
            }
            
            canvas.style.display = 'block';
            chartInstance = new Chart(ctx, config);
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg) return;
            
            const chat = document.getElementById('chat-messages');
            chat.innerHTML += `<div class="flex justify-end mb-1"><div class="bg-blue-600 rounded p-1.5 text-xs max-w-[80%]">${msg}</div></div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;
            
            const result = await processNaturalLanguage(msg);
            
            // Si es una acción de creación, mostrar formulario
            if (result.action) {
                chat.innerHTML += `<div class="flex justify-start mb-1"><div class="bg-gray-700 rounded p-1.5 text-xs max-w-[90%]">
                    <div class="text-yellow-400 font-bold mb-1">${result.message}</div>
                    <div class="mb-2">${getCreateForm(result.action, result.template)}</div>
                </div></div>`;
            } else {
                chat.innerHTML += `<div class="flex justify-start mb-1"><div class="bg-gray-700 rounded p-1.5 text-xs max-w-[80%]">${result.message}</div></div>`;
                chat.scrollTop = chat.scrollHeight;
                
                if (result.data) {
                    document.getElementById('result').innerHTML = renderTable(result.data, result.toolName);
                    renderChart(result.data, result.toolName);
                }
            }
        }

        function getCreateForm(action, template) {
            if (action === 'create_user') {
                return `<form onsubmit="event.preventDefault(); submitCreateForm('create_user', this)">
                    <input type="text" name="email" placeholder="Email" class="w-full mb-1 px-2 py-1 bg-gray-800 rounded text-xs" required>
                    <input type="text" name="nombre" placeholder="Nombre" class="w-full mb-1 px-2 py-1 bg-gray-800 rounded text-xs" required>
                    <input type="text" name="rol" placeholder="Rol (default: registrado)" class="w-full mb-1 px-2 py-1 bg-gray-800 rounded text-xs">
                    <button type="submit" class="bg-green-600 px-3 py-1 rounded text-xs">Crear</button>
                </form>`;
            }
            if (action === 'create_project') {
                return `<form onsubmit="event.preventDefault(); submitCreateForm('create_project', this)">
                    <input type="text" name="name" placeholder="Nombre del proyecto" class="w-full mb-1 px-2 py-1 bg-gray-800 rounded text-xs" required>
                    <input type="text" name="client_id" placeholder="Client ID" class="w-full mb-1 px-2 py-1 bg-gray-800 rounded text-xs" required>
                    <input type="text" name="tipo_proyecto" placeholder="Tipo (ej: Curso virtual)" class="w-full mb-1 px-2 py-1 bg-gray-800 rounded text-xs" required>
                    <button type="submit" class="bg-green-600 px-3 py-1 rounded text-xs">Crear</button>
                </form>`;
            }
            if (action === 'create_client') {
                return `<form onsubmit="event.preventDefault(); submitCreateForm('create_client', this)">
                    <input type="text" name="razon_social" placeholder="Razón social" class="w-full mb-1 px-2 py-1 bg-gray-800 rounded text-xs" required>
                    <input type="text" name="nit" placeholder="NIT" class="w-full mb-1 px-2 py-1 bg-gray-800 rounded text-xs">
                    <input type="text" name="ciudad" placeholder="Ciudad" class="w-full mb-1 px-2 py-1 bg-gray-800 rounded text-xs">
                    <button type="submit" class="bg-green-600 px-3 py-1 rounded text-xs">Crear</button>
                </form>`;
            }
            if (action === 'create_task') {
                return `<form onsubmit="event.preventDefault(); submitCreateForm('create_task', this)">
                    <input type="text" name="titulo" placeholder="Título" class="w-full mb-1 px-2 py-1 bg-gray-800 rounded text-xs" required>
                    <input type="number" name="project_id" placeholder="Project ID" class="w-full mb-1 px-2 py-1 bg-gray-800 rounded text-xs" required>
                    <input type="text" name="descripcion" placeholder="Descripción" class="w-full mb-1 px-2 py-1 bg-gray-800 rounded text-xs">
                    <button type="submit" class="bg-green-600 px-3 py-1 rounded text-xs">Crear</button>
                </form>`;
            }
            if (action === 'delete_user') {
                return `<form onsubmit="event.preventDefault(); submitCreateForm('delete_user', this)">
                    <input type="text" name="user_id" placeholder="User ID" class="w-full mb-1 px-2 py-1 bg-gray-800 rounded text-xs" required>
                    <button type="submit" class="bg-red-600 px-3 py-1 rounded text-xs">Eliminar</button>
                </form>`;
            }
            if (action === 'delete_project') {
                return `<form onsubmit="event.preventDefault(); submitCreateForm('delete_project', this)">
                    <input type="number" name="project_id" placeholder="Project ID" class="w-full mb-1 px-2 py-1 bg-gray-800 rounded text-xs" required>
                    <button type="submit" class="bg-red-600 px-3 py-1 rounded text-xs">Eliminar</button>
                </form>`;
            }
            return '';
        }

        async function submitCreateForm(toolName, form) {
            const formData = new FormData(form);
            const params = {};
            for (let [key, value] of formData.entries()) {
                if (value) {
                    // Convertir a número si es project_id
                    if (key === 'project_id') params[key] = parseInt(value);
                    else params[key] = value;
                }
            }
            
            try {
                const res = await fetch(`${MCP_SERVER}/mcp/tools`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tool_name: toolName, params: params })
                });
                const data = await res.json();
                const result = data.result || data;
                
                if (result.success) {
                    alert('✅ ' + result.message);
                    form.closest('.bg-gray-700').innerHTML = `<div class="text-green-400">✅ ${result.message}</div>`;
                } else {
                    alert('❌ ' + (result.error || 'Error'));
                }
            } catch (e) {
                alert('❌ Error: ' + e.message);
            }
        }

        async function processNaturalLanguage(msg) {
            const lower = msg.toLowerCase();
            
            // === COMANDOS DE CONSULTA ===
            const queryMap = [
                { p: /^(ver|mostrar|listar|dame|cuantos?)\s.*dashboard/i, t: 'get_dashboard_stats' },
                { p: /^(ver|mostrar|listar|dame|cuantos?)\s.*proyecto/i, t: 'get_all_projects' },
                { p: /^(ver|mostrar|listar|dame|cuantos?)\s.*usuario/i, t: 'get_all_users' },
                { p: /^(ver|mostrar|listar|dame|cuantos?)\s.*cliente/i, t: 'get_all_clients' },
                { p: /^(ver|mostrar|listar|dame|cuantos?)\s.*curso/i, t: 'get_all_courses' },
                { p: /^(ver|mostrar|listar|dame|cuantos?)\s.*tarea/i, t: 'get_pending_tasks' },
                { p: /dashboard|estadistica|resumen/i, t: 'get_dashboard_stats' },
                { p: /proyectos?|proyecto$/i, t: 'get_all_projects' },
                { p: /usuarios?|usuario$/i, t: 'get_all_users' },
                { p: /clientes?|cliente$/i, t: 'get_all_clients' },
                { p: /cursos?|curso$/i, t: 'get_all_courses' },
                { p: /tareas?|tarea$/i, t: 'get_pending_tasks' },
                { p: /fases/i, t: 'get_fases' },
                { p: /roles/i, t: 'get_all_roles' },
            ];
            
            for (const m of queryMap) {
                if (m.p.test(lower)) {
                    try {
                        const res = await fetch(`${MCP_SERVER}/mcp/tools`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ tool_name: m.t, params: {} })
                        });
                        const data = await res.json();
                        const r = data.result || data;
                        const count = Array.isArray(r) ? r.length : r.total || 0;
                        return { message: `Encontré ${count} registros`, data: r, toolName: m.t };
                    } catch (e) {
                        return { message: 'Error: ' + e.message, data: null };
                    }
                }
            }
            
            // === COMANDOS DE CREACIÓN ===
            if (/^(crear|nuevo|agregar)\s.*usuario/i.test(lower)) {
                return { 
                    message: 'Para crear usuario necesito: email, nombre. Ejemplo: crear usuario email:test@test.com nombre:Juan',
                    action: 'create_user',
                    template: { tool: 'create_user', params: { email: '', nombre: '', rol: 'registrado' } }
                };
            }
            if (/^(crear|nuevo|agregar)\s.*proyecto/i.test(lower)) {
                return { 
                    message: 'Para crear proyecto necesito: name, client_id, tipo_proyecto. Ejemplo: crear proyecto name:"Mi Proyecto" client_id:xxx tipo_proyecto:"Curso virtual"',
                    action: 'create_project',
                    template: { tool: 'create_project', params: { name: '', client_id: '', tipo_proyecto: '', estado: 'Planificado' } }
                };
            }
            if (/^(crear|nuevo|agregar)\s.*cliente/i.test(lower)) {
                return { 
                    message: 'Para crear cliente necesito: razon_social, nit. Ejemplo: crear cliente razon_social:"Empresa SAS" nit:123456',
                    action: 'create_client',
                    template: { tool: 'create_client', params: { razon_social: '', nit: '', tipo_entidad: 'Privada' } }
                };
            }
            if (/^(crear|nuevo|agregar)\s.*tarea/i.test(lower)) {
                return { 
                    message: 'Para crear tarea necesito: titulo, project_id, descripcion. Ejemplo: crear tarea titulo:"Tarea 1" project_id:1',
                    action: 'create_task',
                    template: { tool: 'create_task', params: { titulo: '', project_id: 1, descripcion: '', prioridad: 'media' } }
                };
            }
            
            // === COMANDOS DE ELIMINAR ===
            if (/^(eliminar|borrar|delete)\s.*usuario/i.test(lower)) {
                return { 
                    message: 'Para eliminar usuario necesito el user_id. Ejemplo: eliminar usuario user_id:xxx',
                    action: 'delete_user',
                    template: { tool: 'delete_user', params: { user_id: '' } }
                };
            }
            if (/^(eliminar|borrar|delete)\s.*proyecto/i.test(lower)) {
                return { 
                    message: 'Para eliminar proyecto necesito el project_id. Ejemplo: eliminar proyecto project_id:5',
                    action: 'delete_project',
                    template: { tool: 'delete_project', params: { project_id: 0 } }
                };
            }
            
            return { message: 'Prueba: "crear usuario", "ver proyectos", "dashboard", "clientes", etc.', data: null };
        }

        function quickChat(text) {
            document.getElementById('chat-input').value = text;
            sendMessage();
        }

        testConnection();
    </script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const path = window.location.pathname;
    const isSuperadmin = path.includes('/r/superadmin/');
    const isAdmin = path.includes('/r/admin/');
    const isCoordinador = path.includes('/r/coordinador/');
    const isCliente = path.includes('/r/cliente/');
    const isDisInst = path.includes('/r/disenador-instruccional/');
    const isAutor = path.includes('/r/autor/');
    const isRevisor = path.includes('/r/revisor-qa/');
    const isEditor = path.includes('/r/editor/');
    const isDesaMult = path.includes('/r/desarrollador-multimedia/');
    const isAbogado = path.includes('/r/abogado/');
    const isDisGraf = path.includes('/r/disenador-grafico/');
    const isAnim2d = path.includes('/r/animador-2d/');
    const isAnim3d = path.includes('/r/animador-3d/');
    const isVideo = path.includes('/r/video/');
    const isCorrector = path.includes('/r/corrector-de-estilo/');
    const isIngeniero = path.includes('/r/ingeniero-lms/');
    const isRegistrado = path.includes('/r/registrado/');

    const allowedRoles = [];
    if (isSuperadmin) allowedRoles.push('superadmin');
    if (isAdmin) allowedRoles.push('admin');
    if (isCoordinador) allowedRoles.push('coordinador');
    if (isCliente) allowedRoles.push('cliente');
    if (isDisInst) allowedRoles.push('disenador-instruccional');
    if (isAutor) allowedRoles.push('autor');
    if (isRevisor) allowedRoles.push('revisor-qa');
    if (isEditor) allowedRoles.push('editor');
    if (isDesaMult) allowedRoles.push('desarrollador-multimedia');
    if (isAbogado) allowedRoles.push('abogado');
    if (isDisGraf) allowedRoles.push('disenador-grafico');
    if (isAnim2d) allowedRoles.push('animador-2d');
    if (isAnim3d) allowedRoles.push('animador-3d');
    if (isVideo) allowedRoles.push('video');
    if (isCorrector) allowedRoles.push('corrector-de-estilo');
    if (isIngeniero) allowedRoles.push('ingeniero-lms');
    if (isRegistrado) allowedRoles.push('registrado');

    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/';
        return;
    }
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const userRoles = payload.roles || [payload.role].filter(Boolean);
        if (!userRoles.some(r => allowedRoles.includes(r))) {
            window.location.href = '/';
            return;
        }
    } catch(e) {
        window.location.href = '/';
    }
});
</script>

<script>
// ==================== VERIFICACIÓN DE PERMISOS DE MENÚ ====================
(function() {
    const token = localStorage.getItem('token');
    if (!token) return;
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const permissions = payload.permissions || [];
        
        const hasPermission = (perm) => permissions.includes(perm);
        const hasAnyPermission = (perms) => perms.some(p => permissions.includes(p));
        
        const menuPermissions = {
            'menu-proyectos': ['proyectos_crear', 'proyectos_consultar'],
            'menu-crear-proyecto': ['proyectos_crear'],
            'menu-entidades': ['autor_crear', 'diseno_instruccional_crear'],

            'menu-clientes': ['usuarios_crear'],
            'menu-crm': ['usuarios_crear'],

            'menu-drive': ['archivos_drive_personal_ver', 'archivos_drive_global_ver'],
            'menu-ia': ['ia_produccion_imagen', 'ia_produccion_audio', 'ia_linguistica_usar'],
            'menu-canvas': ['herramientas_canvas_usar'],
            'menu-powerpoint': ['herramientas_powerpoint_usar'],
            'menu-auditoria': ['seguridad_auditoria_ver'],
            'menu-bitacora': ['seguridad_bitacora_usuarios_ver'],

            'menu-metricas': ['reportes_metricas_ver'],
            'menu-diseno-instruccional': ['diseno_instruccional_ver', 'diseno_instruccional_crear'],
            'menu-autor-contenido': ['autor_ver', 'autor_crear'],
            'menu-microcursos': ['capacitacion_microcursos_ver'],
            'menu-tutoriales': ['capacitacion_tutoriales_ver'],
            'menu-faq': ['capacitacion_faq_ver'],
        };
        
        Object.entries(menuPermissions).forEach(([id, required]) => {
            const el = document.getElementById(id);
            if (el && !hasAnyPermission(required)) {
                el.style.display = 'none';
            }
        });
    } catch(e) {}
})();
</script>
