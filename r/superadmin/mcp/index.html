<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP - Asistente IA VirtualMind</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/fetch-con-token.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .chat-messages { max-height: 250px; overflow-y: auto; }
        .typing-indicator span { animation: bounce 1.4s infinite ease-in-out both; }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="container mx-auto px-4 py-4">
        <div class="flex items-center justify-between mb-4">
            <div>
                <h1 class="text-2xl font-bold text-blue-400">🤖 MCP VirtualMind con Gemini</h1>
                <p class="text-gray-400 text-sm">Asistente de IA (Gemini 2.5 Flash)</p>
            </div>
            <div class="flex gap-2">
                <button onclick="testConnection()" class="bg-green-600 hover:bg-green-700 px-3 py-1.5 rounded text-sm">🔄 Conectar</button>
            </div>
        </div>

        <div id="status" class="bg-gray-800 rounded-lg p-2 mb-3 flex items-center gap-2 text-sm">
            <span id="status-icon">⏳</span>
            <span id="status-text">Conectando...</span>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-3">
            <div class="lg:col-span-3 bg-gray-800 rounded-lg p-3">
                <h2 class="text-base font-semibold mb-2">💬 Agente IA</h2>
                <div id="chat-messages" class="chat-messages bg-gray-900 rounded p-2 mb-2 min-h-[250px] text-sm"></div>
                <div class="flex gap-1 mb-2">
                    <input type="text" id="chat-input" placeholder="Ej: Crea un proyecto llamado Alpha..." 
                        class="flex-1 bg-gray-700 rounded px-2 py-1 text-sm focus:outline-none"
                        onkeypress="if(event.key==='Enter')sendMessage()">
                    <button onclick="sendMessage()" class="bg-blue-600 px-3 py-1 rounded">➤</button>
                    <button id="mic-btn" onclick="toggleVoiceInput()" class="bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded" title="Grabar con voz">🎤</button>
                </div>
                <div class="flex flex-wrap gap-1">
                    <button onclick="quickChat('Dame un resumen del dashboard')" class="text-xs bg-gray-700 px-1.5 py-0.5 rounded hover:bg-gray-600">Dashboard</button>
                    <button onclick="quickChat('Crea un nuevo usuario con correo admin@test.com y nombre Admin')" class="text-xs bg-gray-700 px-1.5 py-0.5 rounded hover:bg-gray-600">Crear Usuario</button>
                    <button onclick="quickChat('Muéstrame todos los clientes')" class="text-xs bg-gray-700 px-1.5 py-0.5 rounded hover:bg-gray-600">Ver Clientes</button>
                </div>
            </div>

            <div class="lg:col-span-6 space-y-3">
                <div class="bg-gray-800 rounded-lg p-3">
                    <h2 class="text-base font-semibold mb-2">📊 Resultados de Base de Datos</h2>
                    <div id="result" class="bg-gray-900 rounded p-2 min-h-[200px] max-h-[350px] overflow-auto text-xs">
                        <span class="text-gray-500">Pídele a la IA que consulte o cree información...</span>
                    </div>
                </div>
                <div class="bg-gray-800 rounded-lg p-3">
                    <h2 class="text-base font-semibold mb-2">📈 Gráfico Analítico</h2>
                    <canvas id="resultChart" height="120"></canvas>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-3">
                <div class="bg-gray-800 rounded-lg p-3">
                    <h2 class="text-base font-semibold mb-2">📋 Tools Entendidas por la IA</h2>
                    <input type="text" id="search-tools" placeholder="Buscar herramienta..." 
                        class="w-full bg-gray-700 rounded px-2 py-1 mb-2 text-sm" oninput="filterTools()">
                    <div id="tools-list" class="space-y-1 max-h-[400px] overflow-y-auto text-xs"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const MCP_SERVER = 'https://gestordecursos.pegui.edu.co/mcp/gemini';
        const API_URL = 'https://gestordecursos.pegui.edu.co:8000';
        let geminiApiKeys = [];
        let _gemini_key_index = 0;
        function getApiKey() {
            if (!geminiApiKeys.length) return '';
            const key = geminiApiKeys[_gemini_key_index % geminiApiKeys.length];
            _gemini_key_index++;
            return key;
        }
        
        let tools = [];
        let geminiFormattedTools = [];
        let chartInstance = null;
        let chatHistory = []; // Para mantener el contexto de la conversación

        // Inicializar UI
        document.getElementById('chat-messages').innerHTML = `
            <div class="flex justify-start mb-2"><div class="bg-blue-900 rounded p-2 max-w-[90%] text-gray-200">
                <p class="text-xs font-bold mb-1">¡Hola! Soy la IA de VirtualMind.</p>
                <p class="text-xs">Uso Gemini 2.5 Flash y estoy conectada a tu base de datos. Puedes decirme:</p>
                <ul class="text-xs mt-1 list-disc ml-4 text-gray-300">
                    <li>"Crea un proyecto llamado Web con el cliente 123"</li>
                    <li>"¿Cuáles son las tareas pendientes?"</li>
                    <li>"Crea un usuario con email test@test.com"</li>
                </ul>
            </div></div>`;

        async function loadConfig() {
            try {
                const res = await fetch(`${MCP_SERVER}/config`);
                const data = await res.json();
                geminiApiKeys = data.gemini_api_keys || [];
            } catch (e) {
                console.error('Error cargando config:', e);
            }
        }

        async function testConnection() {
            try {
                document.getElementById('status-icon').textContent = '⏳';
                document.getElementById('status-text').textContent = 'Conectando a MCP...';
                
                const res = await fetch(`${MCP_SERVER}/health`);
                const data = await res.json();
                
                document.getElementById('status-icon').textContent = '✅';
                document.getElementById('status-text').textContent = `Servidor MCP Activo`;
                document.getElementById('status').className = 'bg-green-900 rounded-lg p-2 mb-3 flex items-center gap-2 text-sm';
                
                await Promise.all([loadConfig(), loadTools()]);
            } catch (e) {
                document.getElementById('status-icon').textContent = '❌';
                document.getElementById('status-text').textContent = 'Error al conectar al servidor MCP';
                document.getElementById('status').className = 'bg-red-900 rounded-lg p-2 mb-3 flex items-center gap-2 text-sm';
            }
        }

        async function loadTools() {
            try {
                const res = await fetch(`${MCP_SERVER}/tools`);
                const data = await res.json();
                tools = data.tools || [];
                renderTools(tools);
                
                // Mapear herramientas al estándar Open API que requiere Gemini
                geminiFormattedTools = formatToolsForGemini(tools);
            } catch (e) { 
                console.error('Error cargando tools:', e); 
            }
        }

        // === CONVERSOR DE ESQUEMAS: DE TU FORMATO AL FORMATO GEMINI ===
        function formatToolsForGemini(mcpTools) {
            const functionDeclarations = mcpTools.map(tool => {
                const properties = {};
                const required = [];
                
                if (tool.params) {
                    for (const [key, val] of Object.entries(tool.params)) {
                        let type = "STRING";
                        if (val.type === "integer" || val.type === "number") type = "INTEGER";
                        if (val.type === "boolean") type = "BOOLEAN";
                        
                        properties[key] = { 
                            type: type, 
                            description: val.description || `Parámetro ${key}` 
                        };
                        
                        if (val.required) required.push(key);
                    }
                }

                return {
                    name: tool.name,
                    description: tool.description || `Ejecuta la acción ${tool.name} en el sistema.`,
                    parameters: {
                        type: "OBJECT",
                        properties: properties,
                        required: required
                    }
                };
            });

            return [{ functionDeclarations: functionDeclarations }];
        }

        function renderTools(toolsToRender) {
            const container = document.getElementById('tools-list');
            container.innerHTML = toolsToRender.map(tool => 
                `<div class="w-full text-left p-1.5 rounded bg-gray-700 mb-1 border-l-2 border-blue-500">
                    <div class="font-bold text-blue-400">${tool.name}</div>
                    <div class="text-gray-400 text-[10px] truncate">${tool.description || ''}</div>
                </div>`
            ).join('');
        }

        function filterTools() {
            const query = document.getElementById('search-tools').value.toLowerCase();
            renderTools(tools.filter(t => t.name.toLowerCase().includes(query)));
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg) return;
            
            const chat = document.getElementById('chat-messages');
            
            // Mensaje del usuario
            chat.innerHTML += `<div class="flex justify-end mb-2"><div class="bg-blue-600 rounded-xl rounded-tr-none p-2 text-xs max-w-[85%] text-white shadow-md">${msg}</div></div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;
            
            // Indicador de escritura
            const typingId = 'typing-' + Date.now();
            chat.innerHTML += `<div id="${typingId}" class="flex justify-start mb-2"><div class="bg-gray-700 rounded-xl rounded-tl-none p-2 text-xs text-gray-400">🧠 Gemini analizando...</div></div>`;
            chat.scrollTop = chat.scrollHeight;

            // Procesar con IA Real
            const result = await processWithGemini(msg);
            
            // Remover indicador de escritura
            document.getElementById(typingId).remove();
            
            // Respuesta del modelo
            chat.innerHTML += `<div class="flex justify-start mb-2"><div class="bg-gray-700 border border-gray-600 rounded-xl rounded-tl-none p-2 text-xs max-w-[95%] text-gray-200 shadow-md">${result.message}</div></div>`;
            chat.scrollTop = chat.scrollHeight;
            
            // Actualizar tablas si hay datos
            if (result.data) {
                document.getElementById('result').innerHTML = renderTable(result.data, result.toolName);
                renderChart(result.data, result.toolName);
            }
        }

        // === EL CORAZÓN DE LA IA: LLAMADA A GEMINI CON FUNCTION CALLING ===
        async function processWithGemini(userText) {
            const resultDiv = document.getElementById('result');
            
            try {
                // Guardamos el mensaje en el historial
                chatHistory.push({ role: "user", parts: [{ text: userText }] });

                const payload = {
                    systemInstruction: {
                        parts: [{ text: "Eres el asistente inteligente del software VirtualMind. Tienes acceso a la base de datos a través de herramientas (tools). Tu obligación absoluta es usar las herramientas provistas para responder. Si el usuario pide crear, actualizar o eliminar un recurso, DEBES invocar la herramienta correspondiente extrayendo los datos de su instrucción. Si faltan datos obligatorios, inventa un valor razonable o usa los defaults. Responde de forma muy corta, directa y profesional." }]
                    },
                    contents: chatHistory,
                    tools: geminiFormattedTools
                };

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${getApiKey()}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                
                if (!data.candidates || data.candidates.length === 0) {
                    throw new Error("La IA no generó respuesta.");
                }

                const responsePart = data.candidates[0].content.parts[0];

                // Verificamos si Gemini decidió usar una de tus Tools
                if (responsePart.functionCall) {
                    const toolName = responsePart.functionCall.name;
                    const args = responsePart.functionCall.args || {};
                    
                    resultDiv.innerHTML = `<span class="text-blue-400 animate-pulse">⚙️ La IA está ejecutando <b>${toolName}</b> en el servidor MCP...</span><br><span class="text-gray-500 text-[10px]">Payload: ${JSON.stringify(args)}</span>`;
                    
                    // LLAMADA REAL AL SERVIDOR MCP (.NET / PYTHON)
                    const mcpRes = await fetch(`${MCP_SERVER}/mcp/tools`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ tool_name: toolName, params: args })
                    });
                    
                    const mcpData = await mcpRes.json();
                    const mcpResult = mcpData.result || mcpData;
                    
                    // Guardamos la decisión en el historial
                    chatHistory.push({ role: "model", parts: [{ functionCall: responsePart.functionCall }] });
                    // Enviamos el resultado de la función a Gemini
                    chatHistory.push({ role: "user", parts: [{ functionResponse: { name: toolName, response: { result: mcpResult } } }] });
                    
                    // Llamamos a Gemini otra vez para que procese el resultado y dé respuesta natural
                    const payload2 = {
                        contents: chatHistory,
                        tools: geminiFormattedTools
                    };
                    const response2 = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${getApiKey()}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload2)
                    });
                    const data2 = await response2.json();
                    
                    let respuesta = '';
                    if (data2.candidates && data2.candidates.length > 0) {
                        const part = data2.candidates[0].content.parts[0];
                        if (part.text) {
                            respuesta = part.text;
                            chatHistory.push({ role: "model", parts: [{ text: part.text }] });
                        } else if (part.functionCall) {
                            respuesta = `✅ Operación completada en la base de datos.`;
                        }
                    }
                    
                    const isWrite = toolName.includes('create_') || toolName.includes('update_') || toolName.includes('delete_');
                    if (isWrite) {
                        resultDiv.innerHTML = `<div class="p-3 bg-green-900/30 border border-green-700 text-green-400 rounded">✔️ Éxito: ${JSON.stringify(mcpResult)}</div>`;
                    }
                    return { message: respuesta || `✅ Operación <code>${toolName}</code> ejecutada.`, data: isWrite ? null : mcpResult, toolName: toolName };

                } else if (responsePart.text) {
                    // Si Gemini solo responde texto normal (ej. saludando o pidiendo clarificación)
                    chatHistory.push({ role: "model", parts: [{ text: responsePart.text }] });
                    return { message: responsePart.text, data: null };
                }

            } catch (e) {
                console.error(e);
                return { message: `<span class="text-red-400">Error de comunicación con Gemini: ${e.message}</span>`, data: null };
            }
        }

        function quickChat(text) {
            document.getElementById('chat-input').value = text;
            sendMessage();
        }

        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;

        async function toggleVoiceInput() {
            if (isRecording) {
                mediaRecorder.stop();
                return;
            }
            
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert('Tu navegador no soporta grabación de voz.');
                return;
            }
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                audioChunks = [];
                isRecording = true;
                document.getElementById('mic-btn').textContent = '🔴';
                
                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };
                
                mediaRecorder.onstop = async () => {
                    stream.getTracks().forEach(t => t.stop());
                    isRecording = false;
                    document.getElementById('mic-btn').textContent = '🎤';
                    
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    if (blob.size < 100) return;
                    
                    const chat = document.getElementById('chat-messages');
                    chat.innerHTML += `<div class="flex justify-start mb-2"><div class="bg-gray-700 rounded-xl rounded-tl-none p-2 text-xs text-gray-400">🎤 Transcribiendo audio...</div></div>`;
                    chat.scrollTop = chat.scrollHeight;
                    
                    const formData = new FormData();
                    formData.append('audio', blob, 'grabacion.webm');
                    
                    try {
                        const res = await fetch(`${API_URL}/whisper/transcribir`, {
                            method: 'POST',
                            headers: { 'Authorization': 'Bearer ' + getToken() },
                            body: formData
                        });
                        const data = await res.json();
                        chat.removeChild(chat.lastElementChild);
                        
                        if (data.texto) {
                            document.getElementById('chat-input').value = data.texto;
                            sendMessage();
                        }
                    } catch (e) {
                        chat.removeChild(chat.lastElementChild);
                        console.error('Error transcribiendo:', e);
                    }
                };
                
                mediaRecorder.start();
                setTimeout(() => {
                    if (isRecording) mediaRecorder.stop();
                }, 10000);
            } catch (e) {
                isRecording = false;
                document.getElementById('mic-btn').textContent = '🎤';
                alert('Error al acceder al micrófono: ' + e.message);
            }
        }

        // === RENDERIZADO DE TABLAS Y GRÁFICOS (Se mantiene intacto) ===
        function renderTable(data, toolName) {
            if (!data) return '<span class="text-gray-500">Sin datos</span>';
            
            if (typeof data === 'object' && !Array.isArray(data)) {
                let html = '<table class="w-full text-xs"><tbody>';
                for (const [k, v] of Object.entries(data)) {
                    html += `<tr class="border-b border-gray-700 hover:bg-gray-800"><td class="py-1.5 px-2 text-blue-400 font-medium capitalize">${k.replace(/_/g, ' ')}</td><td class="py-1.5 px-2 text-gray-300">${typeof v === 'object' ? JSON.stringify(v) : v}</td></tr>`;
                }
                return html + '</tbody></table>';
            }
            
            if (!Array.isArray(data) || data.length === 0) return '<span class="text-gray-500">Consulta exitosa, pero no hay registros para mostrar.</span>';
            
            const importantFields = {
                'get_all_clients': ['razon_social', 'nit', 'ciudad', 'tipo_entidad'],
                'get_all_users': ['nombre', 'email', 'rol', 'estado'],
                'get_all_projects': ['name', 'estado', 'tipo_proyecto', 'etapa'],
                'get_pending_tasks': ['titulo', 'estado', 'prioridad']
            };
            
            const fields = importantFields[toolName] || Object.keys(data[0]).slice(0, 5);
            const keys = fields.filter(f => data[0].hasOwnProperty(f)).slice(0, 5);
            if (keys.length === 0) keys.push(...Object.keys(data[0]).slice(0, 5));
            
            let html = '<div class="overflow-x-auto"><table class="w-full text-xs border-collapse"><thead><tr class="bg-gray-700/50">';
            keys.forEach(k => html += `<th class="py-2 px-2 text-left text-blue-400 uppercase tracking-wider text-[10px]">${k.replace(/_/g, ' ')}</th>`);
            html += '</tr></thead><tbody>';
            
            data.forEach(row => {
                html += '<tr class="border-b border-gray-700/50 hover:bg-gray-700/80 transition-colors">';
                keys.forEach(k => {
                    let val = row[k];
                    if (typeof val === 'object') val = JSON.stringify(val).substring(0, 20) + '...';
                    html += `<td class="py-2 px-2 text-gray-300 truncate max-w-[150px]">${val || '-'}</td>`;
                });
                html += '</tr>';
            });
            return html + '</tbody></table></div>';
        }

        function renderChart(data, toolName) {
            const canvas = document.getElementById('resultChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if (chartInstance) chartInstance.destroy();
            
            let config = null;
            
            if (toolName === 'get_dashboard_stats' && data.proyectos) {
                config = { type: 'doughnut', data: { labels: ['Proyectos', 'Usuarios', 'Cursos', 'Tareas'], datasets: [{ data: [data.proyectos.total||0, data.usuarios.total||0, data.cursos.total||0, data.tareas.pendientes||0], backgroundColor: ['#3B82F6','#10B981','#F59E0B','#EF4444'], borderWidth: 0 }] }, options: { maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#9CA3AF', font: {size: 10}, boxWidth: 12 } } }, cutout: '70%' } };
            } else if (toolName === 'get_all_users' && Array.isArray(data)) {
                const estados = {1: 'Activos', 0: 'Inactivos'}; const counts = {}; data.forEach(u => { const e = estados[u.estado] || 'Otro'; counts[e] = (counts[e]||0)+1; });
                config = { type: 'pie', data: { labels: Object.keys(counts), datasets: [{ data: Object.values(counts), backgroundColor: ['#10B981','#EF4444','#F59E0B'], borderWidth: 0 }] }, options: { maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#9CA3AF', font: {size: 10}, boxWidth: 12 } } } } };
            } else if (toolName === 'get_all_projects' && Array.isArray(data)) {
                const estados = {}; data.forEach(p => { const e = p.estado || 'N/A'; estados[e] = (estados[e]||0)+1; });
                config = { type: 'bar', data: { labels: Object.keys(estados), datasets: [{ label: 'Proyectos', data: Object.values(estados), backgroundColor: '#3B82F6', borderRadius: 4 }] }, options: { maintainAspectRatio: false, plugins: { legend: {display:false} }, scales: { x: { ticks: {color:'#9CA3AF', font: {size: 9}}, grid: {display:false} }, y: { ticks: {color:'#9CA3AF', font: {size: 9}}, grid: {color:'#374151', borderDash: [2, 4]} } } } };
            } else {
                canvas.style.display = 'none';
                return;
            }
            
            canvas.style.display = 'block';
            chartInstance = new Chart(ctx, config);
        }

        // Iniciar
        testConnection();
    </script>
<script src="/js/roles.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const path = window.location.pathname;
    const isSuperadmin = path.includes('/r/superadmin/');
    const isAdmin = path.includes('/r/admin/');
    const isCoordinador = path.includes('/r/coordinador/');
    const isCliente = path.includes('/r/cliente/');
    const isDisInst = path.includes('/r/disenador-instruccional/');
    const isAutor = path.includes('/r/autor/');
    const isRevisor = path.includes('/r/revisor-qa/');
    const isEditor = path.includes('/r/editor/');
    const isDesaMult = path.includes('/r/desarrollador-multimedia/');
    const isAbogado = path.includes('/r/abogado/');
    const isDisGraf = path.includes('/r/disenador-grafico/');
    const isAnim2d = path.includes('/r/animador-2d/');
    const isAnim3d = path.includes('/r/animador-3d/');
    const isVideo = path.includes('/r/video/');
    const isCorrector = path.includes('/r/corrector-de-estilo/');
    const isIngeniero = path.includes('/r/ingeniero-lms/');
    const isRegistrado = path.includes('/r/registrado/');

    const allowedRoles = [];
    if (isSuperadmin) allowedRoles.push('superadmin');
    if (isAdmin) allowedRoles.push('admin');
    if (isCoordinador) allowedRoles.push('coordinador');
    if (isCliente) allowedRoles.push('cliente');
    if (isDisInst) allowedRoles.push('disenador-instruccional');
    if (isAutor) allowedRoles.push('autor');
    if (isRevisor) allowedRoles.push('revisor-qa');
    if (isEditor) allowedRoles.push('editor');
    if (isDesaMult) allowedRoles.push('desarrollador-multimedia');
    if (isAbogado) allowedRoles.push('abogado');
    if (isDisGraf) allowedRoles.push('disenador-grafico');
    if (isAnim2d) allowedRoles.push('animador-2d');
    if (isAnim3d) allowedRoles.push('animador-3d');
    if (isVideo) allowedRoles.push('video');
    if (isCorrector) allowedRoles.push('corrector-de-estilo');
    if (isIngeniero) allowedRoles.push('ingeniero-lms');
    if (isRegistrado) allowedRoles.push('registrado');

    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/';
        return;
    }
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const userRoles = payload.roles || [payload.role].filter(Boolean);
        if (!userRoles.some(r => allowedRoles.includes(r))) {
            window.location.href = '/';
            return;
        }
    } catch(e) {
        window.location.href = '/';
    }
});
</script>

<script>

    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
