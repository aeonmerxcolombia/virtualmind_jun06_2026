<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca de Documentos - VirtualMind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="/js/fetch-con-token.js"></script>
</head>
<body class="bg-red-500 min-h-screen">
    <div class="max-w-7xl mx-auto px-4 py-6">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">📚 Biblioteca de Documentos</h1>
                <p class="text-slate-500 text-sm mt-1">Documentos aprobados con control de acceso</p>
            </div>
            <div class="flex gap-2">
                <button onclick="mostrarSolicitudes()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium transition shadow-sm">
                    <i class="fas fa-inbox mr-1"></i> Solicitudes
                </button>
                <button onclick="mostrarPermisosGlobal()" class="bg-white hover:bg-slate-100 text-slate-700 px-4 py-2 rounded-lg font-medium border-2 border-slate-300 transition shadow-sm">
                    <i class="fas fa-lock mr-1"></i> Permisos
                </button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-md border-2 border-slate-200 p-4 mb-6">
            <div class="flex gap-4">
                <input type="text" id="searchInput" placeholder="Buscar documentos..." 
                    class="flex-1 border-2 border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-white text-slate-800"
                    onkeyup="cargarDocumentos()">
                <select id="tipoFilter" class="border-2 border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none bg-white text-slate-700" onchange="cargarDocumentos()">
                    <option value="">Todos los tipos</option>
                    <option value="docx">Word</option>
                    <option value="xlsx">Excel</option>
                    <option value="pptx">PowerPoint</option>
                    <option value="pdf">PDF</option>
                </select>
            </div>
        </div>

        <div id="loading" class="text-center py-12">
            <div class="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
            <p class="text-slate-500 mt-2">Cargando documentos...</p>
        </div>

        <div id="emptyState" class="hidden text-center py-12 bg-white rounded-xl border-2 border-slate-200">
            <i class="fas fa-book-open text-5xl text-slate-300 mb-4"></i>
            <h3 class="text-lg font-medium text-slate-700">No hay documentos en la biblioteca</h3>
            <p class="text-slate-500 mt-1">Los documentos aprobados aparecerán aquí automáticamente</p>
        </div>

        <div id="documentosGrid" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </div>

    <!-- Modal Detalle -->
    <div id="modalDetalle" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto p-6 border border-slate-200">
            <div id="detalleContent"></div>
        </div>
    </div>

    <!-- Modal Solicitudes -->
    <div id="modalSolicitudes" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg max-h-[90vh] overflow-y-auto p-6 border border-slate-200">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-slate-800">📥 Solicitudes de Acceso</h2>
                <button onclick="cerrarModal('modalSolicitudes')" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div id="solicitudesList"></div>
        </div>
    </div>

    <!-- Modal Permisos Globales -->
    <div id="modalPermisosGlobal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-3xl max-h-[90vh] overflow-y-auto p-6 border border-slate-200">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-slate-800">🔑 Permisos Globales</h2>
                <button onclick="cerrarModal('modalPermisosGlobal')" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div id="permisosGlobalContent">
                <div class="text-center py-8">
                    <div class="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
                    <p class="text-slate-500 mt-2">Cargando permisos...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://gestordecursos.pegui.edu.co:8000";

        function getToken() { return localStorage.getItem('token'); }
        function headers() {
            const t = getToken();
            return t ? { 'Authorization': `Bearer ${t}` } : {};
        }

        async function cargarDocumentos() {
            const q = document.getElementById('searchInput').value;
            const tipo = document.getElementById('tipoFilter').value;
            let url = `${API}/biblioteca/?q=${encodeURIComponent(q)}`;
            if (tipo) url += `&tipo=${tipo}`;

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('documentosGrid').classList.add('hidden');
            document.getElementById('emptyState').classList.add('hidden');

            try {
                const res = await fetch(url, { headers: headers() });
                if (!res.ok) throw new Error('Error');
                const docs = await res.json();
                document.getElementById('loading').classList.add('hidden');
                if (docs.length === 0) {
                    document.getElementById('emptyState').classList.remove('hidden');
                    return;
                }
                document.getElementById('documentosGrid').classList.remove('hidden');
                const grid = document.getElementById('documentosGrid');
                grid.innerHTML = docs.map(doc => crearCard(doc)).join('');
            } catch (e) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('documentosGrid').innerHTML = '<div class="col-span-3 text-center text-red-600 py-8">Error al cargar documentos</div>';
                document.getElementById('documentosGrid').classList.remove('hidden');
            }
        }

        function crearCard(doc) {
            const iconos = { 'docx': 'fa-file-word', 'xlsx': 'fa-file-excel', 'pptx': 'fa-file-powerpoint', 'pdf': 'fa-file-pdf' };
            const icono = iconos[doc.tipo] || 'fa-file';
            const colores = { 'docx': 'text-blue-600', 'xlsx': 'text-green-600', 'pptx': 'text-orange-600', 'pdf': 'text-red-600' };
            const color = colores[doc.tipo] || 'text-slate-600';

            return `
                <div class="bg-white rounded-xl border-2 border-slate-200 p-4 hover:shadow-lg hover:border-indigo-300 transition cursor-pointer" onclick="verDetalle(${doc.id})">
                    <div class="flex items-start gap-3">
                        <div class="text-3xl ${color}"><i class="fas ${icono}"></i></div>
                        <div class="flex-1 min-w-0">
                            <h3 class="font-semibold text-slate-800 truncate">${doc.nombre}</h3>
                            <p class="text-xs text-slate-500 mt-1">${doc.usuario_nombre || 'Autor desconocido'} · v${doc.version}</p>
                            <p class="text-xs text-slate-400 mt-1">${doc.proyecto_nombre || 'Sin proyecto'}</p>
                            ${doc.nota_bibliografica ? `<p class="text-xs text-indigo-600 mt-2 italic truncate">📝 ${doc.nota_bibliografica}</p>` : ''}
                        </div>
                    </div>
                    <div class="flex items-center gap-2 mt-3 pt-3 border-t border-slate-200">
                        <a href="${API}/biblioteca/archivo/${doc.filename}" target="_blank" class="text-xs text-indigo-600 font-semibold hover:text-indigo-800"><i class="fas fa-download mr-1"></i>Descargar</a>
                        <span class="text-slate-300">|</span>
                        <span class="text-xs text-slate-400">${doc.fecha_ingreso ? doc.fecha_ingreso.split('T')[0] : ''}</span>
                    </div>
                </div>
            `;
        }

        async function verDetalle(docId) {
            try {
                const res = await fetch(`${API}/biblioteca/${docId}`, { headers: headers() });
                const doc = await res.json();
                const permisosRes = await fetch(`${API}/biblioteca/${docId}/permisos`, { headers: headers() });
                const permisos = permisosRes.ok ? await permisosRes.json() : [];

                document.getElementById('detalleContent').innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-2xl font-bold text-slate-800">${doc.nombre}</h2>
                        <button onclick="cerrarModal('modalDetalle')" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times text-xl"></i></button>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div><label class="text-xs text-slate-500 font-semibold">Versión</label><p class="font-medium text-slate-800">${doc.version}</p></div>
                        <div><label class="text-xs text-slate-500 font-semibold">Tipo</label><p class="font-medium text-slate-800">${doc.tipo}</p></div>
                        <div><label class="text-xs text-slate-500 font-semibold">Autor</label><p class="font-medium text-slate-800">${doc.usuario_nombre || 'Desconocido'}</p></div>
                        <div><label class="text-xs text-slate-500 font-semibold">Proyecto</label><p class="font-medium text-slate-800">${doc.proyecto_nombre || 'Sin proyecto'}</p></div>
                        <div><label class="text-xs text-slate-500 font-semibold">Ingreso</label><p class="font-medium text-slate-800">${doc.fecha_ingreso ? doc.fecha_ingreso.split('T')[0] : ''}</p></div>
                    </div>
                    <div class="mb-4">
                        <label class="text-xs text-slate-500 font-semibold">📝 Nota Bibliográfica</label>
                        <div class="bg-indigo-50 border-2 border-indigo-200 rounded-lg p-3 mt-1">
                            <p class="text-sm text-indigo-800 italic">${doc.nota_bibliografica || 'Sin nota bibliográfica'}</p>
                        </div>
                        <button onclick="regenerarNota(${doc.id})" class="text-xs text-indigo-600 font-semibold hover:text-indigo-800 mt-1">🔄 Regenerar con IA</button>
                    </div>
                    <div class="mb-4">
                        <label class="text-xs text-slate-500 font-semibold">🔑 Permisos de Acceso</label>
                        <div class="mt-1 space-y-1">
                            ${permisos.map(p => `                            <span class="inline-flex items-center gap-1 bg-indigo-50 border-2 border-indigo-200 rounded-full px-3 py-1 text-xs font-medium text-indigo-700"><i class="fas fa-user"></i> ${p.usuario_id || p.rol} · ${p.permiso}</span>
                                ${p.id ? `<i class="fas fa-times cursor-pointer hover:text-red-600 text-xs ml-1" onclick="eliminarPermisoDetalle(${doc.id}, ${p.id})"></i>` : ''}`).join('') || '<p class="text-xs text-slate-400">Sin permisos adicionales</p>'}
                        </div>
                        <div class="mt-2 flex gap-2">
                            <input type="text" id="permUserInput" placeholder="User ID" class="border-2 border-slate-300 rounded px-2 py-1 text-xs w-32 bg-white text-slate-800">
                            <input type="text" id="permRolInput" placeholder="Rol" class="border-2 border-slate-300 rounded px-2 py-1 text-xs w-32 bg-white text-slate-800">
                            <select id="permTipoInput" class="border-2 border-slate-300 rounded px-2 py-1 text-xs bg-white text-slate-700">
                                <option value="lectura">Lectura</option>
                                <option value="escritura">Escritura</option>
                            </select>
                            <button onclick="asignarPermiso(${doc.id})" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1 rounded text-xs font-semibold shadow-sm"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>
                    <div class="flex gap-2 mt-4 pt-4 border-t-2 border-slate-200">
                        <a href="${API}/biblioteca/archivo/${doc.filename}" target="_blank" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-semibold shadow-sm"><i class="fas fa-download mr-1"></i>Descargar</a>
                        <button onclick="solicitarAccesoModal(${doc.id})" class="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-lg text-sm font-semibold shadow-sm"><i class="fas fa-key mr-1"></i>Solicitar Acceso</button>
                    </div>
                `;
                document.getElementById('modalDetalle').classList.remove('hidden');
            } catch(e) {
                alert('Error al cargar detalle');
            }
        }

        async function regenerarNota(docId) {
            try {
                const res = await fetch(`${API}/biblioteca/${docId}/generar-nota`, { method: 'POST', headers: headers() });
                const data = await res.json();
                alert('✅ Nota bibliográfica generada:\n\n' + data.nota_bibliografica);
                verDetalle(docId);
            } catch(e) { alert('Error al generar nota'); }
        }

        async function asignarPermiso(docId) {
            const usuario_id = document.getElementById('permUserInput').value.trim();
            const rol = document.getElementById('permRolInput').value.trim();
            const permiso = document.getElementById('permTipoInput').value;
            if (!usuario_id && !rol) { alert('Ingresa un usuario o rol'); return; }

            const form = new URLSearchParams();
            if (usuario_id) form.append('usuario_id', usuario_id);
            if (rol) form.append('rol', rol);
            form.append('permiso', permiso);

            try {
                const res = await fetch(`${API}/biblioteca/${docId}/permisos`, {
                    method: 'POST', headers: { ...headers(), 'Content-Type': 'application/x-www-form-urlencoded' }, body: form
                });
                if (res.ok) { alert('✅ Permiso asignado'); verDetalle(docId); }
                else { const d = await res.json(); alert(d.detail); }
            } catch(e) { alert('Error'); }
        }

        async function eliminarPermisoDetalle(docId, accesoId) {
            if (!confirm('¿Eliminar este permiso?')) return;
            try {
                const res = await fetch(`${API}/biblioteca/${docId}/permisos/${accesoId}`, {
                    method: 'DELETE', headers: headers()
                });
                if (res.ok) { verDetalle(docId); }
                else { alert('Error al eliminar permiso'); }
            } catch(e) { alert('Error'); }
        }

        function solicitarAccesoModal(docId) {
            const razon = prompt('¿Por qué necesitas acceso a este documento? (mín 20 caracteres)');
            if (!razon || razon.length < 20) { alert('La razón debe tener al menos 20 caracteres'); return; }
            solicitarAcceso(docId, razon);
        }

        async function solicitarAcceso(docId, razon) {
            const form = new URLSearchParams();
            form.append('razon', razon);
            try {
                const res = await fetch(`${API}/biblioteca/${docId}/solicitar-acceso`, {
                    method: 'POST', headers: { ...headers(), 'Content-Type': 'application/x-www-form-urlencoded' }, body: form
                });
                const d = await res.json();
                alert(d.mensaje || d.detail);
            } catch(e) { alert('Error'); }
        }

        async function mostrarSolicitudes() {
            try {
                const res = await fetch(`${API}/biblioteca/solicitudes/pendientes`, { headers: headers() });
                if (!res.ok) { alert('Solo admin/superadmin/coordinador/cliente pueden ver solicitudes'); return; }
                const solicitudes = await res.json();
                const list = document.getElementById('solicitudesList');
                if (solicitudes.length === 0) {
                    list.innerHTML = '<p class="text-slate-500 text-center py-8">No hay solicitudes pendientes</p>';
                } else {
                    list.innerHTML = solicitudes.map(s => `
                        <div class="border-2 border-slate-200 rounded-lg p-4 mb-3 bg-white">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="font-medium text-slate-800">${s.solicitante_nombre || s.solicitante_id}</p>
                                    <p class="text-sm text-slate-500">📄 ${s.documento_nombre}</p>
                                    <p class="text-xs text-slate-400 mt-1">"${s.razon}"</p>
                                </div>
                                <span class="text-xs text-yellow-700 bg-yellow-100 border border-yellow-300 rounded-full px-2 py-1 font-medium">${s.estado}</span>
                            </div>
                            <div class="flex gap-2 mt-3">
                                <button onclick="resolverSolicitud(${s.id}, 'aprobada')" class="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded text-xs font-semibold shadow-sm">✅ Aprobar</button>
                                <button onclick="resolverSolicitud(${s.id}, 'rechazada')" class="bg-red-600 hover:bg-red-700 text-white px-3 py-1.5 rounded text-xs font-semibold shadow-sm">❌ Rechazar</button>
                            </div>
                        </div>
                    `).join('');
                }
                document.getElementById('modalSolicitudes').classList.remove('hidden');
            } catch(e) { alert('Error al cargar solicitudes'); }
        }

        async function resolverSolicitud(id, estado) {
            const respuesta = prompt('Comentario (opcional):');
            const form = new URLSearchParams();
            form.append('estado', estado);
            if (respuesta) form.append('respuesta_admin', respuesta);
            try {
                const res = await fetch(`${API}/biblioteca/solicitudes/${id}`, {
                    method: 'PUT', headers: { ...headers(), 'Content-Type': 'application/x-www-form-urlencoded' }, body: form
                });
                if (res.ok) { alert(`✅ Solicitud ${estado}`); mostrarSolicitudes(); }
                else { const d = await res.json(); alert(d.detail); }
            } catch(e) { alert('Error'); }
        }

        async function mostrarPermisosGlobal() {
            document.getElementById('modalPermisosGlobal').classList.remove('hidden');
            const content = document.getElementById('permisosGlobalContent');
            content.innerHTML = '<div class="text-center py-8"><div class="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto"></div><p class="text-slate-500 mt-2">Cargando permisos...</p></div>';

            try {
                const resDocs = await fetch(`${API}/biblioteca/`, { headers: headers() });
                const docs = await resDocs.json();

                let html = '';
                for (const doc of docs) {
                    const resPerms = await fetch(`${API}/biblioteca/${doc.id}/permisos`, { headers: headers() });
                    const permisos = resPerms.ok ? await resPerms.json() : [];

                    html += `
                        <div class="border-2 border-slate-200 rounded-lg p-4 mb-3 bg-white">
                            <div class="flex items-start justify-between">
                                <div>
                                    <h4 class="font-medium text-slate-800">${doc.nombre}</h4>
                                    <p class="text-xs text-slate-500">v${doc.version} · ${doc.usuario_nombre || ''}</p>
                                </div>
                                <span class="text-xs text-slate-400">ID: ${doc.id}</span>
                            </div>
                            <div class="mt-2 flex flex-wrap gap-1">
                                ${permisos.map(p => `
                                    <span class="inline-flex items-center gap-1 bg-indigo-50 border-2 border-indigo-200 rounded-full px-2 py-0.5 text-xs font-medium text-indigo-700">
                                        <i class="fas fa-user"></i> ${p.usuario_id || p.rol} · ${p.permiso}
                                        <i class="fas fa-times cursor-pointer hover:text-red-600 ml-1" onclick="eliminarPermisoGlobal(${doc.id}, ${p.id})"></i>
                                    </span>
                                `).join('') || '<span class="text-xs text-slate-400">Sin permisos asignados</span>'}
                            </div>
                            <div class="mt-2 flex gap-1 items-center">
                                <input type="text" id="gUser_${doc.id}" placeholder="User ID" class="border-2 border-slate-300 rounded px-2 py-0.5 text-xs w-24 bg-white text-slate-800">
                                <input type="text" id="gRol_${doc.id}" placeholder="Rol" class="border-2 border-slate-300 rounded px-2 py-0.5 text-xs w-24 bg-white text-slate-800">
                                <select id="gPerm_${doc.id}" class="border-2 border-slate-300 rounded px-2 py-0.5 text-xs bg-white text-slate-700">
                                    <option value="lectura">Lectura</option>
                                    <option value="escritura">Escritura</option>
                                </select>
                                <button onclick="asignarPermisoGlobal(${doc.id})" class="bg-indigo-600 hover:bg-indigo-700 text-white px-2 py-0.5 rounded text-xs font-semibold shadow-sm"><i class="fas fa-plus"></i></button>
                            </div>
                        </div>
                    `;
                }
                content.innerHTML = html || '<p class="text-slate-500 text-center py-8">No hay documentos en la biblioteca</p>';
            } catch(e) {
                content.innerHTML = '<p class="text-red-600 text-center py-8">Error al cargar permisos</p>';
            }
        }

        async function asignarPermisoGlobal(docId) {
            const usuario_id = document.getElementById(`gUser_${docId}`).value.trim();
            const rol = document.getElementById(`gRol_${docId}`).value.trim();
            const permiso = document.getElementById(`gPerm_${docId}`).value;
            if (!usuario_id && !rol) { alert('Ingresa un usuario o rol'); return; }

            const form = new URLSearchParams();
            if (usuario_id) form.append('usuario_id', usuario_id);
            if (rol) form.append('rol', rol);
            form.append('permiso', permiso);

            try {
                const res = await fetch(`${API}/biblioteca/${docId}/permisos`, {
                    method: 'POST', headers: { ...headers(), 'Content-Type': 'application/x-www-form-urlencoded' }, body: form
                });
                if (res.ok) { mostrarPermisosGlobal(); }
                else { const d = await res.json(); alert(d.detail); }
            } catch(e) { alert('Error'); }
        }

        async function eliminarPermisoGlobal(docId, accesoId) {
            if (!confirm('¿Eliminar este permiso?')) return;
            try {
                const res = await fetch(`${API}/biblioteca/${docId}/permisos/${accesoId}`, {
                    method: 'DELETE', headers: headers()
                });
                if (res.ok) { mostrarPermisosGlobal(); }
                else { alert('Error al eliminar permiso'); }
            } catch(e) { alert('Error'); }
        }

        function cerrarModal(id) { document.getElementById(id).classList.add('hidden'); }

        document.addEventListener('DOMContentLoaded', function() {
            cargarDocumentos();
            const p = new URLSearchParams(window.location.search);
            const docId = p.get('id');
            if (docId) setTimeout(() => verDetalle(docId), 600);
        });
    </script>
</body>
</html>
