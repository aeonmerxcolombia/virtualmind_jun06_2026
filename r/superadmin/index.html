
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Virtualmind – Superadmin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0">  
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.js.iife.min.js"></script>

  <script src="/staging/js/fetch-con-token.js"></script>
  <script src="/staging/js/colmena-widget-intelligent.js"></script>
  <script src="/staging/js/global-search.js"></script>
  <script src="/staging/js/tooltips.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/open-dyslexic-regular.css" rel="stylesheet">  
  
  <script>  
    if (window.innerWidth <= 768) {    
      window.location.href = "/staging/r/superadmin/responsive/";    
    }  
  </script>  
  
  <style>  
    /* Custom High-Tech Styling */  
    body {    
      font-family: 'Inter', sans-serif;    
      transition: background-color 0.3s ease, font-size 0.2s ease;  
    }      
    
    .chat-bubble { 
      animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
    }  
    
    @keyframes fadeIn {    
      from { opacity: 0; transform: translateY(12px); }    
      to   { opacity: 1; transform: translateY(0); }  
    }      
    
    iframe { 
      width: 100%; 
      height: 100%; 
      border: none; 
    }      
    
    /* Custom Premium Scrollbar */  
    ::-webkit-scrollbar {    
      width: 6px;    
      height: 6px;  
    }  
    ::-webkit-scrollbar-track {    
      background: rgba(243, 244, 246, 1);  
    }  
    ::-webkit-scrollbar-thumb {    
      background: rgba(79, 70, 229, 0.5);    
      border-radius: 9999px;  
    }  
    ::-webkit-scrollbar-thumb:hover {    
      background: rgba(79, 70, 229, 0.8);  
    }      
    
    .scrollbar-hide::-webkit-scrollbar { 
      display: none; 
    }  
    .scrollbar-hide { 
      -ms-overflow-style: none; 
      scrollbar-width: none; 
    }      
    
    .chat-bubble {    
      max-width: 90%;    
      word-wrap: break-word;    
      line-height: 1.6;  
    }      
    
    /* Menú Activo con gradiente de alto contraste */  
    .menu-item.active {    
      background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%) !important;    
      color: #ffffff !important;    
      border-left: 4px solid #10b981 !important;    
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3) !important;  
    }      
    
    /* Subitems del menú */
    .submenu-item {
      display: flex;
      align-items: center;
      padding: 0.5rem 0.75rem;
      margin: 0.25rem 0;
      border-radius: 0.5rem;
      font-size: 0.8125rem;
      color: #475569;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border-left: 3px solid transparent;
      position: relative;
    }
    
    .submenu-item::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: linear-gradient(135deg, #94a3b8 0%, #64748b 100%);
      margin-right: 0.75rem;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    
    .submenu-item:hover {
      background: linear-gradient(90deg, rgba(79, 70, 229, 0.05) 0%, rgba(99, 102, 241, 0.02) 100%);
      color: #4f46e5;
      border-left-color: #6366f1;
      padding-left: 1rem;
    }
    
    .submenu-item:hover::before {
      background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
      transform: scale(1.3);
    }
    
    .submenu-item.active {
      background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%) !important;
      color: #ffffff !important;
      border-left-color: #10b981 !important;
      box-shadow: 0 2px 8px rgba(79, 70, 229, 0.2) !important;
    }
    
    .submenu-item.active::before {
      background: #ffffff;
    }
    
    /* Container de subitems con animación */
    .submenu-container {
      margin-left: 2.5rem;
      margin-top: 0.25rem;
      margin-bottom: 0.25rem;
      padding-left: 0.5rem;
      border-left: 2px solid #e2e8f0;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
      opacity: 0;
    }
    
    .submenu-container.expanded {
      max-height: 500px;
      opacity: 1;
    }
    
    /* Menú principal hover mejorado */
    .menu-header-btn {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 0.625rem 0.75rem;
      border-radius: 0.75rem;
      color: #1e293b;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      font-weight: 500;
    }
    
    .menu-header-btn:hover {
      background: linear-gradient(90deg, rgba(79, 70, 229, 0.08) 0%, rgba(99, 102, 241, 0.04) 100%);
      color: #4f46e5;
    }
    
    .menu-header-btn:hover .menu-chevron {
      color: #4f46e5;
      transform: translateX(2px);
    }
    
    .menu-chevron {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .menu-chevron.rotated {
      transform: rotate(180deg);
    }
    
    /* Menú container mejorado */
    .menu-section {
      margin: 0.375rem 0;
      border-radius: 0.75rem;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      transition: all 0.2s;
    }
    
    .menu-section:hover {
      border-color: #c7d2fe;
      box-shadow: 0 2px 8px rgba(79, 70, 229, 0.08);
    }      
    
    /* Configuración de Traducción de Google con alto contraste */  
    #google_translate_element {    
      display: inline-flex;    
      align-items: center;    
      justify-content: center;  
    }  
    #google_translate_element .goog-te-combo {    
      border-radius: 0.5rem;    
      padding: 0.375rem 0.75rem;    
      font-size: 0.8125rem;    
      font-weight: 700;    
      border: 2px solid #cbd5e1;    
      background-color: #ffffff;    
      color: #000000;    
      outline: none;    
      cursor: pointer;    
      transition: all 0.2s;  
    }  
    #google_translate_element .goog-te-combo:hover {    
      border-color: #4f46e5;    
      background-color: #f8fafc;  
    }  
    
    .goog-logo-link { 
      display: none !important; 
    }  
    .goog-te-gadget-simple { 
      background-color: transparent !important; 
      border: none !important; 
    }  
    .goog-te-gadget-simple span { 
      display: none; 
    }      
    
    /* Clases de Accesibilidad */  
    body.contrast { 
      filter: invert(1) hue-rotate(180deg); 
      background: #000 !important; 
    }  
    body.contrast iframe { 
      filter: invert(1) hue-rotate(180deg); 
    }  
    body.large-text { 
      font-size: 1.15rem !important; 
      line-height: 1.7 !important; 
    }  
    body.grayscale { 
      filter: grayscale(1); 
    }  
    body.dyslexia { 
      font-family: 'OpenDyslexic', sans-serif !important; 
    }  
    body.reduce-motion * { 
      animation: none !important; 
      transition: none !important; 
    }      
    
    /* Chat Widget Posición e Interacciones */  
    #chatWidgetContainer {    
      position: fixed;    
      bottom: 1.5rem;    
      left: calc(18rem + 1.5rem);    
      z-index: 1000;    
      display: flex;    
      flex-direction: column;    
      align-items: flex-start;  
    }  
    #chatWidgetToggle {    
      background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);    
      color: white;    
      padding: 1rem;    
      border-radius: 9999px;    
      box-shadow: 0 4px 20px rgba(79, 70, 229, 0.4);    
      font-size: 1.5rem;    
      cursor: pointer;    
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);  
    }  
    #chatWidgetToggle:hover {     
      transform: scale(1.08) rotate(5deg);    
      box-shadow: 0 6px 24px rgba(79, 70, 229, 0.6);  
    }  
    #chatWidget {    
      width: 26rem;    
      height: 36rem;    
      background: rgba(255, 255, 255, 0.99);    
      backdrop-filter: blur(16px);    
      -webkit-backdrop-filter: blur(16px);    
      border: 2px solid #cbd5e1;    
      border-radius: 1rem;    
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);    
      transform-origin: bottom left;    
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;    
      opacity: 0;    
      transform: translateY(100%) scale(0.9);    
      pointer-events: none;    
      margin-bottom: 0.75rem;    
      display: flex;    
      flex-direction: column;    
      overflow: hidden;    
      position: absolute;    
      bottom: calc(100% + 1rem);    
      left: 0;  
    }  
    #chatWidget.opened {    
      opacity: 1;    
      transform: translateY(0) scale(1);    
      pointer-events: auto;  
    }  
    #chatBoxWidget { 
      flex-grow: 1; 
      overflow-y: auto; 
    }      
    
    /* Accesibilidad Dropdown Animaciones */  
    #accessibilityMenu {    
      position: relative;  
    }  
    #accessibilityControls {    
      display: none;    
      position: absolute;    
      top: calc(100% + 0.75rem);    
      right: 0;    
      width: 16rem;    
      background: #ffffff;    
      border: 2px solid #cbd5e1;    
      border-radius: 0.75rem;    
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);    
      padding: 0.75rem;    
      flex-direction: column;    
      gap: 0.5rem;    
      animation: fadeIn 0.2s ease-out;  
    }  
    #accessibilityMenu.opened #accessibilityControls {     
      display: flex;   
    }      
    
    /* Custom ambient glowing backgrounds */  
    .glow-blob {    
      position: absolute;    
      width: 500px;    
      height: 500px;    
      background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, rgba(0,0,0,0) 70%);    
      border-radius: 50%;    
      pointer-events: none;    
      z-index: 0;  
    }  

    /* ==================== TEMA CLARO PARA DRIVER.JS ==================== */
    .driverjs-theme .driver-popover { 
      background: #ffffff !important; 
      border: 1px solid rgba(0,0,0,0.1) !important; 
      border-radius: 16px !important; 
      padding: 20px !important; 
      box-shadow: 0 8px 30px rgba(0,0,0,0.12) !important; 
    }
    
    .driverjs-theme .driver-popover-title { 
      color: #0f172a !important; 
      font-weight: 700 !important; 
      font-size: 16px !important; 
      margin-bottom: 6px !important; 
    }
    
    .driverjs-theme .driver-popover-description { 
      color: #475569 !important; 
      font-size: 13px !important; 
      line-height: 1.6 !important; 
    }
    
    .driverjs-theme .driver-popover-navigation-btns { 
      justify-content: flex-end !important; 
      gap: 8px !important; 
      margin-top: 14px !important; 
    }
    
    .driverjs-theme .driver-popover-prev-btn { 
      background: transparent !important; 
      color: #64748b !important; 
      border: 1px solid rgba(0,0,0,0.1) !important; 
      border-radius: 10px !important; 
      font-size: 12px !important; 
      font-weight: 600 !important; 
      padding: 6px 14px !important; 
      transition: all 0.2s; 
    }
    
    .driverjs-theme .driver-popover-prev-btn:hover { 
      background: #f1f5f9 !important; 
      color: #0f172a !important; 
    }
    
    .driverjs-theme .driver-popover-next-btn { 
      background: #6366f1 !important; 
      color: #ffffff !important; 
      border: none !important; 
      border-radius: 10px !important; 
      font-size: 12px !important; 
      font-weight: 600 !important; 
      padding: 6px 14px !important; 
      transition: all 0.2s; 
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3) !important; 
    }
    
    .driverjs-theme .driver-popover-next-btn:hover { 
      background: #4f46e5 !important; 
    }
    
    .driverjs-theme .driver-popover-progress-text { 
      color: #94a3b8 !important; 
      font-size: 11px !important; 
      font-weight: 600 !important; 
    }
    
    .driverjs-theme .driver-popover-close-btn { 
      color: #94a3b8 !important; 
      transition: color 0.2s; 
    }
    
    .driverjs-theme .driver-popover-close-btn:hover { 
      color: #ef4444 !important; 
    }
  </style>
  
  <script src="/staging/js/staging-banner.js"></script>
</head>
<body class="min-h-screen font-[Inter] bg-white text-black flex flex-col overflow-x-hidden">    
  
  <!-- Glowing blobs for background styling -->  
  <div class="glow-blob top-10 left-10"></div>  
  <div class="glow-blob bottom-10 right-10"></div>  
  
  <!-- Custom Notification Container -->  
  <div id="customToastContainer" class="fixed top-5 right-5 z-50 flex flex-col gap-3 pointer-events-none"></div>  
  
  <!-- HEADER Premium con Glassmorphism y Alto Contraste -->  
  <header class="sticky top-0 z-30 backdrop-blur-md bg-white border-b-2 border-indigo-600 shadow-md flex items-center justify-between px-6 py-4">    
    <div class="flex items-center space-x-3 z-10">      
      <div class="relative group">        
        <div class="absolute -inset-0.5 bg-gradient-to-r from-indigo-600 to-emerald-500 rounded-full blur opacity-60 group-hover:opacity-100 transition duration-300"></div>        
        <img src="/staging/assets/logo.png" alt="Logo" class="relative h-10 w-10 rounded-full object-cover border border-white/20">      
      </div>      
      <h1 class="text-xl font-extrabold text-black tracking-wide">        
        Virtualmind <span class="text-xs text-white font-bold px-2.5 py-1 bg-indigo-600 rounded-full border border-indigo-600 ml-2">Superadmin</span>      
      </h1>    
    </div>        
    
    <!-- Header Right Controls -->    
    <div class="flex items-center space-x-4 z-10">            
      <!-- Panel de Accesibilidad Premium -->      
      <div id="accessibilityMenu" class="flex items-center">        
        <button id="accessibilityToggle" aria-expanded="false" aria-label="Opciones de accesibilidad" class="flex items-center justify-center bg-white hover:bg-slate-100 text-black p-2.5 rounded-xl border-2 border-slate-300 transition-all focus:outline-none focus:ring-2 focus:ring-indigo-600 shadow-sm font-bold" title="Accesibilidad">          
          <svg class="w-5 h-5 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>          
          <span class="text-xs ml-1.5 font-bold hidden md:inline">Accesibilidad</span>        
        </button>                
        <div id="accessibilityControls" class="p-4 space-y-2">          
          <div class="text-xs font-black text-black border-b-2 border-gray-300 pb-2 mb-2 uppercase">Herramientas Visuales</div>                    
          <button data-act="contrast" class="w-full flex items-center gap-2.5 px-3 py-2 text-xs font-bold text-black hover:bg-slate-100 rounded-lg border border-slate-300 transition-all text-left">            
            <span class="text-base">🌗</span><span>Alto contraste</span>          
          </button>                    
          <button data-act="large-text" class="w-full flex items-center gap-2.5 px-3 py-2 text-xs font-bold text-black hover:bg-slate-100 rounded-lg border border-slate-300 transition-all text-left">            
            <span class="text-base">🔠</span><span>Texto más grande</span>          
          </button>                    
          <button data-act="grayscale" class="w-full flex items-center gap-2.5 px-3 py-2 text-xs font-bold text-black hover:bg-slate-100 rounded-lg border border-slate-300 transition-all text-left">            
            <span class="text-base">⚫️</span><span>Escala de grises</span>          
          </button>                    
          <button data-act="dyslexia" class="w-full flex items-center gap-2.5 px-3 py-2 text-xs font-bold text-black hover:bg-slate-100 rounded-lg border border-slate-300 transition-all text-left">            
            <span class="text-base">📖</span><span>Fuente disléxica</span>          
          </button>                    
          <button id="resetAccessibility" class="w-full flex items-center justify-center gap-1.5 px-3 py-2 mt-2 text-xs font-bold text-rose-700 bg-rose-50 hover:bg-rose-100 rounded-lg border-2 border-rose-300 transition-all">            
            <span>🔄</span> Restablecer          
          </button>        
        </div>      
      </div>            
      
      <!-- Buscador Global -->      
      <button id="globalSearchBtn" onclick="document.dispatchEvent(new KeyboardEvent('keydown', {ctrlKey: true, key: 'k'}))" class="flex items-center gap-2 bg-white hover:bg-slate-100 text-black px-3 py-2 rounded-xl border-2 border-slate-300 transition-all text-xs font-bold shadow-sm" title="Buscar (Ctrl+K)">        
        <svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>        
        <span class="hidden md:inline">Buscar</span>        
        <kbd class="hidden lg:inline-flex px-1.5 py-0.5 bg-gray-200 rounded text-[9px] font-mono border border-gray-400 text-black font-bold">Ctrl+K</kbd>      
      </button>      
      
      <!-- Health Status Indicator -->      
      <div id="healthIndicator" class="flex items-center gap-1.5 px-2 py-1 rounded-lg bg-slate-50 border-2 border-slate-300 cursor-help" title="Estado del sistema">        
        <span id="healthDot" class="w-2 h-2 rounded-full bg-slate-500"></span>        
        <span id="healthText" class="text-[10px] text-black font-mono font-bold hidden md:inline">...</span>      
      </div>      
      
      <!-- Selector de Rol Modernizado -->      
      <div class="flex items-center space-x-2">        
        <label for="roleSelect" class="text-xs font-black text-black uppercase tracking-wider hidden lg:inline">Rol:</label>        
        <select id="roleSelect" class="border-2 border-slate-400 px-3 py-1.5 rounded-xl bg-white text-sm text-black font-extrabold shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-600 transition-all">          
          <option value="">Cargando...</option>        
        </select>      
      </div>            
      
      <!-- Google Translate Container -->      
      <div id="google_translate_element"></div>            
      
      <!-- Botón Notificaciones -->      
      <div class="relative">        
        <button id="notifButton" class="relative bg-white hover:bg-slate-100 text-black p-2.5 rounded-xl border-2 border-slate-300 transition-all">          
          <svg class="w-5 h-5 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>          
          <span id="notifCount" class="absolute -top-1 -right-1 bg-rose-600 text-white text-[10px] font-bold rounded-full w-4 h-4 flex items-center justify-center animate-pulse">0</span>        
        </button>        
        <div id="notifDropdown" class="hidden absolute right-0 mt-3 w-80 bg-white shadow-2xl rounded-xl border-2 border-slate-300 overflow-hidden z-50">          
          <div class="px-4 py-3 border-b-2 border-slate-200 bg-gray-50">            
            <h3 class="text-xs font-black uppercase tracking-wider text-black">Notificaciones</h3>          
          </div>          
          <div id="notifList" class="flex flex-col divide-y-2 divide-gray-200 max-h-80 overflow-y-auto"></div>          
          <div id="notifEmpty" class="text-center py-6 px-4 text-xs font-bold text-gray-700">No tienes notificaciones pendientes</div>        
        </div>      
      </div>      
      
      <!-- Botón Cerrar Sesión -->      
      <button onclick="logout()" class="bg-white hover:bg-rose-600 border-2 border-rose-300 hover:border-transparent text-rose-700 hover:text-white font-bold text-sm px-4 py-2 rounded-xl transition-all shadow-sm">        
        Cerrar sesión      
      </button>    
    </div>  
  </header>    
  
  <!-- MAIN WORKSPACE -->  
  <div class="flex flex-1 min-h-[calc(100vh-80px)] z-10 relative">        
    <!-- SIDEBAR Premium Transparente / Glassmorphic -->    
    <aside class="w-72 flex flex-col border-r-2 border-slate-200 bg-white">            
      <!-- Panel de Perfil del Sidebar -->      
      <div class="flex flex-col items-center py-6 border-b-2 border-slate-200 bg-slate-50">        
        <div class="relative group mb-3">          
          <div class="absolute -inset-1 bg-gradient-to-tr from-indigo-600 to-indigo-600 rounded-full blur opacity-40 group-hover:opacity-75 transition duration-300"></div>          
          <div class="relative bg-white rounded-full w-20 h-20 flex items-center justify-center border-2 border-indigo-600 overflow-hidden">            
            <img id="sidebarAvatar" src="" alt="Perfil" class="w-full h-full rounded-full object-cover transition duration-300 group-hover:scale-110" onerror="this.onerror=null;this.src='/assets/default_avatar.png';">          
          </div>        
        </div>        
        <span id="sidebarName" class="text-black font-black text-base tracking-wide">Perfil</span>                
        <button onclick="verMiPerfil()" class="mt-3 flex items-center gap-1.5 bg-white hover:bg-indigo-600 border-2 border-indigo-600 hover:border-transparent text-indigo-600 hover:text-white text-xs font-bold px-4 py-1.5 rounded-lg transition-all shadow-sm">          
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>          
          Ver mi perfil        
        </button>      
      </div>            
      
      <!-- Menú Dinámico con scroll moderno -->      
      <nav id="dynamic-sidebar-menu" class="flex-1 px-1 py-1 space-y-0.5 overflow-y-auto max-h-[calc(100vh-320px)]"></nav>    
    </aside>        
    
    <!-- VIEWPORT CENTRAL (Contenedor del IFrame) -->    
    <main class="flex-1 p-6 flex flex-col bg-gray-50">      
      <div class="bg-white shadow-lg rounded-2xl border-2 border-slate-200 h-full w-full overflow-hidden flex flex-col flex-1 relative">        
        <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-indigo-600 to-emerald-500"></div>        
        <iframe id="mainFrame" src="tutorial/index.html" class="flex-1"></iframe>      
      </div>    
    </main>  
  </div>

    // --- Elegant Toast Alerts ---    
    function showNotification(type, message) {      
      const container = document.getElementById('customToastContainer');      
      if (!container) return;      
      const toast = document.createElement('div');      
      toast.className = `flex items-center p-4 rounded-xl shadow-xl border-2 backdrop-blur-md transform translate-y-2 opacity-0 transition-all duration-300 pointer-events-auto ${        
        type === 'success'           
          ? 'bg-emerald-50 border-emerald-400 text-emerald-900'           
          : 'bg-rose-50 border-rose-400 text-rose-900'      
      }`;      
      toast.innerHTML = `        
        <span class="mr-3 text-lg">${type === 'success' ? '✨' : '⚠️'}</span>        
        <div class="text-xs font-bold tracking-wide">${message}</div>      
      `;      
      container.appendChild(toast);      
      setTimeout(() => {        
        toast.classList.remove('translate-y-2', 'opacity-0');      
      }, 50);      
      setTimeout(() => {        
        toast.classList.add('opacity-0', 'translate-y-2');        
        setTimeout(() => toast.remove(), 300);      
      }, 4000);    
    }

    function parseJwt(token) {      
      try {        
        const base64Url = token.split('.')[1];        
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');        
        const jsonPayload = decodeURIComponent(          
          atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')        
        );        
        return JSON.parse(jsonPayload);      
      } catch (e) {        
        console.error("Error decodificando token:", e);        
        return null;      
      }    
    }    
    
    async function fetchPermissionsForCurrentRole() {      
      if (!token) return new Set();      
      const path = window.location.pathname;      
      const currentRole = path.split('/')[3];            
      if (!currentRole || currentRole === 'superadmin') return new Set();            
      try {        
        const res = await fetch(`${API}/roles/`, {          
          headers: { 'Authorization': `Bearer ${token}` }        
        });        
        if (!res.ok) {          
          if (res.status === 401) logout();          
          throw new Error(`HTTP error! status: ${res.status}`);        
        }        
        const allRoles = await res.json();        
        const currentRoleObject = allRoles.find(r => r.name === currentRole);        
        if (currentRoleObject && currentRoleObject.permissions) {          
          return new Set(currentRoleObject.permissions.map(p => p.name));        
        }        
        return new Set();      
      } catch (error) {        
        console.error(`Error consultando permisos para el rol '${currentRole}':`, error);        
        return new Set();      
      }    
    }    
    
    async function renderSidebar() {      
      const sidebarMenu = document.getElementById('dynamic-sidebar-menu');      
      if (!sidebarMenu) return;      
      sidebarMenu.innerHTML = '';            
      const path = window.location.pathname;      
      const currentRole = path.split('/')[3];      
      let permissionsToRender = new Set();            
      if (currentRole === 'superadmin') {        
        for (const sectionId in menuMapping) {          
          const section = menuMapping[sectionId];          
          if (section.items) {            
            section.items.forEach(item => permissionsToRender.add(item.permission));          
          } else if (section.permission) {            
            permissionsToRender.add(section.permission);          
          }        
        }      
      } else {        
        permissionsToRender = await fetchPermissionsForCurrentRole();      
      }            
      for (const sectionId in menuMapping) {        
        const section = menuMapping[sectionId];        
        if (section.url && section.permission && permissionsToRender.has(section.permission)) {          
          sidebarMenu.innerHTML += `            
            <a href="#" onclick="selectMenu(this); cargarVista('${section.url}')"                
                 class="menu-item flex items-center px-3 py-2.5 my-1 rounded-lg text-slate-800 hover:text-indigo-600 hover:bg-indigo-50 transition-all duration-200 border border-transparent hover:border-indigo-200">              
              <span class="mr-3 text-xl">${section.icon}</span>              
              <span class="text-sm font-medium">${section.label}</span>            
            </a>`;        
        }
        }
      }    
    }    
    
    async function cargarPerfilSidebar() {      
      if (!token) return;      
      const payload = parseJwt(token);      
      if (!payload || !payload.user_id) { logout(); return; }      
      const user_id = payload.user_id;      
      localStorage.setItem("user_id", user_id);            
      try {        
        const res = await fetch(`${API}/users/${user_id}`, {          
          headers: { Authorization: "Bearer " + token }        
        });        
        const data = await res.json();        
        const roles = data.roles;        
        const sel = document.getElementById("roleSelect");        
        sel.innerHTML = "";                
        const path = window.location.pathname;        
        const currentRole = path.split('/')[3];                
        roles.forEach(r => {          
          const o = document.createElement("option");          
          o.value = r;          
          o.textContent = r.charAt(0).toUpperCase() + r.slice(1);          
          if (r === currentRole) o.selected = true;          
          sel.appendChild(o);        
        });                
        sel.addEventListener("change", async () => {          
          if (!sel.value) return;          
          try {            
            const res = await fetch(`${API}/auth/switch-role`, {              
              method: "POST",              
              headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },              
              body: JSON.stringify({ role: sel.value })            
            });            
            if (!res.ok) throw new Error((await res.json()).detail || "Error al cambiar rol");            
            const data = await res.json();            
            localStorage.setItem("token", data.access_token);            
            window.location.href = `/staging/r/${sel.value}/`;          
          } catch (e) {            
            showNotification("error", "Error al cambiar rol: " + e.message);          
          }        
        });      
      } catch (e) {        
        console.error("Error cargando roles de usuario:", e);      
      }            
      try {        
        const res2 = await fetch(`${API}/profiles/${user_id}`, {          
          headers: { Authorization: "Bearer " + token }        
        });        
        const p = await res2.json();        
        document.getElementById("sidebarAvatar").src = p.foto_url || "/assets/default_avatar.png";        
        document.getElementById("sidebarName").textContent = p.nombre || "Perfil";      
      } catch (e) {        
        console.error("Error cargando perfil:", e);      
      }    
    }

    function copiarTexto(id) {      
      const texto = document.getElementById(id)?.innerText;      
      if (texto) {        
        // Safe clipboard method for iframe restriction guards        
        const textArea = document.createElement("textarea");

    // --- Síntesis de Voz (Text to Speech) ---    
    function sanitizeTextForSpeech(text) {      
      let cleanedText = text.replace(/\*\*(.*?)\*\*/g, '$1');      
      cleanedText = cleanedText.replace(/\*(.*?)\*/g, '$1');      
      cleanedText = cleanedText.replace(/[\#\>\-]/g, '');      
      cleanedText = cleanedText.replace(/\n/g, ' ').replace(/\s{2,}/g, ' ');      
      return cleanedText.trim();    
    }    
    
    function updateSpeakButtonState(button, state) {      
      if (button) {        
        button.disabled = state === 'disabled';        
        button.style.opacity = state === 'disabled' ? 0.5 : 1;        
        button.style.cursor = state === 'disabled' ? 'not-allowed' : 'pointer';        
        button.textContent = state === 'disabled' ? '🔊 Leyendo...' : '🔊 Escuchar';      
      }    
    }    
    
    function speakText(text, button) {      
      if ('speechSynthesis' in window) {        
        window.speechSynthesis.cancel();        
        const cleanedText = sanitizeTextForSpeech(text);        
        const utterance = new SpeechSynthesisUtterance(cleanedText);        
        utterance.lang = 'es-ES';        
        utterance.rate = 1;        
        utterance.pitch = 1;        
        utterance.volume = 1;        
        updateSpeakButtonState(button, 'disabled');                
        utterance.onend = function () { updateSpeakButtonState(button, 'enabled'); };        
        utterance.onerror = function (event) {          
          console.error('Error en síntesis de voz:', event);          
          updateSpeakButtonState(button, 'enabled');        
        };                
        setTimeout(() => { window.speechSynthesis.speak(utterance); }, 100);      
      } else {        
        alert('Tu navegador no soporta la síntesis de voz.');      
      }    
    }    
    
    // --- INTEGRACIÓN WHISPER IA CON INTERCEPTOR DE COMANDOS ---    
    let mediaRecorder;    
    let audioChunks = [];    
    let isRecording = false;    
    
    document.addEventListener('DOMContentLoaded', () => {      
      const micButton = document.getElementById('micButton');      
      if (micButton) {        
        micButton.addEventListener('click', toggleAudioRecording);      
      }    
    });    
    
    async function toggleAudioRecording() {      
      if (!isRecording) {        
        try {          
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });          
          mediaRecorder = new MediaRecorder(stream);          
          audioChunks = [];          
          mediaRecorder.ondataavailable = (event) => {            
            if (event.data.size > 0) audioChunks.push(event.data);          
          };          
          mediaRecorder.onstop = async () => {            
            const audioBlob = new Blob(audioChunks, { type: 'audio/ogg' });            
            await enviarAudioAWhisper(audioBlob);            
            stream.getTracks().forEach(track => track.stop());          
          };          
          mediaRecorder.start();          
          isRecording = true;          
          document.getElementById('chatInput').value = '🎙️ Grabando audio... (Clic para detener)';          
          updateMicButtonVisuals();        
        } catch (error) {          
          console.error("Error accediendo al micrófono:", error);          
          alert("❌ No se pudo acceder al micrófono. Verifica permisos del navegador.");        
        }      
      } else {        
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {          
          mediaRecorder.stop();        
        }        
        isRecording = false;        
        updateMicButtonVisuals();      
      }    
    }    
    
    async function procesarComandosDeVoz(textoDescifrado) {        
      const texto = textoDescifrado.toLowerCase();        
      if (texto.includes("abrir") || texto.includes("ir a") || texto.includes("muéstrame") || texto.includes("crear")) {            
        for (const sectionId in menuMapping) {                
          const section = menuMapping[sectionId];                
          if (section.url && texto.includes(section.label.toLowerCase())) {                    
            cargarVista(section.url);                    
            return true;                
          } else if (section.items) {                    
            for (const item of section.items) {                        
              if (texto.includes(item.label.toLowerCase())) {                            
                cargarVista(item.url);                            
                return true;                        
              }                    
            }                
          }            
        }        
      }        
      return false;    
    }    
    
    async function enviarAudioAWhisper(audioBlob) {      
      const chatInput = document.getElementById('chatInput');      
      chatInput.value = '⏳ Transcribiendo comandos por Whisper IA...';            
      const formData = new FormData();      
      formData.append("audio", audioBlob, "grabacion.ogg");      
      try {        
        const respuesta = await fetch(`${API}/whisper/transcribir`, {          
          method: 'POST',          
          body: formData        
        });        
        if (!respuesta.ok) throw new Error("Fallo en el servidor.");        
        const data = await respuesta.json();        
        const textoTranscrito = data.texto;        
        chatInput.value = textoTranscrito;        
        const esComandoEjecutado = await procesarComandosDeVoz(textoTranscrito);                
        if (esComandoEjecutado) {            
          appendBubble(`🗣️ Comando de voz detectado exitosamente. Redirigiendo vista del sistema...`, "IA");           
          chatInput.value = "";         
        } else {           
          enviarMensaje();        
        }      
      } catch (error) {        
        console.error("Error Whisper:", error);        
        chatInput.value = '';        
        alert("❌ Error al transcribir. Asegúrate de que Whisper está en ejecución en el servidor Backend.");      
      }    
    }    
    
    function updateMicButtonVisuals() {      
      const micButton = document.getElementById('micButton');      
      if (micButton) {        
        if (isRecording) {          
          micButton.innerHTML = `<svg class="w-4 h-4 text-rose-500 animate-pulse" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z" clip-rule="evenodd"></path></svg>`;          
          micButton.title = 'Detener y transcribir comando';          
          micButton.className = "absolute right-2 p-1.5 rounded-full bg-rose-500/20 text-rose-300 border border-rose-500/30 hover:bg-rose-500/30 transition-all focus:outline-none";

          micButton.innerHTML = `<svg id="micIconDefault" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>`;          
          micButton.title = 'Iniciar grabación';          
          micButton.className = "absolute right-2 p-1.5 rounded-full text-gray-500 hover:text-indigo-600 hover:bg-gray-100 transition-all focus:outline-none";        
        }      
      }    
    }

          'menu-metricas': ['reportes_metricas_ver'],          
          'menu-diseno-instruccional': ['diseno_instruccional_ver', 'diseno_instruccional_crear'],          
          'menu-autor-contenido': ['autor_ver', 'autor_crear'],          
          'menu-microcursos': ['capacitacion_microcursos_ver'],          
          'menu-tutoriales': ['capacitacion_tutoriales_ver'],          
          'menu-faq': ['capacitacion_faq_ver'],        
        };                
        Object.entries(menuPermissions).forEach(([id, required]) => {          
          const el = document.getElementById(id);          
          if (el && !hasAnyPermission(required)) {            
            el.style.display = 'none';          
          }        
        });      
      } catch(e) {        
        console.error("Error comprobando permisos de menú:", e);      
      }    
    })();  
  </script>
  </body>
</html>
