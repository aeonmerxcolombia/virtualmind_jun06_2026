    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff;
            color: #000000;
            overflow-x: hidden;
        }
                
        .glass-card { 
            background: #ffffff;
            border: 2px solid #94a3b8;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }
                
        .action-btn { 
            cursor: pointer; 
            transition: all 0.2s ease-in-out; 
            border-radius: 12px; 
            padding: 0.5rem 0.7rem; 
        }
        
        .action-btn:hover { 
            transform: translateY(-1px); 
            filter: brightness(0.9); 
        }

        .input-focus { 
            transition: all 0.2s ease-in-out;
            background: #ffffff !important;
            border: 2px solid #94a3b8 !important;
            color: #000000 !important;
        }
        
        .input-focus:focus { 
            border-color: #4f46e5 !important;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2) !important;
            background: #ffffff !important;
        }

        .help-icon { 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            width: 20px; 
            height: 20px; 
            background: #1e293b; 
            color: #ffffff; 
            border-radius: 50%; 
            font-size: 11px; 
            font-weight: bold;
            cursor: help; 
        }
        
        .help-icon:hover {
            background: #000000;
        }

        /* Ambient subtle styling */
        .glow-blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.04) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        /* Select robusto para lectura clara */
        select option {
            background-color: #ffffff;
            color: #000000;
        }

        /* Tooltip System con contraste Ultra Nivel */
        .vm-tooltip { 
            position: absolute; 
            background: #000000; 
            color: #ffffff; 
            font-size: 12px; 
            font-weight: 600;
            padding: 6px 12px; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            pointer-events: none; 
            opacity: 0; 
            transform: translateY(4px); 
            transition: opacity 0.15s ease-out, transform 0.15s ease-out; 
            z-index: 10000; 
            max-width: 250px; 
            text-align: center; 
            border: 1px solid #000000;
        }
        
        .vm-tooltip.visible { 
            opacity: 1; 
            transform: translateY(0); 
        }
    </style>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/staging/css/themes.css">
    <link rel="stylesheet" href="/staging/css/theme-white.css?v=20260615" id="themeWhiteCSS">
</head>
<body class="min-h-screen p-4 md:p-8 relative">

    <div class="glow-blob top-10 left-10"></div>
    <div class="glow-blob bottom-10 right-10"></div>

    <div id="customToastContainer" style="position: fixed; top: 20px; right: 20px; z-index: 99999;" class="flex flex-col gap-3 pointer-events-none"></div>

    <div class="max-w-6xl mx-auto glass-card p-8 rounded-3xl z-10 relative">
        
        <div class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4 border-b-2 border-slate-200 pb-6">
            <h1 class="text-3xl font-normal text-black tracking-wide">Gestión de Clientes</h1>
            <button id="btnCreate" title="Registrar un nuevo cliente en el sistema" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl font-normal text-sm shadow-md transition-all transform hover:-translate-y-0.5">
                <i class="fas fa-plus mr-2"></i>Crear Cliente
            </button>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
          
            <div class="relative">
                <input id="filtroTexto" type="text" placeholder="Buscar clientes por nombre, documento o email..." title="Busca clientes por nombre, documento o email" class="w-full p-3 rounded-xl input-focus text-sm outline-none font-medium" />
                <span class="absolute right-4 top-1/2 -translate-y-1/2 help-icon flex items-center justify-center" title="Busca clientes por nombre, documento o email">?</span>
            </div>
            
            <div class="relative">
                <select id="filtroEstado" title="Filtra clientes por estado: Activos o Inactivos" class="w-full p-3 pr-12 rounded-xl bg-white border-2 border-slate-400 text-black outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-sm font-normal cursor-pointer appearance-none">
                    <option value="todos">Todos los estados</option>
                    <option value="activo">Activos</option>
                    <option value="inactivo">Inactivos</option>
                </select>
                <span class="absolute right-10 top-1/2 -translate-y-1/2 help-icon flex items-center justify-center" title="Filtra clientes por estado: Activos o Inactivos">?</span>
                <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-black font-normal text-xs">▼</div>
            </div>
            
        </div>

        <div class="overflow-x-auto rounded-2xl border-2 border-slate-300 bg-white shadow-inner">
            <table class="min-w-full text-sm text-black">
                <thead class="bg-slate-100 text-slate-900 font-normal border-b-2 border-slate-300">
                    <tr>
                        <th class="px-6 py-4 text-left uppercase tracking-wider">Cliente</th>
                        <th class="px-6 py-4 text-left uppercase tracking-wider">Documento</th>
                        <th class="px-6 py-4 text-left uppercase tracking-wider">Email</th>
                        <th class="px-6 py-4 text-left uppercase tracking-wider">Estado</th>

                </thead>

            </table>

            <div id="welcomeContainer" class="p-12 text-center hidden">
                <div class="bg-slate-50 border-2 border-slate-300 p-8 rounded-2xl text-center cursor-pointer hover:border-indigo-500 transition-all shadow-md inline-block max-w-md" onclick="openEdit(null)">
                    <div class="w-16 h-16 rounded-full bg-indigo-50 text-indigo-600 border-2 border-indigo-200 flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-user-plus text-2xl"></i>
                    </div>
                    <h2 class="text-xl font-normal text-black mb-2">¡Todo listo para comenzar!</h2>
                    <p class="text-slate-700 text-xs mb-6 leading-relaxed font-medium">No tienes clientes registrados aún.<br>El primer paso indispensable es crear un cliente para poder asignarle proyectos.</p>
                    <button class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2.5 rounded-xl font-normal text-xs shadow-md transition-all">Crear mi primer cliente</button>

        <div class="flex justify-between items-center mt-6 text-sm">
            <button id="btnPrev" title="Página anterior de resultados" class="px-4 py-2 bg-white border-2 border-slate-400 hover:bg-slate-100 text-black rounded-xl disabled:opacity-40 disabled:cursor-not-allowed transition-all font-normal">← Anterior</button>

            <button id="btnNext" title="Página siguiente de resultados" class="px-4 py-2 bg-white border-2 border-slate-400 hover:bg-slate-100 text-black rounded-xl disabled:opacity-40 disabled:cursor-not-allowed transition-all font-normal">Siguiente →</button>
        </div>

    <div id="confirmModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[150] hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 text-center border-2 border-slate-400 shadow-2xl">
            <div class="w-16 h-16 rounded-full bg-rose-50 text-rose-600 flex items-center justify-center mx-auto mb-4 border-2 border-rose-300">
                <i class="fas fa-exclamation-triangle text-2xl"></i>
            </div>
            <h3 class="text-lg font-normal text-black mb-2" id="confirmTitle">Confirmar Acción</h3>
            <p class="text-sm text-slate-800 font-medium mb-6" id="confirmText">¿Estás seguro de realizar esta acción?</p>
            <div class="flex gap-3 justify-center">
                <button id="btnConfirmCancel" class="px-4 py-2 bg-slate-200 hover:bg-slate-300 text-black rounded-xl text-xs font-normal transition-all">Cancelar</button>
                <button id="btnConfirmAccept" class="px-5 py-2 bg-rose-600 hover:bg-rose-700 text-white rounded-xl text-xs font-normal transition-all shadow-md">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        var API_BASE = "https://gestordecursos.pegui.edu.co:8000";
        const API_CLIENTS = `${API_BASE}/clients`;
        const HEADERS = { "Content-Type": "application/json" };
        let currentPage = 1, limit = 10, lastPageCount = 0;

        const token = window.parent.localStorage.getItem("token") || localStorage.getItem("token");
        if (token) {
            HEADERS['Authorization'] = `Bearer ${token}`;
        } else {
            console.error("No se encontró token de autorización.");
        }

        // --- Elegant Toast Alerts ---
        function showNotification(type, message) {
            const container = document.getElementById('customToastContainer');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = `flex items-center p-3 rounded-xl shadow-xl border-2 backdrop-blur-md transform translate-y-2 opacity-0 transition-all duration-300 pointer-events-auto ${
                type === 'success' 
                    ? 'bg-emerald-50 border-emerald-400 text-emerald-900' 
                    : 'bg-rose-50 border-rose-400 text-rose-900'
            }`;
            toast.innerHTML = `
                <span class="mr-2 text-lg">${type === 'success' ? '✨' : '⚠️'}</span>
                <div class="text-xs font-normal tracking-wide">${message}</div>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.remove('translate-y-2', 'opacity-0');
            }, 50);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }
        
        window.alert = function(msg) {
            const isSuccess = msg.includes('✅') || msg.toLowerCase().includes('éxito') || msg.toLowerCase().includes('cambiado');
            showNotification(isSuccess ? 'success' : 'error', msg.replace(/[✅❌]/g, '').trim());
        };

        // --- Custom Promise Confirmation Modal ---
        function openConfirmModal(msg) {
            return new Promise((resolve) => {
                const modal = document.getElementById('confirmModal');
                const text = document.getElementById('confirmText');
                const btnAccept = document.getElementById('btnConfirmAccept');
                const btnCancel = document.getElementById('btnConfirmCancel');
                
                text.textContent = msg;
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                
                const handleAccept = () => {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                    cleanup();
                    resolve(true);
                };
                const handleCancel = () => {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                    cleanup();
                    resolve(false);
                };
                const cleanup = () => {
                    btnAccept.removeEventListener('click', handleAccept);
                    btnCancel.removeEventListener('click', handleCancel);
                };
                btnAccept.addEventListener('click', handleAccept);
                btnCancel.addEventListener('click', handleCancel);
            });
        }

        async function fetchClients(page = 1) {
            currentPage = page;
            const url = new URL(API_CLIENTS, window.location.origin);
            url.searchParams.set("skip", (page - 1) * limit);
            url.searchParams.set("limit", limit);

            const texto = document.getElementById("filtroTexto").value.trim();
            const estado = document.getElementById("filtroEstado").value;

            if (texto) url.searchParams.set("nombre", texto);
            if (estado !== "todos") url.searchParams.set("estado", estado === "activo" ? "true" : "false");

            try {
                const res = await fetch(url, { headers: HEADERS });
                if (!res.ok) throw new Error("Error al cargar clientes");
                const data = await res.json();
                lastPageCount = data.length;
                renderClients(data);
                updatePagination();
            } catch (error) {
                console.error(error);
                alert("❌ No se pudieron cargar los clientes.");
            }
        }

        function renderClients(clients) {
            const tbody = document.getElementById("clientTableBody");
            const welcomeContainer = document.getElementById("welcomeContainer");
            tbody.innerHTML = "";
            
            const texto = document.getElementById("filtroTexto").value.trim();
            const estado = document.getElementById("filtroEstado").value;

            if (clients.length === 0 && currentPage === 1 && !texto && estado === 'todos') {
                tbody.parentElement.classList.add("hidden");
                welcomeContainer.classList.remove("hidden");
                return;
            }
            
            tbody.parentElement.classList.remove("hidden");
            welcomeContainer.classList.add("hidden");

            if (clients.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center py-6 text-slate-700 font-normal">No se encontraron clientes con esos filtros.</td></tr>`;
                return;
            }

            clients.forEach(c => {
                const row = `
                <tr class="hover:bg-slate-50 transition-colors border-b border-slate-200">
                    <td class="px-6 py-4 font-normal text-black">${c.nombre}</td>
                    <td class="px-6 py-4 text-slate-800 font-mono text-xs font-normal">${c.tipo_documento || ""} ${c.documento || ""}</td>
                    <td class="px-6 py-4 text-slate-800 font-normal">${c.email}</td>
                    <td class="px-6 py-4">
                        ${c.estado 
                            ? '<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-normal bg-emerald-100 text-emerald-800 border-2 border-emerald-300">🟢 Activo</span>' 
                            : '<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-normal bg-rose-100 text-rose-800 border-2 border-rose-300">🔴 Inactivo</span>'
                        }
                    </td>
                    <td class="px-6 py-4 flex gap-1.5">
                        <button class="action-btn bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border-2 border-indigo-300 view-btn" data-id="${c.uid}" title="Ver Detalles"><i class="fas fa-eye"></i></button>
                        <button class="action-btn bg-amber-50 hover:bg-amber-100 text-amber-700 border-2 border-amber-300 edit-btn" data-id="${c.uid}" title="Editar Cliente"><i class="fas fa-pencil-alt"></i></button>
                        
                        <button class="action-btn bg-emerald-50 hover:bg-emerald-100 text-emerald-700 border-2 border-emerald-300 create-project-btn" 
                                data-id="${c.uid}" 
                                data-name="${encodeURIComponent(c.nombre)}" 
                                title="Crear Proyecto para este Cliente">
                            <i class="fas fa-folder-plus"></i>
                        </button>

                        <button class="action-btn ${c.estado ? 'bg-rose-50 hover:bg-rose-100 text-rose-700 border-2 border-rose-300' : 'bg-emerald-50 hover:bg-emerald-100 text-emerald-700 border-2 border-emerald-300'} toggle-btn" 
                                data-id="${c.uid}" data-active="${c.estado}" title="${c.estado ? 'Desactivar' : 'Activar'}">
                            ${c.estado ? '<i class="fas fa-trash-alt"></i>' : '<i class="fas fa-check-circle"></i>'}
                        </button>
                    </td>
                </tr>`;
                tbody.insertAdjacentHTML("beforeend", row);
            });

            document.querySelectorAll(".view-btn").forEach(btn =>
                btn.addEventListener("click", e => openDetail(e.currentTarget.dataset.id))
            );
            document.querySelectorAll(".edit-btn").forEach(btn =>
                btn.addEventListener("click", e => openEdit(e.currentTarget.dataset.id))
            );
            document.querySelectorAll(".toggle-btn").forEach(btn =>
                btn.addEventListener("click", e => toggleClient(e.currentTarget.dataset.id, e.currentTarget.dataset.active === "true"))
            );
            document.querySelectorAll(".create-project-btn").forEach(btn =>
                btn.addEventListener("click", e => openCreateProject(e.currentTarget.dataset.id, e.currentTarget.dataset.name))
            );
        }

        function updatePagination() {
            document.getElementById("btnPrev").disabled = (currentPage === 1);
            document.getElementById("btnNext").disabled = (lastPageCount < limit);
            document.getElementById("pagerInfo").textContent = `Página ${currentPage}`;
        }

        async function toggleClient(id, active) {
            const confirmMsg = active ? "¿Seguro que deseas desactivar a este cliente del sistema?" : "¿Deseas activar de nuevo a este cliente?";
            const confirmed = await openConfirmModal(confirmMsg);
            if (!confirmed) return;
            try {
                const res = await fetch(`${API_CLIENTS}/${id}/status`, {
                    method: "PATCH",
                    headers: HEADERS,
                    body: JSON.stringify({ estado: !active })
                });
                if (!res.ok) throw new Error("No se pudo cambiar el estado del cliente");
                showNotification('success', '✅ Estado de afiliación de cliente actualizado correctamente.');
                await fetchClients(currentPage);
            } catch (err) {
                console.error(err);
                alert("❌ Error al actualizar el estado del cliente.");
            }
        }

        function openDetail(id) {
            window.location.href = `clientes_detalle.html?id=${id}`;
        }

        function openEdit(id) {
            if (id) {
                window.location.href = `clientes_editar.html?id=${id}`;
            } else {
                window.location.href = `clientes_crear.html`;
            }
        }

        function openCreateProject(clientId, clientName) {
            if (!clientId || !clientName) return;
            window.location.href = `../projects/create.html?clientId=${clientId}&clientName=${clientName}`;
        }

        document.addEventListener("DOMContentLoaded", () => {
            fetchClients();
            document.getElementById("btnNext").addEventListener("click", () => fetchClients(currentPage + 1));
            document.getElementById("btnPrev").addEventListener("click", () => fetchClients(currentPage - 1));
            document.getElementById("filtroTexto").addEventListener("input", () => fetchClients(1));
            document.getElementById("filtroEstado").addEventListener("change", () => fetchClients(1));
            document.getElementById("btnCreate").addEventListener("click", () => openEdit(null));
        });
    </script>

    <script>
        (function(){
            if(window.__ttLoaded) return;
            window.__ttLoaded=true;
            let el=null;
            document.addEventListener('mouseover',function(e){
                var t=e.target.closest('[data-tooltip]');
                if(!t)return;
                var txt=t.getAttribute('data-tooltip');
                if(!txt)return;
                if(el)el.remove();
                el=document.createElement('div');
                el.className='vm-tooltip';
                el.textContent=txt;
                document.body.appendChild(el);
                var r=t.getBoundingClientRect(),pos=t.getAttribute('data-tooltip-position')||'top';
                requestAnimationFrame(function(){
                    if(!el)return;
                    var tr=el.getBoundingClientRect(),top=0,left=0;
                    if(pos==='top'){
                        top=r.top+window.scrollY-tr.height-8;
                        left=r.left+window.scrollX+(r.width/2)-(tr.width/2);
                    }else if(pos==='bottom'){
                        top=r.bottom+window.scrollY+8;
                        left=r.left+window.scrollX+(r.width/2)-(tr.width/2);
                    }else if(pos==='left'){
                        top=r.top+window.scrollY+(r.height/2)-(tr.height/2);
                        left=r.left+window.scrollX-tr.width-8;
                    }else if(pos==='right'){
                        top=r.top+window.scrollY+(r.height/2)-(r.height/2);
                        left=r.right+window.scrollX+8;
                    }
                    if(left<5)left=5;
                    if(left+tr.width>window.innerWidth-5)left=window.innerWidth-tr.width-5;
                    el.style.top=top+'px';
                    el.style.left=left+'px';
                    el.classList.add('visible');
                });
            });
            document.addEventListener('mouseout',function(e){
                if(e.target.closest('[data-tooltip]')&&el){
                    el.classList.remove('visible');
                    setTimeout(function(){if(el){el.remove();el=null}},150);
                }
            });
        })();
    </script>
    <script src="/staging/js/roles.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const path = window.location.pathname;
            const allowedRoles = ['superadmin', 'admin', 'coordinador', 'cliente', 'disenador-instruccional', 'autor', 'revisor-qa', 'editor', 'desarrollador-multimedia', 'abogado', 'disenador-grafico', 'animador-2d', 'animador-3d', 'video', 'corrector-de-estilo', 'ingeniero-lms', 'registrado'];
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/staging/';
                return;
            }
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                const userRoles = payload.roles || [payload.role].filter(Boolean);
                if (!userRoles.some(r => allowedRoles.includes(r))) {
                    window.location.href = '/staging/';
                    return;
                }
            } catch(e) {
                window.location.href = '/staging/';
            }
        });
    </script>

                    'menu-metricas': ['reportes_metricas_ver'],
                    'menu-diseno-instruccional': ['diseno_instruccional_ver', 'diseno_instruccional_crear'],
                    'menu-autor-contenido': ['autor_ver', 'autor_crear'],
                    'menu-microcursos': ['capacitacion_microcursos_ver'],
                    'menu-tutoriales': ['capacitacion_tutoriales_ver'],
                    'menu-faq': ['capacitacion_faq_ver'],
                };
                Object.entries(menuPermissions).forEach(([id, required]) => {
                    const el = document.getElementById(id);
                    if (el && !hasAnyPermission(required)) {
                        el.style.display = 'none';
                    }
                });
            } catch(e) {}
        })();
    </script>
    <script src="/staging/js/theme-manager.js"></script>
</body>
</html>
