<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Proyectos - VirtualMind</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/fetch-con-token.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .card-project { transition: all 0.3s ease; }
    .card-project:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    .badge { @apply px-3 py-1 rounded-full text-xs font-semibold; }
    .badge-planificado { @apply bg-blue-100 text-blue-700 border border-blue-200; }
    .badge-desarrollo { @apply bg-yellow-100 text-yellow-700 border border-yellow-200; }
    .badge-aprobado { @apply bg-green-100 text-green-700 border border-green-200; }
    .badge-aplazado { @apply bg-orange-100 text-orange-700 border border-orange-200; }
    .badge-finalizado { @apply bg-emerald-100 text-emerald-700 border border-emerald-200; }
    .badge-cancelado { @apply bg-red-100 text-red-700 border border-red-200; }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .loading-spinner { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen bg-slate-50">

  <!-- Header -->
  <div class="bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-500 shadow-xl">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-6">
        <div class="fade-in">
          <h1 class="text-3xl md:text-4xl font-bold text-white flex items-center gap-3">
            <span class="p-2 bg-white/20 rounded-xl">📊</span>
            Proyectos
          </h1>
          <p class="text-indigo-100 mt-2 text-lg">Gestión de proyectos E-learning</p>
        </div>
        
        <!-- Filtros -->
        <div class="flex flex-wrap gap-3 fade-in">
          <div class="relative">
            <select id="filtroEstado" class="appearance-none bg-white/95 backdrop-blur-sm text-gray-700 px-4 py-3 pr-10 rounded-xl shadow-lg border-0 focus:ring-2 focus:ring-white/50 cursor-pointer">
              <option value="">📋 Todos los estados</option>
              <option value="Planificado">📋 Planificado</option>
              <option value="En desarrollo">⚡ En desarrollo</option>
              <option value="Aprobado">✅ Aprobado</option>
              <option value="Aplazado">⏸️ Aplazado</option>
              <option value="Finalizado">🎉 Finalizado</option>
              <option value="Cancelado">❌ Cancelado</option>
            </select>
            <div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none">▼</div>
          </div>
          
          <div class="relative">
            <input type="text" id="filtroCliente" placeholder="🔍 Cliente..." class="bg-white/95 backdrop-blur-sm text-gray-700 px-4 py-3 rounded-xl shadow-lg border-0 focus:ring-2 focus:ring-white/50 w-48">
          </div>
          
          <div class="relative">
            <input type="text" id="filtroNombre" placeholder="🔍 Proyecto..." class="bg-white/95 backdrop-blur-sm text-gray-700 px-4 py-3 rounded-xl shadow-lg border-0 focus:ring-2 focus:ring-white/50 w-48">
          </div>
        </div>

        <!-- Botones -->
        <div class="flex gap-3 fade-in">
          <button onclick="cargarProyectos()" class="bg-white/20 hover:bg-white/30 text-white px-5 py-3 rounded-xl font-semibold flex items-center gap-2 transition-all">
            <span>🔄</span> Actualizar
          </button>
          <button onclick="exportarPDF()" class="bg-red-500 hover:bg-red-600 text-white px-5 py-3 rounded-xl font-semibold flex items-center gap-2 transition-all shadow-lg">
            <span>📄</span> PDF
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Contenido Principal -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
        <div class="text-3xl font-bold text-indigo-600" id="statTotal">0</div>
        <div class="text-sm text-gray-500">Total Proyectos</div>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
        <div class="text-3xl font-bold text-blue-600" id="statPlanificado">0</div>
        <div class="text-sm text-gray-500">Planificados</div>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
        <div class="text-3xl font-bold text-yellow-600" id="statDesarrollo">0</div>
        <div class="text-sm text-gray-500">En Desarrollo</div>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
        <div class="text-3xl font-bold text-green-600" id="statFinalizado">0</div>
        <div class="text-sm text-gray-500">Finalizados</div>
      </div>
    </div>

    <!-- Grid de Proyectos -->
    <div id="proyectosGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
      <div class="col-span-full py-20 text-center">
        <div class="inline-flex items-center gap-3 text-gray-500 text-lg">
          <div class="w-8 h-8 border-3 border-indigo-500 border-t-transparent rounded-full loading-spinner"></div>
          Cargando proyectos...
        </div>
      </div>
    </div>

    <!-- Tabla Oculta para PDF -->
    <div id="tablaProyectos" class="hidden"></div>
  </div>

  <!-- Modal Detalles -->
  <div id="modalDetalles" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto">
      <div class="sticky top-0 bg-gradient-to-r from-indigo-600 to-purple-600 p-6 rounded-t-2xl">
        <div class="flex justify-between items-center">
          <h2 class="text-2xl font-bold text-white" id="modalTitulo">Detalles del Proyecto</h2>
          <button onclick="cerrarModal()" class="text-white/80 hover:text-white text-2xl">✕</button>
        </div>
      </div>
      <div class="p-6" id="modalContenido"></div>
    </div>
  </div>

  <script>
    const API_URL = "https://gestordecursos.pegui.edu.co:8000";
    let todosProyectos = [];
    let clientesCache = {};

    // Badges de estado
    function getBadge(estado) {
      const badges = {
        'Planificado': 'badge-planificado',
        'En desarrollo': 'badge-desarrollo',
        'Aprobado': 'badge-aprobado',
        'Aplazado': 'badge-aplazado',
        'Finalizado': 'badge-finalizado',
        'Cancelado': 'badge-cancelado'
      };
      return badges[estado] || 'bg-gray-100 text-gray-700';
    }

    // Obtener nombre del cliente
    async function getNombreCliente(client_id) {
      if (!client_id) return 'Sin cliente';
      if (clientesCache[client_id]) return clientesCache[client_id];
      
      try {
        const token = localStorage.getItem("token");
        const resp = await fetch(`${API_URL}/users/${client_id}`, {
          headers: { "Authorization": "Bearer " + token }
        });
        if (resp.ok) {
          const data = await resp.json();
          const nombre = data.name || data.nombre || 'Cliente';
          clientesCache[client_id] = nombre;
          return nombre;
        }
      } catch {}
      return 'Cliente';
    }

    // Renderizar proyectos como cards
    async function cargarProyectos() {
      const grid = document.getElementById('proyectosGrid');
      const estadoFiltro = document.getElementById('filtroEstado').value;
      const clienteFiltro = document.getElementById('filtroCliente').value.toLowerCase();
      const nombreFiltro = document.getElementById('filtroNombre').value.toLowerCase();

      grid.innerHTML = `
        <div class="col-span-full py-20 text-center">
          <div class="inline-flex items-center gap-3 text-gray-500 text-lg">
            <div class="w-8 h-8 border-3 border-indigo-500 border-t-transparent rounded-full loading-spinner"></div>
            Cargando proyectos...
          </div>
        </div>
      `;

      try {
        let url = `${API_URL}/projects/`;
        if (estadoFiltro) url += `?estado=${encodeURIComponent(estadoFiltro)}`;
        
        const resp = await fetch(url);
        if (!resp.ok) throw new Error("Error al cargar proyectos");
        
        todosProyectos = await resp.json();
        
        // Cargar nombres de clientes
        for (let p of todosProyectos) {
          if (p.client_id && !clientesCache[p.client_id]) {
            getNombreCliente(p.client_id).then(n => {
              clientesCache[p.client_id] = n;
              renderProyectos();
            });
          }
        }

        renderProyectos();
        actualizarStats();
        
      } catch (e) {
        grid.innerHTML = `
          <div class="col-span-full py-20 text-center">
            <div class="text-6xl mb-4">⚠️</div>
            <div class="text-red-500 text-lg font-semibold">Error al cargar proyectos</div>
            <p class="text-gray-500 mt-2">${e.message}</p>
            <button onclick="cargarProyectos()" class="mt-4 bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">Reintentar</button>
          </div>
        `;
      }
    }

    function renderProyectos() {
      const grid = document.getElementById('proyectosGrid');
      const estadoFiltro = document.getElementById('filtroEstado').value;
      const clienteFiltro = document.getElementById('filtroCliente').value.toLowerCase();
      const nombreFiltro = document.getElementById('filtroNombre').value.toLowerCase();

      let proyectos = todosProyectos.filter(p => {
        const nombreCliente = clientesCache[p.client_id] || '';
        const matchEstado = !estadoFiltro || p.estado === estadoFiltro;
        const matchCliente = !clienteFiltro || nombreCliente.toLowerCase().includes(clienteFiltro);
        const matchNombre = !nombreFiltro || (p.name || '').toLowerCase().includes(nombreFiltro);
        return matchEstado && matchCliente && matchNombre;
      });

      if (!proyectos.length) {
        grid.innerHTML = `
          <div class="col-span-full py-20 text-center">
            <div class="text-6xl mb-4">📋</div>
            <div class="text-gray-500 text-lg">No hay proyectos para mostrar</div>
          </div>
        `;
        return;
      }

      grid.innerHTML = proyectos.map((proj, idx) => {
        const clienteNombre = clientesCache[proj.client_id] || 'Cargando...';
        const inicial = clienteNombre.charAt(0).toUpperCase();
        
        return `
          <div class="card-project bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden fade-in" style="animation-delay: ${idx * 0.05}s">
            <div class="bg-gradient-to-r from-indigo-50 to-purple-50 p-4 border-b border-slate-100">
              <div class="flex justify-between items-start">
                <div>
                  <span class="inline-flex items-center justify-center w-8 h-8 bg-indigo-100 text-indigo-700 rounded-lg text-sm font-bold">
                    ${proj.id}
                  </span>
                  <span class="ml-2 badge ${getBadge(proj.estado)}">${proj.estado || 'Sin estado'}</span>
                </div>
                <span class="text-xs text-gray-400">${proj.tipo_proyecto || 'Curso'}</span>
              </div>
            </div>
            
            <div class="p-5">
              <h3 class="font-bold text-lg text-gray-800 mb-3 line-clamp-2">${proj.name || 'Sin título'}</h3>
              
              <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-400 to-purple-500 rounded-full flex items-center justify-center text-white font-bold">
                  ${inicial}
                </div>
                <div>
                  <div class="text-sm font-medium text-gray-700">${clienteNombre}</div>
                  <div class="text-xs text-gray-400">${proj.codigo_referencia || 'Sin referencia'}</div>
                </div>
              </div>

              <div class="grid grid-cols-2 gap-3 text-sm mb-4">
                <div class="bg-slate-50 rounded-lg p-2">
                  <div class="text-xs text-gray-400">Inicio</div>
                  <div class="font-medium text-gray-700">${proj.start_date || '—'}</div>
                </div>
                <div class="bg-slate-50 rounded-lg p-2">
                  <div class="text-xs text-gray-400">Fin</div>
                  <div class="font-medium text-gray-700">${proj.end_date || '—'}</div>
                </div>
              </div>

              ${proj.horas_curso ? `
              <div class="flex items-center gap-2 text-sm text-gray-500 mb-4">
                <span class="bg-blue-100 text-blue-700 px-2 py-1 rounded-full text-xs font-medium">
                  ⏱️ ${proj.horas_curso}h
                </span>
                ${proj.idioma ? `<span>🌐 ${proj.idioma}</span>` : ''}
              </div>
              ` : ''}

              <p class="text-sm text-gray-500 line-clamp-2 mb-4">${proj.description || 'Sin descripción'}</p>

              <div class="flex flex-wrap gap-2">
                <button onclick="verProyecto(${proj.id})" title="Ver detalles del proyecto" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-2 px-3 rounded-lg text-sm font-medium transition-colors">
                  👁️ Ver
                </button>
                <button onclick="actualizarProyecto(${proj.id})" title="Editar proyecto" class="bg-purple-100 hover:bg-purple-200 text-purple-700 py-2 px-3 rounded-lg text-sm font-medium transition-colors">
                  ✏️
                </button>
                <button onclick="crearCronograma(${proj.id})" title="Crear cronograma" class="bg-blue-100 hover:bg-blue-200 text-blue-700 py-2 px-3 rounded-lg text-sm font-medium transition-colors">
                  📆
                </button>
                <button onclick="crearPlanFormacion(${proj.id})" title="Crear plan de formación" class="bg-green-100 hover:bg-green-200 text-green-700 py-2 px-3 rounded-lg text-sm font-medium transition-colors">
                  📋
                </button>
                <button onclick="subirDocumentos(${proj.id})" title="Subir documentos" class="bg-orange-100 hover:bg-orange-200 text-orange-700 py-2 px-3 rounded-lg text-sm font-medium transition-colors">
                  📁
                </button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // Actualizar estadísticas
    function actualizarStats() {
      const total = todosProyectos.length;
      const planificado = todosProyectos.filter(p => p.estado === 'Planificado').length;
      const desarrollo = todosProyectos.filter(p => p.estado === 'En desarrollo').length;
      const finalizado = todosProyectos.filter(p => p.estado === 'Finalizado').length;

      document.getElementById('statTotal').textContent = total;
      document.getElementById('statPlanificado').textContent = planificado;
      document.getElementById('statDesarrollo').textContent = desarrollo;
      document.getElementById('statFinalizado').textContent = finalizados;
    }

    // Ver proyecto en modal
    async function verProyecto(id) {
      const proyecto = todosProyectos.find(p => p.id === id);
      if (!proyecto) return;

      const clienteNombre = clientesCache[proyecto.client_id] || 'Cargando...';
      
      document.getElementById('modalTitulo').textContent = proyecto.name || 'Detalles del Proyecto';
      document.getElementById('modalContenido').innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-4">
            <h3 class="font-bold text-gray-800 border-b pb-2">📋 Información General</h3>
            <div class="grid grid-cols-2 gap-3 text-sm">
              <div><span class="text-gray-500">ID:</span> <span class="font-medium">${proyecto.id}</span></div>
              <div><span class="text-gray-500">Estado:</span> <span class="badge ${getBadge(proyecto.estado)}">${proyecto.estado}</span></div>
              <div><span class="text-gray-500">Tipo:</span> <span class="font-medium">${proyecto.tipo_proyecto || '—'}</span></div>
              <div><span class="text-gray-500">Horas:</span> <span class="font-medium">${proyecto.horas_curso || '—'}</span></div>
              <div><span class="text-gray-500">Inicio:</span> <span class="font-medium">${proyecto.start_date || '—'}</span></div>
              <div><span class="text-gray-500">Fin:</span> <span class="font-medium">${proyecto.end_date || '—'}</span></div>
            </div>
            
            <h3 class="font-bold text-gray-800 border-b pb-2 mt-6">👤 Cliente</h3>
            <div class="flex items-center gap-3">
              <div class="w-12 h-12 bg-gradient-to-br from-blue-400 to-purple-500 rounded-full flex items-center justify-center text-white font-bold">
                ${clienteNombre.charAt(0)}
              </div>
              <div>
                <div class="font-medium">${clienteNombre}</div>
                <div class="text-sm text-gray-500">${proyecto.codigo_referencia || 'Sin referencia'}</div>
              </div>
            </div>
          </div>
          
          <div class="space-y-4">
            <h3 class="font-bold text-gray-800 border-b pb-2">📝 Descripción</h3>
            <p class="text-sm text-gray-600">${proyecto.description || 'Sin descripción'}</p>
            
            <h3 class="font-bold text-gray-800 border-b pb-2 mt-6">🌐 Configuración</h3>
            <div class="grid grid-cols-2 gap-3 text-sm">
              <div><span class="text-gray-500">Idioma:</span> ${proyecto.idioma || '—'}</div>
              <div><span class="text-gray-500">Lenguaje Incluyente:</span> ${proyecto.lenguaje_incluyente ? '✅' : '❌'}</div>
              <div><span class="text-gray-500">Inclusión Digital:</span> ${proyecto.inclusion_digital ? '✅' : '❌'}</div>
              <div><span class="text-gray-500">Horas Autónomas:</span> ${proyecto.horas_aprendizaje_autonomo_virtual || '—'}</div>
            </div>
          </div>
        </div>
        
        <div class="mt-6 flex gap-3">
          <button onclick="actualizarProyecto(${proyecto.id})" title="Editar proyecto" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-medium">
            ✏️ Editar
          </button>
          <button onclick="crearCronograma(${proyecto.id})" title="Crear cronograma" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium">
            📆 Cronograma
          </button>
          <button onclick="crearPlanFormacion(${proyecto.id})" title="Crear plan de formación" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-medium">
            📋 Plan de Estudio
          </button>
        </div>
      `;
      
      document.getElementById('modalDetalles').classList.remove('hidden');
      document.getElementById('modalDetalles').classList.add('flex');
    }

    function cerrarModal() {
      document.getElementById('modalDetalles').classList.add('hidden');
      document.getElementById('modalDetalles').classList.remove('flex');
    }

    // Funciones de acción
    function verProyecto(id) { window.location.href = `read.html?id=${id}`; }
    function actualizarProyecto(id) { window.location.href = `edit.html?id=${id}`; }
    function crearCronograma(id) { window.location.href = `../cronograma/form-cronograma.html?project_id=${id}`; }
    function crearPlanFormacion(id) { window.location.href = `../studyplan/index.html?project_id=${id}`; }
    function subirDocumentos(id) { window.location.href = `../documentos/index.html?project_id=${id}`; }

    // Filtros en tiempo real
    document.getElementById('filtroEstado').addEventListener('change', renderProyectos);
    document.getElementById('filtroCliente').addEventListener('input', renderProyectos);
    document.getElementById('filtroNombre').addEventListener('input', renderProyectos);

    // Cerrar modal con ESC
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') cerrarModal(); });

    // Exportar PDF
    function exportarPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      
      doc.setFontSize(18);
      doc.text("Lista de Proyectos", 14, 22);
      
      const data = todosProyectos.map(p => [
        p.id,
        p.name || '',
        clientesCache[p.client_id] || '',
        p.estado || '',
        p.tipo_proyecto || '',
        p.start_date || '',
        p.end_date || ''
      ]);

      doc.autoTable({
        head: [['ID', 'Proyecto', 'Cliente', 'Estado', 'Tipo', 'Inicio', 'Fin']],
        body: data,
        startY: 30,
        styles: { fontSize: 8 },
        headStyles: { fillColor: [79, 70, 229] }
      });

      doc.save('proyectos.pdf');
    }

    // Iniciar
    cargarProyectos();
  </script>
<script src="/js/roles.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const path = window.location.pathname;
    const isSuperadmin = path.includes('/r/superadmin/');
    const isAdmin = path.includes('/r/admin/');
    const isCoordinador = path.includes('/r/coordinador/');
    const isCliente = path.includes('/r/cliente/');
    const isDisInst = path.includes('/r/disenador-instruccional/');
    const isAutor = path.includes('/r/autor/');
    const isRevisor = path.includes('/r/revisor-qa/');
    const isEditor = path.includes('/r/editor/');
    const isDesaMult = path.includes('/r/desarrollador-multimedia/');
    const isAbogado = path.includes('/r/abogado/');
    const isDisGraf = path.includes('/r/disenador-grafico/');
    const isAnim2d = path.includes('/r/animador-2d/');
    const isAnim3d = path.includes('/r/animador-3d/');
    const isVideo = path.includes('/r/video/');
    const isCorrector = path.includes('/r/corrector-de-estilo/');
    const isIngeniero = path.includes('/r/ingeniero-lms/');
    const isRegistrado = path.includes('/r/registrado/');

    const allowedRoles = [];
    if (isSuperadmin) allowedRoles.push('superadmin');
    if (isAdmin) allowedRoles.push('admin');
    if (isCoordinador) allowedRoles.push('coordinador');
    if (isCliente) allowedRoles.push('cliente');
    if (isDisInst) allowedRoles.push('disenador-instruccional');
    if (isAutor) allowedRoles.push('autor');
    if (isRevisor) allowedRoles.push('revisor-qa');
    if (isEditor) allowedRoles.push('editor');
    if (isDesaMult) allowedRoles.push('desarrollador-multimedia');
    if (isAbogado) allowedRoles.push('abogado');
    if (isDisGraf) allowedRoles.push('disenador-grafico');
    if (isAnim2d) allowedRoles.push('animador-2d');
    if (isAnim3d) allowedRoles.push('animador-3d');
    if (isVideo) allowedRoles.push('video');
    if (isCorrector) allowedRoles.push('corrector-de-estilo');
    if (isIngeniero) allowedRoles.push('ingeniero-lms');
    if (isRegistrado) allowedRoles.push('registrado');

    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/';
        return;
    }
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const userRoles = payload.roles || [payload.role].filter(Boolean);
        if (!userRoles.some(r => allowedRoles.includes(r))) {
            window.location.href = '/';
            return;
        }
    } catch(e) {
        window.location.href = '/';
    }
});
</script>

<script>
// ==================== VERIFICACIÓN DE PERMISOS DE MENÚ ====================
(function() {
    const token = localStorage.getItem('token');
    if (!token) return;
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const permissions = payload.permissions || [];
        
        const hasPermission = (perm) => permissions.includes(perm);

})();
</script>
