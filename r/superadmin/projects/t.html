<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Proyectos - VirtualMind</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/fetch-con-token.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; }
    .card-project { transition: all 0.3s ease; }
    .card-project:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    .badge { @apply px-3 py-1 rounded-full text-xs font-semibold; }
    .badge-planificado { @apply bg-blue-100 text-blue-700 border border-blue-200; }
    .badge-desarrollo { @apply bg-yellow-100 text-yellow-700 border border-yellow-200; }
    .badge-aprobado { @apply bg-green-100 text-green-700 border border-green-200; }
    .badge-aplazado { @apply bg-orange-100 text-orange-700 border border-orange-200; }
    .badge-finalizado { @apply bg-emerald-100 text-emerald-700 border border-emerald-200; }
    .badge-cancelado { @apply bg-red-100 text-red-700 border border-red-200; }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .loading-spinner { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen bg-slate-50">

  <div class="bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-500 shadow-xl">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-6">
        <div class="fade-in">
          <h1 class="text-3xl md:text-4xl font-bold text-white flex items-center gap-3">
            <span class="p-2 bg-white/20 rounded-xl">📊</span>
            Proyectos
          </h1>
          <p class="text-indigo-100 mt-2 text-lg">Gestión de proyectos E-learning</p>
        </div>
        
        <div class="flex flex-wrap gap-3 fade-in">
          <div class="relative">
            <select id="filtroEstado" class="appearance-none bg-white/95 backdrop-blur-sm text-gray-700 px-4 py-3 pr-10 rounded-xl shadow-lg border-0 focus:ring-2 focus:ring-white/50 cursor-pointer">
              <option value="">📋 Todos los estados</option>
              <option value="Planificado">📋 Planificado</option>
              <option value="En desarrollo">⚡ En desarrollo</option>
              <option value="Aprobado">✅ Aprobado</option>
              <option value="Aplazado">⏸️ Aplazado</option>
              <option value="Finalizado">🎉 Finalizado</option>
              <option value="Cancelado">❌ Cancelado</option>
            </select>
            <div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400">▼</div>
          </div>
          
          <div class="relative">
            <input type="text" id="filtroCliente" placeholder="🔍 Cliente..." class="bg-white/95 backdrop-blur-sm text-gray-700 px-4 py-3 rounded-xl shadow-lg border-0 focus:ring-2 focus:ring-white/50 w-48">
          </div>
          
          <div class="relative">
            <input type="text" id="filtroNombre" placeholder="🔍 Proyecto..." class="bg-white/95 backdrop-blur-sm text-gray-700 px-4 py-3 rounded-xl shadow-lg border-0 focus:ring-2 focus:ring-white/50 w-48">
          </div>
        </div>

        <div class="flex gap-3 fade-in">
          <button onclick="cargarProyectos()" class="bg-white/20 hover:bg-white/30 text-white px-5 py-3 rounded-xl font-semibold flex items-center gap-2 transition-all">
            <span>🔄</span> Actualizar
          </button>
          <button onclick="exportarPDF()" class="bg-red-500 hover:bg-red-600 text-white px-5 py-3 rounded-xl font-semibold flex items-center gap-2 transition-all shadow-lg">
            <span>📄</span> PDF
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
        <div class="text-3xl font-bold text-indigo-600" id="statTotal">0</div>
        <div class="text-sm text-gray-500 font-medium uppercase tracking-wider">Total Proyectos</div>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
        <div class="text-3xl font-bold text-blue-600" id="statPlanificado">0</div>
        <div class="text-sm text-gray-500 font-medium uppercase tracking-wider">Planificados</div>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
        <div class="text-3xl font-bold text-yellow-600" id="statDesarrollo">0</div>
        <div class="text-sm text-gray-500 font-medium uppercase tracking-wider">En Desarrollo</div>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
        <div class="text-3xl font-bold text-green-600" id="statFinalizado">0</div>
        <div class="text-sm text-gray-500 font-medium uppercase tracking-wider">Finalizados</div>
      </div>
    </div>

    <div id="proyectosGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
      <div class="col-span-full py-20 text-center">
        <div class="inline-flex items-center gap-3 text-gray-400 text-lg">
          <div class="w-8 h-8 border-3 border-indigo-500 border-t-transparent rounded-full loading-spinner"></div>
          Cargando proyectos desde el servidor...
        </div>
      </div>
    </div>

  </div>

  <div id="modalDetalles" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto">
      <div class="sticky top-0 bg-gradient-to-r from-indigo-600 to-purple-600 p-6 rounded-t-2xl">
        <div class="flex justify-between items-center text-white">
          <h2 class="text-2xl font-bold" id="modalTitulo text-white">Detalles del Proyecto</h2>
          <button onclick="cerrarModal()" class="text-white/80 hover:text-white text-3xl">×</button>
        </div>
      </div>
      <div class="p-6" id="modalContenido"></div>
    </div>
  </div>

  <script>
    const API_URL = "https://gestordecursos.pegui.edu.co:8000";
    let todosProyectos = [];
    let clientesCache = {};
    let peticionesEnCurso = {}; // Mapa para evitar duplicidad de red

    function getToken() {
        return localStorage.getItem("token") || sessionStorage.getItem("token");
    }

    // Estilos de los estados
    function getBadge(estado) {
      const badges = {
        'Planificado': 'badge-planificado',
        'En desarrollo': 'badge-desarrollo',
        'Aprobado': 'badge-aprobado',
        'Aplazado': 'badge-aplazado',
        'Finalizado': 'badge-finalizado',
        'Cancelado': 'badge-cancelado'
      };
      return badges[estado] || 'bg-gray-100 text-gray-700';
    }

    // Obtener nombre del cliente (Optimizado con Caché y Semáforo de red)
    async function getNombreCliente(client_id) {
      if (!client_id) return 'Sin cliente';
      if (clientesCache[client_id]) return clientesCache[client_id];
      if (peticionesEnCurso[client_id]) return peticionesEnCurso[client_id];

      peticionesEnCurso[client_id] = (async () => {
        try {
          const token = getToken();
          const resp = await fetch(`${API_URL}/users/${client_id}`, {
            headers: { "Authorization": "Bearer " + token }
          });
          if (resp.ok) {
            const data = await resp.json();
            const nombre = data.name || data.nombre || 'Cliente';
            clientesCache[client_id] = nombre;
            return nombre;
          }
        } catch (e) {
          console.warn("Error cargando cliente:", client_id);
        } finally {
          delete peticionesEnCurso[client_id];
        }
        return 'Cliente';
      })();

      return peticionesEnCurso[client_id];
    }

    // Carga de proyectos principal
    async function cargarProyectos() {
      const grid = document.getElementById('proyectosGrid');
      const token = getToken();

      if (!token) { window.location.href = '/login.html'; return; }

      grid.innerHTML = `
        <div class="col-span-full py-20 text-center">
          <div class="inline-flex items-center gap-3 text-gray-400 text-lg">
            <div class="w-8 h-8 border-3 border-indigo-500 border-t-transparent rounded-full loading-spinner"></div>
            Consultando API...
          </div>
        </div>
      `;

      try {
        const resp = await fetch(`${API_URL}/projects/`, {
            headers: { 
              "Authorization": "Bearer " + token,
              "Content-Type": "application/json"
            }
        });
        
        if (!resp.ok) throw new Error("Error en la autenticación o servidor");
        
        todosProyectos = await resp.json();
        
        // Cargar nombres de clientes en paralelo pero sin repetir peticiones
        const promesasClientes = [...new Set(todosProyectos.map(p => p.client_id))]
            .filter(id => id)
            .map(id => getNombreCliente(id));
        
        await Promise.all(promesasClientes);

        renderProyectos();
        actualizarStats();
        
      } catch (e) {
        grid.innerHTML = `
          <div class="col-span-full py-20 text-center">
            <div class="text-red-500 text-4xl mb-4">⚠️</div>
            <div class="text-red-600 text-xl font-bold">Error de Conexión</div>
            <p class="text-gray-500 mt-2">${e.message}</p>
            <button onclick="cargarProyectos()" class="mt-6 bg-indigo-600 text-white px-8 py-3 rounded-xl hover:bg-indigo-700 transition-all shadow-lg">Reintentar</button>
          </div>
        `;
      }
    }

    // Dibujar tarjetas en pantalla
    function renderProyectos() {
      const grid = document.getElementById('proyectosGrid');
      const estadoFiltro = document.getElementById('filtroEstado').value;
      const clienteFiltro = document.getElementById('filtroCliente').value.toLowerCase();
      const nombreFiltro = document.getElementById('filtroNombre').value.toLowerCase();

      let proyectos = todosProyectos.filter(p => {
        const nombreCliente = (clientesCache[p.client_id] || '').toLowerCase();
        const matchEstado = !estadoFiltro || p.estado === estadoFiltro;
        const matchCliente = !clienteFiltro || nombreCliente.includes(clienteFiltro);
        const matchNombre = !nombreFiltro || (p.name || '').toLowerCase().includes(nombreFiltro);
        return matchEstado && matchCliente && matchNombre;
      });

      if (!proyectos.length) {
        grid.innerHTML = `
          <div class="col-span-full py-20 text-center text-gray-400">
             <span class="text-6xl block mb-4">📋</span>
             <p class="text-xl">No se encontraron proyectos con estos criterios.</p>
          </div>`;
        return;
      }

      grid.innerHTML = proyectos.map((proj, idx) => {
        const clienteNombre = clientesCache[proj.client_id] || 'Cliente VirtualMind';
        const inicial = clienteNombre.charAt(0).toUpperCase();
        
        return `
          <div class="card-project bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden fade-in" style="animation-delay: ${idx * 0.03}s">
            <div class="bg-gradient-to-r from-slate-50 to-indigo-50 p-4 border-b border-slate-100">
              <div class="flex justify-between items-start">
                <div class="flex items-center">
                  <span class="inline-flex items-center justify-center w-7 h-7 bg-indigo-600 text-white rounded-lg text-xs font-bold shadow-sm">${proj.id}</span>
                  <span class="ml-2 badge ${getBadge(proj.estado)}">${proj.estado || 'Planificado'}</span>
                </div>
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">${proj.tipo_proyecto || 'E-learning'}</span>
              </div>
            </div>
            
            <div class="p-5">
              <h3 class="font-bold text-lg text-gray-800 mb-3 line-clamp-1">${proj.name || 'Sin título'}</h3>
              
              <div class="flex items-center gap-3 mb-4">
                <div class="w-9 h-9 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-full flex items-center justify-center text-white text-sm font-black shadow-md">${inicial}</div>
                <div>
                  <div class="text-sm font-semibold text-gray-700">${clienteNombre}</div>
                  <div class="text-[11px] text-gray-400 font-mono">${proj.codigo_referencia || 'VM-PROJECT'}</div>
                </div>
              </div>

              <div class="grid grid-cols-2 gap-3 text-xs mb-4">
                <div class="bg-slate-50 rounded-xl p-3 border border-slate-100">
                  <div class="text-gray-400 mb-1">📅 Inicio</div>
                  <div class="font-bold text-gray-700">${proj.start_date || '—'}</div>
                </div>
                <div class="bg-slate-50 rounded-xl p-3 border border-slate-100">
                  <div class="text-gray-400 mb-1">🏁 Fin</div>
                  <div class="font-bold text-gray-700">${proj.end_date || '—'}</div>
                </div>
              </div>

              <p class="text-sm text-gray-500 line-clamp-2 mb-5 h-10 italic">"${proj.description || 'Sin descripción disponible'}"</p>

              <div class="flex flex-wrap gap-2">
                <button onclick="verProyecto(${proj.id})" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-xl text-sm font-bold transition-all shadow-md active:scale-95">👁️ Ver</button>
                <button onclick="actualizarProyecto(${proj.id})" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2.5 rounded-xl text-sm font-bold transition-all">✏️</button>
                <button onclick="crearPlanFormacion(${proj.id})" title="Plan de Formación" class="bg-emerald-50 hover:bg-emerald-100 text-emerald-700 px-4 py-2.5 rounded-xl text-sm transition-all border border-emerald-100">📋</button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // Totales de la parte superior
    function actualizarStats() {
      const total = todosProyectos.length;
      const planificado = todosProyectos.filter(p => p.estado === 'Planificado').length;
      const desarrollo = todosProyectos.filter(p => p.estado === 'En desarrollo').length;
      const finalizado = todosProyectos.filter(p => p.estado === 'Finalizado').length;

      document.getElementById('statTotal').textContent = total;
      document.getElementById('statPlanificado').textContent = planificado;
      document.getElementById('statDesarrollo').textContent = desarrollo;
      document.getElementById('statFinalizado').textContent = finalizado;
    }

    // Acciones de navegación
    function verProyecto(id) { window.location.href = `read.html?id=${id}`; }
    function actualizarProyecto(id) { window.location.href = `edit.html?id=${id}`; }
    function crearPlanFormacion(id) { window.location.href = `../studyplan/index.html?project_id=${id}`; }

    function cerrarModal() { 
      document.getElementById('modalDetalles').classList.add('hidden'); 
    }

    // PDF Export
    function exportarPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFontSize(20);
      doc.setTextColor(79, 70, 229);
      doc.text("Reporte General de Proyectos - VirtualMind", 14, 20);
      
      const data = todosProyectos.map(p => [
        p.id, p.name || 'N/A', clientesCache[p.client_id] || 'N/A', p.estado || 'N/A', p.start_date || '—'
      ]);

      doc.autoTable({
        head: [['ID', 'Proyecto', 'Cliente', 'Estado', 'Fecha Inicio']],
        body: data,
        startY: 30,
        theme: 'grid',
        headStyles: { fillColor: [79, 70, 229] }
      });

      doc.save(`VirtualMind_Proyectos_${new Date().toISOString().slice(0,10)}.pdf`);
    }

    // Listeners para filtros
    document.getElementById('filtroEstado').addEventListener('change', renderProyectos);
    document.getElementById('filtroCliente').addEventListener('input', renderProyectos);
    document.getElementById('filtroNombre').addEventListener('input', renderProyectos);

    // Iniciar carga al entrar
    window.onload = cargarProyectos;
  </script>

  <script src="/js/roles.js"></script>
  <script>
    (function() {
        const token = localStorage.getItem('token');
        if (!token) return;
        try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            const permissions = payload.permissions || [];
            const hasAnyPermission = (perms) => perms.some(p => permissions.includes(p));
            
            const menuPermissions = {
                'menu-proyectos': ['proyectos_crear', 'proyectos_consultar'],
                'menu-crear-proyecto': ['proyectos_crear'],
                'menu-ia': ['ia_produccion_imagen', 'ia_linguistica_usar'],
                'menu-drive': ['archivos_drive_personal_ver', 'archivos_drive_global_ver'],
            };
            
            Object.entries(menuPermissions).forEach(([id, required]) => {
                const el = document.getElementById(id);
                if (el && !hasAnyPermission(required)) el.style.display = 'none';
            });
        } catch(e) {}
    })();
  </script>
</body>
</html>
