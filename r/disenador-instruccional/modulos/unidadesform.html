<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Unidad - Formulario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%); min-height: 100vh; }
        .form-input { @apply w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-300; }
        .header-gradient { background: linear-gradient(90deg, #3b82f6 0%, #6366f1 100%); }
    </style>
</head>
<body class="bg-slate-50">

    <div class="header-gradient text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex items-center justify-between">
                <h1 class="text-3xl font-bold flex items-center"><i class="fas fa-file-alt text-white mr-3"></i>Crear Nueva Unidad</h1>
                <button onclick="window.location.href='modulos.html'" class="bg-white/20 backdrop-blur-sm text-white px-4 py-2 rounded-lg hover:bg-white/30 transition-all flex items-center">
                    <i class="fas fa-arrow-left mr-2"></i>Volver
                </button>
            </div>
        </div>
    </div>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="bg-white rounded-2xl shadow-lg p-8">
            <form id="unit-form" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-700">Nombre Completo de la Unidad</label>
                        <input type="text" id="name" name="name" required class="mt-1 form-input">
                    </div>
                    <div>
                        <label for="short_name" class="block text-sm font-medium text-gray-700">Nombre Corto</label>
                        <input type="text" id="short_name" name="short_name" required class="mt-1 form-input">
                    </div>
                    <div>
                        <label for="unit_code" class="block text-sm font-medium text-gray-700">Código de la Unidad</label>
                        <input type="text" id="unit_code" name="unit_code" required class="mt-1 form-input">
                    </div>
                    <div>
                        <label for="duration" class="block text-sm font-medium text-gray-700">Duración Estimada</label>
                        <input type="text" id="duration" name="duration" class="mt-1 form-input">
                    </div>
                </div>

                <div>
                    <label for="general_objective" class="block text-sm font-medium text-gray-700">Objetivo General</label>
                    <textarea id="general_objective" name="general_objective" rows="2" class="mt-1 form-input"></textarea>
                </div>

                <div>
                    <label for="specific_objectives" class="block text-sm font-medium text-gray-700">Objetivos Específicos (separados por punto y coma)</label>
                    <textarea id="specific_objectives" name="specific_objectives" rows="3" class="mt-1 form-input"></textarea>
                </div>

                <div>
                    <label for="contents" class="block text-sm font-medium text-gray-700">Contenidos (separados por punto y coma)</label>
                    <textarea id="contents" name="contents" rows="4" class="mt-1 form-input"></textarea>
                </div>

                <div>
                    <label for="multimedia_resources" class="block text-sm font-medium text-gray-700">Recursos Multimedia (separados por coma)</label>
                    <textarea id="multimedia_resources" name="multimedia_resources" rows="2" class="mt-1 form-input"></textarea>
                </div>

                <div class="flex items-center space-x-4">
                    <div class="flex items-center">
                        <input id="has_activities" name="has_activities" type="checkbox" class="h-4 w-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                        <label for="has_activities" class="ml-2 block text-sm font-medium text-gray-700">¿Tendrá actividades?</label>
                    </div>
                    <div class="flex items-center">
                        <input id="has_downloadable_materials" name="has_downloadable_materials" type="checkbox" class="h-4 w-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                        <label for="has_downloadable_materials" class="ml-2 block text-sm font-medium text-gray-700">¿Tendrá materiales descargables?</label>
                    </div>
                    <div class="flex items-center">
                        <input id="has_assessment" name="has_assessment" type="checkbox" class="h-4 w-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                        <label for="has_assessment" class="ml-2 block text-sm font-medium text-gray-700">¿Tendrá evaluación formal?</label>
                    </div>
                </div>

                <div id="activity-fields" class="space-y-6 hidden">
                    <div>
                        <label for="activity_types" class="block text-sm font-medium text-gray-700">Tipos de Actividades (ej: Cuestionario, Foro)</label>
                        <input type="text" id="activity_types" name="activity_types" class="mt-1 form-input">
                    </div>
                    <div>
                        <label for="activity_instructions" class="block text-sm font-medium text-gray-700">Instrucciones de las Actividades</label>
                        <textarea id="activity_instructions" name="activity_instructions" rows="2" class="mt-1 form-input"></textarea>
                    </div>
                </div>

                <div>
                    <label for="accessibility" class="block text-sm font-medium text-gray-700">Características de Accesibilidad</label>
                    <textarea id="accessibility" name="accessibility" rows="2" class="mt-1 form-input"></textarea>
                </div>

                <div>
                    <label for="additional_notes" class="block text-sm font-medium text-gray-700">Notas Adicionales</label>
                    <textarea id="additional_notes" name="additional_notes" rows="2" class="mt-1 form-input"></textarea>
                </div>

                <div class="flex justify-end pt-4">
                    <button type="submit" class="px-6 py-3 bg-green-600 text-white rounded-lg font-semibold hover:bg-green-700 flex items-center">
                        <i class="fas fa-save mr-2"></i>Guardar Unidad
                    </button>
                </div>
            </form>
        </div>
    </main>

    <div id="notification" class="fixed top-5 right-5 z-50"></div>

    <script>
        const API_BASE = 'https://gestordecursos.pegui.edu.co:8000';
        const token = localStorage.getItem('token');
        const form = document.getElementById('unit-form');
        const hasActivitiesCheckbox = document.getElementById('has_activities');
        const activityFieldsDiv = document.getElementById('activity-fields');

        // Función para mostrar notificaciones
        function showNotification(type, title, message) {
            const notificationArea = document.getElementById('notification');
            const colors = { success: 'green', error: 'red' };
            const icons = { success: 'fa-check-circle', error: 'fa-times-circle' };
            
            const notification = document.createElement('div');
            notification.className = `rounded-lg border-l-4 p-4 max-w-md mb-4 shadow-lg bg-${colors[type]}-100 border-${colors[type]}-500 text-${colors[type]}-700`;
            notification.innerHTML = `
                <div class="flex items-center">
                    <div class="mr-3 text-xl"><i class="fas ${icons[type]}"></i></div>
                    <div>
                        <div class="font-semibold">${title}</div>
                        <div class="text-sm">${message}</div>
                    </div>
                </div>
            `;
            
            notificationArea.appendChild(notification);
            setTimeout(() => { notification.remove() }, 5000);
        }

        // Mostrar u ocultar campos de actividades
        hasActivitiesCheckbox.addEventListener('change', () => {
            if (hasActivitiesCheckbox.checked) {
                activityFieldsDiv.classList.remove('hidden');
            } else {
                activityFieldsDiv.classList.add('hidden');
            }
        });

        // Manejar el envío del formulario
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Obtener module_id de la URL
            const urlParams = new URLSearchParams(window.location.search);
            const moduleId = urlParams.get('module_id');
            if (!moduleId) {
                showNotification('error', 'Error', 'No se encontró el ID del módulo.');
                return;
            }

            // Recolectar datos del formulario
            const unitData = {
                name: document.getElementById('name').value,
                short_name: document.getElementById('short_name').value,
                unit_code: document.getElementById('unit_code').value,
                general_objective: document.getElementById('general_objective').value,
                specific_objectives: document.getElementById('specific_objectives').value,
                duration: document.getElementById('duration').value,
                contents: document.getElementById('contents').value,
                multimedia_resources: document.getElementById('multimedia_resources').value,
                has_activities: hasActivitiesCheckbox.checked,
                activity_types: hasActivitiesCheckbox.checked ? document.getElementById('activity_types').value : '',
                activity_instructions: hasActivitiesCheckbox.checked ? document.getElementById('activity_instructions').value : '',
                has_downloadable_materials: document.getElementById('has_downloadable_materials').checked,
                has_assessment: document.getElementById('has_assessment').checked,
                accessibility: document.getElementById('accessibility').value,
                additional_notes: document.getElementById('additional_notes').value,
                module_id: parseInt(moduleId)
            };

            try {
                const response = await fetch(`${API_BASE}/units/`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(unitData)
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ detail: 'Error al procesar la solicitud.' }));
                    throw new Error(errorData.detail || `Error ${response.status}`);
                }
                
                showNotification('success', 'Éxito', 'Unidad creada correctamente.');
                form.reset();
                setTimeout(() => window.location.href = `https://gestordecursos.pegui.edu.co/r/superadmin/modulos/`, 2000);

            } catch (error) {
                console.error('Error al guardar la unidad:', error);
                showNotification('error', 'Error', `No se pudo guardar la unidad: ${error.message}`);
            }
        });
    </script>
</body>
</html>
