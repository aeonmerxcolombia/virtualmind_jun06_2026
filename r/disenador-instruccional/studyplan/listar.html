<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planes de Formación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6', // Azul primario
                        secondary: '#64748b',
                        header: '#4f46e5' // Tono índigo para cabeceras
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-100 min-h-screen">
    <header class="bg-header shadow-lg">
        <div class="container mx-auto px-6 py-8">
            <h1 class="text-4xl font-bold text-white mb-2">📚 Planes de Formación</h1>
            <p class="text-indigo-200">Gestión académica y curricular</p>
        </div>
    </header>

    <div id="loading" class="flex justify-center items-center py-20">
        <div class="animate-spin rounded-full h-16 w-16 border-4 border-primary border-t-transparent"></div>
        <span class="ml-4 text-xl text-gray-600">Cargando planes de estudio...</span>
    </div>

    <div id="error" class="hidden container mx-auto px-6 py-12">
        </div>

    <main class="container mx-auto px-6 py-8">
        <div class="bg-white rounded-xl shadow-xl overflow-hidden">
            <div class="bg-header p-6">
                <h2 class="text-2xl font-bold text-white">Lista de Planes</h2>
                <p class="text-indigo-200 mt-1">Filtra y visualiza los planes de estudio disponibles.</p>
            </div>
            
            <div class="p-6 bg-slate-50">
                <div id="stats" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white rounded-xl shadow-lg p-6 border-l-4 border-blue-500"><div class="flex items-center"><span class="text-3xl mr-4">📊</span><div><h3 class="text-lg font-semibold text-gray-700">Total Planes</h3><p class="text-2xl font-bold text-blue-600" id="total-plans">0</p></div></div></div>
                    <div class="bg-white rounded-xl shadow-lg p-6 border-l-4 border-green-500"><div class="flex items-center"><span class="text-3xl mr-4">🎓</span><div><h3 class="text-lg font-semibold text-gray-700">Con Cursos</h3><p class="text-2xl font-bold text-green-600" id="plans-with-courses">0</p></div></div></div>
                    <div class="bg-white rounded-xl shadow-lg p-6 border-l-4 border-purple-500"><div class="flex items-center"><span class="text-3xl mr-4">📈</span><div><h3 class="text-lg font-semibold text-gray-700">Cursos Promedio</h3><p class="text-2xl font-bold text-purple-600" id="avg-courses">0</p></div></div></div>
                </div>

                <div id="filters" class="hidden bg-white rounded-xl shadow-lg p-6 mb-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div><label class="block text-sm font-medium text-gray-700 mb-2">Buscar por nombre</label><input type="text" id="search-input" placeholder="Filtrar planes..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent"></div><div><label class="block text-sm font-medium text-gray-700 mb-2">Estado</label><select id="status-filter" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent"><option value="">Todos los planes</option><option value="with-courses">Con cursos</option><option value="without-courses">Sin cursos</option></select></div></div>
                </div>

                <div id="study-plans-grid" class="hidden grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-8">
                    </div>

                <div id="empty-state" class="hidden text-center py-20">
                    </div>
            </div>
        </div>
    </main>

    <div id="detail-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl max-w-5xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6 border-b bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-t-xl">
                <div class="flex justify-between items-center">
                    <h2 class="text-2xl font-bold" id="modal-title"></h2>
                    <button onclick="closeModal()" class="text-indigo-200 hover:text-white text-3xl">&times;</button>
                </div>
            </div>
            <div class="p-6" id="modal-content">
                </div>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE_URL = 'https://gestordecursos.pegui.edu.co:8000';
        let allPlans = [];
        let filteredPlans = [];

        // (Todo el resto del JavaScript permanece exactamente igual, no se necesita modificar)
        // Utility functions
        function formatDate(dateString) { if (!dateString) return 'No disponible'; return new Date(dateString).toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' }); }
        function truncateText(text, maxLength = 150) { if (!text || text.length <= maxLength) return text || 'No disponible'; return text.substring(0, maxLength) + '...'; }
        function getCourseIcon() { return '🎓'; }
        function getStatusBadge(coursesCount) { if (coursesCount === 0) { return '<span class="bg-red-100 text-red-800 px-2 py-1 rounded-full text-xs font-medium">Sin cursos</span>'; } else if (coursesCount <= 3) { return '<span class="bg-yellow-100 text-yellow-800 px-2 py-1 rounded-full text-xs font-medium">Pocos cursos</span>'; } else { return '<span class="bg-green-100 text-green-800 px-2 py-1 rounded-full text-xs font-medium">Completo</span>'; } }
        
        // API Functions
        async function loadStudyPlans() { try { showLoading(); const response = await fetch(`${API_BASE_URL}/study_plans/`); if (!response.ok) { throw new Error(`Error ${response.status}: ${response.statusText}`); } const data = await response.json(); allPlans = data; filteredPlans = [...allPlans]; hideLoading(); displayPlans(); updateStats(); setupFilters(); } catch (error) { console.error('Error loading study plans:', error); showError(error.message); } }
        
        // Display Functions
        function showLoading() { document.getElementById('loading').classList.remove('hidden'); document.getElementById('error').classList.add('hidden'); document.getElementById('stats').classList.add('hidden'); document.getElementById('filters').classList.add('hidden'); document.getElementById('study-plans-grid').classList.add('hidden'); document.getElementById('empty-state').classList.add('hidden'); }
        function hideLoading() { document.getElementById('loading').classList.add('hidden'); }
        function showError(message) { hideLoading(); document.getElementById('error-message').textContent = message; document.getElementById('error').classList.remove('hidden'); }
        function updateStats() { const totalPlans = allPlans.length; const plansWithCourses = allPlans.filter(plan => plan.courses && plan.courses.length > 0).length; const totalCourses = allPlans.reduce((sum, plan) => sum + (plan.courses ? plan.courses.length : 0), 0); const avgCourses = totalPlans > 0 ? Math.round(totalCourses / totalPlans) : 0; document.getElementById('total-plans').textContent = totalPlans; document.getElementById('plans-with-courses').textContent = plansWithCourses; document.getElementById('avg-courses').textContent = avgCourses; document.getElementById('stats').classList.remove('hidden'); }
        function setupFilters() { document.getElementById('search-input').addEventListener('input', applyFilters); document.getElementById('status-filter').addEventListener('change', applyFilters); document.getElementById('filters').classList.remove('hidden'); }
        function applyFilters() { const searchTerm = document.getElementById('search-input').value.toLowerCase(); const statusFilter = document.getElementById('status-filter').value; filteredPlans = allPlans.filter(plan => { const matchesSearch = !searchTerm || plan.name.toLowerCase().includes(searchTerm) || (plan.description && plan.description.toLowerCase().includes(searchTerm)); let matchesStatus = true; if (statusFilter === 'with-courses') { matchesStatus = plan.courses && plan.courses.length > 0; } else if (statusFilter === 'without-courses') { matchesStatus = !plan.courses || plan.courses.length === 0; } return matchesSearch && matchesStatus; }); displayPlans(); }
        function displayPlans() { const grid = document.getElementById('study-plans-grid'); const emptyState = document.getElementById('empty-state'); if (filteredPlans.length === 0) { grid.classList.add('hidden'); emptyState.classList.remove('hidden'); return; } emptyState.classList.add('hidden'); grid.classList.remove('hidden'); grid.innerHTML = filteredPlans.map(plan => ` <div class="bg-white rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 border border-gray-100"> <div class="p-6 border-b border-gray-100"> <div class="flex items-start justify-between"> <div class="flex-1"> <h3 class="text-xl font-bold text-gray-800 mb-2">${plan.name}</h3> <div class="flex items-center gap-4 text-sm text-gray-600"> ${getStatusBadge(plan.courses ? plan.courses.length : 0)} </div> </div> <span class="bg-primary/10 text-primary px-3 py-1 rounded-full text-sm font-medium"> ID: ${plan.id} </span> </div> </div> <div class="p-6"> <p class="text-gray-600 mb-4 leading-relaxed"> ${truncateText(plan.description)} </p> <div class="mb-4"> <div class="bg-gray-50 rounded-lg p-3 text-center"> <span class="text-xs font-medium text-gray-500 uppercase tracking-wide block">Total de Cursos</span> <p class="text-2xl font-bold text-primary">${plan.courses ? plan.courses.length : 0}</p> </div> </div> <div class="mb-4"> <div class="flex items-center justify-between"> <span class="text-sm font-medium text-gray-700">Cursos</span> <span class="bg-blue-100 text-blue-800 px-2 py-1 rounded-full text-xs font-medium"> ${plan.courses ? plan.courses.length : 0} </span> </div> ${plan.courses && plan.courses.length > 0 ? ` <div class="mt-2 space-y-1"> ${plan.courses.slice(0, 3).map(course => ` <div class="flex items-center text-sm text-gray-600"> <span class="w-2 h-2 bg-green-400 rounded-full mr-2"></span> <span class="truncate">${course.name}</span> </div> `).join('')} ${plan.courses.length > 3 ? ` <div class="text-xs text-gray-500 ml-4"> +${plan.courses.length - 3} cursos más </div> ` : ''} </div> ` : ` <p class="text-sm text-gray-500 mt-2">Sin cursos asignados</p> `} </div> </div> <div class="px-6 pb-6"> <button onclick="showPlanDetails(${plan.id})" class="w-full bg-primary hover:bg-primary/90 text-white font-medium py-3 px-4 rounded-lg transition-colors duration-200 flex items-center justify-center gap-2"> <span>👁️</span> Ver detalles completos </button> </div> </div> `).join(''); }
        
        // Modal Functions
        function showPlanDetails(planId) { const plan = allPlans.find(p => p.id === planId); if (!plan) return; document.getElementById('modal-title').textContent = plan.name; const modalContent = document.getElementById('modal-content'); modalContent.innerHTML = ` <div class="space-y-6"> <div> <h4 class="text-lg font-semibold text-gray-800 mb-3">Información General</h4> <div class="bg-gray-50 rounded-lg p-4"> <div class="grid grid-cols-1 md:grid-cols-2 gap-4"> <div> <span class="text-sm font-medium text-gray-500">Descripción:</span> <p class="text-gray-700 mt-1">${plan.description || 'No disponible'}</p> </div> <div> <span class="text-sm font-medium text-gray-500">Total de Cursos:</span> <p class="text-gray-700 mt-1 text-xl font-bold text-primary">${plan.courses ? plan.courses.length : 0}</p> </div> </div> </div> </div> <div> <h4 class="text-lg font-semibold text-gray-800 mb-3"> Cursos Asociados (${plan.courses ? plan.courses.length : 0}) </h4> ${plan.courses && plan.courses.length > 0 ? ` <div class="grid grid-cols-1 md:grid-cols-2 gap-4"> ${plan.courses.map(course => ` <div class="border border-gray-200 rounded-lg p-4 hover:shadow-md transition-shadow"> <div class="flex items-start justify-between mb-2"> <div class="flex-1"> <h5 class="font-semibold text-gray-800 mb-1">${course.name}</h5> <span class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded"> ID: ${course.id} </span> </div> <span class="text-2xl">${getCourseIcon()}</span> </div> ${course.description ? ` <p class="text-sm text-gray-600 mb-2">${truncateText(course.description, 100)}</p> ` : ''} <div class="flex flex-wrap gap-2 text-xs text-gray-500"> ${course.author ? ` <span class="bg-blue-50 text-blue-700 px-2 py-1 rounded"> 👨‍🏫 ${course.author} </span> ` : ''} ${course.created_at ? ` <span class="bg-green-50 text-green-700 px-2 py-1 rounded"> 📅 ${formatDate(course.created_at)} </span> ` : ''} </div> </div> `).join('')} </div> ` : ` <div class="text-center py-12 bg-gray-50 rounded-lg"> <span class="text-6xl mb-4 block">📚</span> <h5 class="text-lg font-medium text-gray-700 mb-2">Sin cursos asignados</h5> <p class="text-gray-500">Este plan de estudio aún no tiene cursos asociados.</p> </div> `} </div> ${plan.courses && plan.courses.length > 0 ? ` <div> <h4 class="text-lg font-semibold text-gray-800 mb-3">Estadísticas del Plan</h4> <div class="grid grid-cols-1 md:grid-cols-3 gap-4"> <div class="bg-blue-50 rounded-lg p-4 text-center"> <span class="text-2xl block mb-2">📊</span> <p class="text-sm text-gray-600">Total Cursos</p> <p class="text-xl font-bold text-blue-600">${plan.courses.length}</p> </div> <div class="bg-green-50 rounded-lg p-4 text-center"> <span class="text-2xl block mb-2">👨‍🏫</span> <p class="text-sm text-gray-600">Autores Únicos</p> <p class="text-xl font-bold text-green-600">${[...new Set(plan.courses.map(c => c.author).filter(Boolean))].length}</p> </div> <div class="bg-purple-50 rounded-lg p-4 text-center"> <span class="text-2xl block mb-2">📝</span> <p class="text-sm text-gray-600">Con Descripción</p> <p class="text-xl font-bold text-purple-600">${plan.courses.filter(c => c.description).length}</p> </div> </div> </div> ` : ''} </div> `; document.getElementById('detail-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('detail-modal').classList.add('hidden'); }
        
        // Event Listeners
        document.addEventListener('DOMContentLoaded', function() { loadStudyPlans(); });
        document.getElementById('detail-modal').addEventListener('click', function(e) { if (e.target === this) { closeModal(); } });
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') { closeModal(); } });
    </script>
</body>
</html>
