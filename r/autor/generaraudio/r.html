<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Generador de Audio IA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/fetch-con-token.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'gradient': 'gradient 8s ease infinite',
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'bounce-gentle': 'bounce 2s infinite',
            'float': 'float 6s ease-in-out infinite',
            'glow': 'glow 2s ease-in-out infinite alternate',
          },
          keyframes: {
            gradient: {
              '0%, 100%': {
                'background-size': '200% 200%',
                'background-position': 'left center'
              },
              '50%': {
                'background-size': '200% 200%',
                'background-position': 'right center'
              },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            glow: {
              '0%': { 'box-shadow': '0 0 20px rgba(59, 130, 246, 0.5)' },
              '100%': { 'box-shadow': '0 0 30px rgba(59, 130, 246, 0.8)' },
            }
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 animate-gradient p-6 text-white relative overflow-hidden">
  <!-- Background effects -->
  <div class="absolute inset-0 opacity-30">
    <div class="absolute top-10 left-10 w-72 h-72 bg-purple-500 rounded-full mix-blend-multiply filter blur-xl animate-float"></div>
    <div class="absolute top-40 right-10 w-72 h-72 bg-blue-500 rounded-full mix-blend-multiply filter blur-xl animate-float" style="animation-delay: 2s;"></div>
    <div class="absolute bottom-10 left-1/2 w-72 h-72 bg-pink-500 rounded-full mix-blend-multiply filter blur-xl animate-float" style="animation-delay: 4s;"></div>
  </div>

  <div class="max-w-3xl mx-auto relative z-10">
    <!-- Header -->
    <div class="text-center mb-12 animate-float">
      <div class="inline-block bg-gradient-to-r from-purple-600 to-blue-600 p-6 rounded-full mb-6 shadow-2xl animate-glow">
        <svg class="w-16 h-16 text-white" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM15.657 6.343a1 1 0 011.414 0A9.972 9.972 0 0119 12a9.972 9.972 0 01-1.929 5.657 1 1 0 11-1.414-1.414A7.971 7.971 0 0017 12c0-1.691-.525-3.26-1.343-4.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 12a5.983 5.983 0 01-.757 2.829 1 1 0 11-1.415-1.414A3.987 3.987 0 0013 12a3.987 3.987 0 00-.172-1.415 1 1 0 010-1.414z" clip-rule="evenodd"></path>
        </svg>
      </div>
      <h1 class="text-5xl font-black bg-gradient-to-r from-white via-purple-200 to-blue-200 bg-clip-text text-transparent mb-4">
        Generador de Voz IA
      </h1>
      <p class="text-xl text-purple-200 font-light">Convierte tu texto en audio con inteligencia artificial</p>
    </div>

    <!-- Main Card -->
    <div class="bg-white/10 backdrop-blur-lg border border-white/20 shadow-2xl rounded-3xl p-8 mb-8">
      <!-- Text Input Section -->
      <div class="mb-8">
        <label for="texto" class="block text-lg font-semibold mb-3 text-purple-200 flex items-center gap-2">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M18 13V5a2 2 0 00-2-2H4a2 2 0 00-2 2v8a2 2 0 002 2h3l3 3 3-3h3a2 2 0 002-2zM5 7a1 1 0 011-1h8a1 1 0 110 2H6a1 1 0 01-1-1zm1 3a1 1 0 100 2h3a1 1 0 100-2H6z" clip-rule="evenodd"></path>
          </svg>
          Texto a convertir
        </label>
        <div class="relative">
          <textarea 
            id="texto" 
            rows="5" 
            class="w-full bg-white/5 backdrop-blur-sm border-2 border-purple-500/30 rounded-2xl p-4 resize-none text-white placeholder-purple-300/70 focus:border-purple-400 focus:ring-4 focus:ring-purple-500/20 focus:outline-none transition-all duration-300 text-lg leading-relaxed"
            placeholder="Escribe aquí el texto que quieres convertir a voz..."
          ></textarea>
          <div class="absolute bottom-3 right-3 text-purple-300/60 text-sm" id="charCounter">0 caracteres</div>
        </div>
      </div>

      <!-- Voice Selection -->
      <div class="mb-8">
        <label for="modelo" class="block text-lg font-semibold mb-3 text-purple-200 flex items-center gap-2">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
            <path d="M7 4a3 3 0 016 0v4a3 3 0 11-6 0V4z"></path>
            <path d="M5.5 9.643a.75.75 0 00-1.5 0V10c0 3.06 2.29 5.585 5.25 5.954V17.5h-1.5a.75.75 0 000 1.5h4.5a.75.75 0 000-1.5H10.5v-1.546A6.001 6.001 0 0016 10v-.357a.75.75 0 00-1.5 0V10a4.5 4.5 0 01-9 0v-.357z"></path>
          </svg>
          Selecciona la voz
        </label>
        <select id="modelo" class="w-full bg-white/5 backdrop-blur-sm border-2 border-purple-500/30 rounded-2xl p-4 text-white focus:border-purple-400 focus:ring-4 focus:ring-purple-500/20 focus:outline-none transition-all duration-300 text-lg">
  <optgroup label="🇪🇸 Español" class="bg-slate-800">
    <option value="es_css10" class="bg-slate-800">🗣️ CSS10 - Voz Neutra</option>
    <option value="es_mai" class="bg-slate-800">👩 MAI - Tacotron2</option>
    <option value="es_mai_vits" class="bg-slate-800">👩 MAI - VITS Expresiva</option>
  </optgroup>
  <optgroup label="🇺🇸 Inglés" class="bg-slate-800">
    <option value="en_ljspeech_tacotron2" class="bg-slate-800">🧑 LJSpeech - Tacotron2</option>
  </optgroup>
</select>

      </div>

      <!-- Generate Button -->
      <button 
        onclick="generarAudio()" 
        id="generateBtn"
        class="w-full bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 text-white py-4 rounded-2xl font-bold text-xl transition-all duration-300 transform hover:scale-105 hover:shadow-2xl flex items-center justify-center gap-3 group"
      >
        <svg class="w-6 h-6 group-hover:animate-bounce-gentle" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path>
        </svg>
        <span id="btnText">Generar Audio</span>
      </button>
    </div>

    <!-- Loading State -->
    <div id="loading" class="hidden text-center animate-pulse-slow">
      <div class="bg-white/10 backdrop-blur-lg border border-white/20 rounded-3xl p-8 mb-8">
        <div class="flex flex-col items-center gap-4">
          <div class="w-16 h-16 border-4 border-purple-500/30 border-t-purple-500 rounded-full animate-spin"></div>
          <p class="text-xl text-purple-200">Generando tu audio con IA...</p>
          <div class="w-64 bg-white/10 rounded-full h-2">
            <div class="bg-gradient-to-r from-purple-500 to-blue-500 h-2 rounded-full animate-pulse" style="width: 60%"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Audio Result -->
    <div id="audioContainer" class="hidden animate-float">
      <div class="bg-white/10 backdrop-blur-lg border border-white/20 rounded-3xl p-8 mb-8">
        <div class="text-center mb-6">
          <div class="inline-block bg-green-500/20 p-4 rounded-full mb-4">
            <svg class="w-8 h-8 text-green-400" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
            </svg>
          </div>
          <h3 class="text-2xl font-bold text-green-400 mb-2">¡Audio Generado!</h3>
          <p class="text-purple-200">Tu archivo está listo para reproducir</p>
        </div>
        
        <div class="space-y-4">
          <audio controls id="audioPlayer" class="w-full rounded-xl bg-white/5 backdrop-blur-sm border border-white/20"></audio>
          <div class="flex gap-4">
            <a id="downloadLink" class="flex-1 bg-green-600 hover:bg-green-700 text-white py-3 px-6 rounded-xl font-semibold transition-all duration-300 text-center flex items-center justify-center gap-2 group" download>
              <svg class="w-5 h-5 group-hover:animate-bounce" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"></path>
              </svg>
              Descargar Audio
            </a>
            <button onclick="generarNuevo()" class="flex-1 bg-purple-600 hover:bg-purple-700 text-white py-3 px-6 rounded-xl font-semibold transition-all duration-300 flex items-center justify-center gap-2">
              <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd"></path>
              </svg>
              Nuevo Audio
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Error State -->
    <div id="errorContainer" class="hidden">
      <div class="bg-red-500/10 backdrop-blur-lg border border-red-500/30 rounded-3xl p-8 mb-8">
        <div class="text-center">
          <div class="inline-block bg-red-500/20 p-4 rounded-full mb-4">
            <svg class="w-8 h-8 text-red-400" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path>
            </svg>
          </div>
          <h3 class="text-2xl font-bold text-red-400 mb-2">Error</h3>
          <p id="errorMessage" class="text-red-300"></p>
          <button onclick="reintentar()" class="mt-4 bg-red-600 hover:bg-red-700 text-white py-2 px-6 rounded-xl font-semibold transition-all duration-300">
            Intentar de Nuevo
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Character counter
    const textArea = document.getElementById("texto");
    const charCounter = document.getElementById("charCounter");
    
    textArea.addEventListener("input", () => {
      const length = textArea.value.length;
      charCounter.textContent = `${length} caracteres`;
    });

    async function generarAudio() {
      const texto = document.getElementById("texto").value.trim();
      const modelo = document.getElementById("modelo").value;
      
      if (!texto) {
        mostrarError("⚠️ Por favor escribe algún texto.");
        return;
      }

      // Update button state
      const btn = document.getElementById("generateBtn");
      const btnText = document.getElementById("btnText");
      btn.disabled = true;
      btn.classList.add("opacity-50", "cursor-not-allowed");
      btnText.textContent = "Generando...";

      document.getElementById("loading").classList.remove("hidden");
      document.getElementById("audioContainer").classList.add("hidden");
      document.getElementById("errorContainer").classList.add("hidden");

      try {
        const response = await fetch("https://gestordecursos.pegui.edu.co:8000/audio/generar/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ texto, modelo })
        });

        if (!response.ok) throw new Error("No se pudo generar el audio.");

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        
        const player = document.getElementById("audioPlayer");
        player.src = url;
        
        const link = document.getElementById("downloadLink");
        link.href = url;
        link.download = `voz_ia_${Date.now()}.wav`;
        
        document.getElementById("audioContainer").classList.remove("hidden");
      } catch (err) {
        mostrarError("❌ " + err.message);
      } finally {
        document.getElementById("loading").classList.add("hidden");
        
        // Reset button state
        btn.disabled = false;
        btn.classList.remove("opacity-50", "cursor-not-allowed");
        btnText.textContent = "Generar Audio";
      }
    }

    function mostrarError(msg) {
      const error = document.getElementById("errorContainer");
      const errorMessage = document.getElementById("errorMessage");
      errorMessage.textContent = msg;
      error.classList.remove("hidden");
    }

    function generarNuevo() {
      document.getElementById("audioContainer").classList.add("hidden");
      document.getElementById("errorContainer").classList.add("hidden");
      document.getElementById("texto").focus();
    }

    function reintentar() {
      document.getElementById("errorContainer").classList.add("hidden");
      generarAudio();
    }

    // Add keyboard shortcut
    document.addEventListener("keydown", (e) => {
      if (e.ctrlKey && e.key === "Enter") {
        e.preventDefault();
        generarAudio();
      }
    });

    // Auto-focus on text area
    window.addEventListener("load", () => {
      document.getElementById("texto").focus();
    });
  </script>
<script src="/js/roles.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const path = window.location.pathname;
    const isSuperadmin = path.includes('/r/superadmin/');
    const isAdmin = path.includes('/r/admin/');
    const isCoordinador = path.includes('/r/coordinador/');
    const isCliente = path.includes('/r/cliente/');
    const isDisInst = path.includes('/r/disenador-instruccional/');
    const isAutor = path.includes('/r/autor/');
    const isRevisor = path.includes('/r/revisor-qa/');
    const isEditor = path.includes('/r/editor/');
    const isDesaMult = path.includes('/r/desarrollador-multimedia/');
    const isAbogado = path.includes('/r/abogado/');
    const isDisGraf = path.includes('/r/disenador-grafico/');
    const isAnim2d = path.includes('/r/animador-2d/');
    const isAnim3d = path.includes('/r/animador-3d/');
    const isVideo = path.includes('/r/video/');
    const isCorrector = path.includes('/r/corrector-de-estilo/');
    const isIngeniero = path.includes('/r/ingeniero-lms/');
    const isRegistrado = path.includes('/r/registrado/');

    const allowedRoles = [];
    if (isSuperadmin) allowedRoles.push('superadmin');
    if (isAdmin) allowedRoles.push('admin');
    if (isCoordinador) allowedRoles.push('coordinador');
    if (isCliente) allowedRoles.push('cliente');
    if (isDisInst) allowedRoles.push('disenador-instruccional');
    if (isAutor) allowedRoles.push('autor');
    if (isRevisor) allowedRoles.push('revisor-qa');
    if (isEditor) allowedRoles.push('editor');
    if (isDesaMult) allowedRoles.push('desarrollador-multimedia');
    if (isAbogado) allowedRoles.push('abogado');
    if (isDisGraf) allowedRoles.push('disenador-grafico');
    if (isAnim2d) allowedRoles.push('animador-2d');
    if (isAnim3d) allowedRoles.push('animador-3d');
    if (isVideo) allowedRoles.push('video');
    if (isCorrector) allowedRoles.push('corrector-de-estilo');
    if (isIngeniero) allowedRoles.push('ingeniero-lms');
    if (isRegistrado) allowedRoles.push('registrado');

    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/login.html';
        return;
    }
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const userRoles = payload.roles || [payload.role].filter(Boolean);
        if (!userRoles.some(r => allowedRoles.includes(r))) {
            window.location.href = '/';
            return;
        }
    } catch(e) {
        window.location.href = '/login.html';
    }
});
</script>

<script>
// ==================== VERIFICACIÓN DE PERMISOS DE MENÚ ====================
(function() {
    const token = localStorage.getItem('token');
    if (!token) return;
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const permissions = payload.permissions || [];
        
        const hasPermission = (perm) => permissions.includes(perm);
        const hasAnyPermission = (perms) => perms.some(p => permissions.includes(p));
        
        const menuPermissions = {
            'menu-proyectos': ['proyectos_crear', 'proyectos_consultar'],
            'menu-crear-proyecto': ['proyectos_crear'],
            'menu-entidades': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-crear-entidad': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-plan-estudio': ['proyectos_planes_formacion_listar', 'diseno_instruccional_ver'],
            'menu-crear-plan': ['diseno_instruccional_crear'],
            'menu-cursos': ['proyectos_cursos_listar'],
            'menu-crear-curso': ['autor_crear'],
            'menu-modulos': ['proyectos_modulos_listar'],
            'menu-crear-modulo': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-unidades': ['proyectos_unidades_listar'],
            'menu-crear-unidad': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-tareas': ['proyectos_tareas_listar'],
            'menu-crear-tarea': ['autor_crear'],
            'menu-evaluaciones': ['proyectos_evaluaciones_listar'],
            'menu-crear-evaluacion': ['autor_crear'],
            'menu-fases': ['proyectos_fases_etapas_gestionar'],
            'menu-cronogramas': ['proyectos_cronogramas_crear'],
            'menu-calendario': ['proyectos_calendario_ver'],
            'menu-usuarios': ['usuarios_crear'],
            'menu-clientes': ['usuarios_crear'],
            'menu-crm': ['usuarios_crear'],
            'menu-roles': ['roles_permisos_gestionar'],
            'menu-drive': ['archivos_drive_personal_ver', 'archivos_drive_global_ver'],
            'menu-ia': ['ia_produccion_imagen', 'ia_produccion_audio', 'ia_linguistica_usar'],
            'menu-canvas': ['herramientas_canvas_usar'],
            'menu-powerpoint': ['herramientas_powerpoint_usar'],
            'menu-auditoria': ['seguridad_auditoria_ver'],
            'menu-bitacora': ['seguridad_bitacora_usuarios_ver'],
            'menu-estadisticas': ['reportes_estadisticas_ver'],
            'menu-metricas': ['reportes_metricas_ver'],
            'menu-diseno-instruccional': ['diseno_instruccional_ver', 'diseno_instruccional_crear'],
            'menu-autor-contenido': ['autor_ver', 'autor_crear'],
            'menu-microcursos': ['capacitacion_microcursos_ver'],
            'menu-tutoriales': ['capacitacion_tutoriales_ver'],
            'menu-faq': ['capacitacion_faq_ver'],
        };
        
        Object.entries(menuPermissions).forEach(([id, required]) => {
            const el = document.getElementById(id);
            if (el && !hasAnyPermission(required)) {
                el.style.display = 'none';
            }
        });
    } catch(e) {}
})();
</script>

</body>
