    <script>
        // -----------------------------------------------------------------
        // 0️⃣  CONFIGURACIÓN (origen permitido)
        // -----------------------------------------------------------------
        const PARENT_ORIGIN = 'https://gestordecursos.pegui.edu.co'; // <-- mismo dominio

        // -----------------------------------------------------------------
        // 1️⃣  VARIABLES GLOBALES
        // -----------------------------------------------------------------
        let remoteEditorReady = false;       // ¿El iframe ya envió “ready”?
        let remoteEditorWindow = null;       // referencia a la ventana del iframe
        let lastResult = '';                 // guarda el HTML devuelto por la IA

        // -----------------------------------------------------------------
        // 2️⃣  ESCUCHAR MENSAJES DEL IFRAME (ready, content)
        // -----------------------------------------------------------------
        window.addEventListener('message', ev => {
            if (ev.origin !== PARENT_ORIGIN) return;           // seguridad

            const data = ev.data;
            if (!data || typeof data !== 'object') return;

            if (data.type === 'ready') {
                remoteEditorReady = true;
                remoteEditorWindow = ev.source;               // guardamos la ventana del iframe
                console.log('✅ Editor remoto listo');
                return;
            }

            if (data.type === 'content') {
                // Guardamos el contenido que nos envía el iframe; será usado por la IA
                window.__remoteEditorContent = data.payload;   // HTML string
            }
        });

        /** Pide al iframe que envíe su contenido (devuelve una Promise). */
        function requestEditorContent() {
            if (!remoteEditorReady) {
                showNotification('El editor aún no está listo.', 'warning');
                return Promise.reject('editor-not-ready');
            }

            // Solicitamos al iframe el contenido actual
            remoteEditorWindow.postMessage({type:'getContent'}, PARENT_ORIGIN);

            // Esperamos máximo 8 s a que llegue la respuesta
            return new Promise((resolve, reject) => {
                const timeout = setTimeout(() => reject('timeout'), 8000);
                const check = () => {
                    if (window.__remoteEditorContent !== undefined) {
                        clearTimeout(timeout);
                        const html = window.__remoteEditorContent;
                        delete window.__remoteEditorContent;
                        resolve(html);
                    } else {
                        setTimeout(check, 200);
                    }
                };
                check();
            });
        }

        // -----------------------------------------------------------------
        // 3️⃣  UTILIDADES DE UI (spinner, notificaciones, formateo)
        // -----------------------------------------------------------------
        function showLoading(agentName) {
            document.getElementById('results').innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-white">
                    <div class="animate-spin rounded-full h-16 w-16 border-b-2 border-white mb-4"></div>
                    <p class="text-lg font-semibold typing">Procesando con ${agentName}</p>
                    <p class="text-sm opacity-70 mt-2">Por favor espera…</p>
                </div>`;
        }

        function showNotification(message, type) {
            const notif = document.createElement('div');
            const colors = { warning:'bg-yellow-500', error:'bg-red-500', success:'bg-green-500' };
            notif.className = `fixed top-4 right-4 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg z-50 transform translate-x-full transition-transform duration-300`;
            notif.textContent = message;
            document.body.appendChild(notif);
            setTimeout(()=> notif.style.transform='translateX(0)', 100);
            setTimeout(()=> {
                notif.style.transform='translateX(100%)';
                setTimeout(()=> notif.remove(), 300);
            }, 3000);
        }

        /** Convierte texto plano devuelto por la IA en HTML bonito (muy simple). */
        function formatTextToHTML(text) {
            if (!text) return '';
            // Aquí puedes añadir las reglas que necesites (bold, listas, etc.)
            let html = text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/^\* (.+)$/gm, '<li>$1</li>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');
            // Si hay listas, las envolvemos en <ul>
            if (html.includes('<li>')) {
                html = `<ul>${html}</ul>`;
            } else {
                html = `<p>${html}</p>`;
            }
            return html;
        }

        /** Envío genérico a los micro‑servicios de IA. */
        async function sendRequest(endpoint, body) {
            try {
                const resp = await fetch(endpoint, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify(body)
                });
                if (!resp.ok) throw new Error(`Error ${resp.status}`);
                const txt = await resp.text();

                // Intentamos parsear JSON; si falla, usamos texto puro
                try {
                    const json = JSON.parse(txt);
                    const raw = json.mensaje || json.result || json.respuesta || JSON.stringify(json);
                    return formatTextToHTML(raw);
                } catch {
                    return formatTextToHTML(txt);
                }
            } catch (e) {
                console.error(e);
                return `<div class="text-red-300 p-4 bg-red-500/20 rounded-lg border border-red-400/30">
                    <strong>Error de conexión:</strong> ${e.message}
                </div>`;
            }
        }

        // -----------------------------------------------------------------
        // 4️⃣  MANEJO DE LOS BOTONES DE AGENTES IA
        // -----------------------------------------------------------------
        async function handleAgentRequest(agent) {
            // 1️⃣  Obtener contenido del editor embebido
            let editorContent = '';
            try {
                editorContent = await requestEditorContent();          // ← mensaje al iframe
                editorContent = editorContent.trim();
                if (!editorContent) {
                    showNotification('El editor está vacío.', 'warning');
                    return;
                }
            } catch (e) {
                console.error(e);
                showNotification('No se pudo leer el contenido del editor.', 'error');
                return;
            }

            // 2️⃣  Definir endpoint / payload según agente
            let endpoint = '', body = {}, title = '', agentName = '', color = '';
            switch (agent) {
                case 'gemini':
                    endpoint   = 'https://gestordecursos.pegui.edu.co:8000/chat/gemini';
                    body       = {prompt: editorContent};
                    title      = 'Respuesta del Agente Gemini';
                    agentName  = 'Gemini';
                    color      = 'green';
                    break;
                case 'kimik2':
                    endpoint   = 'https://gestordecursos.pegui.edu.co:8000/chat/kimi';
                    body       = {mensaje: editorContent};
                    title      = 'Respuesta del Agente KimiK2';
                    agentName  = 'KimiK2';
                    color      = 'blue';
                    break;
                case 'openai':
                    endpoint   = 'https://gestordecursos.pegui.edu.co:8000/chat/openai';
                    body       = {mensaje: editorContent};
                    title      = 'Respuesta del Agente OpenAI';
                    agentName  = 'OpenAI';
                    color      = 'purple';
                    break;
                default:
                    showNotification('Agente desconocido', 'error');
                    return;
            }

            // 3️⃣  Spinner mientras esperamos la IA
            showLoading(agentName);

            // 4️⃣  Llamada al endpoint y render del resultado
            const resultHTML = await sendRequest(endpoint, body);
            lastResult = resultHTML;   // guardamos para los botones de copiar/insertar

            document.getElementById('results').innerHTML = `
                <div class="space-y-6">
                    <div class="flex items-center space-x-3 pb-4 border-b border-white/20">
                        <div class="w-6 h-6 bg-${color}-400 rounded-full animate-pulse flex items-center justify-center">
                            <svg class="w-3 h-3 text-white" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/>
                            </svg>
                        </div>
                        <h2 class="text-2xl font-bold text-white">${title}</h2>
                        <div class="flex-1"></div>
                        <div class="text-xs text-white/50 bg-white/10 px-3 py-1 rounded-full">
                            ${new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'})}
                        </div>
                    </div>

                    <div class="bg-gradient-to-br from-white/10 to-white/5 rounded-2xl p-8 backdrop-blur-sm border border-white/20 shadow-2xl">
                        <div class="prose prose-lg max-w-none">
                            ${resultHTML}
                        </div>
                    </div>

                    <div class="flex justify-center space-x-4">
                        <button onclick="copyToClipboard()"
                                class="bg-white/10 hover:bg-white/20 text-white px-6 py-2 rounded-lg transition-all duration-300 border border-white/20">
                            📋 Copiar Resultado
                        </button>
                        <button onclick="insertToEditor()"
                                class="bg-${color}-500/30 hover:bg-${color}-500/50 text-white px-6 py-2 rounded-lg transition-all duration-300 border border-${color}-400/30">
                            📝 Insertar al Editor
                        </button>
                    </div>
                </div>`;
        }

        // -----------------------------------------------------------------
        // 5️⃣  Botones: feedback visual + llamado a la función anterior
        // -----------------------------------------------------------------
        function addButtonFeedback(btnId, handler) {
            const btn = document.getElementById(btnId);
            btn.addEventListener('click', async () => {
                btn.style.transform = 'scale(0.95)';
                setTimeout(() => btn.style.transform = '', 150);
                await handler();
            });
        }
        addButtonFeedback('btn-gemini', () => handleAgentRequest('gemini'));
        addButtonFeedback('btn-kimik2', () => handleAgentRequest('kimik2'));
        addButtonFeedback('btn-openai', () => handleAgentRequest('openai'));

        // -----------------------------------------------------------------
        // 6️⃣  Copiar / Insertar resultados
        // -----------------------------------------------------------------
        window.copyToClipboard = function () {
            const el = document.querySelector('#results .prose');
            if (!el) return;
            const txt = el.innerText || el.textContent;
            navigator.clipboard.writeText(txt)
                .then(() => showNotification('✅ Resultado copiado', 'success'))
                .catch(() => showNotification('❌ Error al copiar', 'error'));
        };

        /** Inserta el HTML devuelto por la IA dentro del editor embebido */
        window.insertToEditor = function () {
            if (!remoteEditorReady) {
                showNotification('El editor no está listo', 'warning');
                return;
            }
            // Enviamos al iframe el HTML que queremos insertar
            remoteEditorWindow.postMessage(
                {type:'insertHTML', payload: lastResult},
                PARENT_ORIGIN
            );
            showNotification('✅ Resultado insertado en el editor', 'success');
        };
    </script>
<script src="/js/roles.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const path = window.location.pathname;
    const isSuperadmin = path.includes('/r/superadmin/');
    const isAdmin = path.includes('/r/admin/');
    const isCoordinador = path.includes('/r/coordinador/');
    const isCliente = path.includes('/r/cliente/');
    const isDisInst = path.includes('/r/disenador-instruccional/');
    const isAutor = path.includes('/r/autor/');
    const isRevisor = path.includes('/r/revisor-qa/');
    const isEditor = path.includes('/r/editor/');
    const isDesaMult = path.includes('/r/desarrollador-multimedia/');
    const isAbogado = path.includes('/r/abogado/');
    const isDisGraf = path.includes('/r/disenador-grafico/');
    const isAnim2d = path.includes('/r/animador-2d/');
    const isAnim3d = path.includes('/r/animador-3d/');
    const isVideo = path.includes('/r/video/');
    const isCorrector = path.includes('/r/corrector-de-estilo/');
    const isIngeniero = path.includes('/r/ingeniero-lms/');
    const isRegistrado = path.includes('/r/registrado/');

    const allowedRoles = [];
    if (isSuperadmin) allowedRoles.push('superadmin');
    if (isAdmin) allowedRoles.push('admin');
    if (isCoordinador) allowedRoles.push('coordinador');
    if (isCliente) allowedRoles.push('cliente');
    if (isDisInst) allowedRoles.push('disenador-instruccional');
    if (isAutor) allowedRoles.push('autor');
    if (isRevisor) allowedRoles.push('revisor-qa');
    if (isEditor) allowedRoles.push('editor');
    if (isDesaMult) allowedRoles.push('desarrollador-multimedia');
    if (isAbogado) allowedRoles.push('abogado');
    if (isDisGraf) allowedRoles.push('disenador-grafico');
    if (isAnim2d) allowedRoles.push('animador-2d');
    if (isAnim3d) allowedRoles.push('animador-3d');
    if (isVideo) allowedRoles.push('video');
    if (isCorrector) allowedRoles.push('corrector-de-estilo');
    if (isIngeniero) allowedRoles.push('ingeniero-lms');
    if (isRegistrado) allowedRoles.push('registrado');

    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/login.html';
        return;
    }
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const userRoles = payload.roles || [payload.role].filter(Boolean);
        if (!userRoles.some(r => allowedRoles.includes(r))) {
            window.location.href = '/';
            return;
        }
    } catch(e) {
        window.location.href = '/login.html';
    }
});
</script>

<script>
// ==================== VERIFICACIÓN DE PERMISOS DE MENÚ ====================
(function() {
    const token = localStorage.getItem('token');
    if (!token) return;
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const permissions = payload.permissions || [];
        
        const hasPermission = (perm) => permissions.includes(perm);
        const hasAnyPermission = (perms) => perms.some(p => permissions.includes(p));
        
        const menuPermissions = {
            'menu-proyectos': ['proyectos_crear', 'proyectos_consultar'],
