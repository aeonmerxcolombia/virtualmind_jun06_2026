    <div id="notification" class="fixed top-24 right-4 z-50"></div>

    <script>
        const API_BASE = 'https://gestordecursos.pegui.edu.co:8000';

        function showNotification(type, title, message) {
            const notificationArea = document.getElementById('notification');
            const colors = { success: 'green', error: 'red' };
            const icons = { success: 'fa-check-circle', error: 'fa-times-circle' };
            const notification = document.createElement('div');
            notification.className = `bg-white rounded-lg shadow-xl border-l-4 border-${colors[type]}-500 p-4 max-w-md mb-4`;
            notification.innerHTML = `<div class="flex items-center"><div class="mr-3"><i class="fas ${icons[type]} text-${colors[type]}-500 text-xl"></i></div><div><div class="font-semibold">${title}</div><div class="text-sm text-gray-600">${message}</div></div></div>`;
            notificationArea.appendChild(notification);
            setTimeout(() => { notification.remove(); }, 5000);
        }

        async function loadCourses() {
            const select = document.getElementById('courseSelect');
            try {
                const response = await fetch(`${API_BASE}/courses/`);
                const courses = await response.json();
                select.innerHTML = '<option value="">-- Selecciona un curso --</option>';
                courses.forEach(course => {
                    select.innerHTML += `<option value="${course.id}">${course.name}</option>`;
                });
            } catch (error) {
                select.innerHTML = '<option value="">Error al cargar cursos</option>';
            }
        }
        
        async function loadAuthors() {
            const select = document.getElementById('authorSelect');
            const token = localStorage.getItem('token'); 

            if (!token) {
                select.innerHTML = '<option value="">Error: Token no encontrado</option>';
                console.error("No se encontró el token de autenticación en localStorage.");
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/users/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) throw new Error('No se pudo autenticar para cargar los autores.');
                const users = await response.json();
                select.innerHTML = '<option value="">-- Selecciona un autor --</option>';
                users.forEach(user => {
                    select.innerHTML += `<option value="${user.nombre}">${user.nombre}</option>`;
                });
            } catch (error) {
                select.innerHTML = '<option value="">Error al cargar autores</option>';
                console.error("Error en loadAuthors:", error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadCourses();
            loadAuthors();
        });

        document.getElementById('createModuleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const saveButton = document.getElementById('saveButton');
            saveButton.disabled = true;
            saveButton.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Creando...';

            const form = e.target;
            const payload = {};

            for (const element of form.elements) {
                if (element.name) {
                    if (element.type === 'checkbox') {
                        payload[element.name] = element.checked;
                    } else if (element.type === 'number' || element.name === 'course_id' || element.name === 'nota_minima_aprobacion') {
                        payload[element.name] = parseFloat(element.value) || null;
                    } else {
                        payload[element.name] = element.value;
                    }
                }
            }
            
            payload.codigo_id_del_modulo = 'ID_' + new Date().getTime();
            
            try {
                const response = await fetch(`${API_BASE}/modules/`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail?.[0]?.msg || errorData.detail || 'Ocurrió un error al crear el módulo.');
                }

                showNotification('success', 'Éxito', 'El módulo se ha creado correctamente.');
                form.reset();
                setTimeout(() => {
    window.location.href = 'https://gestordecursos.pegui.edu.co/r/superadmin/modulos/'; // Aquí se define la página de destino
}, 2000); // 2000 milisegundos = 2 segundos

            } catch (error) {
                showNotification('error', 'Error', `No se pudo crear el módulo: ${error.message}`);
            } finally {
                saveButton.disabled = false;
                saveButton.innerHTML = '<i class="fas fa-check mr-2"></i>Crear Módulo';
            }
        });
    </script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const path = window.location.pathname;
    const isSuperadmin = path.includes('/r/superadmin/');
    const isAdmin = path.includes('/r/admin/');
    const isCoordinador = path.includes('/r/coordinador/');
    const isCliente = path.includes('/r/cliente/');
    const isDisInst = path.includes('/r/disenador-instruccional/');
    const isAutor = path.includes('/r/autor/');
    const isRevisor = path.includes('/r/revisor-qa/');
    const isEditor = path.includes('/r/editor/');
    const isDesaMult = path.includes('/r/desarrollador-multimedia/');
    const isAbogado = path.includes('/r/abogado/');
    const isDisGraf = path.includes('/r/disenador-grafico/');
    const isAnim2d = path.includes('/r/animador-2d/');
    const isAnim3d = path.includes('/r/animador-3d/');
    const isVideo = path.includes('/r/video/');
    const isCorrector = path.includes('/r/corrector-de-estilo/');
    const isIngeniero = path.includes('/r/ingeniero-lms/');
    const isRegistrado = path.includes('/r/registrado/');

    const allowedRoles = [];
    if (isSuperadmin) allowedRoles.push('superadmin');
    if (isAdmin) allowedRoles.push('admin');
    if (isCoordinador) allowedRoles.push('coordinador');
    if (isCliente) allowedRoles.push('cliente');
    if (isDisInst) allowedRoles.push('disenador-instruccional');
    if (isAutor) allowedRoles.push('autor');
    if (isRevisor) allowedRoles.push('revisor-qa');
    if (isEditor) allowedRoles.push('editor');
    if (isDesaMult) allowedRoles.push('desarrollador-multimedia');
    if (isAbogado) allowedRoles.push('abogado');
    if (isDisGraf) allowedRoles.push('disenador-grafico');
    if (isAnim2d) allowedRoles.push('animador-2d');
    if (isAnim3d) allowedRoles.push('animador-3d');
    if (isVideo) allowedRoles.push('video');
    if (isCorrector) allowedRoles.push('corrector-de-estilo');
    if (isIngeniero) allowedRoles.push('ingeniero-lms');
    if (isRegistrado) allowedRoles.push('registrado');

    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/login.html';
        return;
    }
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const userRoles = payload.roles || [payload.role].filter(Boolean);
        if (!userRoles.some(r => allowedRoles.includes(r))) {
            window.location.href = '/';
            return;
        }
    } catch(e) {
        window.location.href = '/login.html';
    }
});
</script>

            'menu-microcursos': ['capacitacion_microcursos_ver'],
            'menu-tutoriales': ['capacitacion_tutoriales_ver'],
            'menu-faq': ['capacitacion_faq_ver'],
        };
        
        Object.entries(menuPermissions).forEach(([id, required]) => {
            const el = document.getElementById(id);
            if (el && !hasAnyPermission(required)) {
                el.style.display = 'none';
            }
        });
    } catch(e) {}
})();
</script>

</body>
</html>
