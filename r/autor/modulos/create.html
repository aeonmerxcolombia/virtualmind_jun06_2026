<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot para Creación de Módulo eLearning</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/fetch-con-token.js"></script>
    <style>
        .chat-box { scroll-behavior: smooth; }
        .chat-box::-webkit-scrollbar { display: none; }
        .chat-box { -ms-overflow-style: none; scrollbar-width: none; }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="chat-container w-full max-w-2xl bg-white shadow-xl rounded-2xl overflow-hidden flex flex-col h-[90vh]">
        <header class="p-6 bg-gradient-to-r from-blue-600 to-indigo-700 text-white text-center font-bold text-xl md:text-2xl shadow-md">
            Creador de Módulo eLearning
        </header>
        <main id="chat-box" class="flex-grow p-6 overflow-y-auto space-y-4">
        </main>
        <footer class="p-4 bg-gray-50 border-t border-gray-200 flex items-center">
            <input
                type="text"
                id="user-input"
                placeholder="Escribe tu respuesta aquí..."
                class="flex-grow px-4 py-3 rounded-full bg-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all duration-200 text-gray-800"
                autofocus
            />
            <button
                onclick="handleSendClick()"
                id="send-button"
                class="ml-3 px-6 py-3 rounded-full bg-blue-600 text-white font-semibold shadow-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all duration-200"
            >
                Enviar
            </button>
        </footer>
    </div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendButton = document.getElementById('send-button');

    // --- ESTADO Y DATOS DEL FORMULARIO ---
    let conversationState = 'obtener_cursos';
    let formData = {};
    let availableCourses = [];
    let availableUsers = [];
    let tempObjectives = [];
    let tempActivities = [];

    // --- CONFIGURACIÓN DE ENDPOINTS ---
    const BASE_API_URL = 'https://gestordecursos.pegui.edu.co:8000';
    const apiEndpoint = `${BASE_API_URL}/modules`;
    const coursesEndpoint = `${BASE_API_URL}/courses/`;
    const usersEndpoint = `${BASE_API_URL}/users/`;
    const iaGeneracionEndpoint = `${BASE_API_URL}/chat/generar-contenido`;

    // --- TOKEN DE AUTENTICACIÓN ---
    // Se toma del localStorage, como me indicaste
    const AUTH_TOKEN = localStorage.getItem('token');
    if (!AUTH_TOKEN) {
        console.error("Error: No se encontró el token de autenticación en el localStorage.");
        addMessage("Error: No se pudo iniciar el chat. Por favor, asegúrate de haber iniciado sesión y de que el token de autenticación esté disponible.", 'bot');
        // Esto deshabilitará la entrada del usuario si no hay token
        userInput.disabled = true;
        sendButton.disabled = true;
    }

    // --- FLUJO DE PREGUNTAS ---
    const questions = {
        'obtener_cursos': 'Conectando con el gestor de cursos...',
        'select_course': '¡Hola! Por favor, selecciona el curso para el nuevo módulo. Aquí están los disponibles:',

        // FIN DE CORRECCIONES Y ADICIONES

        'generar_palabras_clave_ia': 'Entendido. Generando palabras clave con IA...',

        'objetivos_especificos_decision': '¿Quieres que la IA genere los objetivos específicos basándose en el objetivo general, o prefieres escribirlos tú? (Escribe "generar" o "escribir")',

        'escribir_objetivos_especificos_manual': '¿Cuáles son los objetivos específicos? (Escribe uno y presiona Enviar. Cuando termines, escribe "listo")',
        'objetivos_especificos_list': 'Objetivo añadido. ¿Tienes otro objetivo específico? (di "listo" para terminar)',

        'tipos_actividades_list': 'Tipo de actividad añadido. ¿Tienes otro? (di "listo" para terminar)',

        'transcripciones_audio': '¿Habrá transcripciones de audio? (Sí/No)',
        'navegacion_teclado': '¿Será compatible con navegación con teclado? (Sí/No)',
        'lectura_pantalla_compatible': '¿Será compatible con lectura de pantalla? (Sí/No)',
        'idiomas_disponibles': '¿Qué idiomas estarán disponibles? (separados por coma)',
        'plataforma_destino': 'Pasemos a la entrega. ¿Cuál es la plataforma o LMS de destino? (ej. Moodle, Canvas, etc.)',
        'dispositivos_objetivo': '¿En qué dispositivos se usará? (Móvil, tableta, PC, separados por coma)',
        'modo_uso': '¿El modo de uso será en línea o sin conexión?',
        'tamano_aproximado': '¿Cuál es el tamaño aproximado del módulo en MB?',
        'entrega_fuentes': '¿Se entregarán las fuentes? (Sí/No)',
        'entrega_scorm': '¿Se entregará el SCORM? (Sí/No)',
        'entrega_multimedia': '¿Se entregará el multimedia? (Sí/No)',
        'entrega_version_pdf': '¿Se entregará la versión en PDF? (Sí/No)',
        'notas_adicionales': 'Por último, ¿tienes alguna nota u observación adicional? Escribe "listo" para crear el módulo.',
        'finalizar': 'finalizar'
    };

    // --- FUNCIONES AUXILIARES ---
    function addMessage(text, sender, isLoading = false) {
        const messageId = `msg-${Date.now()}`;
        const messageDiv = document.createElement('div');
        messageDiv.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
        messageDiv.id = messageId;

        const bubbleDiv = document.createElement('div');
        bubbleDiv.className = `rounded-xl px-4 py-2 max-w-sm break-words ${sender === 'user' ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-800'}`;
        
        if (isLoading) {
            bubbleDiv.innerHTML = '<div class="loader"></div>';
        } else {
            bubbleDiv.innerHTML = text.replace(/\n/g, '<br>');
        }
        
        messageDiv.appendChild(bubbleDiv);
        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        return messageId;
    }

    function updateMessage(messageId, newText) {
        const messageBubble = document.querySelector(`#${messageId} > div`);
        if (messageBubble) {
            messageBubble.innerHTML = newText.replace(/\n/g, '<br>');
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }
    
    function toggleUserInput(enabled) {
        userInput.disabled = !enabled;
        sendButton.disabled = !enabled;
        userInput.placeholder = enabled ? "Escribe tu respuesta aquí..." : "Esperando respuesta...";
    }

    function parseYesNo(input) {
        const cleanInput = input.trim().toLowerCase();
        return cleanInput === 'sí' || cleanInput === 'si';
    }

    // --- LÓGICA DE API Y IA ---
    async function fetchFromAPI(endpoint, requiresAuth = false, options = {}) {
        try {
            const headers = { 'Content-Type': 'application/json' };
            if (requiresAuth) {
                headers['Authorization'] = `Bearer ${AUTH_TOKEN}`;
            }
            const finalOptions = { ...options, headers: { ...headers, ...options.headers } };
            
            const response = await fetch(endpoint, finalOptions);
            
            if (!response.ok) {
                const errorData = await response.json().catch(() => ({ detail: 'Error desconocido' }));
                throw new Error(errorData.detail || `Error ${response.status}`);
            }
            return await response.json();
        } catch (error) {
            console.error(`Error en la llamada a ${endpoint}:`, error);
            addMessage(`Ocurrió un error de conexión con el servidor. Por favor, intenta de nuevo más tarde.`, 'bot');
            return null;
        }
    }

    async function getCourses() {
        addMessage(questions.obtener_cursos, 'bot');
        availableCourses = await fetchFromAPI(coursesEndpoint);
        if (availableCourses && availableCourses.length > 0) {
            let courseList = availableCourses.map((course, index) => `${index + 1}. ${course.name}`).join('\n');
            addMessage(questions.select_course + "\n\n" + courseList, 'bot');
            conversationState = 'select_course';
        } else {
            addMessage('No se encontraron cursos disponibles. Por favor, crea un curso primero.', 'bot');
            conversationState = 'error_fatal';
        }
    }
    
    async function getUsers() {
        addMessage('Obteniendo la lista de responsables...', 'bot');
        availableUsers = await fetchFromAPI(usersEndpoint, true); // true indica que requiere autenticación
        if (availableUsers && availableUsers.length > 0) {
            // CORRECCIÓN: Usar 'user.nombre' en lugar de 'user.full_name' para mostrar el nombre.
            let userList = availableUsers.map((user, index) => `${index + 1}. ${user.nombre} (${user.email})`).join('\n');
            addMessage(questions.select_user + "\n\n" + userList, 'bot');
            conversationState = 'select_user';
        } else {
            addMessage('No se pudo obtener la lista de responsables. No podrás continuar.', 'bot');
            conversationState = 'error_fatal';
        }
    }

    async function sendToIA(prompt) {
        const loaderId = addMessage('', 'bot', true);
        toggleUserInput(false);
        try {
            const response = await fetch(`${iaGeneracionEndpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });

            if (!response.ok) {
                updateMessage(loaderId, 'La IA no pudo generar el contenido. Por favor, ingrésalo manualmente.');
                return { success: false, data: 'Error de la IA' };
            }
            
            const data = await response.json();
            const rawText = data.respuesta;
            
            // Intenta extraer un JSON del texto, incluso si está rodeado de otras palabras
            const jsonMatch = rawText.match(/\[.*\]|\{.*\}/s);
            if (jsonMatch) {
                try {
                    const parsedJson = JSON.parse(jsonMatch[0]);
                    updateMessage(loaderId, `Contenido generado: ${parsedJson.join(', ')}`);
                    return { success: true, data: parsedJson };
                } catch (e) {
                    updateMessage(loaderId, 'La IA devolvió un formato incorrecto. Por favor, ingresa los datos manualmente.');
                    return { success: false, data: 'Formato incorrecto' };
                }
            } else {
                updateMessage(loaderId, rawText);
                return { success: false, data: rawText };
            }
        } catch (error) {
            updateMessage(loaderId, 'Ocurrió un error al conectar con el servidor de la IA.');
            return { success: false, data: 'Error de conexión' };
        } finally {
            toggleUserInput(true);
        }
    }

    // --- LÓGICA PRINCIPAL DE PROCESAMIENTO ---
    async function processResponse(message) {
        let nextQuestion = '';

        switch (conversationState) {
            case 'select_course':
                const courseIndex = parseInt(message, 10) - 1;
                const selectedCourse = availableCourses[courseIndex];
                if (selectedCourse) {
                    formData.course_id = selectedCourse.id;
                    addMessage(`Has seleccionado el curso: ${selectedCourse.name}`, 'bot');
                    formData.codigo_id_del_modulo = 'ID_' + new Date().getTime();
                    // Siguiente paso: seleccionar el usuario responsable
                    getUsers();
                } else {
                    addMessage('Selección inválida. Por favor, ingresa el número de un curso de la lista.', 'bot');
                }
                break;
            case 'select_user':
                const userIndex = parseInt(message, 10) - 1;
                const selectedUser = availableUsers[userIndex];
                if (selectedUser) {
                    // CORRECCIÓN: Usar 'selectedUser.nombre' en lugar de 'selectedUser.full_name'.
                    formData.autor_responsable = selectedUser.nombre;
                    formData.responsable_id = selectedUser.uid; // Usar el campo 'uid' como ID del responsable.
                    addMessage(`Has seleccionado a ${selectedUser.nombre} como responsable.`, 'bot');
                    
                    // AÑADIDO: Nuevas preguntas sobre derechos y organización
                    nextQuestion = questions.organizacion_institucion;
                    conversationState = 'organizacion_institucion';
                } else {
                    addMessage('Selección inválida. Por favor, ingresa el número de un responsable de la lista.', 'bot');
                }
                break;
            // INICIO DE ADICIONES AL FLUJO
            case 'organizacion_institucion':
                formData.organizacion_institucion = message;
                nextQuestion = questions.derechos_patrimoniales;
                conversationState = 'derechos_patrimoniales';
                break;
            case 'derechos_patrimoniales':
                formData.derechos_patrimoniales = parseYesNo(message);
                nextQuestion = questions.derechos_intelectuales;
                conversationState = 'derechos_intelectuales';
                break;
            case 'derechos_intelectuales':
                formData.derechos_intelectuales = parseYesNo(message);
                // Volver al flujo original
                nextQuestion = questions.nombre_del_modulo;
                conversationState = 'nombre_del_modulo';
                break;
            // FIN DE ADICIONES
            case 'nombre_del_modulo':
                formData.nombre_del_modulo = message;
                nextQuestion = questions.nombre_corto_del_modulo;
                conversationState = 'nombre_corto_del_modulo';
                break;
            case 'nombre_corto_del_modulo':
                formData.nombre_corto_del_modulo = message;
                nextQuestion = questions.version;
                conversationState = 'version';
                break;
            case 'version':
                formData.version = message;
                nextQuestion = questions.palabras_clave_decision;
                conversationState = 'palabras_clave_decision';
                break;
            case 'palabras_clave_decision':
                if (message.toLowerCase() === 'generar') {
                    const prompt = `Genera 5 palabras clave para un módulo de e-learning llamado "${formData.nombre_del_modulo}". Responde solo con una lista JSON de strings, sin texto adicional.`;
                    const iaResult = await sendToIA(prompt);
                    if (iaResult.success) {
                        formData.palabras_clave = iaResult.data.join(', ');
                        nextQuestion = questions.objetivo_general;
                        conversationState = 'objetivo_general';
                    } else {
                        addMessage('Ocurrió un error con la IA. Por favor, ingresa las palabras clave manualmente.', 'bot');
                        nextQuestion = questions.escribir_palabras_clave_manual;
                        conversationState = 'palabras_clave';
                    }
                } else {
                    nextQuestion = questions.escribir_palabras_clave_manual;
                    conversationState = 'palabras_clave';
                }
                break;
            case 'palabras_clave':
                formData.palabras_clave = message;
                nextQuestion = questions.objetivo_general;
                conversationState = 'objetivo_general';
                break;
            case 'objetivo_general':
                formData.objetivo_general = message;
                nextQuestion = questions.objetivos_especificos_decision;
                conversationState = 'objetivos_especificos_decision';
                break;
            case 'objetivos_especificos_decision':
                if (message.toLowerCase() === 'generar') {
                    const prompt = `Genera 5 objetivos específicos para un módulo de e-learning con el objetivo general: "${formData.objetivo_general}". Responde solo con una lista JSON de strings, sin texto adicional.`;
                    const iaResult = await sendToIA(prompt);
                    if (iaResult.success) {
                        formData.objetivos_especificos = iaResult.data.join(', ');
                        nextQuestion = questions.publico_objetivo;
                        conversationState = 'publico_objetivo';
                    } else {
                        addMessage('Ocurrió un error con la IA. Por favor, ingresa los objetivos manualmente.', 'bot');
                        nextQuestion = questions.escribir_objetivos_especificos_manual;
                        conversationState = 'objetivos_especificos_list';
                    }
                } else {
                    nextQuestion = questions.escribir_objetivos_especificos_manual;
                    conversationState = 'objetivos_especificos_list';
                }
                break;
            case 'objetivos_especificos_list':
                if (message.toLowerCase() === 'listo') {
                    formData.objetivos_especificos = tempObjectives.join(', ');
                    tempObjectives = [];
                    nextQuestion = questions.publico_objetivo;
                    conversationState = 'publico_objetivo';
                } else {
                    tempObjectives.push(message);
                    nextQuestion = questions.objetivos_especificos_list;
                }
                break;
            case 'publico_objetivo':
                formData.publico_objetivo = message;
                nextQuestion = questions.duracion_estimada;
                conversationState = 'duracion_estimada';
                break;
            case 'duracion_estimada':
                formData.duracion_estimada = message;
                nextQuestion = questions.requisitos_previos;
                conversationState = 'requisitos_previos';
                break;
            case 'requisitos_previos':
                formData.requisitos_previos = message;
                nextQuestion = questions.criterios_de_logro;
                conversationState = 'criterios_de_logro';
                break;
            case 'criterios_de_logro':
                formData.criterios_de_logro = message;
                nextQuestion = questions.numero_unidades;
                conversationState = 'numero_unidades';
                break;
            case 'numero_unidades':
                formData.numero_unidades = parseInt(message, 10) || 0;
                nextQuestion = questions.lista_unidades_temas;
                conversationState = 'lista_unidades_temas';
                break;
            case 'lista_unidades_temas':
                formData.lista_unidades_temas = message;
                nextQuestion = questions.orden_unidades;
                conversationState = 'orden_unidades';
                break;
            case 'orden_unidades':
                formData.orden_unidades = message;
                nextQuestion = questions.tiempo_estimado_por_unidad;
                conversationState = 'tiempo_estimado_por_unidad';
                break;
            case 'tiempo_estimado_por_unidad':
                formData.tiempo_estimado_por_unidad = message;
                nextQuestion = questions.tipo_letra;
                conversationState = 'tipo_letra';
                break;
            case 'tipo_letra':
                formData.tipo_letra = message;
                nextQuestion = questions.tamano_letra;
                conversationState = 'tamano_letra';
                break;
            case 'tamano_letra':
                formData.tamano_letra = message;
                nextQuestion = questions.estilos_texto;
                conversationState = 'estilos_texto';
                break;
            case 'estilos_texto':
                formData.estilos_texto = message;
                nextQuestion = questions.colores_principales;
                conversationState = 'colores_principales';
                break;
            case 'colores_principales':
                formData.colores_principales = message;
                nextQuestion = questions.logotipo;
                conversationState = 'logotipo';

        delete finalPayload.responsable_id; 

        const options = {
            method: 'POST',
            body: JSON.stringify(finalPayload),
            headers: { 'Content-Type': 'application/json' }
        };
        const response = await fetchFromAPI(apiEndpoint, true, options);

        if (response) {
            addMessage(`¡Formulario enviado con éxito! El módulo con ID ${response.id} ha sido creado.`, 'bot');
            console.log('JSON enviado:', finalPayload);
            console.log('Respuesta del servidor:', response);
        } else {

        }
        toggleUserInput(true);
    }

        const message = userInput.value.trim();

            processResponse(message);
            userInput.value = '';
        }

    const isAnim3d = path.includes('/r/animador-3d/');
    const isVideo = path.includes('/r/video/');
    const isCorrector = path.includes('/r/corrector-de-estilo/');
    const isIngeniero = path.includes('/r/ingeniero-lms/');
    const isRegistrado = path.includes('/r/registrado/');

    const allowedRoles = [];
    if (isSuperadmin) allowedRoles.push('superadmin');
    if (isAdmin) allowedRoles.push('admin');
    if (isCoordinador) allowedRoles.push('coordinador');
    if (isCliente) allowedRoles.push('cliente');
    if (isDisInst) allowedRoles.push('disenador-instruccional');
    if (isAutor) allowedRoles.push('autor');
    if (isRevisor) allowedRoles.push('revisor-qa');
    if (isEditor) allowedRoles.push('editor');
    if (isDesaMult) allowedRoles.push('desarrollador-multimedia');
    if (isAbogado) allowedRoles.push('abogado');
    if (isDisGraf) allowedRoles.push('disenador-grafico');
    if (isAnim2d) allowedRoles.push('animador-2d');
    if (isAnim3d) allowedRoles.push('animador-3d');
    if (isVideo) allowedRoles.push('video');
    if (isCorrector) allowedRoles.push('corrector-de-estilo');
    if (isIngeniero) allowedRoles.push('ingeniero-lms');
    if (isRegistrado) allowedRoles.push('registrado');

    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/login.html';
        return;
    }
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const userRoles = payload.roles || [payload.role].filter(Boolean);
        if (!userRoles.some(r => allowedRoles.includes(r))) {
            window.location.href = '/';
            return;
        }
    } catch(e) {
        window.location.href = '/login.html';
    }
});
