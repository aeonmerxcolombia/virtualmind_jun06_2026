<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Perfil de Usuario</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/fetch-con-token.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-2xl bg-white p-8 rounded-2xl shadow-xl border border-gray-200">
    
    <h2 class="text-3xl font-bold mb-6 text-center text-gray-700">Perfil de Usuario</h2>

    <div id="preview" class="flex justify-center mb-6 hidden">
      <img id="foto_actual" src="" alt="Foto de perfil"
        class="w-32 h-32 object-cover rounded-full border-4 border-gray-300 shadow-lg" />
    </div>

    <form id="profileForm" enctype="multipart/form-data" class="space-y-5">
      
      <div>
        <label for="user_id" class="block font-semibold mb-1">ID de Usuario</label>
        <input type="text" id="user_id" name="user_id" readonly
          class="w-full border border-gray-300 p-3 rounded-lg bg-gray-100 text-gray-700" />
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label for="nombre" class="block font-semibold mb-1">Nombre</label>
          <input type="text" id="nombre" name="nombre" class="w-full border border-gray-300 p-3 rounded-lg" />
        </div>
        <div>
          <label for="apellidos" class="block font-semibold mb-1">Apellidos</label>
          <input type="text" id="apellidos" name="apellidos" class="w-full border border-gray-300 p-3 rounded-lg" />
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label for="telefono" class="block font-semibold mb-1">Teléfono</label>
          <input type="text" id="telefono" name="telefono" class="w-full border border-gray-300 p-3 rounded-lg" />
        </div>
        <div>
          <label for="celular" class="block font-semibold mb-1">Celular</label>
          <input type="text" id="celular" name="celular" class="w-full border border-gray-300 p-3 rounded-lg" />
        </div>
      </div>

      <div>
        <label for="direccion" class="block font-semibold mb-1">Dirección</label>
        <input type="text" id="direccion" name="direccion" class="w-full border border-gray-300 p-3 rounded-lg" />
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label for="ciudad" class="block font-semibold mb-1">Ciudad</label>
          <input type="text" id="ciudad" name="ciudad" class="w-full border border-gray-300 p-3 rounded-lg" />
        </div>
        <div>
          <label for="pais" class="block font-semibold mb-1">País</label>
          <input type="text" id="pais" name="pais" class="w-full border border-gray-300 p-3 rounded-lg" />
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label for="cargo" class="block font-semibold mb-1">Cargo</label>
          <input type="text" id="cargo" name="cargo" class="w-full border border-gray-300 p-3 rounded-lg" />
        </div>
        <div>
          <label for="empresa" class="block font-semibold mb-1">Empresa</label>
          <input type="text" id="empresa" name="empresa" class="w-full border border-gray-300 p-3 rounded-lg" />
        </div>
      </div>

      <div>
        <label for="biografia" class="block font-semibold mb-1">Biografía</label>
        <textarea id="biografia" name="biografia" rows="3"
          class="w-full border border-gray-300 p-3 rounded-lg"></textarea>
      </div>

      <div class="grid grid-cols-3 gap-4">
        <div>
          <label for="linkedin" class="block font-semibold mb-1">LinkedIn</label>
          <input type="text" id="linkedin" name="linkedin" class="w-full border border-gray-300 p-3 rounded-lg" />
        </div>
        <div>
          <label for="twitter" class="block font-semibold mb-1">Twitter</label>
          <input type="text" id="twitter" name="twitter" class="w-full border border-gray-300 p-3 rounded-lg" />
        </div>
        <div>
          <label for="facebook" class="block font-semibold mb-1">Facebook</label>
          <input type="text" id="facebook" name="facebook" class="w-full border border-gray-300 p-3 rounded-lg" />
        </div>
      </div>

      <div class="flex items-center space-x-4 mt-2">
        <label class="flex items-center">
          <input type="checkbox" id="notificaciones_email" name="notificaciones_email" class="mr-2" checked />
          Notificaciones por correo
        </label>
        <label class="flex items-center">
          <input type="checkbox" id="notificaciones_virtualmind" name="notificaciones_virtualmind" class="mr-2" checked />
          Notificaciones en Virtualmind
        </label>
      </div>

      <div>
        <label for="privacidad_perfil" class="block font-semibold mb-1">Privacidad</label>
        <select id="privacidad_perfil" name="privacidad_perfil" class="w-full border border-gray-300 p-3 rounded-lg">
          <option value="privado">Privado</option>
          <option value="publico">Público</option>
        </select>
      </div>

      <div>
        <label for="foto" class="block font-semibold mb-1">Actualizar Foto de Perfil</label>
        <input type="file" id="foto" name="foto" accept="image/*" class="w-full border border-gray-300 p-3 rounded-lg" />
      </div>

      <div class="flex justify-between mt-8">
        <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 shadow">
          Guardar Cambios
        </button>
        <button type="button" onclick="eliminarPerfil()" class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700 shadow">
          Eliminar Perfil
        </button>
      </div>

      <div id="respuesta" class="mt-4 text-sm"></div>

    </form>

  </div>

<script src="/js/roles.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const path = window.location.pathname;
    const isSuperadmin = path.includes('/r/superadmin/');
    const isAdmin = path.includes('/r/admin/');
    const isCoordinador = path.includes('/r/coordinador/');
    const isCliente = path.includes('/r/cliente/');
    const isDisInst = path.includes('/r/disenador-instruccional/');
    const isAutor = path.includes('/r/autor/');
    const isRevisor = path.includes('/r/revisor-qa/');
    const isEditor = path.includes('/r/editor/');
    const isDesaMult = path.includes('/r/desarrollador-multimedia/');
    const isAbogado = path.includes('/r/abogado/');
    const isDisGraf = path.includes('/r/disenador-grafico/');
    const isAnim2d = path.includes('/r/animador-2d/');
    const isAnim3d = path.includes('/r/animador-3d/');
    const isVideo = path.includes('/r/video/');
    const isCorrector = path.includes('/r/corrector-de-estilo/');
    const isIngeniero = path.includes('/r/ingeniero-lms/');
    const isRegistrado = path.includes('/r/registrado/');

    const allowedRoles = [];
    if (isSuperadmin) allowedRoles.push('superadmin');
    if (isAdmin) allowedRoles.push('admin');
    if (isCoordinador) allowedRoles.push('coordinador');
    if (isCliente) allowedRoles.push('cliente');
    if (isDisInst) allowedRoles.push('disenador-instruccional');
    if (isAutor) allowedRoles.push('autor');
    if (isRevisor) allowedRoles.push('revisor-qa');
    if (isEditor) allowedRoles.push('editor');
    if (isDesaMult) allowedRoles.push('desarrollador-multimedia');
    if (isAbogado) allowedRoles.push('abogado');
    if (isDisGraf) allowedRoles.push('disenador-grafico');
    if (isAnim2d) allowedRoles.push('animador-2d');
    if (isAnim3d) allowedRoles.push('animador-3d');
    if (isVideo) allowedRoles.push('video');
    if (isCorrector) allowedRoles.push('corrector-de-estilo');
    if (isIngeniero) allowedRoles.push('ingeniero-lms');
    if (isRegistrado) allowedRoles.push('registrado');

    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/login.html';
        return;
    }
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const userRoles = payload.roles || [payload.role].filter(Boolean);
        if (!userRoles.some(r => allowedRoles.includes(r))) {
            window.location.href = '/';
            return;
        }
    } catch(e) {
        window.location.href = '/login.html';
    }
});
</script>

<script>
// ==================== VERIFICACIÓN DE PERMISOS DE MENÚ ====================
(function() {
    const token = localStorage.getItem('token');
    if (!token) return;
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const permissions = payload.permissions || [];
        
        const hasPermission = (perm) => permissions.includes(perm);
        const hasAnyPermission = (perms) => perms.some(p => permissions.includes(p));
        
        const menuPermissions = {
            'menu-proyectos': ['proyectos_crear', 'proyectos_consultar'],
            'menu-crear-proyecto': ['proyectos_crear'],
            'menu-entidades': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-crear-entidad': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-plan-estudio': ['proyectos_planes_formacion_listar', 'diseno_instruccional_ver'],
            'menu-crear-plan': ['diseno_instruccional_crear'],
            'menu-cursos': ['proyectos_cursos_listar'],
            'menu-crear-curso': ['autor_crear'],
            'menu-modulos': ['proyectos_modulos_listar'],
            'menu-crear-modulo': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-unidades': ['proyectos_unidades_listar'],
            'menu-crear-unidad': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-tareas': ['proyectos_tareas_listar'],
            'menu-crear-tarea': ['autor_crear'],
            'menu-evaluaciones': ['proyectos_evaluaciones_listar'],
            'menu-crear-evaluacion': ['autor_crear'],
            'menu-fases': ['proyectos_fases_etapas_gestionar'],
            'menu-cronogramas': ['proyectos_cronogramas_crear'],
            'menu-calendario': ['proyectos_calendario_ver'],
            'menu-usuarios': ['usuarios_crear'],
            'menu-clientes': ['usuarios_crear'],
            'menu-crm': ['usuarios_crear'],
            'menu-roles': ['roles_permisos_gestionar'],
            'menu-drive': ['archivos_drive_personal_ver', 'archivos_drive_global_ver'],
            'menu-ia': ['ia_produccion_imagen', 'ia_produccion_audio', 'ia_linguistica_usar'],
            'menu-canvas': ['herramientas_canvas_usar'],
            'menu-powerpoint': ['herramientas_powerpoint_usar'],
            'menu-auditoria': ['seguridad_auditoria_ver'],
            'menu-bitacora': ['seguridad_bitacora_usuarios_ver'],
            'menu-estadisticas': ['reportes_estadisticas_ver'],
            'menu-metricas': ['reportes_metricas_ver'],
            'menu-diseno-instruccional': ['diseno_instruccional_ver', 'diseno_instruccional_crear'],
            'menu-autor-contenido': ['autor_ver', 'autor_crear'],
            'menu-microcursos': ['capacitacion_microcursos_ver'],
            'menu-tutoriales': ['capacitacion_tutoriales_ver'],
            'menu-faq': ['capacitacion_faq_ver'],
        };
        
        Object.entries(menuPermissions).forEach(([id, required]) => {
            const el = document.getElementById(id);
            if (el && !hasAnyPermission(required)) {
                el.style.display = 'none';
            }
        });
    } catch(e) {}
})();
</script>

</body>
</html>
