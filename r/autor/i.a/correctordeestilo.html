<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corrector de Estilo Dinámico</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/fetch-con-token.js"></script>
</head>
<body class="bg-gray-100 font-sans">

  <div class="container mx-auto p-6">
    <h1 class="text-4xl font-extrabold text-center text-indigo-700 mb-8">Corrector de Estilo Dinámico</h1>

    <!-- Área de texto para ingresar el texto -->
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-lg shadow-xl mb-6">
      <textarea id="input-text" class="w-full h-32 p-4 border-2 border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-600 text-lg mb-6" placeholder="Escribe tu texto aquí..."></textarea>

      <!-- Botones para seleccionar el tipo de corrección -->
      <div class="flex justify-center space-x-6 mb-6">
        <button id="style-btn" class="py-3 px-6 bg-blue-500 text-white font-semibold rounded-full shadow-md transition-all transform hover:scale-105 hover:bg-blue-600">Estilo Académico</button>
        <button id="informal-btn" class="py-3 px-6 bg-green-500 text-white font-semibold rounded-full shadow-md transition-all transform hover:scale-105 hover:bg-green-600">Estilo Informal</button>
        <button id="persuasive-btn" class="py-3 px-6 bg-purple-500 text-white font-semibold rounded-full shadow-md transition-all transform hover:scale-105 hover:bg-purple-600">Estilo Persuasivo</button>
      </div>
    </div>

    <!-- Mostrar los resultados de las respuestas -->
    <div id="results" class="max-w-4xl mx-auto mt-8 space-y-6"></div>

  </div>

  <script>
    // Función para enviar la solicitud y obtener la respuesta de la IA
    async function sendRequest(endpoint, body) {
      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(body),
        });

        if (!response.ok) {
          throw new Error('Error en la solicitud');
        }

        // Intentamos obtener la respuesta como texto
        const textResponse = await response.text();

        // Si la respuesta es JSON, intentar parsearlo, sino, solo devolver el texto
        try {
          const data = JSON.parse(textResponse);
          return data.mensaje || data.result || data.respuesta;
        } catch (e) {
          return textResponse; // Si no es JSON, devolverlo como texto
        }

      } catch (error) {
        console.error('Error en la solicitud:', error);
        return 'Error al procesar la solicitud';
      }
    }

    // Función para manejar las solicitudes dependiendo del estilo
    async function handleRequest(style) {
      const text = document.getElementById('input-text').value;
      if (!text) {
        alert('Por favor, ingresa un texto');
        return;
      }

      document.getElementById('results').innerHTML = 'Procesando...';

      const body = { "mensaje": text };

      let endpoint = '';
      let title = '';

      // Asignar el endpoint y título según el estilo seleccionado
      if (style === 'academic') {
        endpoint = 'https://gestordecursos.pegui.edu.co:8000/chat/openai';  // Usar el endpoint para OpenAI
        title = 'Estilo Académico';
      } else if (style === 'informal') {
        endpoint = 'https://gestordecursos.pegui.edu.co:8000/chat/kimi';  // Usar el endpoint para Kimi
        title = 'Estilo Informal';
      } else if (style === 'persuasive') {
        endpoint = 'https://gestordecursos.pegui.edu.co:8000/chat/gemini';  // Usar el endpoint para Gemini
        title = 'Estilo Persuasivo';
      }

      // Enviar la solicitud y obtener la respuesta
      const result = await sendRequest(endpoint, body);

      // Mostrar el resultado en la interfaz
      document.getElementById('results').innerHTML = `
        <div class="bg-white p-6 rounded-lg shadow-md">
          <h2 class="text-2xl font-semibold text-indigo-600 mb-4">${title}</h2>
          <p class="text-lg text-gray-700">${result}</p>
        </div>
      `;
    }

    // Asignar los eventos de los botones
    document.getElementById('style-btn').addEventListener('click', () => handleRequest('academic'));
    document.getElementById('informal-btn').addEventListener('click', () => handleRequest('informal'));
    document.getElementById('persuasive-btn').addEventListener('click', () => handleRequest('persuasive'));
  </script>
<script src="/js/roles.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const path = window.location.pathname;
    const isSuperadmin = path.includes('/r/superadmin/');
    const isAdmin = path.includes('/r/admin/');
    const isCoordinador = path.includes('/r/coordinador/');
    const isCliente = path.includes('/r/cliente/');
    const isDisInst = path.includes('/r/disenador-instruccional/');
    const isAutor = path.includes('/r/autor/');
    const isRevisor = path.includes('/r/revisor-qa/');
    const isEditor = path.includes('/r/editor/');
    const isDesaMult = path.includes('/r/desarrollador-multimedia/');
    const isAbogado = path.includes('/r/abogado/');
    const isDisGraf = path.includes('/r/disenador-grafico/');
    const isAnim2d = path.includes('/r/animador-2d/');
    const isAnim3d = path.includes('/r/animador-3d/');
    const isVideo = path.includes('/r/video/');
    const isCorrector = path.includes('/r/corrector-de-estilo/');
    const isIngeniero = path.includes('/r/ingeniero-lms/');
    const isRegistrado = path.includes('/r/registrado/');

    const allowedRoles = [];
    if (isSuperadmin) allowedRoles.push('superadmin');
    if (isAdmin) allowedRoles.push('admin');
    if (isCoordinador) allowedRoles.push('coordinador');
    if (isCliente) allowedRoles.push('cliente');
    if (isDisInst) allowedRoles.push('disenador-instruccional');
    if (isAutor) allowedRoles.push('autor');
    if (isRevisor) allowedRoles.push('revisor-qa');
    if (isEditor) allowedRoles.push('editor');
    if (isDesaMult) allowedRoles.push('desarrollador-multimedia');
    if (isAbogado) allowedRoles.push('abogado');
    if (isDisGraf) allowedRoles.push('disenador-grafico');
    if (isAnim2d) allowedRoles.push('animador-2d');
    if (isAnim3d) allowedRoles.push('animador-3d');
    if (isVideo) allowedRoles.push('video');
    if (isCorrector) allowedRoles.push('corrector-de-estilo');
    if (isIngeniero) allowedRoles.push('ingeniero-lms');
    if (isRegistrado) allowedRoles.push('registrado');

    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/login.html';
        return;
    }
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const userRoles = payload.roles || [payload.role].filter(Boolean);
        if (!userRoles.some(r => allowedRoles.includes(r))) {
            window.location.href = '/';
            return;
        }
    } catch(e) {
        window.location.href = '/login.html';
    }
});
</script>

<script>
// ==================== VERIFICACIÓN DE PERMISOS DE MENÚ ====================
(function() {
    const token = localStorage.getItem('token');
    if (!token) return;
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const permissions = payload.permissions || [];
        
        const hasPermission = (perm) => permissions.includes(perm);
        const hasAnyPermission = (perms) => perms.some(p => permissions.includes(p));
        
        const menuPermissions = {
            'menu-proyectos': ['proyectos_crear', 'proyectos_consultar'],
            'menu-crear-proyecto': ['proyectos_crear'],
            'menu-entidades': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-crear-entidad': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-plan-estudio': ['proyectos_planes_formacion_listar', 'diseno_instruccional_ver'],
            'menu-crear-plan': ['diseno_instruccional_crear'],
            'menu-cursos': ['proyectos_cursos_listar'],
            'menu-crear-curso': ['autor_crear'],
            'menu-modulos': ['proyectos_modulos_listar'],
            'menu-crear-modulo': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-unidades': ['proyectos_unidades_listar'],
            'menu-crear-unidad': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-tareas': ['proyectos_tareas_listar'],
            'menu-crear-tarea': ['autor_crear'],
            'menu-evaluaciones': ['proyectos_evaluaciones_listar'],
            'menu-crear-evaluacion': ['autor_crear'],
            'menu-fases': ['proyectos_fases_etapas_gestionar'],
            'menu-cronogramas': ['proyectos_cronogramas_crear'],
            'menu-calendario': ['proyectos_calendario_ver'],
            'menu-usuarios': ['usuarios_crear'],
            'menu-clientes': ['usuarios_crear'],
            'menu-crm': ['usuarios_crear'],
            'menu-roles': ['roles_permisos_gestionar'],
            'menu-drive': ['archivos_drive_personal_ver', 'archivos_drive_global_ver'],
            'menu-ia': ['ia_produccion_imagen', 'ia_produccion_audio', 'ia_linguistica_usar'],
            'menu-canvas': ['herramientas_canvas_usar'],
            'menu-powerpoint': ['herramientas_powerpoint_usar'],
            'menu-auditoria': ['seguridad_auditoria_ver'],
            'menu-bitacora': ['seguridad_bitacora_usuarios_ver'],
            'menu-estadisticas': ['reportes_estadisticas_ver'],
            'menu-metricas': ['reportes_metricas_ver'],
            'menu-diseno-instruccional': ['diseno_instruccional_ver', 'diseno_instruccional_crear'],
            'menu-autor-contenido': ['autor_ver', 'autor_crear'],
            'menu-microcursos': ['capacitacion_microcursos_ver'],
            'menu-tutoriales': ['capacitacion_tutoriales_ver'],
            'menu-faq': ['capacitacion_faq_ver'],
        };
        
        Object.entries(menuPermissions).forEach(([id, required]) => {
            const el = document.getElementById(id);
            if (el && !hasAnyPermission(required)) {
                el.style.display = 'none';
            }
        });
    } catch(e) {}
})();
</script>

</body>
</html>
