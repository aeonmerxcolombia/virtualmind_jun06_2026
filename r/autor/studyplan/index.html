<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Crear Plan de Formación</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/fetch-con-token.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 p-8">
  <div class="max-w-3xl mx-auto bg-white p-8 shadow-lg rounded-lg">
    <h2 class="text-3xl font-bold mb-6">Crear Plan de Formación</h2>
    <form id="studyPlanForm" class="space-y-6">
      <div>
        <label class="block font-semibold mb-1">Nombre del Curso</label>
        <input type="text" name="name" required class="w-full border p-2 rounded" />
      </div>
      <div>
        <label class="block font-semibold mb-1">Descripción</label>
        <textarea name="description" rows="2" class="w-full border p-2 rounded"></textarea>
      </div>
      <div>
        <label class="block font-semibold mb-1">Modalidad</label>
        <select name="modalidad" class="w-full border p-2 rounded">
          <option>Presencial</option>
          <option>Virtual</option>
          <option>B-Learning</option>
          <option>Autoformación</option>
          <option>Otra</option>
        </select>
        <input type="text" name="modalidad_otro" placeholder="Si eligió 'Otra', especifique" class="w-full mt-2 border p-2 rounded" />
      </div>
      <div>
        <label class="block font-semibold mb-1">Sincronía</label>
        <div class="flex gap-8 mt-1">
          <label class="inline-flex items-center">
            <input type="radio" name="sincronia" value="Sincrono" required class="form-radio accent-blue-600">
            <span class="ml-2">Sincrono</span>
          </label>
          <label class="inline-flex items-center">
            <input type="radio" name="sincronia" value="Asincrono" class="form-radio accent-blue-600">
            <span class="ml-2">Asincrono</span>
          </label>
        </div>
      </div>
      <div>
        <label class="block font-semibold mb-1">Duración (semanas)</label>
        <input type="number" name="duracion" class="w-full border p-2 rounded" />
      </div>
      <div>
        <label class="block font-semibold mb-1">Objetivo General</label>
        <textarea name="objetivo_general" rows="2" class="w-full border p-2 rounded"></textarea>
      </div>
      <div>
        <label class="block font-semibold mb-1">Objetivos Específicos</label>
        <textarea name="objetivos_especificos" rows="2" class="w-full border p-2 rounded"></textarea>
      </div>
      <div>
        <label class="block font-semibold mb-1">Resultados de Aprendizaje</label>
        <textarea name="resultados_aprendizaje" rows="2" class="w-full border p-2 rounded"></textarea>
      </div>
      <div>
        <label class="block font-semibold mb-1">Horas de Estudio</label>
        <textarea name="horas_estudio" rows="2" class="w-full border p-2 rounded"></textarea>
      </div>
      <div>
        <label class="block font-semibold mb-1">Recursos Libros</label>
        <textarea name="recursos_libros" rows="2" class="w-full border p-2 rounded"></textarea>
      </div>
      <div>
        <label class="block font-semibold mb-1">Recursos Artículos</label>
        <textarea name="recursos_articulos" rows="2" class="w-full border p-2 rounded"></textarea>
      </div>
      <div>
        <label class="block font-semibold mb-1">Recursos Materiales</label>
        <textarea name="recursos_materiales" rows="2" class="w-full border p-2 rounded"></textarea>
      </div>
      <div>
        <label class="block font-semibold mb-1">Evaluaciones Cuestionarios</label>
        <textarea name="evaluaciones_cuestionarios" rows="2" class="w-full border p-2 rounded"></textarea>
      </div>
      <div>
        <label class="block font-semibold mb-1">Evaluaciones Exámenes</label>
        <textarea name="evaluaciones_examenes" rows="2" class="w-full border p-2 rounded"></textarea>
      </div>
      <div>
        <label class="block font-semibold mb-1">Evaluaciones Tareas</label>
        <textarea name="evaluaciones_tareas" rows="2" class="w-full border p-2 rounded"></textarea>
      </div>
      <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Crear Plan</button>
    </form>
    <div id="mensaje" class="mt-6 text-center"></div>
  </div>
  <script>
    document.getElementById('studyPlanForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      // Obtener project_id de la URL
      const urlParams = new URLSearchParams(window.location.search);
      const project_id = parseInt(urlParams.get('project_id'));

      const formData = new FormData(e.target);
      const data = {};
      for (const [key, value] of formData.entries()) {
        data[key] = value;
      }
      data['duracion'] = parseInt(data['duracion']) || 0;
      data['project_id'] = project_id;

      const response = await fetch('https://gestordecursos.pegui.edu.co:8000/study_plans/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      const mensaje = document.getElementById("mensaje");
      if (response.ok) {
        const plan = await response.json();
        mensaje.innerHTML = `
          <div class="text-green-600 font-semibold mb-4">Plan de estudio creado con éxito.</div>
          <a href="/r/superadmin/modules/?study_plan_id=${plan.id}"
            class="inline-block px-6 py-3 bg-green-600 hover:bg-green-800 text-white rounded font-bold transition">
            ➕ Agregar Módulos a este Plan
          </a>
        `;
        e.target.style.display = "none";
      } else {
        const error = await response.json();
        mensaje.innerHTML = `<div class="text-red-600">Error: ${error.detail || 'No se pudo crear el plan de estudio.'}</div>`;
      }
    });
  </script>
<script src="/js/roles.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const path = window.location.pathname;
    const isSuperadmin = path.includes('/r/superadmin/');
    const isAdmin = path.includes('/r/admin/');
    const isCoordinador = path.includes('/r/coordinador/');
    const isCliente = path.includes('/r/cliente/');
    const isDisInst = path.includes('/r/disenador-instruccional/');
    const isAutor = path.includes('/r/autor/');
    const isRevisor = path.includes('/r/revisor-qa/');
    const isEditor = path.includes('/r/editor/');
    const isDesaMult = path.includes('/r/desarrollador-multimedia/');
    const isAbogado = path.includes('/r/abogado/');
    const isDisGraf = path.includes('/r/disenador-grafico/');
    const isAnim2d = path.includes('/r/animador-2d/');
    const isAnim3d = path.includes('/r/animador-3d/');
    const isVideo = path.includes('/r/video/');
    const isCorrector = path.includes('/r/corrector-de-estilo/');
    const isIngeniero = path.includes('/r/ingeniero-lms/');
    const isRegistrado = path.includes('/r/registrado/');

    const allowedRoles = [];
    if (isSuperadmin) allowedRoles.push('superadmin');
    if (isAdmin) allowedRoles.push('admin');
    if (isCoordinador) allowedRoles.push('coordinador');
    if (isCliente) allowedRoles.push('cliente');
    if (isDisInst) allowedRoles.push('disenador-instruccional');
    if (isAutor) allowedRoles.push('autor');
    if (isRevisor) allowedRoles.push('revisor-qa');
    if (isEditor) allowedRoles.push('editor');
    if (isDesaMult) allowedRoles.push('desarrollador-multimedia');
    if (isAbogado) allowedRoles.push('abogado');
    if (isDisGraf) allowedRoles.push('disenador-grafico');
    if (isAnim2d) allowedRoles.push('animador-2d');
    if (isAnim3d) allowedRoles.push('animador-3d');
    if (isVideo) allowedRoles.push('video');
    if (isCorrector) allowedRoles.push('corrector-de-estilo');
    if (isIngeniero) allowedRoles.push('ingeniero-lms');
    if (isRegistrado) allowedRoles.push('registrado');

    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/login.html';
        return;
    }
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const userRoles = payload.roles || [payload.role].filter(Boolean);
        if (!userRoles.some(r => allowedRoles.includes(r))) {
            window.location.href = '/';
            return;
        }
    } catch(e) {
        window.location.href = '/login.html';
    }
});
</script>

<script>
// ==================== VERIFICACIÓN DE PERMISOS DE MENÚ ====================
(function() {
    const token = localStorage.getItem('token');
    if (!token) return;
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const permissions = payload.permissions || [];
        
        const hasPermission = (perm) => permissions.includes(perm);
        const hasAnyPermission = (perms) => perms.some(p => permissions.includes(p));
        
        const menuPermissions = {
            'menu-proyectos': ['proyectos_crear', 'proyectos_consultar'],
            'menu-crear-proyecto': ['proyectos_crear'],
            'menu-entidades': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-crear-entidad': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-plan-estudio': ['proyectos_planes_formacion_listar', 'diseno_instruccional_ver'],
            'menu-crear-plan': ['diseno_instruccional_crear'],
            'menu-cursos': ['proyectos_cursos_listar'],
            'menu-crear-curso': ['autor_crear'],
            'menu-modulos': ['proyectos_modulos_listar'],
            'menu-crear-modulo': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-unidades': ['proyectos_unidades_listar'],
            'menu-crear-unidad': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-tareas': ['proyectos_tareas_listar'],
            'menu-crear-tarea': ['autor_crear'],
            'menu-evaluaciones': ['proyectos_evaluaciones_listar'],
            'menu-crear-evaluacion': ['autor_crear'],
            'menu-fases': ['proyectos_fases_etapas_gestionar'],
            'menu-cronogramas': ['proyectos_cronogramas_crear'],
            'menu-calendario': ['proyectos_calendario_ver'],
            'menu-usuarios': ['usuarios_crear'],
            'menu-clientes': ['usuarios_crear'],
            'menu-crm': ['usuarios_crear'],
            'menu-roles': ['roles_permisos_gestionar'],
            'menu-drive': ['archivos_drive_personal_ver', 'archivos_drive_global_ver'],
            'menu-ia': ['ia_produccion_imagen', 'ia_produccion_audio', 'ia_linguistica_usar'],
            'menu-canvas': ['herramientas_canvas_usar'],
            'menu-powerpoint': ['herramientas_powerpoint_usar'],
            'menu-auditoria': ['seguridad_auditoria_ver'],
            'menu-bitacora': ['seguridad_bitacora_usuarios_ver'],
            'menu-estadisticas': ['reportes_estadisticas_ver'],
            'menu-metricas': ['reportes_metricas_ver'],
            'menu-diseno-instruccional': ['diseno_instruccional_ver', 'diseno_instruccional_crear'],
            'menu-autor-contenido': ['autor_ver', 'autor_crear'],
            'menu-microcursos': ['capacitacion_microcursos_ver'],
            'menu-tutoriales': ['capacitacion_tutoriales_ver'],
            'menu-faq': ['capacitacion_faq_ver'],
        };
        
        Object.entries(menuPermissions).forEach(([id, required]) => {
            const el = document.getElementById(id);
            if (el && !hasAnyPermission(required)) {
                el.style.display = 'none';
            }
        });
    } catch(e) {}
})();
</script>

</body>
</html>
