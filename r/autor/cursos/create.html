<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear Curso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/fetch-con-token.js"></script>
</head>
<body class="bg-gray-100 p-8">
  <div class="max-w-xl mx-auto bg-white shadow-md rounded px-8 pt-6 pb-8">
    <h1 class="text-2xl font-bold mb-6 text-center">Crear Nuevo Curso</h1>

    <form id="courseForm" class="space-y-4">
      <div>
        <label class="block text-gray-700 font-bold mb-2" for="name">Nombre del curso</label>
        <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700" id="name" name="name" type="text" required>
      </div>

      <div>
        <label class="block text-gray-700 font-bold mb-2" for="description">Descripción</label>
        <textarea class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700" id="description" name="description" rows="3" required></textarea>
      </div>

      <div>
        <label class="block text-gray-700 font-bold mb-2" for="study_plan_id">Plan de estudio</label>
        <select class="shadow border rounded w-full py-2 px-3 text-gray-700" id="study_plan_id" name="study_plan_id" required>
          <option value="">Cargando...</option>
        </select>
      </div>

      <div>
        <label class="inline-flex items-center">
          <input type="checkbox" id="soyAutor" class="form-checkbox h-5 w-5 text-blue-600">
          <span class="ml-2 text-gray-700">El curso lo hago yo</span>
        </label>
      </div>

      <div id="autorDiv">
        <label class="block text-gray-700 font-bold mb-2" for="author">Autor</label>
        <select class="shadow border rounded w-full py-2 px-3 text-gray-700" id="author" name="author">
          <option value="">Seleccione un usuario</option>
        </select>
      </div>

      <div class="text-center">
        <button class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded" type="submit">
          Crear Curso
        </button>
      </div>
    </form>
  </div>

  <script>
    const token = localStorage.token || sessionStorage.token;
    const autorDiv = document.getElementById('autorDiv');
    const selectAutor = document.getElementById('author');

    // Oculta o muestra select según checkbox
    document.getElementById('soyAutor').addEventListener('change', async function () {
      if (this.checked) {
        // Decodificar token para extraer el campo 'sub'
        const payload = JSON.parse(atob(token.split('.')[1]));
        selectAutor.innerHTML = `<option value="${payload.sub}" selected>${payload.sub}</option>`;
        selectAutor.disabled = true;
      } else {
        selectAutor.disabled = false;
        await cargarUsuarios();
      }
    });

    async function cargarPlanes() {
      const select = document.getElementById('study_plan_id');
      try {
        const res = await fetch('https://gestordecursos.pegui.edu.co:8000/study_plans');
        const planes = await res.json();
        select.innerHTML = '<option value="">Seleccione un plan</option>';
        planes.forEach(plan => {
          const option = document.createElement('option');
          option.value = plan.id;
          option.textContent = plan.name;
          select.appendChild(option);
        });
      } catch (error) {
        select.innerHTML = '<option value="">Error al cargar planes</option>';
      }
    }

    async function cargarUsuarios() {
      try {
        const res = await fetch('https://gestordecursos.pegui.edu.co:8000/users', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error("No autorizado");

        const usuarios = await res.json();
        selectAutor.innerHTML = '<option value="">Seleccione un usuario</option>';
        usuarios.forEach(u => {
          const option = document.createElement('option');
          option.value = u.email || u.id || u.username;
          option.textContent = u.email || u.username;
          selectAutor.appendChild(option);
        });
      } catch (err) {
        selectAutor.innerHTML = '<option value="">Error al cargar usuarios</option>';
        console.error(err);
      }
    }

    cargarPlanes();
    cargarUsuarios();

    document.getElementById('courseForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const data = {
        name: e.target.name.value,
        description: e.target.description.value,
        study_plan_id: parseInt(e.target.study_plan_id.value),
        author: e.target.author.value
      };

      try {
        const res = await fetch('https://gestordecursos.pegui.edu.co:8000/courses', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(data)
        });

        if (res.ok) {
          window.location.href = "/r/superadmin/cursos/";
        } else {
          const error = await res.text();
          alert("Error al crear: " + error);
        }
      } catch (err) {
        alert("Error de red: " + err.message);
      }
    });
  </script>
<script src="/js/roles.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const path = window.location.pathname;
    const isSuperadmin = path.includes('/r/superadmin/');
    const isAdmin = path.includes('/r/admin/');
    const isCoordinador = path.includes('/r/coordinador/');
    const isCliente = path.includes('/r/cliente/');
    const isDisInst = path.includes('/r/disenador-instruccional/');
    const isAutor = path.includes('/r/autor/');
    const isRevisor = path.includes('/r/revisor-qa/');
    const isEditor = path.includes('/r/editor/');
    const isDesaMult = path.includes('/r/desarrollador-multimedia/');
    const isAbogado = path.includes('/r/abogado/');
    const isDisGraf = path.includes('/r/disenador-grafico/');
    const isAnim2d = path.includes('/r/animador-2d/');
    const isAnim3d = path.includes('/r/animador-3d/');
    const isVideo = path.includes('/r/video/');
    const isCorrector = path.includes('/r/corrector-de-estilo/');
    const isIngeniero = path.includes('/r/ingeniero-lms/');
    const isRegistrado = path.includes('/r/registrado/');

    const allowedRoles = [];
    if (isSuperadmin) allowedRoles.push('superadmin');
    if (isAdmin) allowedRoles.push('admin');
    if (isCoordinador) allowedRoles.push('coordinador');
    if (isCliente) allowedRoles.push('cliente');
    if (isDisInst) allowedRoles.push('disenador-instruccional');
    if (isAutor) allowedRoles.push('autor');
    if (isRevisor) allowedRoles.push('revisor-qa');
    if (isEditor) allowedRoles.push('editor');
    if (isDesaMult) allowedRoles.push('desarrollador-multimedia');
    if (isAbogado) allowedRoles.push('abogado');
    if (isDisGraf) allowedRoles.push('disenador-grafico');
    if (isAnim2d) allowedRoles.push('animador-2d');
    if (isAnim3d) allowedRoles.push('animador-3d');
    if (isVideo) allowedRoles.push('video');
    if (isCorrector) allowedRoles.push('corrector-de-estilo');
    if (isIngeniero) allowedRoles.push('ingeniero-lms');
    if (isRegistrado) allowedRoles.push('registrado');

    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/login.html';
        return;
    }
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const userRoles = payload.roles || [payload.role].filter(Boolean);
        if (!userRoles.some(r => allowedRoles.includes(r))) {
            window.location.href = '/';
            return;
        }
    } catch(e) {
        window.location.href = '/login.html';
    }
});
</script>

<script>
// ==================== VERIFICACIÓN DE PERMISOS DE MENÚ ====================
(function() {
    const token = localStorage.getItem('token');
    if (!token) return;
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const permissions = payload.permissions || [];
        
        const hasPermission = (perm) => permissions.includes(perm);
        const hasAnyPermission = (perms) => perms.some(p => permissions.includes(p));
        
        const menuPermissions = {
            'menu-proyectos': ['proyectos_crear', 'proyectos_consultar'],
            'menu-crear-proyecto': ['proyectos_crear'],
            'menu-entidades': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-crear-entidad': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-plan-estudio': ['proyectos_planes_formacion_listar', 'diseno_instruccional_ver'],
            'menu-crear-plan': ['diseno_instruccional_crear'],
            'menu-cursos': ['proyectos_cursos_listar'],
            'menu-crear-curso': ['autor_crear'],
            'menu-modulos': ['proyectos_modulos_listar'],
            'menu-crear-modulo': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-unidades': ['proyectos_unidades_listar'],
            'menu-crear-unidad': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-tareas': ['proyectos_tareas_listar'],
            'menu-crear-tarea': ['autor_crear'],
            'menu-evaluaciones': ['proyectos_evaluaciones_listar'],
            'menu-crear-evaluacion': ['autor_crear'],
            'menu-fases': ['proyectos_fases_etapas_gestionar'],
            'menu-cronogramas': ['proyectos_cronogramas_crear'],
            'menu-calendario': ['proyectos_calendario_ver'],
            'menu-usuarios': ['usuarios_crear'],
            'menu-clientes': ['usuarios_crear'],
            'menu-crm': ['usuarios_crear'],
            'menu-roles': ['roles_permisos_gestionar'],
            'menu-drive': ['archivos_drive_personal_ver', 'archivos_drive_global_ver'],
            'menu-ia': ['ia_produccion_imagen', 'ia_produccion_audio', 'ia_linguistica_usar'],
            'menu-canvas': ['herramientas_canvas_usar'],
            'menu-powerpoint': ['herramientas_powerpoint_usar'],
            'menu-auditoria': ['seguridad_auditoria_ver'],
            'menu-bitacora': ['seguridad_bitacora_usuarios_ver'],
            'menu-estadisticas': ['reportes_estadisticas_ver'],
            'menu-metricas': ['reportes_metricas_ver'],
            'menu-diseno-instruccional': ['diseno_instruccional_ver', 'diseno_instruccional_crear'],
            'menu-autor-contenido': ['autor_ver', 'autor_crear'],
            'menu-microcursos': ['capacitacion_microcursos_ver'],
            'menu-tutoriales': ['capacitacion_tutoriales_ver'],
            'menu-faq': ['capacitacion_faq_ver'],
        };
        
        Object.entries(menuPermissions).forEach(([id, required]) => {
            const el = document.getElementById(id);
            if (el && !hasAnyPermission(required)) {
                el.style.display = 'none';
            }
        });
    } catch(e) {}
})();
</script>

</body>
</html>
