<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registrar Competencias</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/fetch-con-token.js"></script>
</head>
<body class="bg-gray-50 p-6 font-sans">
  <h1 class="text-3xl font-bold text-emerald-700 mb-6">📘 Registrar Competencias</h1>

  <form id="competenciaForm" class="max-w-3xl mx-auto bg-white p-6 rounded-lg shadow space-y-6">

    <!-- HABILIDADES (tags) -->
    <div>
      <label class="block font-semibold mb-1">Habilidades</label>
      <div class="flex gap-2 mb-2">
        <input id="skillInput" type="text" placeholder="Agregar habilidad"
               class="flex-1 border p-2 rounded"/>
        <button type="button" id="addSkill"
                class="bg-blue-500 hover:bg-blue-600 text-white px-4 rounded">Añadir</button>
      </div>
      <div id="skillsContainer" class="flex flex-wrap gap-2"></div>
    </div>

    <!-- IDIOMAS (tags) -->
    <div>
      <label class="block font-semibold mb-1">Idiomas</label>
      <div class="flex gap-2 mb-2">
        <select id="langSelect" class="flex-1 border p-2 rounded">
          <option value="">Seleccionar idioma</option>
          <option>Español</option>
          <option>Inglés</option>
          <option>Portugués</option>
          <option>Francés</option>
          <option>Otro</option>
        </select>
        <button type="button" id="addLang"
                class="bg-blue-500 hover:bg-blue-600 text-white px-4 rounded">+</button>
      </div>
      <div id="langsContainer" class="flex flex-wrap gap-2"></div>
    </div>

    <!-- NIVEL ACADÉMICO con “Otro” -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block font-semibold mb-1">Nivel académico</label>
        <select id="nivelAcademico" class="w-full border p-2 rounded">
          <option value="">Seleccionar nivel</option>
          <option>Secundaria</option>
          <option>Tecnólogo</option>
          <option>Profesional</option>
          <option>Maestría</option>
          <option>Doctorado</option>
          <option>Otro</option>
        </select>
      </div>
      <div id="otroNivelContainer" class="hidden">
        <label class="block font-semibold mb-1">Especifique nivel</label>
        <input id="otroNivel" type="text" placeholder="Describa nivel académico"
               class="w-full border p-2 rounded"/>
      </div>
    </div>

    <!-- ÁREA DE CONOCIMIENTO -->
    <div>
      <label class="block font-semibold mb-1">Área de conocimiento</label>
      <input id="areaConocimiento" type="text" placeholder="Ej. Desarrollo web"
             class="w-full border p-2 rounded"/>
    </div>

    <!-- OTROS ESTUDIOS -->
    <div>
      <label class="block font-semibold mb-1">Otros estudios</label>
      <input id="otrosEstudios" type="text" placeholder="Ej. Curso de UX"
             class="w-full border p-2 rounded"/>
    </div>

    <!-- AÑOS DE EXPERIENCIA y DISPONIBILIDAD -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block font-semibold mb-1">Años de experiencia</label>
        <input id="aniosExperiencia" type="number" min="0" placeholder="0"
               class="w-full border p-2 rounded"/>
      </div>
      <div>
        <label class="block font-semibold mb-1">Disponibilidad</label>
        <input id="disponibilidad" type="text" placeholder="Ej. Inmediata / Fecha"
               class="w-full border p-2 rounded"/>
      </div>
    </div>

    <!-- SOBRE MI / PERFILAMIENTO -->
    <div>
      <label class="block font-semibold mb-1">Sobre mí</label>
      <textarea id="perfilamiento" rows="4" placeholder="Describe brevemente tu perfil, intereses o fortalezas"
                class="w-full border p-2 rounded resize-y"></textarea>
    </div>

    <!-- Oculto: USER ID -->
    <input type="hidden" id="userId">

    <button type="submit"
            class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 rounded">
      Guardar Competencia
    </button>
  </form>

  <script>
    // Arrays para almacenar tags
    const skills = [];
    const langs  = [];

    // Referencias DOM
    const skillsContainer = document.getElementById("skillsContainer");
    const langsContainer  = document.getElementById("langsContainer");

    // Añadir habilidad
    document.getElementById("addSkill").addEventListener("click", () => {
      const input = document.getElementById("skillInput");
      const val = input.value.trim();
      if (val && !skills.includes(val)) {
        skills.push(val);
        const tag = document.createElement("div");
        tag.className = "bg-gray-200 px-3 py-1 rounded flex items-center gap-2 text-sm";
        tag.innerHTML = `${val} <button type="button" class="text-red-500">&times;</button>`;
        tag.querySelector("button").onclick = () => {
          skills.splice(skills.indexOf(val), 1);
          tag.remove();
        };
        skillsContainer.appendChild(tag);
      }
      input.value = "";
    });

    // Añadir idioma
    document.getElementById("addLang").addEventListener("click", () => {
      const sel = document.getElementById("langSelect");
      const val = sel.value;
      if (val && !langs.includes(val)) {
        langs.push(val);
        const tag = document.createElement("div");
        tag.className = "bg-gray-200 px-3 py-1 rounded flex items-center gap-2 text-sm";
        tag.innerHTML = `${val} <button type="button" class="text-red-500">&times;</button>`;
        tag.querySelector("button").onclick = () => {
          langs.splice(langs.indexOf(val), 1);
          tag.remove();
        };
        langsContainer.appendChild(tag);
      }
      sel.value = "";
    });

    // Mostrar campo “Otro nivel” si se selecciona “Otro”
    document.getElementById("nivelAcademico").addEventListener("change", e => {
      const show = e.target.value === "Otro";
      document.getElementById("otroNivelContainer").classList.toggle("hidden", !show);
    });

    // Capturar user_id desde URL
    document.addEventListener("DOMContentLoaded", () => {
      const uid = new URLSearchParams(window.location.search).get("user_id") || "";
      document.getElementById("userId").value = uid;
    });

    // Enviar formulario al backend
    document.getElementById("competenciaForm").addEventListener("submit", async e => {
      e.preventDefault();
      const payload = {
        habilidades: skills,
        idiomas: langs,
        nivel_academico: document.getElementById("nivelAcademico").value === "Otro"
                         ? document.getElementById("otroNivel").value
                         : document.getElementById("nivelAcademico").value,
        area_conocimiento : document.getElementById("areaConocimiento").value,
        otros_estudios    : document.getElementById("otrosEstudios").value,
        anios_experiencia : Number(document.getElementById("aniosExperiencia").value),
        disponibilidad    : document.getElementById("disponibilidad").value,
        perfilamiento     : document.getElementById("perfilamiento").value, // <-- Nuevo campo obligatorio
        user_id           : document.getElementById("userId").value
      };

      try {
        const res = await fetch("https://gestordecursos.pegui.edu.co:8000/competencias/", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify(payload)
        });
        if (res.ok) {
          alert("✅ Competencias registradas correctamente");
          // Aquí puedes redirigir o limpiar el formulario
        } else {
          const err = await res.json();
          alert("❌ Error: " + (err.detail || JSON.stringify(err)));
        }
      } catch (err) {
        alert("⚠️ Error de red al guardar.");
        console.error(err);
      }
    });
  </script>
<script src="/js/roles.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const path = window.location.pathname;
    const isSuperadmin = path.includes('/r/superadmin/');
    const isAdmin = path.includes('/r/admin/');
    const isCoordinador = path.includes('/r/coordinador/');
    const isCliente = path.includes('/r/cliente/');
    const isDisInst = path.includes('/r/disenador-instruccional/');
    const isAutor = path.includes('/r/autor/');
    const isRevisor = path.includes('/r/revisor-qa/');
    const isEditor = path.includes('/r/editor/');
    const isDesaMult = path.includes('/r/desarrollador-multimedia/');
    const isAbogado = path.includes('/r/abogado/');
    const isDisGraf = path.includes('/r/disenador-grafico/');
    const isAnim2d = path.includes('/r/animador-2d/');
    const isAnim3d = path.includes('/r/animador-3d/');
    const isVideo = path.includes('/r/video/');
    const isCorrector = path.includes('/r/corrector-de-estilo/');
    const isIngeniero = path.includes('/r/ingeniero-lms/');
    const isRegistrado = path.includes('/r/registrado/');

    const allowedRoles = [];
    if (isSuperadmin) allowedRoles.push('superadmin');
    if (isAdmin) allowedRoles.push('admin');
    if (isCoordinador) allowedRoles.push('coordinador');
    if (isCliente) allowedRoles.push('cliente');
    if (isDisInst) allowedRoles.push('disenador-instruccional');
    if (isAutor) allowedRoles.push('autor');
    if (isRevisor) allowedRoles.push('revisor-qa');
    if (isEditor) allowedRoles.push('editor');
    if (isDesaMult) allowedRoles.push('desarrollador-multimedia');
    if (isAbogado) allowedRoles.push('abogado');
    if (isDisGraf) allowedRoles.push('disenador-grafico');
    if (isAnim2d) allowedRoles.push('animador-2d');
    if (isAnim3d) allowedRoles.push('animador-3d');
    if (isVideo) allowedRoles.push('video');
    if (isCorrector) allowedRoles.push('corrector-de-estilo');
    if (isIngeniero) allowedRoles.push('ingeniero-lms');
    if (isRegistrado) allowedRoles.push('registrado');

    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/login.html';
        return;
    }
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const userRoles = payload.roles || [payload.role].filter(Boolean);
        if (!userRoles.some(r => allowedRoles.includes(r))) {
            window.location.href = '/';
            return;
        }
    } catch(e) {
        window.location.href = '/login.html';
    }
});
</script>

<script>
// ==================== VERIFICACIÓN DE PERMISOS DE MENÚ ====================
(function() {
    const token = localStorage.getItem('token');
    if (!token) return;
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const permissions = payload.permissions || [];
        
        const hasPermission = (perm) => permissions.includes(perm);
        const hasAnyPermission = (perms) => perms.some(p => permissions.includes(p));
        
        const menuPermissions = {
            'menu-proyectos': ['proyectos_crear', 'proyectos_consultar'],
            'menu-crear-proyecto': ['proyectos_crear'],
            'menu-entidades': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-crear-entidad': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-plan-estudio': ['proyectos_planes_formacion_listar', 'diseno_instruccional_ver'],
            'menu-crear-plan': ['diseno_instruccional_crear'],
            'menu-cursos': ['proyectos_cursos_listar'],
            'menu-crear-curso': ['autor_crear'],
            'menu-modulos': ['proyectos_modulos_listar'],
            'menu-crear-modulo': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-unidades': ['proyectos_unidades_listar'],
            'menu-crear-unidad': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-tareas': ['proyectos_tareas_listar'],
            'menu-crear-tarea': ['autor_crear'],
            'menu-evaluaciones': ['proyectos_evaluaciones_listar'],
            'menu-crear-evaluacion': ['autor_crear'],
            'menu-fases': ['proyectos_fases_etapas_gestionar'],
            'menu-cronogramas': ['proyectos_cronogramas_crear'],
            'menu-calendario': ['proyectos_calendario_ver'],
            'menu-usuarios': ['usuarios_crear'],
            'menu-clientes': ['usuarios_crear'],
            'menu-crm': ['usuarios_crear'],
            'menu-roles': ['roles_permisos_gestionar'],
            'menu-drive': ['archivos_drive_personal_ver', 'archivos_drive_global_ver'],
            'menu-ia': ['ia_produccion_imagen', 'ia_produccion_audio', 'ia_linguistica_usar'],
            'menu-canvas': ['herramientas_canvas_usar'],
            'menu-powerpoint': ['herramientas_powerpoint_usar'],
            'menu-auditoria': ['seguridad_auditoria_ver'],
            'menu-bitacora': ['seguridad_bitacora_usuarios_ver'],
            'menu-estadisticas': ['reportes_estadisticas_ver'],
            'menu-metricas': ['reportes_metricas_ver'],
            'menu-diseno-instruccional': ['diseno_instruccional_ver', 'diseno_instruccional_crear'],
            'menu-autor-contenido': ['autor_ver', 'autor_crear'],
            'menu-microcursos': ['capacitacion_microcursos_ver'],
            'menu-tutoriales': ['capacitacion_tutoriales_ver'],
            'menu-faq': ['capacitacion_faq_ver'],
        };
        
        Object.entries(menuPermissions).forEach(([id, required]) => {
            const el = document.getElementById(id);
            if (el && !hasAnyPermission(required)) {
                el.style.display = 'none';
            }
        });
    } catch(e) {}
})();
</script>

</body>
</html>
