<!DOCTYPE html>
<html lang="es" >
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VirtualMind - Podcasts</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/fetch-con-token.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'bounce-slow': 'bounce 2s infinite',
            'gradient': 'gradient 15s ease infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-10px)' }
            },
            gradient: {
              '0%, 100%': { 'background-position': '0% 50%' },
              '50%': { 'background-position': '100% 50%' }
            }
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-violet-900 via-purple-900 to-indigo-900 bg-[length:400%_400%] animate-gradient">
  <!-- Background Effects -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-4 -left-4 w-72 h-72 bg-purple-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-float"></div>
    <div class="absolute top-1/3 -right-4 w-72 h-72 bg-pink-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-float" style="animation-delay: 2s"></div>
    <div class="absolute -bottom-8 left-1/3 w-72 h-72 bg-indigo-500 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-float" style="animation-delay: 4s"></div>
  </div>

  <div class="relative z-10 min-h-screen p-4 lg:p-8">
    <div class="max-w-6xl mx-auto">
      
      <!-- Header -->
      <header class="text-center mb-12">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-r from-pink-500 to-violet-500 rounded-2xl mb-6 shadow-2xl animate-bounce-slow">
          <svg class="w-10 h-10 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>
        </div>
        <h1 class="text-5xl lg:text-6xl font-black bg-gradient-to-r from-pink-400 via-purple-400 to-indigo-400 bg-clip-text text-transparent mb-4">
          VirtualMind
        </h1>
        <p class="text-xl text-purple-200 font-light">Plataforma de Podcasts</p>
        <div class="w-24 h-1 bg-gradient-to-r from-pink-500 to-violet-500 mx-auto mt-4 rounded-full"></div>
      </header>

      <!-- Upload Form -->
      <div class="mb-16">
        <div class="backdrop-blur-lg bg-white/10 border border-white/20 rounded-3xl p-8 lg:p-10 shadow-2xl">
          <form id="uploadForm" class="space-y-8" enctype="multipart/form-data" novalidate>
            <div class="flex items-center space-x-4 mb-8">
              <div class="w-12 h-12 bg-gradient-to-r from-emerald-400 to-teal-400 rounded-xl flex items-center justify-center">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                </svg>
              </div>
              <h2 class="text-3xl font-bold text-white">Crear Nuevo Podcast</h2>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
              <!-- Título -->
              <div class="space-y-2">
                <label for="titulo" class="block text-purple-200 font-semibold text-lg">Título del Podcast</label>
                <div class="relative">
                  <input
                    type="text"
                    id="titulo"
                    name="titulo"
                    required
                    placeholder="Ej: Mi primer podcast increíble"
                    class="w-full rounded-2xl border-0 bg-white/20 backdrop-blur-sm px-6 py-4 text-white placeholder-purple-300 focus:outline-none focus:ring-4 focus:ring-purple-500/50 focus:bg-white/30 transition-all duration-300 text-lg"
                  />
                  <div class="absolute inset-0 rounded-2xl bg-gradient-to-r from-purple-500/20 to-pink-500/20 -z-10"></div>
                </div>
              </div>

              <!-- Descripción -->
              <div class="space-y-2">
                <label for="descripcion" class="block text-purple-200 font-semibold text-lg">Descripción</label>
                <div class="relative">
                  <textarea
                    id="descripcion"
                    name="descripcion"
                    rows="4"
                    placeholder="Cuéntanos de qué trata tu podcast..."
                    class="w-full rounded-2xl border-0 bg-white/20 backdrop-blur-sm px-6 py-4 text-white placeholder-purple-300 focus:outline-none focus:ring-4 focus:ring-purple-500/50 focus:bg-white/30 transition-all duration-300 resize-none text-lg"
                  ></textarea>
                  <div class="absolute inset-0 rounded-2xl bg-gradient-to-r from-purple-500/20 to-pink-500/20 -z-10"></div>
                </div>
              </div>
            </div>

            <!-- Recording Section -->
            <div class="bg-gradient-to-r from-emerald-500/20 to-teal-500/20 rounded-2xl p-6 border border-emerald-400/30">
              <h3 class="text-xl font-bold text-white mb-4 flex items-center">
                <svg class="w-6 h-6 mr-3 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
                </svg>
                Grabar Audio
              </h3>
              <div class="flex flex-col sm:flex-row items-start sm:items-center space-y-4 sm:space-y-0 sm:space-x-6">
                <button
                  type="button"
                  id="btnRecord"
                  class="group relative inline-flex items-center space-x-3 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white px-8 py-4 rounded-2xl font-bold transition-all duration-300 transform hover:scale-105 shadow-lg hover:shadow-xl"
                >
                  <div class="absolute inset-0 bg-gradient-to-r from-emerald-400 to-teal-400 rounded-2xl blur opacity-75 group-hover:opacity-100 transition duration-300"></div>
                  <svg class="relative w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 12l-3.536 3.536-3.536-3.536M12 2v14"/>
                  </svg>
                  <span id="btnRecordText" class="relative text-lg">Comenzar Grabación</span>
                </button>
                <div id="recordStatus" class="flex items-center space-x-2 text-emerald-300 font-bold text-lg">
                  <!-- Status will be updated by JS -->
                </div>
              </div>
            </div>

            <!-- File Upload -->
            <div class="bg-gradient-to-r from-blue-500/20 to-indigo-500/20 rounded-2xl p-6 border border-blue-400/30">
              <h3 class="text-xl font-bold text-white mb-4 flex items-center">
                <svg class="w-6 h-6 mr-3 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                </svg>
                Subir Archivo
              </h3>
              <div class="relative">
                <input
                  type="file"
                  id="archivo"
                  name="archivo"
                  accept=".mp3,.wav,.webm,.ogg"
                  class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                />
                <div class="border-2 border-dashed border-blue-400/50 rounded-2xl p-8 text-center hover:border-blue-400 hover:bg-blue-500/10 transition-all duration-300">
                  <svg class="mx-auto h-16 w-16 text-blue-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                  </svg>
                  <p class="text-blue-200 text-lg font-medium">Arrastra tu archivo aquí o haz clic para seleccionar</p>
                  <p class="text-blue-300 text-sm mt-2">Soporta MP3, WAV, WebM y OGG</p>
                </div>
              </div>
            </div>

            <!-- Submit Button -->
            <button
              type="submit"
              class="group relative w-full bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 hover:from-pink-600 hover:via-purple-600 hover:to-indigo-600 text-white font-bold py-6 rounded-2xl shadow-2xl transition-all duration-300 transform hover:scale-[1.02] text-xl"
            >
              <div class="absolute inset-0 bg-gradient-to-r from-pink-400 via-purple-400 to-indigo-400 rounded-2xl blur opacity-75 group-hover:opacity-100 transition duration-300"></div>
              <div class="relative flex items-center justify-center space-x-3">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                </svg>
                <span>Publicar Podcast</span>
              </div>
            </button>
          </form>
        </div>
      </div>

      <!-- AI Generation Section -->
      <div class="mb-16">
        <div class="backdrop-blur-lg bg-white/10 border border-white/20 rounded-3xl p-8 lg:p-10 shadow-2xl">
          <div class="flex items-center space-x-4 mb-8">
            <div class="w-12 h-12 bg-gradient-to-r from-indigo-400 to-purple-400 rounded-xl flex items-center justify-center">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
            </div>
            <h2 class="text-3xl font-bold text-white">Generar Podcast con IA</h2>
          </div>

          <form id="iaForm" class="space-y-6" onsubmit="generarPodcastIA(event)">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div class="space-y-2">
                <label class="block text-purple-200 font-semibold text-lg">Título</label>
                <input type="text" id="iaTitulo" required placeholder="Título del podcast" class="w-full rounded-2xl border-0 bg-white/20 backdrop-blur-sm px-6 py-4 text-white placeholder-purple-300 focus:outline-none focus:ring-4 focus:ring-purple-500/50 transition-all duration-300 text-lg">
              </div>
              <div class="space-y-2">
                <label class="block text-purple-200 font-semibold text-lg">Descripción</label>
                <input type="text" id="iaDescripcion" placeholder="Breve descripción" class="w-full rounded-2xl border-0 bg-white/20 backdrop-blur-sm px-6 py-4 text-white placeholder-purple-300 focus:outline-none focus:ring-4 focus:ring-purple-500/50 transition-all duration-300 text-lg">
              </div>
            </div>

            <div class="space-y-2">
              <label class="block text-purple-200 font-semibold text-lg">Contenido del Podcast</label>
              <textarea id="iaTexto" rows="6" required placeholder="Escribe el texto que se convertirá en audio del podcast..." class="w-full rounded-2xl border-0 bg-white/20 backdrop-blur-sm px-6 py-4 text-white placeholder-purple-300 focus:outline-none focus:ring-4 focus:ring-purple-500/50 transition-all duration-300 resize-none text-lg"></textarea>
            </div>

            <div class="bg-gradient-to-r from-indigo-500/20 to-purple-500/20 rounded-2xl p-6 border border-indigo-400/30">
              <h3 class="text-lg font-bold text-white mb-4 flex items-center">
                <svg class="w-5 h-5 mr-2 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4"/>
                </svg>
                Motor de Voz
              </h3>
              <div class="flex gap-4 mb-4">
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="radio" name="motorVoz" value="tts" checked onchange="toggleMotorVoz()" class="w-4 h-4 text-indigo-500">
                  <span class="text-purple-200">TTS (Edge) — 322 voces</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="radio" name="motorVoz" value="clonacion" onchange="toggleMotorVoz()" class="w-4 h-4 text-indigo-500">
                  <span class="text-purple-200">Clonación de Voz (XTTS)</span>
                </label>
              </div>

              <div id="ttsOptions" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div>
                    <label class="block text-purple-300 text-sm mb-1">Voz</label>
                    <select id="iaVoz" class="w-full rounded-xl border-0 bg-white/20 backdrop-blur-sm px-4 py-3 text-white focus:outline-none focus:ring-4 focus:ring-purple-500/50">
                      <option value="es-CO-SalomeNeural">Salome (Colombia)</option>
                      <option value="es-MX-DaliaNeural">Dalia (Mexico)</option>
                      <option value="es-ES-AlvaroNeural">Alvaro (España)</option>
                      <option value="es-US-PalomaNeural">Paloma (US)</option>
                    </select>
                  </div>
                  <div>
                    <label class="block text-purple-300 text-sm mb-1">Velocidad</label>
                    <select id="iaRate" class="w-full rounded-xl border-0 bg-white/20 backdrop-blur-sm px-4 py-3 text-white focus:outline-none focus:ring-4 focus:ring-purple-500/50">
                      <option value="-20">Muy lenta</option>
                      <option value="-10">Lenta</option>
                      <option value="0" selected>Normal</option>
                      <option value="10">Rápida</option>
                      <option value="20">Muy rápida</option>
                    </select>
                  </div>
                  <div>
                    <label class="block text-purple-300 text-sm mb-1">Tono</label>
                    <select id="iaPitch" class="w-full rounded-xl border-0 bg-white/20 backdrop-blur-sm px-4 py-3 text-white focus:outline-none focus:ring-4 focus:ring-purple-500/50">
                      <option value="-20">Grave</option>
                      <option value="-10">Bajo</option>
                      <option value="0" selected>Normal</option>
                      <option value="10">Agudo</option>
                      <option value="20">Muy agudo</option>
                    </select>
                  </div>
                </div>
              </div>

              <div id="clonacionOptions" class="hidden space-y-4">
                <div>
                  <label class="block text-purple-300 text-sm mb-1">Muestra de Voz (opcional — si no se provee, se usa voz por defecto)</label>
                  <input type="file" id="iaAudioMuestra" accept="audio/*" class="w-full rounded-xl border-0 bg-white/20 backdrop-blur-sm px-4 py-3 text-white file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:bg-indigo-500 file:text-white file:cursor-pointer">
                </div>
              </div>
            </div>

            <button type="submit" id="btnGenerarIA" class="group relative w-full bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 hover:from-indigo-600 hover:via-purple-600 hover:to-pink-600 text-white font-bold py-6 rounded-2xl shadow-2xl transition-all duration-300 transform hover:scale-[1.02] text-xl">
              <div class="absolute inset-0 bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 rounded-2xl blur opacity-75 group-hover:opacity-100 transition duration-300"></div>
              <div class="relative flex items-center justify-center space-x-3">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
                <span id="btnGenerarIAText">Generar Podcast con IA</span>
              </div>
            </button>
            <div id="iaProgress" class="hidden text-center text-emerald-300 font-semibold py-3">
              <div class="w-6 h-6 border-2 border-emerald-400 border-t-transparent rounded-full animate-spin mx-auto mb-2"></div>
              Generando audio del podcast...
            </div>
          </form>
        </div>
      </div>

      <script>
      function toggleMotorVoz() {
        const tts = document.getElementById('ttsOptions');
        const clon = document.getElementById('clonacionOptions');
        if (document.querySelector('input[name="motorVoz"]:checked').value === 'tts') {
          tts.classList.remove('hidden');
          clon.classList.add('hidden');
        } else {
          tts.classList.add('hidden');
          clon.classList.remove('hidden');
        }
      }

      async function generarPodcastIA(e) {
        e.preventDefault();
        const titulo = document.getElementById('iaTitulo').value.trim();
        const texto = document.getElementById('iaTexto').value.trim();
        if (!titulo || !texto) return alert('Completa título y contenido');

        const btn = document.getElementById('btnGenerarIA');
        const progress = document.getElementById('iaProgress');
        const motor = document.querySelector('input[name="motorVoz"]:checked').value;

        btn.disabled = true;
        progress.classList.remove('hidden');
        document.getElementById('btnGenerarIAText').textContent = 'Generando...';

        try {
          const fd = new FormData();
          fd.append('titulo', titulo);
          fd.append('descripcion', document.getElementById('iaDescripcion').value.trim());
          fd.append('texto', texto);
          fd.append('usar_clonacion', motor === 'clonacion' ? 'true' : 'false');

          if (motor === 'tts') {
            fd.append('voz', document.getElementById('iaVoz').value);
            fd.append('rate', document.getElementById('iaRate').value);
            fd.append('pitch', document.getElementById('iaPitch').value);
          }

          if (motor === 'clonacion') {
            const audioFile = document.getElementById('iaAudioMuestra').files[0];
            if (audioFile) fd.append('audio_clonacion', audioFile);
          }

          const res = await fetch(`${API_BASE}/podcasts/generar`, {
            method: 'POST',
            headers: { Authorization: `Bearer ${getToken()}` },
            body: fd,
          });

          if (res.ok) {
            alert('✅ Podcast generado exitosamente');
            document.getElementById('iaForm').reset();
            fetchPodcasts();
          } else {
            const err = await res.json();
            alert('Error: ' + (err.detail || 'desconocido'));
          }
        } catch(e) {
          alert('Error de conexión: ' + e.message);
        }

        btn.disabled = false;
        progress.classList.add('hidden');
        document.getElementById('btnGenerarIAText').textContent = 'Generar Podcast con IA';
      }
      </script>

      <!-- Hidden audio element -->
      <audio id="audioDurationHelper" style="display:none;"></audio>

      <!-- Podcasts List -->
      <section>
        <div class="flex items-center space-x-4 mb-8">
          <div class="w-12 h-12 bg-gradient-to-r from-violet-400 to-purple-400 rounded-xl flex items-center justify-center">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
            </svg>
          </div>
          <h2 class="text-3xl font-bold text-white">Biblioteca de Podcasts</h2>
        </div>
        <div id="podcastList" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
      </section>
    </div>
  </div>

<script>
  const API_BASE = "https://gestordecursos.pegui.edu.co:8000"; // Cambia si necesitas

  function getToken() {
    const token = localStorage.getItem("token");
    if (!token) {
      alert("No estás autenticado. Por favor inicia sesión.");
      throw new Error("No token");
    }
    return token;
  }

  let mediaRecorder;
  let audioChunks = [];
  let recordedBlob = null;

  const btnRecord = document.getElementById("btnRecord");
  const btnRecordText = document.getElementById("btnRecordText");
  const recordStatus = document.getElementById("recordStatus");
  const archivoInput = document.getElementById("archivo");

  let recording = false;
  let durationSeconds = 0;
  let durationInterval;

  archivoInput.onchange = () => {
    if (archivoInput.files.length > 0) {
      durationSeconds = 0;
      clearInterval(durationInterval);
      recordStatus.innerHTML = `
        <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span>Archivo listo para subir</span>
      `;
      if (recording) {
        mediaRecorder && mediaRecorder.stop();
        recording = false;
        btnRecordText.textContent = "Comenzar Grabación";
        btnRecord.classList.remove("from-red-500", "to-red-600", "hover:from-red-600", "hover:to-red-700");
        btnRecord.classList.add("from-emerald-500", "to-teal-500", "hover:from-emerald-600", "hover:to-teal-600");
      }
    }
  };

  btnRecord.onclick = async () => {
    if (!recording) {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        alert("Tu navegador no soporta grabación de audio.");
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = e => {
          audioChunks.push(e.data);
        };

        mediaRecorder.onstop = async () => {
          recordedBlob = new Blob(audioChunks, { type: "audio/webm" });
          
          // Intentar convertir a formato más compatible si es necesario
          let finalFile;
          try {
            // Si el navegador soporta MediaRecorder con diferentes formatos
            if (MediaRecorder.isTypeSupported('audio/wav')) {
              finalFile = new File([recordedBlob], "grabacion.wav", { type: "audio/wav" });
            } else {
              finalFile = new File([recordedBlob], "grabacion.webm", { type: "audio/webm" });
            }
          } catch (error) {
            finalFile = new File([recordedBlob], "grabacion.webm", { type: "audio/webm" });
          }

          const dataTransfer = new DataTransfer();
          dataTransfer.items.add(finalFile);
          archivoInput.files = dataTransfer.files;

          clearInterval(durationInterval);
          recordStatus.innerHTML = `
            <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span>Grabación completada: ${durationSeconds} segundos</span>
          `;
        };

        mediaRecorder.start();
        recording = true;
        durationSeconds = 0;
        
        recordStatus.innerHTML = `
          <div class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></div>
          <span>Grabando... 0 seg</span>
        `;

        durationInterval = setInterval(() => {
          durationSeconds++;
          recordStatus.innerHTML = `
            <div class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></div>
            <span>Grabando... ${durationSeconds} seg</span>
          `;
        }, 1000);

        btnRecordText.textContent = "Detener Grabación";
        btnRecord.classList.remove("from-emerald-500", "to-teal-500", "hover:from-emerald-600", "hover:to-teal-600");
        btnRecord.classList.add("from-red-500", "to-red-600", "hover:from-red-600", "hover:to-red-700");
      } catch (err) {
        alert("Error al acceder al micrófono: " + err.message);
      }
    } else {
      mediaRecorder.stop();
      recording = false;
      btnRecordText.textContent = "Comenzar Grabación";
      btnRecord.classList.remove("from-red-500", "to-red-600", "hover:from-red-600", "hover:to-red-700");
      btnRecord.classList.add("from-emerald-500", "to-teal-500", "hover:from-emerald-600", "hover:to-teal-600");
    }
  };

  document.getElementById("uploadForm").onsubmit = async (e) => {
    e.preventDefault();

    const token = getToken();

    const titulo = e.target.titulo.value.trim();
    if (!titulo) {
      alert("El título es obligatorio");
      return;
    }

    if (!archivoInput.files.length) {
      alert("Debes grabar un audio o seleccionar un archivo MP3/WAV");
      return;
    }

    const file = archivoInput.files[0];
    const allowedTypes = ["audio/wav", "audio/mpeg", "audio/webm", "audio/mp3", "audio/ogg"];
    if (!allowedTypes.includes(file.type)) {
      alert("Formato no soportado. Formatos permitidos: MP3, WAV, WebM, OGG");
      return;
    }

    const formData = new FormData();
    formData.append("titulo", titulo);
    formData.append("descripcion", e.target.descripcion.value);
    formData.append("duracion_segundos", durationSeconds || "");
    formData.append("file", file);

    const res = await fetch(`${API_BASE}/podcasts/`, {
      method: "POST",
      headers: {
        Authorization: `Bearer ${token}`,
      },
      body: formData,
    });

    if (res.ok) {
      alert("Podcast subido exitosamente");
      e.target.reset();
      recordedBlob = null;
      durationSeconds = 0;
      recordStatus.innerHTML = "";
      fetchPodcasts();
    } else {
      const err = await res.json();
      alert("Error subiendo podcast: " + (err.detail || "desconocido"));
    }
  };

  async function fetchPodcasts() {
    let token;
    try {
      token = getToken();
    } catch {
      return;
    }

    const res = await fetch(`${API_BASE}/podcasts/`, {
      headers: {
        Authorization: `Bearer ${token}`,
      }
    });
    if (!res.ok) {
      alert("Error cargando podcasts");
      return;
    }
    const podcasts = await res.json();
    const container = document.getElementById("podcastList");
    container.innerHTML = "";
    if (podcasts.length === 0) {
      container.innerHTML = `
        <div class="col-span-full text-center py-16">
          <div class="w-24 h-24 bg-gradient-to-r from-purple-400 to-pink-400 rounded-full mx-auto mb-6 flex items-center justify-center">
            <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
            </svg>
          </div>
          <p class="text-purple-200 text-xl font-medium">No hay podcasts disponibles</p>
          <p class="text-purple-300 text-sm mt-2">¡Crea tu primer podcast ahora!</p>
        </div>
      `;
      return;
    }
    
    podcasts.forEach(podcast => {
      const card = document.createElement("article");
      card.className = "group backdrop-blur-lg bg-white/10 border border-white/20 rounded-2xl p-6 shadow-xl hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1";

      const duration = podcast.duracion_segundos ? `${Math.floor(podcast.duracion_segundos / 60)}:${(podcast.duracion_segundos % 60).toString().padStart(2, '0')}` : "N/A";

      card.innerHTML = `
        <div class="flex flex-col h-full">
          <div class="flex items-start justify-between mb-4">
            <div class="flex-1">
              <h3 class="text-xl font-bold text-white group-hover:text-purple-300 transition-colors duration-300 mb-2">${podcast.titulo}</h3>
              <p class="text-purple-200 text-sm mb-4">${podcast.descripcion || "Sin descripción"}</p>
            </div>
            <div class="flex items-center space-x-2 text-purple-300 text-sm">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <span>${duration}</span>
            </div>
          </div>
          
          <div class="flex-1">
            <div class="bg-black/20 rounded-xl p-3 mb-4">
              <audio controls class="w-full" src="${podcast.archivo_url}" style="filter: invert(1) hue-rotate(180deg);"></audio>
            </div>
          </div>
          
          <div class="flex justify-end">
            <button 
              data-id="${podcast.id}" 
              class="group/btn inline-flex items-center space-x-2 bg-red-500/80 hover:bg-red-500 text-white font-semibold px-4 py-2 rounded-xl transition-all duration-300 transform hover:scale-105"
            >
              <svg class="w-4 h-4 group-hover/btn:animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
              <span>Eliminar</span>
            </button>
          </div>
        </div>
      `;

      container.appendChild(card);
    });

    container.querySelectorAll("button").forEach(btn => {
      btn.onclick = async () => {
        if (!confirm("¿Estás seguro de que quieres eliminar este podcast?")) return;

        try {
          const token = getToken();
          const id = btn.getAttribute("data-id");
          const res = await fetch(`${API_BASE}/podcasts/${id}`, {
            method: "DELETE",
            headers: {
              Authorization: `Bearer ${token}`,
            }
          });
          if (res.status === 204) {
            fetchPodcasts();
          } else {
            alert("Error eliminando podcast");
          }
        } catch {
          alert("No estás autenticado para eliminar");
        }
      };
    });
  }

  fetchPodcasts();
</script>

<script src="/js/roles.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const path = window.location.pathname;
    const isSuperadmin = path.includes('/r/superadmin/');
    const isAdmin = path.includes('/r/admin/');
    const isCoordinador = path.includes('/r/coordinador/');
    const isCliente = path.includes('/r/cliente/');
    const isDisInst = path.includes('/r/disenador-instruccional/');
    const isAutor = path.includes('/r/autor/');
    const isRevisor = path.includes('/r/revisor-qa/');
    const isEditor = path.includes('/r/editor/');
    const isDesaMult = path.includes('/r/desarrollador-multimedia/');
    const isAbogado = path.includes('/r/abogado/');
    const isDisGraf = path.includes('/r/disenador-grafico/');
    const isAnim2d = path.includes('/r/animador-2d/');
    const isAnim3d = path.includes('/r/animador-3d/');
    const isVideo = path.includes('/r/video/');
    const isCorrector = path.includes('/r/corrector-de-estilo/');
    const isIngeniero = path.includes('/r/ingeniero-lms/');
    const isRegistrado = path.includes('/r/registrado/');

    const allowedRoles = [];
    if (isSuperadmin) allowedRoles.push('superadmin');
    if (isAdmin) allowedRoles.push('admin');
    if (isCoordinador) allowedRoles.push('coordinador');
    if (isCliente) allowedRoles.push('cliente');
    if (isDisInst) allowedRoles.push('disenador-instruccional');
    if (isAutor) allowedRoles.push('autor');
    if (isRevisor) allowedRoles.push('revisor-qa');
    if (isEditor) allowedRoles.push('editor');
    if (isDesaMult) allowedRoles.push('desarrollador-multimedia');
    if (isAbogado) allowedRoles.push('abogado');
    if (isDisGraf) allowedRoles.push('disenador-grafico');
    if (isAnim2d) allowedRoles.push('animador-2d');
    if (isAnim3d) allowedRoles.push('animador-3d');
    if (isVideo) allowedRoles.push('video');
    if (isCorrector) allowedRoles.push('corrector-de-estilo');
    if (isIngeniero) allowedRoles.push('ingeniero-lms');
    if (isRegistrado) allowedRoles.push('registrado');

    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/';
        return;
    }
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const userRoles = payload.roles || [payload.role].filter(Boolean);
        if (!userRoles.some(r => allowedRoles.includes(r))) {
            window.location.href = '/';
            return;
        }
    } catch(e) {
        window.location.href = '/';
    }
});
</script>

<script>
// ==================== VERIFICACIÓN DE PERMISOS DE MENÚ ====================
(function() {
    const token = localStorage.getItem('token');
    if (!token) return;
    
    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        const permissions = payload.permissions || [];
        
        const hasPermission = (perm) => permissions.includes(perm);
        const hasAnyPermission = (perms) => perms.some(p => permissions.includes(p));
        
        const menuPermissions = {
            'menu-proyectos': ['proyectos_crear', 'proyectos_consultar'],
            'menu-crear-proyecto': ['proyectos_crear'],
            'menu-entidades': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-crear-entidad': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-plan-estudio': ['proyectos_planes_formacion_listar', 'diseno_instruccional_ver'],
            'menu-crear-plan': ['diseno_instruccional_crear'],
            'menu-cursos': ['proyectos_cursos_listar'],
            'menu-crear-curso': ['autor_crear'],
            'menu-modulos': ['proyectos_modulos_listar'],
            'menu-crear-modulo': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-unidades': ['proyectos_unidades_listar'],
            'menu-crear-unidad': ['autor_crear', 'diseno_instruccional_crear'],
            'menu-tareas': ['proyectos_tareas_listar'],
            'menu-crear-tarea': ['autor_crear'],
            'menu-evaluaciones': ['proyectos_evaluaciones_listar'],
            'menu-crear-evaluacion': ['autor_crear'],
            'menu-fases': ['proyectos_fases_etapas_gestionar'],
            'menu-cronogramas': ['proyectos_cronogramas_crear'],
            'menu-calendario': ['proyectos_calendario_ver'],
            'menu-usuarios': ['usuarios_crear'],
            'menu-clientes': ['usuarios_crear'],
            'menu-crm': ['usuarios_crear'],
            'menu-roles': ['roles_permisos_gestionar'],
            'menu-drive': ['archivos_drive_personal_ver', 'archivos_drive_global_ver'],
            'menu-ia': ['ia_produccion_imagen', 'ia_produccion_audio', 'ia_linguistica_usar'],
            'menu-canvas': ['herramientas_canvas_usar'],
            'menu-powerpoint': ['herramientas_powerpoint_usar'],
            'menu-auditoria': ['seguridad_auditoria_ver'],
            'menu-bitacora': ['seguridad_bitacora_usuarios_ver'],
            'menu-estadisticas': ['reportes_estadisticas_ver'],
            'menu-metricas': ['reportes_metricas_ver'],
            'menu-diseno-instruccional': ['diseno_instruccional_ver', 'diseno_instruccional_crear'],
            'menu-autor-contenido': ['autor_ver', 'autor_crear'],
            'menu-microcursos': ['capacitacion_microcursos_ver'],
            'menu-tutoriales': ['capacitacion_tutoriales_ver'],
            'menu-faq': ['capacitacion_faq_ver'],
        };
        
        Object.entries(menuPermissions).forEach(([id, required]) => {
            const el = document.getElementById(id);
            if (el && !hasAnyPermission(required)) {
                el.style.display = 'none';
            }
        });
    } catch(e) {}
})();
</script>
