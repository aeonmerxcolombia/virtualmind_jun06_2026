    function toggleMenu(id) {
      const menu = document.getElementById(id);
      const icon = document.getElementById('icon-' + id);
      const isCurrentlyOpen = !menu.classList.contains('hidden');

      document.querySelectorAll('.menu-container .space-y-1').forEach(m => {
        m.classList.add('hidden');
      });

      document.querySelectorAll('.menu-container svg').forEach(i => {
        i.classList.remove('rotate-180');
      });

      if (!isCurrentlyOpen) {
        menu.classList.remove('hidden');
        icon.classList.add('rotate-180');
      }
    }

    function selectMenu(element) {
      document.querySelectorAll('.menu-item').forEach(item => {
        item.classList.remove('active');

      localStorage.removeItem("token");

    window.iniciarTourSidebar = function() {
      if (!window.driver?.js?.driver) return;

    function parseJwt(token) {
      try {
        const base64Url = token.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(
          atob(base64)
            .split('')
            .map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2))
            .join('')
        );
        return JSON.parse(jsonPayload);
      } catch (e) {
        console.error("Error decodificando token:", e);
        return null;
      }
    }

    async function fetchPermissionsForCurrentRole() {
      if (!token) {
        // El guardián ya se habrá ejecutado
        return new Set();
      }
      const path = window.location.pathname;
      const currentRole = path.split('/')[2];

      if (!currentRole) {
         // Si no hay rol en la URL, es un error, pero el guardián de permisos se detiene
        return new Set();
      }
      
      // La lógica de 'superadmin' vs otros roles ya está aquí
      if (currentRole === 'superadmin') {
        return new Set(); // El superadmin no usa esta función
      }

      try {
        const res = await fetch(`${API}/roles/`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!res.ok) {
          if (res.status === 401) { logout(); }
          throw new Error(`HTTP error! status: ${res.status}`);
        }

        const allRoles = await res.json();
        const currentRoleObject = allRoles.find(r => r.name === currentRole);

        if (currentRoleObject && currentRoleObject.permissions) {
          return new Set(currentRoleObject.permissions.map(p => p.name));
        }
        return new Set();
      } catch (error) {
        console.error(`Error consultando permisos para el rol '${currentRole}':`, error);
        return new Set();
      }
    }

    async function renderSidebar() {
      const sidebarMenu = document.getElementById('dynamic-sidebar-menu');
      if (!sidebarMenu) return;

      sidebarMenu.innerHTML = '';
      const path = window.location.pathname;
      const currentRole = path.split('/')[2];
      let permissionsToRender = new Set();

      if (currentRole === 'superadmin') {
        // Si es superadmin, tiene todos los permisos
        for (const sectionId in menuMapping) {
          menuMapping[sectionId].items.forEach(item =>
            permissionsToRender.add(item.permission)
          );
        }
      } else {
        // Para cualquier otro rol, consulta sus permisos específicos
        permissionsToRender = await fetchPermissionsForCurrentRole();
      }

      for (const sectionId in menuMapping) {
        const section = menuMapping[sectionId];
        const visibleItems = section.items.filter(item =>
          permissionsToRender.has(item.permission)
        );

        if (visibleItems.length > 0) {
          let sectionItemsHTML = visibleItems.map(item =>
            `<a href="#" onclick="selectMenu(this); cargarVista('${item.url}')" class="menu-item block text-gray-200 hover:text-indigo-600 py-1">${item.label}</a>`
          ).join('');

          sidebarMenu.innerHTML += `
            <div class="menu-container">
              <button onclick="toggleMenu('${sectionId}')" class="flex items-center w-full text-white py-2 px-3 rounded hover:bg-[#282c37] transition">
                <span class="mr-3">${section.icon}</span>
                <span class="flex-1 text-left font-semibold">${section.label}</span>
                <svg id="icon-${sectionId}" class="w-4 h-4 ml-auto transition-transform" fill="none" stroke="white" stroke-width="3" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
              </button>
              <div id="${sectionId}" class="ml-9 mt-1 space-y-1 hidden">
                ${sectionItemsHTML}
              </div>
            </div>
          `;
        }
      }
    }

    async function cargarPerfilSidebar() {
      if (!token) return; // El guardián ya se encargó

      const payload = parseJwt(token);
      if (!payload || !payload.user_id) {
        logout();
        return;
      }

      const user_id = payload.user_id;
      localStorage.setItem("user_id", user_id);

      try {
        const res = await fetch(`${API}/users/${user_id}`, {
          headers: { Authorization: "Bearer " + token }
        });
        const data = await res.json();
        const roles = data.roles;

        const sel = document.getElementById("roleSelect");
        sel.innerHTML = "";
        const path = window.location.pathname;
        const currentRole = path.split('/')[2];

        roles.forEach(r => {
          const o = document.createElement("option");
          o.value = r;
          o.textContent = r.charAt(0).toUpperCase() + r.slice(1);
          if (r === currentRole) o.selected = true;
          sel.appendChild(o);
        });

        sel.addEventListener("change", async () => {
          if (!sel.value) return;
          try {
            const res = await fetch(`${API}/auth/switch-role`, {
              method: "POST",
              headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
              body: JSON.stringify({ role: sel.value })
            });
            if (!res.ok) throw new Error((await res.json()).detail || "Error al cambiar rol");
            const data = await res.json();
            localStorage.setItem("token", data.access_token);
            window.location.href = `/r/${sel.value}/`;
          } catch (e) {
            showNotification("error", "Error al cambiar rol: " + e.message);
          }
        });
      } catch (e) {
        console.error("Error cargando roles de usuario:", e);
      }

      try {
        const res2 = await fetch(`${API}/profiles/${user_id}`, {
          headers: { Authorization: "Bearer " + token }
        });
        const p = await res2.json();
        document.getElementById("sidebarAvatar").src = p.foto_url || "/assets/default_avatar.png";
        document.getElementById("sidebarName").textContent = p.nombre || "Perfil";
      } catch (e) {
        console.error("Error cargando perfil:", e);
      }
    }

    async function cargarNotificaciones() {
      try {
        const res = await fetch(`${API}/notifications/`, {
          headers: { Authorization: "Bearer " + token }
        });

        if (res.status === 401) { logout(); return; }
        const data = await res.json();
        const user_id = localStorage.getItem("user_id");
        const notifs = (data.notificaciones || []).filter(n => String(n.usuario_id) === String(user_id));

        notifList.innerHTML = "";

        if (notifs.length === 0) {
          notifCount.textContent = 0;
          notifEmpty.style.display = "block";
          return;
        }
        notifCount.textContent = notifs.length;
        notifEmpty.style.display = "none";

        notifs.forEach(n => {
          const div = document.createElement("div");
          div.className = "px-4 py-2 hover:bg-gray-100 cursor-pointer text-sm";
          div.textContent = `${n.descripcion} • ${new Date(n.fecha).toLocaleString()}`;
          notifList.appendChild(div);
        });
      } catch (err) {
        console.error("Error al cargar notificaciones:", err);
      }
    }

    (async () => {
      await cargarPerfilSidebar();
      await renderSidebar();
      await cargarNotificaciones();
      setInterval(cargarNotificaciones, 30000);
    })();

    function verMiPerfil() {
      const u = localStorage.getItem("user_id");
      const path = window.location.pathname;
      const currentRole = path.split('/')[2];
      if (u && currentRole)
        window.location.href = `/r/${currentRole}/perfil/?user_id=${u}`;
      else
        alert("No hay sesión iniciada o rol actual no definido");
    }

    const chatWidget = document.getElementById('chatWidget');
    const chatWidgetToggle = document.getElementById('chatWidgetToggle');
    const chatBox = document.getElementById("chatBoxWidget");
    const KEY = "chat_historial";

    chatWidgetToggle.addEventListener('click', () => {
      chatWidget.classList.toggle('opened');
      if (chatWidget.classList.contains('opened')) {
        chatBox.scrollTop = chatBox.scrollHeight;
      }
    });

    window.addEventListener("DOMContentLoaded", () => {
      chatBox.innerHTML =
        localStorage.getItem(KEY) ||
        `<div class="chat-bubble bg-white p-3 rounded-lg shadow text-sm text-gray-600">💬 Hola, ¿en qué puedo ayudarte hoy?</div>`;
      chatBox.scrollTop = chatBox.scrollHeight;
    });

    function convertMarkdownToHtml(text) {
      let htmlText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      htmlText = htmlText.replace(/\*(.*?)\*/g, '<strong>$1</strong>');
      htmlText = htmlText.replace(/\n/g, '<br>');
      return htmlText;
    }

    function appendBubble(originalTxt, who = "IA") {
      const d = document.createElement("div");
      d.className = who === "Tú"
        ? "chat-bubble bg-indigo-600 p-3 rounded-lg text-sm text-gray-800"
        : "chat-bubble bg-white p-3 rounded-lg shadow text-sm text-gray-800 relative";

      const id = `respuesta-${Date.now()}`;
      const textoParaMostrar = convertMarkdownToHtml(originalTxt);
      const contenido = `<strong>${who}:</strong> <span id="${id}">${textoParaMostrar}</span>`;
      d.innerHTML = contenido;

      if (who === "IA") {
        const btnCopy = document.createElement("button");
        btnCopy.textContent = "📋 Copiar";
        btnCopy.title = "Copiar al portapapeles";
        btnCopy.className = "ml-2 text-xs text-indigo-600 hover:underline";
        btnCopy.onclick = () => copiarTexto(id);

        const btnSpeak = document.createElement("button");
        btnSpeak.innerHTML = "🔊 Escuchar";
        btnSpeak.title = "Escuchar esta respuesta";
        btnSpeak.className = "ml-2 text-xs text-indigo-600 hover:underline";
        btnSpeak.onclick = () => speakText(originalTxt, btnSpeak);

        const buttonsContainer = document.createElement("div");
        buttonsContainer.className = "mt-1 flex";
        buttonsContainer.appendChild(btnCopy);
        buttonsContainer.appendChild(btnSpeak);
        d.appendChild(buttonsContainer);
      }
      chatBox.appendChild(d);
      chatBox.scrollTop = chatBox.scrollHeight;
      const copia = chatBox.cloneNode(true);
      copia.querySelectorAll("button").forEach(b => b.remove());
      localStorage.setItem(KEY, copia.innerHTML);
    }

    async function enviarMensaje() {
      const msg = document.getElementById("chatInput").value.trim();
      if (!msg) return;
      appendBubble(msg, "Tú");
      document.getElementById("chatInput").value = "";

      const t = document.createElement("div");
      t.id = "typing";
      t.className = "chat-bubble bg-gray-100 p-3 rounded-lg italic text-gray-500";
      t.innerText = "💬 IA está escribiendo...";
      chatBox.appendChild(t);
      chatBox.scrollTop = chatBox.scrollHeight;

      const mdl = document.getElementById("modeloIA").value;
      try {
        const r = await fetch(`${API}/chat/${mdl}`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({ prompt: msg })
        });

        const { respuesta } = await r.json();
        appendBubble(respuesta, "IA");
      } catch {
        appendBubble("❌ Error al contactar IA.", "IA");
      } finally {
        document.getElementById("typing")?.remove();
      }
    }

    const toggleBtn = document.getElementById('accessibilityToggle'),
          panel = document.getElementById('accessibilityControls'),
          wrap = document.getElementById('accessibilityMenu');

    toggleBtn.addEventListener('click', () => {
      const exp = toggleBtn.getAttribute('aria-expanded') === 'true';
      toggleBtn.setAttribute('aria-expanded', String(!exp));
      wrap.classList.toggle('opened');
    });

    panel.querySelectorAll('button[data-act]').forEach(b => {
      b.addEventListener('click', () =>
        document.body.classList.toggle(b.getAttribute('data-act'))
      );
    });

    document.getElementById('resetAccessibility').addEventListener('click', () => {
      ['contrast', 'large-text', 'grayscale', 'dyslexia', 'reduce-motion']
        .forEach(c => document.body.classList.remove(c));
    });

    function copiarTexto(id) {
      const texto = document.getElementById(id)?.innerText;
      if (texto) {
        navigator.clipboard.writeText(texto)
          .then(() => alert("✅ Texto copiado al portapapeles"))
          .catch(() => alert("❌ No se pudo copiar"));
      }
    }

    let recognition;
    let isListening = false;

    document.addEventListener('DOMContentLoaded', () => {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        const micButton = document.getElementById('micButton');
        if (micButton) {
          micButton.disabled = true;
          micButton.title = 'Navegador no compatible';
        }
      }

      const micButton = document.getElementById('micButton');
      if (micButton) micButton.addEventListener('click', toggleSpeechRecognition);
    });

    function toggleSpeechRecognition() {
      if (!recognition) {
        recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onresult = function (event) {
          const transcript = event.results[0][0].transcript;
          document.getElementById('chatInput').value = transcript;
        };

        recognition.onerror = function (event) {
          console.error('Error en reconocimiento de voz:', event.error);
          isListening = false;
          updateMicButton();
        };

        recognition.onend = function () {
          isListening = false;
          updateMicButton();
        };
      }
      if (isListening) {
        recognition.stop();
      } else {
        recognition.start();
        document.getElementById('chatInput').value = 'Escuchando...';
      }
      isListening = !isListening;
      updateMicButton();
    }

    function updateMicButton() {
      const micButton = document.getElementById('micButton');
      if (micButton) {
        micButton.textContent = isListening ? '⏹️' : '🎤';
        micButton.title = isListening ? 'Detener escucha' : 'Iniciar escucha por voz';

        if (isListening) {
          micButton.classList.add('bg-red-200');
          micButton.classList.remove('bg-gray-200');
        } else {
          micButton.classList.remove('bg-red-200');
          micButton.classList.add('bg-gray-200');
        }
      }
    }

    function sanitizeTextForSpeech(text) {
      let cleanedText = text.replace(/\*\*(.*?)\*\*/g, '$1');
      cleanedText = cleanedText.replace(/\*(.*?)\*/g, '$1');
      cleanedText = cleanedText.replace(/[\#\>\-]/g, '');
      cleanedText = cleanedText.replace(/\n/g, ' ').replace(/\s{2,}/g, ' ');
      return cleanedText.trim();
    }

    function updateSpeakButtonState(button, state) {
      if (button) {
        button.disabled = state === 'disabled';
        button.style.opacity = state === 'disabled' ? 0.5 : 1;
        button.style.cursor = state === 'disabled' ? 'not-allowed' : 'pointer';
        button.textContent = state === 'disabled' ? '🔊 Leyendo...' : '🔊 Escuchar';
      }
    }

    function speakText(text, button) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const cleanedText = sanitizeTextForSpeech(text);
        const utterance = new SpeechSynthesisUtterance(cleanedText);
        utterance.lang = 'es-ES';
        utterance.rate = 1;
        utterance.pitch = 1;
        utterance.volume = 1;

        updateSpeakButtonState(button, 'disabled');

        utterance.onend = function () {
          updateSpeakButtonState(button, 'enabled');
        };

        utterance.onerror = function (event) {
          console.error('Error en síntesis de voz:', event);
          updateSpeakButtonState(button, 'enabled');
        };
        setTimeout(() => {
          window.speechSynthesis.speak(utterance);
        }, 100);
      } else {
        alert('Tu navegador no soporta la síntesis de voz.');
      }
    }

    function googleTranslateElementInit() {
      new google.translate.TranslateElement(
        { pageLanguage: 'es', layout: google.translate.TranslateElement.InlineLayout.SIMPLE },
        'google_translate_element'
      );
    }
  </script>
