<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Unidades y Actividades de Aprendizaje</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-3xl mx-auto mt-10">
    <h1 class="text-2xl font-bold mb-6 text-gray-900">Unidades</h1>
    <table class="min-w-full bg-white rounded-xl shadow text-sm">
      <thead>
        <tr>
          <th class="py-2 px-4 text-left">ID</th>
          <th class="py-2 px-4 text-left">Nombre</th>
          <th class="py-2 px-4 text-left">Acciones</th>
        </tr>
      </thead>
      <tbody id="unitsTable"></tbody>
    </table>
  </div>

  <!-- Modal Crear Actividad -->
  <div id="modalActividad"
    class="fixed inset-0 bg-black bg-opacity-40 z-50 flex items-center justify-center hidden"
    onclick="if(event.target===this)closeModal()">
    <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-md relative">
      <button onclick="closeModal()" class="absolute top-3 right-4 text-2xl text-gray-400 hover:text-gray-700">&times;</button>
      <h2 class="text-lg font-bold mb-3">Crear Actividad de Aprendizaje</h2>
      <form id="createActivityForm" class="space-y-3">
        <input type="hidden" name="unit_id" id="activityUnitId">
        <div>
          <label class="block text-gray-700 mb-1">Nombre</label>
          <input type="text" name="nombre" required class="w-full border p-2 rounded">
        </div>
        <div>
          <label class="block text-gray-700 mb-1">Descripción</label>
          <textarea name="descripcion" rows="2" class="w-full border p-2 rounded"></textarea>
        </div>
        <div>
          <label class="block text-gray-700 mb-1">Tipo</label>
          <input type="text" name="tipo" class="w-full border p-2 rounded">
        </div>
        <div>
          <label class="block text-gray-700 mb-1">Recursos</label>
          <textarea name="recursos" rows="2" class="w-full border p-2 rounded"></textarea>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">
          Crear Actividad
        </button>
      </form>
      <div id="resultActivity" class="mt-2"></div>
    </div>
  </div>

  <script>
    const API = "https://gestordecursos.pegui.edu.co:8000"; // Cambia si usas otra IP/host

    // 1. Cargar y listar unidades
    async function cargarUnidades() {
      const tbody = document.getElementById('unitsTable');
      tbody.innerHTML = '<tr><td colspan="3" class="py-4 text-center text-gray-400">Cargando...</td></tr>';
      try {
        const res = await fetch(`${API}/units/`);
        const units = await res.json();
        tbody.innerHTML = "";
        units.forEach(u => {
          tbody.innerHTML += `
            <tr class="border-t hover:bg-gray-50">
              <td class="py-2 px-4">${u.id}</td>
              <td class="py-2 px-4">${u.name}</td>
              <td class="py-2 px-4">
                <button class="bg-green-600 hover:bg-green-700 text-white px-4 py-1 rounded font-semibold"
                  onclick="abrirModal(${u.id})">Crear Actividad</button>
              </td>
            </tr>
          `;
        });
      } catch {
        tbody.innerHTML = '<tr><td colspan="3" class="py-4 text-center text-red-500">Error cargando unidades</td></tr>';
      }
    }

    // 2. Modal
    function abrirModal(unitId) {
      document.getElementById("modalActividad").classList.remove("hidden");
      document.getElementById("activityUnitId").value = unitId;
      document.getElementById("resultActivity").innerHTML = '';
      document.getElementById("createActivityForm").reset();
    }
    function closeModal() {
      document.getElementById("modalActividad").classList.add("hidden");
    }

    // 3. Crear Actividad
    document.getElementById('createActivityForm').onsubmit = async function(e) {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(this));
      data.unit_id = Number(data.unit_id);

      const res = await fetch(`${API}/learning_activities/`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
      });
      const resultDiv = document.getElementById('resultActivity');
      if (res.ok) {
        resultDiv.innerHTML = '<span class="text-green-600 font-bold">¡Actividad creada!</span>';
        setTimeout(() => { closeModal(); cargarUnidades(); }, 1200);
      } else {
        const err = await res.json();
        resultDiv.innerHTML = '<span class="text-red-600">Error: ' + (err.detail || 'No se pudo crear') + '</span>';
      }
    };

    cargarUnidades();
  </script>
</body>
</html>
